services:
  web-portal:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: agent-eval-web:latest
    container_name: agent-eval-web
    ports:
      - "3000:3000"
    environment:
      - WORKSPACE_DIR=/app/workspace
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      # workspace 需要可写：API 支持 POST /api/index/rebuild
      - ./workspace:/app/workspace
      # assets 只读：项目配置
      - ./assets:/app/assets:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
