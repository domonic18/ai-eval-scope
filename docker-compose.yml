# Agent Eval 可观测平台 — 一键起栈
#
# 约定（参考 SquadSight）：
#   - docker-compose.yml 置于仓库根目录
#   - Dockerfile 集中在 docker/<service>/ 下
#   - 所有配置/凭据来自仓库根 .env（env_file），本文件不硬编码密钥
#
# 用法：
#   cp .env.example .env   # 首次：填入凭据
#   docker compose up -d   # 或 make docker-up
#
# 起栈后：
#   Web/后端 http://localhost:9000   健康 http://localhost:9000/health（对齐腾讯云函数默认 9000）
#   MinIO    API http://localhost:9100  控制台 http://localhost:9101
#   Postgres localhost:5432

name: agent-eval-platform

services:
  # ── PostgreSQL（结构化评估数据）──
  postgres:
    image: postgres:16-alpine
    env_file: ./.env              # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    ports:
      - "5432:5432"
    volumes:
      # 持久化到 workspace 下，便于调试/重置/检视
      - ./workspace/data/postgres:/var/lib/postgresql/data
      # 首次起栈（空库）自动导入建表 SQL；非空卷不重跑，不破坏已有数据
      - ./docker/web/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eval} -d ${POSTGRES_DB:-agent_eval}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO（S3 兼容对象存储，本地替代 COS/S3）──
  # 注：宿主端口改为 9100/9101，把 9000 让给 Web（对齐腾讯云函数默认 9000）。
  # 容器内仍监听 9000/9001，平台经内网 http://minio:9000 访问，不受影响。
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: ./.env              # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      # 持久化到 workspace 下，便于调试/重置/检视
      - ./workspace/data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 一次性建桶（minio 起来且健康后跑，建 PLATFORM_S3_BUCKET 指定的桶）──
  minio-init:
    image: minio/mc:latest
    env_file: ./.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$PLATFORM_S3_BUCKET &&
      mc anonymous set download local/$$PLATFORM_S3_BUCKET || true
      "

  # ── Web 容器（Express + Prisma + 前端托管）──
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file: ./.env              # PLATFORM_OBJECT_STORAGE/REGION/BUCKET/PATH_STYLE/JWT_*/INGEST_* 等
    environment:
      NODE_ENV: production
      # 由 [4] POSTGRES_* 单一凭据源派生（容器内 host=postgres）
      PLATFORM_DATABASE_URL: postgresql://${POSTGRES_USER:-eval}:${POSTGRES_PASSWORD:-evalpassword}@postgres:5432/${POSTGRES_DB:-agent_eval}?schema=public
      # 由 [5] MINIO_ROOT_* 单一凭据源派生（容器内 endpoint=服务名）
      PLATFORM_S3_ENDPOINT: http://minio:9000
      PLATFORM_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-eval}
      PLATFORM_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-evalpassword123}
      PLATFORM_S3_BUCKET: ${PLATFORM_S3_BUCKET:-agent-eval}
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
