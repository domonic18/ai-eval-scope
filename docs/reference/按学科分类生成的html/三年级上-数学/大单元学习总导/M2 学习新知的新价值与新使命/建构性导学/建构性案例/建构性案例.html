<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建构性案例 — 内在驱动力引擎</title>
<style>
:root {
  --primary: #1677ff;--primary-hover: #4096ff;--accent: #69b1ff;
  --bg: linear-gradient(180deg,#1a0a00 0%,#3d1f00 30%,#f5a623 70%,#ffd700 100%);
  --card-bg: #ffffff;--text: rgba(0,0,0,0.88);--text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;--border-radius: 8px;--shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 18px;--font-h1: 28px;--font-h2: 22px;--line-height: 1.8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:var(--font-body);line-height:var(--line-height);color:var(--text);
  background:var(--bg);width:100%;max-width:none;min-height:100vh;overflow-x:hidden
}
.top-bar{
  background:rgba(26,10,0,.95);padding:14px 24px;display:flex;
  align-items:center;gap:12px;border-bottom:3px solid #f5a623;flex-wrap:wrap
}
.top-bar .title{color:#ffd700;font-size:22px;font-weight:700;text-shadow:0 0 10px rgba(255,215,0,.3)}
.top-bar .sub{color:#ccc;font-size:14px}
.top-bar .badge{background:#f5a623;color:#1a0a00;padding:2px 14px;border-radius:14px;font-weight:700;font-size:13px}
.status-bar{background:rgba(0,0,0,.6);padding:8px 24px;display:flex;gap:20px;font-size:14px;color:#ccc;flex-wrap:wrap;justify-content:center}
.status-bar .stat{display:flex;align-items:center;gap:6px}
.engine-area{display:flex;flex-direction:column;align-items:center;padding:24px 20px 16px;position:relative}
.engine-title{font-size:26px;font-weight:700;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.4);text-align:center}
.engine-sub{color:#f5a623;font-size:15px;margin-bottom:16px;text-align:center}
.engine-container{position:relative;width:100%;max-width:600px;height:280px;margin:0 auto}
.engine-bg{position:absolute;width:100%;height:100%;background:radial-gradient(ellipse at center,#3d1f00 0%,#1a0a00 70%);border-radius:50%;border:3px solid #f5a623;box-shadow:0 0 40px rgba(245,166,35,.2)}
.cylinder{position:absolute;bottom:24px;width:44px;height:100px;border:3px solid #b87333;border-radius:6px 6px 0 0;overflow:hidden;transition:all .5s;cursor:pointer}
.cylinder:nth-child(1){left:10%}.cylinder:nth-child(2){left:27%}.cylinder:nth-child(3){left:44%}.cylinder:nth-child(4){left:61%}.cylinder:nth-child(5){left:78%}
.cylinder-fill{position:absolute;bottom:0;width:100%;height:0%;background:linear-gradient(0deg,#f5a623,#ffd700);transition:height 1s ease;border-radius:0 0 4px 4px}
.cylinder-label{position:absolute;top:-24px;width:100%;text-align:center;font-size:9px;color:#b87333;font-weight:600;white-space:nowrap}
.cylinder-glow{position:absolute;bottom:0;width:100%;height:0%;background:radial-gradient(ellipse at center,rgba(255,215,0,.6),transparent);transition:height .8s;opacity:0}
.cylinder.active .cylinder-glow{opacity:1;height:100%}
.energy-balls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:12px;min-height:50px}
.energy-ball{
  width:58px;height:58px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:600;color:#fff;
  cursor:grab;transition:all .3s;box-shadow:0 0 16px rgba(255,215,0,.3);
  text-align:center;padding:3px;user-select:none
}
.energy-ball:hover{transform:scale(1.12);box-shadow:0 0 24px rgba(255,215,0,.6)}
.engine-buttons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.engine-btn{
  padding:8px 20px;border:none;border-radius:8px;font-size:15px;
  font-weight:700;cursor:pointer;transition:all .3s
}
.engine-btn.primary{background:linear-gradient(135deg,#f5a623,#ffd700);color:#1a0a00;box-shadow:0 4px 16px rgba(245,166,35,.4)}
.engine-btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(245,166,35,.6)}
.engine-btn.primary:disabled{opacity:.5;cursor:not-allowed}
.engine-btn.secondary{background:rgba(255,255,255,.1);color:#ffd700;border:2px solid #f5a623}
.engine-btn.secondary:hover{background:rgba(245,166,35,.2)}
.engine-btn.danger{background:#ff4d4f;color:#fff}
.content-section{width:100%;max-width:800px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.case-card{
  background:rgba(255,255,255,.95);border-radius:12px;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.12);transition:all .4s;border-left:5px solid #f5a623
}
.case-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,166,35,.2)}
.case-header{
  padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;user-select:none
}
.case-header .left{display:flex;align-items:center;gap:10px}
.case-header .num{width:30px;height:30px;background:#f5a623;color:#1a0a00;border-radius:50%;text-align:center;line-height:30px;font-weight:700;font-size:14px;flex-shrink:0}
.case-header .title{font-weight:600;font-size:16px;color:#3d1f00}
.case-header .arrow{font-size:18px;color:#f5a623;transition:transform .4s}
.case-card.expanded .arrow{transform:rotate(180deg)}
.case-body{padding:0 18px 16px;display:none;animation:slideDown .3s ease}
.case-card.expanded .case-body{display:block}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:500px}}
.case-body .step{background:#fef9e7;padding:8px 12px;border-radius:6px;margin:4px 0;font-size:14px;border-left:3px solid #f5a623}
.case-body .step strong{color:#d46b08}
.case-body .outcome{background:#e6fffb;padding:8px 12px;border-radius:6px;margin:8px 0;font-size:14px;border-left:3px solid #13c2c2}
.rubric{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.rubric-item{padding:4px 10px;border-radius:12px;font-size:12px;background:var(--bg);color:var(--text-secondary);cursor:pointer;transition:.3s;border:1px solid transparent}
.rubric-item:hover{border-color:#52c41a;color:#52c41a;}
.rubric-item.checked{background:#f6ffed;color:#52c41a;border-color:#52c41a;text-decoration:line-through}
.ignition-effect{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at center,rgba(255,215,0,.8),rgba(245,166,35,.5),transparent 70%);
  pointer-events:none;z-index:999;opacity:0;transition:opacity .5s
}
.ignition-effect.active{opacity:1;animation:ignitionPulse .5s ease 3}
@keyframes ignitionPulse{0%,100%{opacity:.6}50%{opacity:1}}
.modal-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center
}
.modal-overlay.show{display:flex}
.modal-box{
  background:var(--card-bg);border-radius:16px;padding:24px;max-width:480px;
  width:90%;box-shadow:0 8px 40px rgba(0,0,0,.3);max-height:80vh;overflow-y:auto
}
.modal-box h3{color:#3d1f00;margin-bottom:12px}
.recipe-grid{display:grid;gap:10px}
.recipe-card{padding:12px;border-radius:8px;background:#fef9e7;border:1px solid #f5a623}
.recipe-card .label{font-weight:700;color:#f5a623;font-size:13px}
.recipe-card .val{font-size:14px;margin-top:4px}
.peer-chart{height:180px;display:flex;align-items:flex-end;gap:8px;justify-content:center;padding:10px}
.peer-bar{width:45px;background:linear-gradient(0deg,#f5a623,#ffd700);border-radius:6px 6px 0 0;position:relative;text-align:center;font-size:10px;color:#1a0a00;font-weight:600;transition:height 1s}
.peer-bar .bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;color:#ccc;font-size:10px}
.firstaid-list{display:grid;gap:8px}
.firstaid-item{padding:8px 12px;background:#fef9e7;border-radius:8px;display:flex;gap:10px;align-items:center;font-size:14px}
.firstaid-item .icon{font-size:20px;flex-shrink:0}
.declaration-form{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.declaration-form input{width:100%;padding:10px;border:2px solid #f5a623;border-radius:8px;font-size:15px;background:#fff;outline:none}
.declaration-form input:focus{border-color:#ffd700;box-shadow:0 0 8px rgba(245,166,35,.3)}
.declaration-form button{padding:10px;background:linear-gradient(135deg,#f5a623,#ffd700);color:#1a0a00;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:15px}
.tab-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:6px 16px;border-radius:20px;border:2px solid #f5a623;background:transparent;color:#f5a623;cursor:pointer;font-size:13px;font-weight:600;transition:.3s}
.tab-btn.active,.tab-btn:hover{background:#f5a623;color:#1a0a00}
@media(max-width:768px){
  .cylinder{width:36px;height:80px}
  .cylinder:nth-child(1){left:5%}.cylinder:nth-child(2){left:22%}.cylinder:nth-child(3){left:39%}.cylinder:nth-child(4){left:56%}.cylinder:nth-child(5){left:73%}
  .engine-container{height:220px}
  .energy-ball{width:50px;height:50px;font-size:9px}
}
</style>
</head>
<body>
<div class="top-bar">
  <span class="title">⚙️ 内在驱动力引擎</span>
  <span class="badge">激活模式</span>
  <span class="sub">数学 · 三年级上 · 建构性案例</span>
</div>
<div class="status-bar">
  <span class="stat">📚 已探索: <span class="val" id="exploredCount">0</span>/7 案例</span>
  <span class="stat">✅ 已完成: <span class="val" id="doneCount">0</span></span>
</div>

<div class="engine-area">
  <div class="engine-title">🔥 建构案例驱动引擎</div>
  <div class="engine-sub">探索7个建构案例，注入你的学习能量</div>
  <div class="energy-balls" id="ballArea">
    <div class="energy-ball" draggable="true" data-type="cog" style="background:radial-gradient(#ff6b6b,#c0392b)">🧠 时间尺</div>
    <div class="energy-ball" draggable="true" data-type="emo" style="background:radial-gradient(#ff9ff3,#8e44ad)">🍳 计时方案</div>
    <div class="energy-ball" draggable="true" data-type="soc" style="background:radial-gradient(#54a0ff,#2980b9)">⏰ 课间规划</div>
    <div class="energy-ball" draggable="true" data-type="ach" style="background:radial-gradient(#5f27cd,#341f97)">🔐 记忆密码</div>
    <div class="energy-ball" draggable="true" data-type="val" style="background:radial-gradient(#f5a623,#d46b08)">📘 跨学科手册</div>
    <div class="energy-ball" draggable="true" data-type="cog" style="background:radial-gradient(#ff6b6b,#c0392b)">🏛️ 古法计时</div>
    <div class="energy-ball" draggable="true" data-type="val" style="background:radial-gradient(#f5a623,#d46b08)">🚀 未来方案</div>
  </div>

  <div class="engine-container" id="engineContainer">
    <div class="engine-bg"></div>
    <div class="cylinder" data-cylinder="cog"><div class="cylinder-label">认知</div><div class="cylinder-glow"></div><div class="cylinder-fill" id="fillCog"></div></div>
    <div class="cylinder" data-cylinder="emo"><div class="cylinder-label">情感</div><div class="cylinder-glow"></div><div class="cylinder-fill" id="fillEmo"></div></div>
    <div class="cylinder" data-cylinder="soc"><div class="cylinder-label">社会</div><div class="cylinder-glow"></div><div class="cylinder-fill" id="fillSoc"></div></div>
    <div class="cylinder" data-cylinder="ach"><div class="cylinder-label">成就</div><div class="cylinder-glow"></div><div class="cylinder-fill" id="fillAch"></div></div>
    <div class="cylinder" data-cylinder="val"><div class="cylinder-label">价值</div><div class="cylinder-glow"></div><div class="cylinder-fill" id="fillVal"></div></div>
  </div>
</div>

<div class="ignition-effect" id="ignitionEffect"></div>

<div class="engine-buttons">
  <button class="engine-btn primary" id="startBtn" onclick="startEngine()" disabled>🚀 启动引擎</button>
  <button class="engine-btn secondary" id="formulaBtn" onclick="showRecipe()" disabled>📋 生成动力配方</button>
  <button class="engine-btn secondary" onclick="showPeer()">📊 同伴对比</button>
  <button class="engine-btn danger" onclick="showDeclaration()">📜 动力宣言</button>
</div>

<div class="content-section">
  <div class="tab-bar">
    <button class="tab-btn active" data-filter="all" onclick="filterCases('all',this)">📋 全部案例</button>
    <button class="tab-btn" data-filter="person" onclick="filterCases('person',this)">👤 个人</button>
    <button class="tab-btn" data-filter="life" onclick="filterCases('life',this)">🏠 生活</button>
    <button class="tab-btn" data-filter="school" onclick="filterCases('school',this)">🏫 校园</button>
    <button class="tab-btn" data-filter="creative" onclick="filterCases('creative',this)">🎨 创意</button>
  </div>

  <div id="caseList"></div>
</div>

<div class="modal-overlay" id="recipeModal">
  <div class="modal-box"><h3>📋 个人学习动力配方</h3><div id="recipeContent" class="recipe-grid"></div><button class="engine-btn primary" style="margin-top:12px;width:100%" onclick="closeModal('recipeModal')">知道了</button></div>
</div>
<div class="modal-overlay" id="peerModal">
  <div class="modal-box"><h3>📊 班级探索分布</h3><div class="peer-chart" id="peerChart"></div><p style="text-align:center;font-size:13px;color:var(--text-secondary);margin-top:10px">匿名对比 · 基于模拟数据</p><button class="engine-btn primary" style="margin-top:12px;width:100%" onclick="closeModal('peerModal')">关闭</button></div>
</div>
<div class="modal-overlay" id="declarationModal">
  <div class="modal-box"><h3>📜 动力宣言</h3>
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:8px">完成你的学习动力宣言：</p>
    <div class="declaration-form">
      <div style="font-size:15px">"我学这个是因为</div>
      <input id="declInput1" placeholder="为什么学时间？">
      <div style="font-size:15px">______"</div>
      <button onclick="submitDeclaration()">⚡ 刻上引擎铭牌</button>
    </div>
  </div>
</div>

<script>
const cases = [
  {id:1,title:"我的专属时间尺",cat:"person",situation:"每个人对"一分钟"的感觉不一样——怎样做一把个人"时间尺"？",
   steps:[
     {label:"记录节奏",detail:"先深呼吸10次，感受你的呼吸节奏。然后闭眼数60秒，同时记录你的心跳或呼吸次数。"},
     {label:"校准",detail:"用真实时钟或秒表核对你的估计。偏差了多少秒？反复练习3次，找到你的"个人节奏键"。"},
     {label:"制作刻度尺",detail:"用一张长纸条，以你的个人节奏为单位画出刻度——标注秒、分的位置。"},
     {label:"测试准确性",detail:"让家人随机说一个时长（如30秒），你用时间尺估计。记录准确率。"}
   ],outcome:"个人时间尺手工作品 + 使用说明书",rubric:["时间尺至少标注3个时间点","校准记录≥3次","说明书能让他人看懂","测试准确率≥70%","使用了至少一种生活节奏"]},
  {id:2,title:"家庭计时方案设计",cat:"life",situation:"家里煮鸡蛋总是煮过头或不够熟——设计一套不用专业计时器的计时方案。",
   steps:[
     {label:"设定需求",detail:"确定要计时的场景：煮鸡蛋、泡面、刷牙、晾衣服……每个场景需要多长时间？"},
     {label:"寻找替代计时法",detail:"不用钟表怎么计时？可以用：唱歌（一首歌约3分钟）、步行（走100步约1分钟）、数数（数60下约40秒）。"},
     {label:"方案设计",detail:"为每个场景匹配一个替代计时法。写下"场景→计时法→预估时长"对照表。"},
     {label:"测试验证",detail:"实际执行一次，用钟表核对。修改方案直到误差在10秒以内。"}
   ],outcome:"家庭计时方案卡（含3个以上场景）",rubric:["覆盖≥3个生活场景","计时法不需要任何电子设备","误差≤10秒","方案卡图文并茂","请家人试用并签名"]},
  {id:3,title:"课间活动时间规划师",cat:"school",situation:"课间10分钟总觉得不够用——科学规划你的课间时间。",
   steps:[
     {label:"记录现状",detail:"连续3天记录课间10分钟实际做了什么——用秒表记录每项活动耗时。"},
     {label:"分析时间分配",detail:"把活动分为"必须做"（上厕所、接水）和"可以选"（聊天、看书）。画饼图。"},
     {label:"设计新方案",detail:"按优先级排序，设计一份"课间10分钟黄金方案"。必须活动安排在第1-4分钟。"},
     {label:"实际试行",detail:"按新方案试行2天，记录是否更从容。修改后分享给同学。"}
   ],outcome:"课间时间规划表 + 试行报告",rubric:["完整记录≥3天的课间活动","绘制了时间分配饼图","方案有明确的优先级排序","试行后做了修改优化","可以用数据说明方案效果"]},
  {id:4,title:"时间换算记忆密码",cat:"creative",situation:"同学总说"1小时=100分钟"——创造一套让人忘不掉的记忆方法。",
   steps:[
     {label:"分析难记点",detail:""时、分、秒"之间到底哪些换算最容易记混？收集3个同学最容易错的地方。"},
     {label:"寻找记忆锚点",detail:"找顺口溜、图形、故事。例如："小时到分×60，分到秒再×60"——编成口诀。"},
     {label:"创作记忆工具",detail:"选择形式：口诀/图表/故事/歌曲/手勢。创作你的独一无二的记忆工具。"},
     {label:"同伴试用",detail:"让3个同学试用你的记忆工具。统计他们用之前和用之后的错误率变化。"}
   ],outcome:"原创时间记忆工具（口诀/图表/故事等）",rubric:["针对≥3个易混淆的换算点","工具形式有创意","同学试用后错误率下降≥50%","工具能30秒内说清楚","可分享给其他班级使用"]},
  {id:5,title:"'一分钟能做什么'跨学科手册",cat:"creative",situation:"一分钟能写几个字？跳几下绳？心脏跳几下？制作一本"一分钟能力手册"。",
   steps:[
     {label:"设计测量项目",detail:"设计至少5个项目：写字、跳绳、深呼吸、上下楼梯、拍球……每个项目定好测量方法。"},
     {label:"实际测量记录",detail:"用秒表精确计时1分钟。每个项目做3次取平均数。制作数据表格。"},
     {label:"跨学科汇总",detail:"数学（计算平均数）→体育（运动数据）→语文（写字速度）→科学（心率变化）。"},
     {label:"制作手册",detail:"把数据变成一本迷你手册。封面写"一分钟能做____"——填空用你的最大发现。"}
   ],outcome:"《一分钟能做什么》跨学科手册",rubric:["测量项目≥5个（至少跨3个学科）","每个项目有3次测量数据","手册包含数据表和发现结论","有一个"最让人惊讶"的发现","手册排版整洁可展示"]},
  {id:6,title:"古代人的计时方法研究报告",cat:"life",situation:"没有钟表——古人怎么知道时间？研究并制作简易模型。",
   steps:[
     {label:"文献查阅",detail:"查资料了解一种古代计时法：日晷、沙漏、水钟、铜壶滴漏、燃香计时……"},
     {label:"理解原理",detail:"画出原理图：日晷靠太阳影子移动，水钟靠水流速度均匀——写出你怎么理解它。"},
     {label:"动手制作简易模型",detail:"用家里材料制作一个简易版：纸盘+筷子做日晷，塑料瓶做水钟。"},
     {label:"对比现代计时",detail:"用你的模型和手机手表同时计时。模型误差多少？古人为什么需要更精确的钟？"}
   ],outcome:"古代计时法研究报告 + 简易模型",rubric:["至少研究一种古代计时法","制作了可运行的简易模型","测量了模型的误差","能解释模型的工作原理","报告含古今计时对比"]},
  {id:7,title:"未来时间管理创意方案",cat:"creative",situation:"假如未来一天变成30小时——你会怎么安排学习和生活？",
   steps:[
     {label:"分析现状",detail:"现在一天24小时你怎么过的？列出你希望"多些时间"做的事情。"},
     {label:"提出假设",detail:"如果一天30小时——多了6小时怎么分配？睡觉、学习、玩、运动各加多少？"},
     {label:"方案设计",detail:"制作一份"30小时一天"的作息表。要有创意：比如"下午有两个夕阳"——第二个夕阳时段专做喜欢的事。"},
     {label:"可行性评估",detail:"你的方案最大的好处是什么？最大的问题是什么？如果全世界都变30小时会怎样？"}
   ],outcome:"未来时间创意方案海报",rubric:["作息表覆盖一天30小时","至少有1个创意亮点","分析了方案的优缺点","用图画或图表呈现","能用3句话说清核心创意"]}
];

let fillLevels = {cog:0,emo:0,soc:0,ach:0,val:0};
const typeMap = {1:'cog',2:'emo',3:'soc',4:'ach',5:'val',6:'cog',7:'val'};
let exploredSet = new Set();
let activeFilter = 'all';

function renderCases(filter){
  const list = document.getElementById('caseList');
  const filtered = filter==='all'?cases:cases.filter(c=>c.cat===filter);
  list.innerHTML = filtered.map(c => `
    <div class="case-card" data-id="${c.id}">
      <div class="case-header" onclick="toggleCase(this)">
        <div class="left">
          <span class="num">${c.id}</span>
          <span class="title">${c.title}</span>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="case-body">
        <p style="font-size:14px;color:var(--text-secondary);margin-bottom:8px">📖 ${c.situation}</p>
        <div style="margin:8px 0"><strong>建构步骤：</strong></div>
        ${c.steps.map(s => `<div class="step"><strong>${s.label}</strong>：${s.detail}</div>`).join('')}
        <div class="outcome">🎯 成果：${c.outcome}</div>
        <div><strong style="font-size:13px">✅ 自评量规（点击勾选完成项）：</strong></div>
        <div class="rubric">${c.rubric.map(r => `<span class="rubric-item" onclick="this.classList.toggle('checked')">☐ ${r}</span>`).join('')}</div>
        <button class="engine-btn secondary" style="margin-top:8px;font-size:13px;padding:4px 14px" onclick="completeCase(${c.id})">✅ 标记完成</button>
      </div>
    </div>
  `).join('');
}

function toggleCase(header){
  const card = header.closest('.case-card');
  const wasExpanded = card.classList.contains('expanded');
  card.classList.toggle('expanded');
  if(!wasExpanded){
    const id = parseInt(card.dataset.id);
    if(!exploredSet.has(id)){
      exploredSet.add(id);
      injectEnergy(typeMap[id], id);
      document.getElementById('exploredCount').textContent = exploredSet.size;
    }
  }
}

function completeCase(id){
  const btn = event.target;
  btn.textContent = '✅ 已完成！';
  btn.disabled = true;
  btn.style.opacity = '.6';
  const done = document.querySelectorAll('.engine-btn.secondary[disabled]').length;
  document.getElementById('doneCount').textContent = done;
  if(exploredSet.size >= 5){
    document.getElementById('startBtn').disabled = false;
  }
}

function filterCases(filter, btn){
  activeFilter = filter;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCases(filter);
}

function injectEnergy(type, id){
  const fill = document.getElementById('fill'+type.charAt(0).toUpperCase()+type.slice(1));
  if(!fill) return;
  fillLevels[type] = Math.min(100, fillLevels[type] + 15);
  fill.style.height = fillLevels[type] + '%';
  const cyl = document.querySelector(`.cylinder[data-cylinder="${type}"]`);
  if(cyl && fillLevels[type] > 0) cyl.classList.add('active');
  if(Object.values(fillLevels).some(v => v > 0)) document.getElementById('startBtn').disabled = false;
}

function startEngine(){
  const effect = document.getElementById('ignitionEffect');
  effect.classList.add('active');
  setTimeout(() => {
    effect.classList.remove('active');
    document.getElementById('formulaBtn').disabled = false;
    const total = Object.values(fillLevels).reduce((a,b)=>a+b,0);
    const intrinsic = fillLevels.cog + fillLevels.emo + fillLevels.val;
    const msg = `🚀 引擎启动成功！\n探索了 ${exploredSet.size}/7 个案例\n动力类型：${intrinsic>=total-intrinsic?'内在驱动为主':'内外混合驱动'}`;
    alert(msg);
  }, 1500);
}

function showRecipe(){
  const modal = document.getElementById('recipeModal');
  const content = document.getElementById('recipeContent');
  const typeNames = {cog:'认知驱动',emo:'情感驱动',soc:'社会驱动',ach:'成就驱动',val:'价值驱动'};
  const topType = Object.keys(fillLevels).reduce((a,b)=>fillLevels[a]>fillLevels[b]?a:b);
  content.innerHTML = `
    <div class="recipe-card"><div class="label">✅ 你的动力优势</div><div class="val">你从案例探索中获取了 ${exploredSet.size}/7 个能量，最强类型为"${typeNames[topType]}"</div></div>
    <div class="recipe-card"><div class="label">⚠️ 继续加油</div><div class="val">再看看${Object.entries(fillLevels).filter(([k,v])=>v<30).map(([k])=>typeNames[k]).join('、')||''}相关的案例吧！</div></div>
    <div class="recipe-card"><div class="label">💡 动力维护建议</div><div class="val">每完成一个案例的动手制作，都是给引擎加了一次油！</div></div>
    <div class="recipe-card"><div class="label">🌟 动力升级路径</div><div class="val">把案例中的方法用到日常生活中——让"学时间"变成"用时间"</div></div>
  `;
  modal.classList.add('show');
}

function showPeer(){
  const modal = document.getElementById('peerModal');
  const chart = document.getElementById('peerChart');
  const peers = {cog:30,emo:18,soc:22,ach:17,val:13};
  const labels = {cog:'认知',emo:'情感',soc:'社会',ach:'成就',val:'价值'};
  chart.innerHTML = Object.keys(peers).map(k => {
    const h = peers[k] * 2.5;
    const yourH = fillLevels[k] * 1.5;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="font-size:10px;color:#f5a623">你${Math.round(fillLevels[k])}</div>
      <div class="peer-bar" style="height:${Math.max(yourH+5,2)}px;background:linear-gradient(0deg,#ffd700,#f5a623);opacity:.8"></div>
      <div class="peer-bar" style="height:${Math.max(h+5,2)}px;background:linear-gradient(0deg,#69b1ff,#1677ff);opacity:.6"></div>
      <div style="font-size:9px;color:#999">班${peers[k]}%</div>
      <div class="bar-label">${labels[k]}</div>
    </div>`;
  }).join('');
  modal.classList.add('show');
}

function showDeclaration(){
  document.getElementById('declarationModal').classList.add('show');
}

function submitDeclaration(){
  const v1 = document.getElementById('declInput1').value.trim();
  if(!v1) { alert('请填写你的动力宣言！'); return; }
  alert('⚡ 宣言已刻上引擎铭牌！\n\n"我学这个是因为' + v1 + '。"\n\n继续探索吧！');
  closeModal('declarationModal');
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
}

renderCases('all');
</script>
</body>
</html>
