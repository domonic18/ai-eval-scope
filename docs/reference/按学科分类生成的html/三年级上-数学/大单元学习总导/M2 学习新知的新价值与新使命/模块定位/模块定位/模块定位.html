<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>模块定位 — M2 学习新知的新价值与新使命</title>
<style>
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --accent: #69b1ff;
  --bg: #f0f5ff;
  --chat-bg: #f5f5f5;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 18px;
  --font-h1: 28px;
  --font-h2: 22px;
  --line-height: 1.8;
  --bubble-ai: #ffffff;
  --bubble-user: #95ec69;
  --chat-max: 600px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-body);
  line-height: var(--line-height);
  color: var(--text);
  background: var(--chat-bg);
  width: 100%;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.chat-wrapper {
  width: 100%;
  max-width: var(--chat-max);
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--card-bg);
  position: relative;
  box-shadow: 0 0 30px rgba(0,0,0,0.06);
}

/* ===== Chat Header ===== */
.chat-header {
  padding: 16px 16px 12px;
  background: var(--primary);
  color: #fff;
  text-align: center;
  flex-shrink: 0;
  position: relative;
}
.chat-header h1 {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.chat-header .subtitle {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 2px;
}
.chat-header .back-btn {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  opacity: 0.8;
}

/* ===== Messages ===== */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 2px; }

/* ===== Message Bubbles ===== */
.message {
  display: flex;
  gap: 8px;
  max-width: 85%;
  animation: msgIn 0.4s ease-out;
}
.message.ai { align-self: flex-start; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.message .avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-top: 4px;
}
.message.ai .avatar { background: #e6f7ff; }
.message.user .avatar { background: #f6ffed; }

.message .bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.75;
  position: relative;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.message.ai .bubble {
  background: var(--bubble-ai);
  border: 1px solid #e8e8e8;
  border-top-left-radius: 4px;
}
.message.user .bubble {
  background: var(--bubble-user);
  border-top-right-radius: 4px;
}

.bubble p { margin: 0 0 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { color: var(--primary); }
.bubble .highlight-box {
  background: #fff7e6;
  border-left: 3px solid #fa8c16;
  padding: 8px 12px;
  border-radius: 6px;
  margin: 8px 0;
  font-size: 14px;
}
.bubble ul { padding-left: 18px; margin: 6px 0; }
.bubble li { margin: 3px 0; }

/* ===== Typing Indicator ===== */
.typing-indicator {
  align-self: flex-start;
  display: none;
  gap: 8px;
  max-width: 85%;
  animation: msgIn 0.3s;
}
.typing-indicator.show { display: flex; }
.typing-indicator .avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #e6f7ff;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-top: 4px;
}
.typing-indicator .bubble {
  background: var(--bubble-ai);
  border: 1px solid #e8e8e8;
  border-radius: 16px;
  border-top-left-radius: 4px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.typing-indicator .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #bbb;
  animation: typing 1.4s infinite;
}
.typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-4px); }
}

/* ===== Quick Replies ===== */
.quick-replies {
  padding: 8px 16px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  flex-shrink: 0;
  border-top: 1px solid #f0f0f0;
  background: var(--card-bg);
}
.quick-reply {
  padding: 10px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--primary);
  background: transparent;
  color: var(--primary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  white-space: nowrap;
}
.quick-reply:hover {
  background: var(--primary);
  color: #fff;
  transform: translateY(-1px);
}
.quick-reply:disabled {
  opacity: 0.4;
  cursor: default;
  transform: none;
}

/* ===== Scroll Anchor ===== */
#scrollAnchor { height: 1px; flex-shrink: 0; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .chat-wrapper { max-width: 100%; height: 100dvh; }
  .message { max-width: 90%; }
  .bubble { font-size: 15px; padding: 10px 14px; }
}

/* ===== Hidden messages (for non-interactive fallback) ===== */
.msg-hidden { display: none; }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <button class="back-btn">‹</button>
    <h1>AI 导师 · 模块定位</h1>
    <div class="subtitle">M2：学习新知的新价值与新使命</div>
  </div>

  <div class="messages" id="messageContainer">
    <!-- Messages inserted by JS -->
    <div id="scrollAnchor"></div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply" data-action="q1">📖 本模块学什么</button>
    <button class="quick-reply" data-action="q2">⭐ 为什么重要</button>
    <button class="quick-reply" data-action="q3">🔗 与大单元的关系</button>
    <button class="quick-reply" data-action="q4">🔄 前后模块衔接</button>
    <button class="quick-reply" data-action="q5">🎯 学习成果</button>
  </div>
</div>

<script>
// ===== Conversation Flow =====
const container = document.getElementById('messageContainer');
const anchor = document.getElementById('scrollAnchor');
const quickReplies = document.querySelectorAll('.quick-reply');
const typingEl = createTypingIndicator();

function createTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>`;
  return div;
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addMessage(role, content, isHTML = false) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = role === 'ai' ? '🤖' : '😊';
  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${isHTML ? content : content.replace(/\n/g, '<br>')}</div>`;
  container.insertBefore(div, anchor);
  scrollToBottom();
  return div;
}

async function showTyping() {
  const clone = typingEl.cloneNode(true);
  clone.id = 'typingIndicator';
  const existing = document.getElementById('typingIndicator');
  if (existing) existing.remove();
  container.insertBefore(clone, anchor);
  scrollToBottom();
  await wait(1200);
  const e = document.getElementById('typingIndicator');
  if (e) e.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    anchor.scrollIntoView({ behavior: 'smooth' });
  });
}

function disableQuickReplies() {
  quickReplies.forEach(b => b.disabled = true);
}

function enableQuickReplies() {
  quickReplies.forEach(b => b.disabled = false);
}

// ===== Message Data =====
const aiMessages = {
  welcome: {
    content: `你好！欢迎来到 **M2：学习新知的新价值与新使命** 👋

我是你的 AI 学习导师。在正式开始之前，我想先帮你了解：这个模块在整个大单元中扮演什么角色？它的价值在哪里？学完之后你能带走什么？

准备好了吗？让我来一一为你介绍。`,
    isHTML: true
  },
  q1: {
    content: `## 📖 本模块学习什么

本模块学的不只是**时、分、秒**的知识，更重要的，你要学**如何学习新知识**。

你会通过时间这个熟悉的话题，发现自己是怎么从已有经验出发、通过亲身体验和动手操作，一步步建构出对"秒—分—时"关系的**真正理解**。

你还能从示例中提炼出可以反复使用的**学习方法**，把它们变成你以后学习任何新知识的工具。`,
    isHTML: true
  },
  q2: {
    content: `## ⭐ 本模块为什么重要

因为它教你的不是答案，而是**"得到答案的方法"**。

很多同学学完一个单元只记住了结论，遇到新问题仍然不会。本模块就是要打破这个循环——让你学会**自己建构知识**，而不是等着别人告诉你。

这个能力，比记住任何一道题的答案都重要。`,
    isHTML: true
  },
  q3: {
    content: `## 🔗 本模块与大单元主题的关系

大单元的核心是**"时、分、秒"**——这是人类计量时间的基础单位。

本模块的任务是帮你从根本上理解"**为什么这样计量时间**"，以及"**理解新知识究竟意味着什么**"。

它不是大单元的附加内容，而是**让你拥有"学会整个单元的能力"的核心模块**。`,
    isHTML: true
  },
  q4: {
    content: `## 🔄 本模块与前后模块的衔接

- **M1** 已经让你初步认识了秒、分、时这三个时间单位
- **M2** 在此基础上追问"这些知识是怎么来的"以及"学习它们的价值是什么"
- **M3及以后** 你会带着本模块学到的方法，去解决更复杂的时间问题（如经过时间计算、时分秒的应用题）

所以——**M2 是你从"知道"走向"真正理解"的桥梁**。`,
    isHTML: true
  },
  q5: {
    content: `## 🎯 本模块预期学习成果

完成本模块后，你将带走：

1️⃣ **一份亲手制作的时间关系建构图** — 你的专属学习成果

2️⃣ **一套可迁移的学习方法** — "建构性原理+解析性原理"，以后学任何新知识都能用

3️⃣ **一份对自己学习过程的思考和反思** — 你开始理解"自己是怎么学会的"

准备好开始这段旅程了吗？我们出发吧！🚀`,
    isHTML: true
  }
};

// ===== Conversation State =====
let step = 0;
const answered = new Set();

async function startConversation() {
  disableQuickReplies();
  await showTyping();
  addMessage('ai', aiMessages.welcome.content, true);
  enableQuickReplies();
  scrollToBottom();
}

// Handle quick reply clicks
quickReplies.forEach(btn => {
  btn.addEventListener('click', async () => {
    const action = btn.dataset.action;
    if (answered.has(action)) return;
    answered.add(action);
    disableQuickReplies();

    // Show user reply
    const labels = {
      q1: '📖 本模块学什么',
      q2: '⭐ 为什么重要',
      q3: '🔗 与大单元的关系',
      q4: '🔄 前后模块衔接',
      q5: '🎯 学习成果'
    };
    addMessage('user', labels[action] || action);
    btn.disabled = true;
    btn.style.opacity = '0.5';

    // Show typing and AI response
    await showTyping();
    const msg = aiMessages[action];
    if (msg) {
      addMessage('ai', msg.content, true);
    }

    enableQuickReplies();
    scrollToBottom();
  });
});

// Start
startConversation();
</script>
</body>
</html>
