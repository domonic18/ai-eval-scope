<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时、分、秒 - 大单元学习总导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1a2e;
  --bg2:#112540;
  --accent:#3a7bd5;
  --accent2:#5b9ef4;
  --accent-light:#8ab8ff;
  --node-glow:rgba(58,123,213,0.35);
  --text:#e8edf5;
  --text-dim:#8899b8;
  --text-bright:#ffffff;
  --font-body:18px;
  --font-h1:28px;
  --font-h2:22px;
  --line-height:1.8;
  --locked-bg:#1a2940;
  --locked-border:#2a3f5a;
  --unlocked-bg:#1d3858;
  --completed-bg:#0f4a2e;
  --stage-entry:#3a7bd5;
  --stage-knowledge:#5db0f4;
  --stage-thinking:#a78bfa;
  --stage-application:#f59e0b;
  --stage-reflection:#ef4444;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:var(--font-body);line-height:var(--line-height)}
#app{width:100%;height:100%;position:relative;overflow:hidden}
#canvas-wrap{width:100%;height:100%;cursor:grab;transform-origin:0 0}
#canvas-wrap:active{cursor:grabbing}
#node-layer{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.connector{position:absolute;height:3px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;transform-origin:0 50%;z-index:0;opacity:0.3;transition:opacity 0.5s}
.connector.unlocked{opacity:0.6}
.skill-node{position:absolute;z-index:1;transition:opacity 0.4s,transform 0.3s;cursor:pointer;user-select:none}
.skill-node.locked{opacity:0.25;filter:saturate(0.2)}
.skill-node.locked:hover{opacity:0.4}
.skill-node.unlocked{opacity:1}
.skill-node.completed .node-icon{background:var(--completed-bg);border-color:#22c55e;box-shadow:0 0 18px rgba(34,197,94,0.3)}
.skill-node.completed .node-label{color:#22c55e}
.skill-node.unlocked .node-icon{background:var(--unlocked-bg);border-color:var(--accent);box-shadow:0 0 18px var(--node-glow)}
.node-icon{width:58px;height:58px;border-radius:50%;border:2.5px solid var(--locked-border);background:var(--locked-bg);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:24px;transition:all 0.3s;position:relative}
.node-icon .lock-icon{position:absolute;right:-4px;top:-4px;font-size:12px;filter:opacity(0.6)}
.node-label{text-align:center;font-size:13px;margin-top:6px;color:var(--text-dim);transition:color 0.3s;max-width:100px;line-height:1.35;pointer-events:none}
.skill-node.locked .node-label{color:var(--text-dim)}
.skill-node.unlocked .node-label{color:var(--text-bright)}
/* stage indicators */
.stage-badge{border-left:3px solid}
.stage-entry .node-icon{border-color:var(--stage-entry)}
.stage-knowledge .node-icon{border-color:var(--stage-knowledge)}
.stage-application .node-icon{border-color:var(--stage-application)}
.stage-reflection .node-icon{border-color:var(--stage-reflection)}
/* header overlay */
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 28px;background:linear-gradient(180deg,var(--bg) 60%,transparent);pointer-events:none}
#header h1{font-size:var(--font-h1);font-weight:700;color:var(--text-bright);letter-spacing:2px}
#header .sub{font-size:14px;color:var(--text-dim);margin-top:2px}
#header .sub span{display:inline-block;margin-right:18px}
#sidebar{position:fixed;bottom:30px;right:30px;z-index:100;pointer-events:none}
#info-panel{background:rgba(11,26,46,0.92);border:1px solid var(--locked-border);border-radius:12px;padding:18px 22px;max-width:320px;backdrop-filter:blur(8px);pointer-events:auto;transition:opacity 0.3s,transform 0.3s}
#info-panel.hidden{opacity:0;transform:translateY(12px);pointer-events:none}
#info-panel .ip-title{font-size:var(--font-h2);font-weight:600;color:var(--text-bright);margin-bottom:6px}
#info-panel .ip-desc{font-size:15px;color:var(--text);line-height:1.7;margin-bottom:10px}
#info-panel .ip-stage{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
#info-panel .ip-action{display:inline-block;margin-top:6px;padding:4px 16px;border-radius:20px;background:var(--accent);color:#fff;font-size:13px;border:none;cursor:pointer;pointer-events:auto;transition:background 0.2s}
#info-panel .ip-action:hover{background:var(--accent2)}
#controls{position:fixed;bottom:30px;left:30px;z-index:100;display:flex;gap:8px}
#controls button{width:38px;height:38px;border-radius:50%;border:1px solid var(--locked-border);background:rgba(11,26,46,0.85);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;backdrop-filter:blur(4px)}
#controls button:hover{background:var(--accent);border-color:var(--accent)}
#legend{position:fixed;right:30px;top:80px;z-index:100;padding:12px 16px;background:rgba(11,26,46,0.85);border:1px solid var(--locked-border);border-radius:8px;font-size:12px;backdrop-filter:blur(4px)}
#legend .leg-item{display:flex;align-items:center;gap:8px;margin:4px 0}
#legend .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#legend .leg-lock{background:var(--locked-bg);border:1.5px solid var(--locked-border)}
#legend .leg-unlock{background:var(--unlocked-bg);border:1.5px solid var(--accent)}
#legend .leg-done{background:var(--completed-bg);border:1.5px solid #22c55e}
#progress{position:fixed;top:80px;left:30px;z-index:100;font-size:13px;color:var(--text-dim)}
#progress strong{color:var(--text-bright);font-size:18px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>时、分、秒 · 大单元学习总导航</h1>
    <div class="sub">
      <span>核心追问：时间是什么？为什么要精准测量与管理时间？</span>
      <span>三年级 · 数学</span>
    </div>
  </div>

  <div id="legend">
    <div class="leg-item"><span class="leg-dot leg-lock"></span> 未解锁 (迷雾)</div>
    <div class="leg-item"><span class="leg-dot leg-unlock"></span> 已解锁</div>
    <div class="leg-item"><span class="leg-dot leg-done"></span> 已完成</div>
  </div>

  <div id="progress">解锁进度：<strong id="progress-num">0</strong> / 20</div>

  <div id="canvas-wrap">
    <div id="node-layer"></div>
  </div>

  <div id="controls">
    <button id="zoom-in" title="放大">+</button>
    <button id="zoom-out" title="缩小">-</button>
    <button id="zoom-reset" title="重置">&#8634;</button>
  </div>

  <div id="sidebar">
    <div id="info-panel" class="hidden">
      <div class="ip-stage" id="ip-stage"></div>
      <div class="ip-title" id="ip-title"></div>
      <div class="ip-desc" id="ip-desc"></div>
      <button class="ip-action" id="ip-action">解锁节点</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

/* ---- CONSTANTS ---- */
const MODULES = [
  {id:0,label:'M1 大单元概述',icon:'&#127919;',stage:'entry',
   desc:'本单元的总入口、总导航与认知起点。为模块2-4提供框架，为模块5-11提供多维思考起点，为模块12-15明确任务方向，为模块16-20确立评价坐标。',
   children:[1,2,3,4]},
  {id:1,label:'M2 认识钟面',icon:'&#128368;',stage:'knowledge',
   desc:'认识钟面结构：时针、分针、秒针。了解它们的运动关系与基本读数。',
   children:[5,6]},
  {id:2,label:'M3 认识时分秒',icon:'&#9202;',stage:'knowledge',
   desc:'理解时、分、秒的定义与相互换算关系：1时=60分，1分=60秒。',
   children:[5,6]},
  {id:3,label:'M4 时间读数',icon:'&#128200;',stage:'knowledge',
   desc:'掌握电子表与指针式钟表的读数方法，区分上午、下午。',
   children:[5,6]},
  {id:4,label:'M5 时间感知',icon:'&#9200;',stage:'thinking',
   desc:'建立对时、分、秒长短的感性认知：1秒能做什么？1分钟能做什么？',
   children:[7,8]},
  {id:5,label:'M6 时间比较',icon:'&#128197;',stage:'thinking',
   desc:'学会比较时间的长短，理解"快"与"慢"的相对性。',
   children:[7,8]},
  {id:6,label:'M7 时间计算',icon:'&#10133;',stage:'thinking',
   desc:'掌握简单的时间加减计算：经过时间、开始与结束时刻。',
   children:[7,8]},
  {id:7,label:'M8 时间规划',icon:'&#128203;',stage:'thinking',
   desc:'学习制定时间表，初步建立时间管理意识。',
   children:[9,10]},
  {id:8,label:'M9 时间故事',icon:'&#128214;',stage:'thinking',
   desc:'通过故事与生活场景理解时间在文化中的意义。',
   children:[9,10]},
  {id:9,label:'M10 跨学科视角',icon:'&#127891;',stage:'thinking',
   desc:'从科学、历史、艺术等多维角度理解"时间"概念。',
   children:[11]},
  {id:10,label:'M11 时间与科技',icon:'&#128225;',stage:'thinking',
   desc:'了解计时工具的演变：从日晷到原子钟。',
   children:[11]},
  {id:11,label:'M12 应用一：作息',icon:'&#127959;',stage:'application',
   desc:'制定合理的作息时间表，应用所学服务于日常生活。',
   children:[12,13]},
  {id:12,label:'M13 应用二：赛事',icon:'&#127942;',stage:'application',
   desc:'运动会场景中的计时、排序与成绩记录。',
   children:[12,13]},
  {id:13,label:'M14 应用三：出行',icon:'&#128652;',stage:'application',
   desc:'规划一次出行的时间安排：出发、到达、等候。',
   children:[14]},
  {id:14,label:'M15 应用四：实验',icon:'&#128300;',stage:'application',
   desc:'科学实验中的时间测量与数据记录。',
   children:[15]},
  {id:15,label:'M16 反思一',icon:'&#128220;',stage:'reflection',
   desc:'回顾本单元学习历程，梳理知识结构。',
   children:[16]},
  {id:16,label:'M17 反思二',icon:'&#128221;',stage:'reflection',
   desc:'评估自己时间管理技能的实际进步。',
   children:[17]},
  {id:17,label:'M18 反思三',icon:'&#127912;',stage:'reflection',
   desc:'创作时间主题作品，表达个人理解。',
   children:[18]},
  {id:18,label:'M19 反思四',icon:'&#129309;',stage:'reflection',
   desc:'小组互评与分享，从他人视角重新理解时间。',
   children:[19]},
  {id:19,label:'M20 总结与展望',icon:'&#127775;',stage:'reflection',
   desc:'总结整个大单元学习，展望后续时间与量感主题的学习。',
   children:[]}
];

/* stage colors for badges */
const STAGE_COLORS = {entry:'#3a7bd5',knowledge:'#5db0f4',thinking:'#a78bfa',application:'#f59e0b',reflection:'#ef4444'};

/* ---- STATE ---- */
let locked = new Array(20).fill(true);
let completed = new Array(20).fill(false);
let selectedId = null;
let unlockedCount = 0;
const LOCKED_DEFAULT = 0; // root unlocked by default
locked[0] = false;
unlockedCount = 1;

/* tree layout (computed positions) */
const TREE = [];

/* view state */
let scale = 1;
let panX = 0, panY = 0;
let isDragging = false, dragStartX, dragStartY, panStartX, panStartY;

/* DOM refs */
const layer = document.getElementById('node-layer');
const canvasWrap = document.getElementById('canvas-wrap');
const infoPanel = document.getElementById('info-panel');
const ipTitle = document.getElementById('ip-title');
const ipDesc = document.getElementById('ip-desc');
const ipStage = document.getElementById('ip-stage');
const ipAction = document.getElementById('ip-action');
const progressNum = document.getElementById('progress-num');

/* ---- LAYOUT ---- */
function computeTreeLayout(){
  /* manual positions for 20 nodes — tree hierarchy spread on canvas */
  const w = 1600, h = 1100;
  const cx = w/2, topY = 80;
  const positions = [
    // entry (layer 0): root
    {x:cx, y:topY},
    // knowledge (layer 1): 3 nodes
    {x:cx-200, y:topY+160},
    {x:cx, y:topY+160},
    {x:cx+200, y:topY+160},
    // thinking (layer 2): many nodes
    {x:cx-350, y:topY+320}, // M5
    {x:cx-170, y:topY+320}, // M6
    {x:cx+10, y:topY+320},  // M7
    {x:cx-280, y:topY+460}, // M8
    {x:cx-80, y:topY+460},  // M9
    {x:cx+120, y:topY+460}, // M10
    {x:cx+320, y:topY+460}, // M11
    // application (layer 3)
    {x:cx-200, y:topY+600},
    {x:cx, y:topY+600},
    {x:cx+200, y:topY+600},
    {x:cx, y:topY+740},
    // reflection (layer 4)
    {x:cx-200, y:topY+880},
    {x:cx, y:topY+880},
    {x:cx+200, y:topY+880},
    {x:cx-100, y:topY+1000},
    {x:cx+100, y:topY+1000}
  ];
  for(let i=0;i<20;i++){
    TREE[i] = {x:positions[i].x, y:positions[i].y};
  }
}

/* ---- DRAW ---- */
function drawConnectors(){
  const els = layer.querySelectorAll('.connector');
  els.forEach(e=>e.remove());
  for(let i=0;i<20;i++){
    const mod = MODULES[i];
    const p = TREE[i];
    for(const c of mod.children){
      const cp = TREE[c];
      drawOneConnector(p.x,p.y,cp.x,cp.y,i,c);
    }
  }
}

function drawOneConnector(x1,y1,x2,y2,parentIdx,childIdx){
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  const angle = Math.atan2(dy,dx)*180/Math.PI;
  const el = document.createElement('div');
  el.className = 'connector';
  if(!locked[childIdx]) el.classList.add('unlocked');
  el.style.width = len+'px';
  el.style.left = x1+'px';
  el.style.top = y1+'px';
  el.style.transform = 'rotate('+angle+'deg)';
  el.dataset.parent = parentIdx;
  el.dataset.child = childIdx;
  layer.appendChild(el);
}

function drawNodes(){
  const els = layer.querySelectorAll('.skill-node');
  els.forEach(e=>e.remove());
  for(let i=0;i<20;i++){
    const mod = MODULES[i];
    const p = TREE[i];
    const el = document.createElement('div');
    el.className = 'skill-node';
    el.dataset.id = i;
    if(locked[i]) el.classList.add('locked');
    else el.classList.add('unlocked');
    if(completed[i]) el.classList.add('completed');
    const stageCls = 'stage-'+mod.stage;
    el.classList.add(stageCls);
    el.style.left = (p.x-29)+'px';
    el.style.top = (p.y-29)+'px';
    el.innerHTML =
      '<div class="node-icon">'+
        (locked[i]?'<span class="lock-icon">&#128274;</span>':'')+
        mod.icon+
      '</div>'+
      '<div class="node-label">'+mod.label+'</div>';
    el.addEventListener('click',function(e){e.stopPropagation();selectNode(i);});
    layer.appendChild(el);
  }
}

function updateConnectors(){
  const conns = layer.querySelectorAll('.connector');
  conns.forEach(el=>{
    const child = parseInt(el.dataset.child);
    if(!locked[child]) el.classList.add('unlocked');
    else el.classList.remove('unlocked');
  });
}

function updateProgress(){
  progressNum.textContent = unlockedCount;
}

/* ---- SELECT & UNLOCK ---- */
function selectNode(id){
  selectedId = id;
  const mod = MODULES[id];
  const isLocked = locked[id];
  ipTitle.textContent = mod.label;
  ipDesc.textContent = isLocked ? '该节点尚未解锁，请先完成前置节点。' : mod.desc;
  ipStage.textContent = mod.stage + ' · ' + (isLocked?'LOCKED':'UNLOCKED');
  ipStage.style.color = STAGE_COLORS[mod.stage] || '#8899b8';
  if(!isLocked && !completed[id]){
    ipAction.textContent = '标记完成';
    ipAction.style.display = 'inline-block';
    ipAction.onclick = function(){completeNode(id);};
  } else if(!isLocked && completed[id]){
    ipAction.textContent = '已完成';
    ipAction.style.display = 'inline-block';
    ipAction.style.background = '#22c55e';
    ipAction.onclick = null;
  } else {
    // locked: allow unlock if parent nodes are all unlocked
    const canUnlock = canUnlockNode(id);
    if(canUnlock){
      ipAction.textContent = '解锁节点';
      ipAction.style.display = 'inline-block';
      ipAction.style.background = 'var(--accent)';
      ipAction.onclick = function(){unlockNode(id);};
    } else {
      ipAction.style.display = 'none';
    }
  }
  infoPanel.classList.remove('hidden');
}

function canUnlockNode(id){
  if(!locked[id]) return false;
  // root can always be unlocked
  if(id===0) return true;
  // check parent relationships
  for(let i=0;i<20;i++){
    if(MODULES[i].children.includes(id)){
      if(locked[i]) return false;
    }
  }
  return true;
}

function unlockNode(id){
  if(!locked[id]) return;
  locked[id] = false;
  unlockedCount++;
  const node = layer.querySelector('.skill-node[data-id="'+id+'"]');
  if(node){
    node.classList.remove('locked');
    node.classList.add('unlocked');
    // remove lock icon
    const lockEl = node.querySelector('.lock-icon');
    if(lockEl) lockEl.remove();
  }
  updateConnectors();
  updateProgress();
  // auto-select to show description
  selectNode(id);
}

function completeNode(id){
  if(completed[id]) return;
  completed[id] = true;
  const node = layer.querySelector('.skill-node[data-id="'+id+'"]');
  if(node){
    node.classList.add('completed');
  }
  // unlock children (or mark them unlockable)
  // actually: children become unlockable but user still clicks to unlock
  // also update info panel
  // check if there are new unlockable nodes
  for(let i=0;i<20;i++){
    if(locked[i] && canUnlockNode(i)){
      // auto-unlock children after completion for convenience
      // but we keep fog of war: user still needs to click child
      // no auto-unlock, just mark as available
    }
  }
  // check if all children of current node can now be hinted
  selectNode(id);
}

/* ---- NAVIGATION HINTS ---- */
function updateUnlockableHints(){
  for(let i=0;i<20;i++){
    if(locked[i] && canUnlockNode(i)){
      const node = layer.querySelector('.skill-node[data-id="'+i+'"]');
      if(node){
        // subtle pulse effect
        node.style.boxShadow = '0 0 12px rgba(58,123,213,0.4)';
      }
    }
  }
}

/* ---- ZOOM & PAN ---- */
function applyTransform(){
  layer.style.transform = 'translate('+panX+'px,'+panY+'px) scale('+scale+')';
}

function zoomAtPoint(newScale, mx, my){
  const rect = canvasWrap.getBoundingClientRect();
  const ox = mx - rect.left, oy = my - rect.top;
  const newPanX = ox - (ox - panX) * (newScale / scale);
  const newPanY = oy - (oy - panY) * (newScale / scale);
  scale = Math.max(0.2, Math.min(3, newScale));
  panX = newPanX;
  panY = newPanY;
  applyTransform();
}

/* ---- INIT ---- */
function init(){
  computeTreeLayout();
  drawConnectors();
  drawNodes();
  updateConnectors();
  updateProgress();
  applyTransform();

  // center view
  setTimeout(()=>{
    const rect = canvasWrap.getBoundingClientRect();
    panX = rect.width/2 - 800;
    panY = rect.height/2 - 550;
    applyTransform();
  },50);

  /* ---- EVENTS ---- */
  // mouse wheel zoom
  canvasWrap.addEventListener('wheel',function(e){
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    zoomAtPoint(scale*delta, e.clientX, e.clientY);
  },{passive:false});

  // pan via drag
  canvasWrap.addEventListener('mousedown',function(e){
    if(e.target.closest('.skill-node')) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    panStartX = panX;
    panStartY = panY;
  });
  document.addEventListener('mousemove',function(e){
    if(!isDragging) return;
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  });
  document.addEventListener('mouseup',function(){
    isDragging = false;
  });

  // controls
  document.getElementById('zoom-in').addEventListener('click',function(){
    const rect = canvasWrap.getBoundingClientRect();
    zoomAtPoint(scale*1.2, rect.left+rect.width/2, rect.top+rect.height/2);
  });
  document.getElementById('zoom-out').addEventListener('click',function(){
    const rect = canvasWrap.getBoundingClientRect();
    zoomAtPoint(scale*0.8, rect.left+rect.width/2, rect.top+rect.height/2);
  });
  document.getElementById('zoom-reset').addEventListener('click',function(){
    scale = 1;
    const rect = canvasWrap.getBoundingClientRect();
    panX = rect.width/2 - 800;
    panY = rect.height/2 - 550;
    applyTransform();
  });

  // hide panel on background click
  document.addEventListener('click',function(e){
    if(e.target === canvasWrap || e.target === layer || e.target === document.getElementById('app')){
      infoPanel.classList.add('hidden');
      selectedId = null;
    }
  });

  // auto-select root
  setTimeout(()=>{selectNode(0);},100);
}

document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
</html>
