<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建构性七阶适配案例 — 从"知道时间"到"用好时间"</title>
<style>
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --accent: #69b1ff;
  --bg: #f0f5ff;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 18px;
  --font-h1: 28px;
  --font-h2: 22px;
  --line-height: 1.8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-body);
  line-height: var(--line-height);
  color: var(--text);
  background: var(--bg);
  width: 100%;
  max-width: none;
}
.container {
  width: 100%;
  max-width: none;
  padding: 24px 20px;
  box-sizing: border-box;
}
.header {
  background: linear-gradient(135deg, var(--primary), #4096ff, var(--accent));
  color: #fff;
  padding: 28px 24px;
  border-radius: var(--border-radius);
  margin-bottom: 24px;
  text-align: center;
}
.header h1 { font-size: var(--font-h1); margin-bottom: 6px; }
.header p { opacity: 0.9; font-size: 16px; }
.header .step-badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 3px 14px; border-radius: 20px; font-size: 14px; margin-top: 8px; }
.nav-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0 12px;
  margin-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
.nav-btn {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 20px;
  border: 2px solid var(--primary);
  background: var(--card-bg);
  color: var(--primary);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.25s;
  white-space: nowrap;
}
.nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.case-card {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  padding: 22px 22px 18px;
  margin-bottom: 16px;
  display: none;
  animation: fadeIn 0.4s ease;
}
.case-card.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.case-level {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  padding: 2px 12px;
  border-radius: 12px;
  font-size: 13px;
  margin-bottom: 10px;
}
.case-card h3 { font-size: var(--font-h2); color: var(--primary); margin-bottom: 12px; }
.case-card h4 { color: var(--text); font-size: 17px; margin: 10px 0 4px; }
.case-card p { margin-bottom: 6px; }
.info-row { display: flex; align-items: baseline; gap: 6px; margin: 4px 0; }
.info-label { font-weight: 600; color: var(--primary); min-width: 70px; }
.tag {
  display: inline-block;
  background: #e6f4ff;
  color: var(--primary);
  padding: 1px 10px;
  border-radius: 10px;
  font-size: 13px;
  margin-right: 4px;
  margin-bottom: 2px;
}
.check-list { margin: 10px 0 0; list-style: none; }
.check-list li::before { content: "☐ "; color: var(--primary); font-weight: bold; }
.check-list li.done::before { content: "☑ "; }
.check-list li { padding: 2px 0; cursor: pointer; user-select: none; }
.check-list li:hover { background: #f6f8fa; border-radius: 4px; }
.page-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 16px 0 20px;
}
.page-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.25s;
  font-weight: 500;
}
.page-btn:hover { background: var(--primary-hover); }
.page-btn:disabled { background: var(--border); cursor: not-allowed; }
.page-indicator { font-size: 16px; color: var(--text-secondary); font-weight: 500; }
.reflection-box {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  padding: 22px;
  margin-bottom: 20px;
}
.reflection-box h3 { color: var(--primary); font-size: var(--font-h2); margin-bottom: 12px; }
.reflection-box ol { padding-left: 20px; }
.reflection-box li { margin-bottom: 8px; }
.footer {
  text-align: center;
  padding: 16px;
  color: var(--text-secondary);
  font-size: 14px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
@media (min-width: 640px) {
  .container { padding: 32px 40px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🚀 建构性七阶适配案例</h1>
    <p>从"知道时间"到"用好时间" —— 7个进阶挑战</p>
    <div class="step-badge">当前：第 <span id="levelDisplay">1</span> 阶</div>
  </div>

  <div class="nav-bar" id="navBar"></div>

  <div id="caseContainer"></div>

  <div class="page-controls">
    <button class="page-btn" id="prevBtn" onclick="changeCase(-1)">◀ 上一阶</button>
    <span class="page-indicator" id="pageIndicator">1 / 7</span>
    <button class="page-btn" id="nextBtn" onclick="changeCase(1)">下一阶 ▶</button>
  </div>

  <div class="reflection-box">
    <h3>💭 综合反思</h3>
    <p style="margin-bottom:10px;">完成7个案例后，问问自己：</p>
    <ol>
      <li>哪个案例你做得最快？为什么？</li>
      <li>哪个案例最有挑战？哪个原理帮了你？</li>
      <li>哪条原理你用得最多？哪条还不太熟练？</li>
    </ol>
  </div>

  <div class="footer">© 建构性学习 · 三年级数学 · 时、分、秒单元</div>
</div>
<script>
var cases = [
  {
    level: "第一阶 · 个人理解型",
    title: "我和"一分钟"",
    situation: "闭上眼睛感受一分钟有多长——不看钟表，在心里默数60秒，然后睁眼看钟表。",
    task: "画一张"一分钟感受地图"，标出你在一分钟里能做的事情。",
    principles: ["情境锚定法"],
    steps: "感受→记录→画图→对比→反思",
    outcome: "一份"一分钟能做什么"的图文笔记",
    checks: ["是否记录了3件以上？", "是否与实际时间对比了？"]
  },
  {
    level: "第二阶 · 生活应用型",
    title: "我的"时间换算小助手"",
    situation: "妈妈问你"15分钟=？秒？"，奶奶问你"2小时=？分？"。",
    task: "制作一张时间换算手卡，正面写"大→小（×）"，反面写"小→大（÷）"。",
    principles: ["系统分解法", "成果可视法"],
    steps: "梳理换算规则→设计卡片→制作→测试",
    outcome: "一张可随身携带的时间换算手卡",
    checks: ["是否覆盖了时→分、分→秒、时→秒？", "是否标注了×60还是÷60？"]
  },
  {
    level: "第三阶 · 校园问题解决型",
    title: "课间10分钟怎么过？",
    situation: "课间只有10分钟，你想去操场玩，又要准备下节课的书，还要喝水上厕所。",
    task: "设计一个"10分钟课间行动方案"，按分钟分配时间。",
    principles: ["系统分解法", "情境锚定法"],
    steps: "列出所有要做的事→估算每件事的时间→分配顺序→画时间轴→优化",
    outcome: "一份"课间10分钟时间轴图"",
    checks: ["是否包含了3件以上事项？", "时间加起来是否≤10分钟？", "是否留有缓冲？"]
  },
  {
    level: "第四阶 · 学科表达型",
    title: "时间系统的"家族树"",
    situation: "时、分、秒就像一家三口——有各自的角色，也有换算规则。",
    task: "用"家族树"的形式画出一张时间单位关系图。",
    principles: ["成果可视法", "自我校验法"],
    steps: "收集信息→设计结构→绘制关系图→标注进率→美化",
    outcome: "一张"时间单位家族树"手绘图",
    checks: ["是否画出了时、分、秒三个层级？", "是否标注了进率？", "是否有生活例子？"]
  },
  {
    level: "第五阶 · 跨学科整合型",
    title: "时间与速度的对话",
    situation: "你和同学在100米赛跑，你用了20秒，同学用了25秒。谁快？快多少？",
    task: "做一个"时间与速度关系小实验"，记录自己的跑步时间。",
    principles: ["系统分解法", "情境锚定法"],
    steps: "准备→测量→记录→比较→画结论图",
    outcome: "一份"我的速度实验记录表+结论"",
    checks: ["是否记录了至少3组数据？", "是否说明了"时间越短速度越快"？", "是否画了对比图？"]
  },
  {
    level: "第六阶 · 社会或未来情境型",
    title: "如果一天只有20小时",
    situation: "假设地球自转变快了，一天只有20小时（每小时还是60分钟）。",
    task: "写一份"20小时一天生活调整建议书"。",
    principles: ["情境锚定法", "自我校验法"],
    steps: "理解变化→列出受影响的事→逐一调整建议→写建议书→自检",
    outcome: "一份简短的生活调整建议书",
    checks: ["是否基于"20小时"现实给出的调整？", "是否考虑了至少3个生活方面？"]
  },
  {
    level: "第七阶 · 综合创新型",
    title: "设计一个"时间达人"桌游",
    situation: "一年级的弟弟妹妹总是分不清时、分、秒，也不会换算。",
    task: "设计一款2-4人玩的桌游，主要练习时间换算。",
    principles: ["情境锚定法", "系统分解法", "成果可视法", "自我校验法"],
    steps: "确定玩法→设计题目→画棋盘→制作规则→试玩→改进",
    outcome: "一份完整的桌游设计（棋盘+规则+题目卡）",
    checks: ["是否包含了换算练习？", "规则是否简单易懂？", "是否适合低年级？", "是否有趣？", "是否有答案？"]
  }
];

var current = 0;

function renderNav() {
  var nav = document.getElementById('navBar');
  nav.innerHTML = '';
  cases.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === current ? ' active' : '');
    btn.textContent = '阶' + (i+1);
    btn.onclick = function() { goToCase(i); };
    nav.appendChild(btn);
  });
}

function renderCase(index) {
  var c = cases[index];
  var container = document.getElementById('caseContainer');
  var checksHTML = '';
  c.checks.forEach(function(ch) {
    checksHTML += '<li onclick="this.classList.toggle(\'done\')">' + ch + '</li>';
  });
  container.innerHTML =
    '<div class="case-card active">' +
      '<div class="case-level">' + c.level + '</div>' +
      '<h3>' + c.title + '</h3>' +
      '<div class="info-row"><span class="info-label">🎯 情境</span><span>' + c.situation + '</span></div>' +
      '<div class="info-row"><span class="info-label">📝 任务</span><span>' + c.task + '</span></div>' +
      '<div class="info-row"><span class="info-label">⚙️ 原理</span><span>' + c.principles.map(function(p) { return '<span class="tag">' + p + '</span>'; }).join('') + '</span></div>' +
      '<div class="info-row"><span class="info-label">👣 步骤</span><span>' + c.steps + '</span></div>' +
      '<div class="info-row"><span class="info-label">🎨 成果</span><span>' + c.outcome + '</span></div>' +
      '<h4 style="margin-top:14px;">✅ 自评清单（点击勾选）</h4>' +
      '<ul class="check-list">' + checksHTML + '</ul>' +
    '</div>';
  document.getElementById('levelDisplay').textContent = (index + 1);
  document.getElementById('pageIndicator').textContent = (index + 1) + ' / ' + cases.length;
  document.getElementById('prevBtn').disabled = (index === 0);
  document.getElementById('nextBtn').disabled = (index === cases.length - 1);
  renderNav();
}

function goToCase(index) {
  current = index;
  renderCase(current);
}

function changeCase(delta) {
  var next = current + delta;
  if (next < 0 || next >= cases.length) return;
  goToCase(next);
}

renderCase(0);
</script>
</body>
</html>
