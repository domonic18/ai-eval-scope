<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大单元定位 - 游戏化全景技能地图</title>
<style>
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --accent: #69b1ff;
  --bg: #0a0e1a;
  --card-bg: rgba(255,255,255,0.05);
  --text: rgba(255,255,255,0.92);
  --text-secondary: rgba(255,255,255,0.55);
  --border: rgba(255,255,255,0.12);
  --border-radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font-body: 15px;
  --font-h1: 24px;
  --font-h2: 19px;
  --line-height: 1.7;
  --node-radius: 50px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: var(--font-body); line-height: var(--line-height); color: var(--text); background: #0a0e1a; overflow: hidden; height: 100vh; }
#app { width: 100%; height: 100vh; position: relative; overflow: hidden; }
canvas#skillMap { display: block; width: 100%; height: 100%; }
.header { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; pointer-events: none; }
.header h1 { font-size: var(--font-h1); color: #fff; text-shadow: 0 0 30px rgba(22,119,255,0.5); letter-spacing: 2px; background: rgba(10,14,26,0.7); padding: 8px 24px; border-radius: 30px; border: 1px solid rgba(22,119,255,0.3); backdrop-filter: blur(8px); display: inline-block; pointer-events: auto; }
.header .sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 12px; align-items: center; }
.controls button { background: rgba(22,119,255,0.2); border: 1px solid rgba(22,119,255,0.4); color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; backdrop-filter: blur(4px); font-family: inherit; }
.controls button:hover { background: rgba(22,119,255,0.4); transform: scale(1.05); }
.controls .zoom-display { color: var(--text-secondary); font-size: 13px; min-width: 60px; text-align: center; }
.controls .hint { color: var(--text-secondary); font-size: 12px; }
.node-detail { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20; background: rgba(10,14,26,0.95); border: 1px solid rgba(22,119,255,0.4); border-radius: 16px; padding: 28px 32px; max-width: 440px; width: 90%; backdrop-filter: blur(12px); box-shadow: 0 0 60px rgba(22,119,255,0.15); display: none; }
.node-detail.show { display: block; }
.node-detail h3 { font-size: var(--font-h2); color: var(--accent); margin-bottom: 10px; }
.node-detail p { color: var(--text); font-size: var(--font-body); line-height: var(--line-height); margin-bottom: 12px; }
.node-detail .tag { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 12px; margin-right: 6px; margin-bottom: 6px; }
.node-detail .tag.ready { background: rgba(22,119,255,0.2); color: var(--accent); border: 1px solid rgba(22,119,255,0.3); }
.node-detail .tag.locked { background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1); }
.node-detail .btn-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; }
.node-detail .btn-read { background: var(--primary); border: none; color: #fff; padding: 8px 24px; border-radius: 20px; cursor: pointer; font-size: 14px; font-family: inherit; transition: background 0.3s; margin-top: 8px; }
.node-detail .btn-read:hover { background: var(--primary-hover); }
.progress-bar { position: absolute; top: 72px; right: 20px; z-index: 10; background: rgba(10,14,26,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 18px; backdrop-filter: blur(8px); min-width: 120px; }
.progress-bar .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
.progress-bar .count { font-size: 22px; color: #fff; font-weight: bold; }
.progress-bar .count span { color: var(--accent); }
.progress-bar .bar-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.progress-bar .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 2px; width: 0%; transition: width 0.5s; }
@media (max-width: 768px) {
  .header h1 { font-size: 18px; padding: 6px 16px; }
  .node-detail { padding: 20px; max-width: 90%; }
  .controls button { padding: 6px 12px; font-size: 12px; }
  .progress-bar { top: 64px; right: 10px; padding: 10px 12px; min-width: 80px; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🧪 走进化学世界</h1>
    <div class="sub">第一单元 · 大单元全景技能地图</div>
  </div>
  <div class="progress-bar" id="progressBar">
    <div class="label">探索进度</div>
    <div class="count"><span id="unlockedCount">1</span>/5</div>
    <div class="bar-track"><div class="bar-fill" id="barFill" style="width:20%"></div></div>
  </div>
  <canvas id="skillMap"></canvas>
  <div class="node-detail" id="nodeDetail">
    <button class="btn-close" id="btnCloseDetail">✕</button>
    <h3 id="detailTitle">节点标题</h3>
    <p id="detailDesc">节点描述</p>
    <div id="detailTags"></div>
    <button class="btn-read" id="btnReadNode">📖 阅读完成，解锁下一层</button>
  </div>
  <div class="controls">
    <button id="btnZoomIn">🔍+</button>
    <span class="zoom-display" id="zoomDisplay">100%</span>
    <button id="btnZoomOut">🔍−</button>
    <button id="btnResetView">⟲ 重置视角</button>
    <span class="hint" id="hintText">点击节点阅读 → 解锁新区域</span>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('skillMap');
  const ctx = canvas.getContext('2d');
  const detail = document.getElementById('nodeDetail');
  const detailTitle = document.getElementById('detailTitle');
  const detailDesc = document.getElementById('detailDesc');
  const detailTags = document.getElementById('detailTags');
  const btnRead = document.getElementById('btnReadNode');
  const btnClose = document.getElementById('btnCloseDetail');
  const unlockedCount = document.getElementById('unlockedCount');
  const barFill = document.getElementById('barFill');
  const hintText = document.getElementById('hintText');
  const zoomDisplay = document.getElementById('zoomDisplay');
  const btnZoomIn = document.getElementById('btnZoomIn');
  const btnZoomOut = document.getElementById('btnZoomOut');
  const btnReset = document.getElementById('btnResetView');

  let W, H;
  let scale = 1, offsetX = 0, offsetY = 0;
  let isDragging = false, dragStartX, dragStartY;
  let unlocked = new Set([0]);
  let selectedNode = -1;
  let hoveredNode = -1;
  let particles = [];
  let animFrame;

  const nodes = [
    { id: 0, x: 0.50, y: 0.15, r: 42, label: '🔥 大单元概述', desc: '化学是什么？为什么要学化学？这是你进入化学世界的全景地图和导航仪。本模块为你展示"走进化学世界"完整图景。', unlocked: true, color: '#1677ff' },
    { id: 1, x: 0.20, y: 0.38, r: 38, label: '💡 化学的价值', desc: '化学在新能源、新材料、生物医药、碳中和等领域的革命性作用。化学不是课本知识，而是改变世界的力量。', unlocked: false, color: '#22c55e' },
    { id: 2, x: 0.80, y: 0.38, r: 38, label: '🔬 感知化学', desc: '从生活现象出发，感受化学就在身边。你喝的每一口水、用的每一件塑料制品，都蕴含着化学原理。', unlocked: false, color: '#f59e0b' },
    { id: 3, x: 0.35, y: 0.62, r: 38, label: '🧠 核心概念', desc: '物质、变化、性质——化学的三个核心概念。物理变化与化学变化的区分是入门的第一个关键。', unlocked: false, color: '#8b5cf6' },
    { id: 4, x: 0.65, y: 0.62, r: 38, label: '🎯 科学思维', desc: '建立"宏观—微观—符号"三重表征思维。学会变量控制和证据推理，这是化学家的思考方式。', unlocked: false, color: '#ec4899' }
  ];

  const connections = [[0,1],[0,2],[1,3],[2,3],[3,4],[1,4],[2,4]];

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    W = rect.width; H = rect.height;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    draw();
  }

  function toScreen(nx, ny) {
    return { x: nx * W + offsetX * scale, y: ny * H + offsetY * scale };
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(offsetX * scale * 0.3, offsetY * scale * 0.3);

    // Background grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 40) {
      ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
    }
    for (let i = 0; i < H; i += 40) {
      ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke();
    }

    // Connections
    connections.forEach(([a,b]) => {
      const na = nodes[a], nb = nodes[b];
      const pa = toScreen(na.x, na.y), pb = toScreen(nb.x, nb.y);
      const bothUnlocked = unlocked.has(a) && unlocked.has(b);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = bothUnlocked ? 'rgba(22,119,255,0.35)' : 'rgba(255,255,255,0.08)';
      ctx.lineWidth = bothUnlocked ? 2.5 : 1.5;
      if (!bothUnlocked) ctx.setLineDash([4,6]);
      else ctx.setLineDash([]);
      ctx.stroke();
    });
    ctx.setLineDash([]);

    // Draw nodes
    nodes.forEach((n, i) => {
      const p = toScreen(n.x, n.y);
      const isUnlocked = unlocked.has(i);
      const isHover = hoveredNode === i;
      const isSelected = selectedNode === i;
      const r = n.r * (isHover ? 1.1 : 1);

      // Glow if unlocked
      if (isUnlocked) {
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.5);
        grad.addColorStop(0, n.color + '30');
        grad.addColorStop(1, n.color + '00');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(p.x, p.y, r * 2.5, 0, Math.PI*2); ctx.fill();
      }

      // Node circle
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      if (isUnlocked) {
        const grad = ctx.createRadialGradient(p.x-r*0.3, p.y-r*0.3, 0, p.x, p.y, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, n.color);
        grad.addColorStop(1, n.color + 'cc');
        ctx.fillStyle = grad;
      } else {
        ctx.fillStyle = 'rgba(30,35,50,0.9)';
      }
      ctx.fill();
      ctx.strokeStyle = isUnlocked ? n.color : 'rgba(255,255,255,0.15)';
      ctx.lineWidth = isSelected ? 3 : (isUnlocked ? 2 : 1.5);
      ctx.stroke();

      // Lock icon for locked nodes
      if (!isUnlocked) {
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🔒', p.x, p.y);
      }

      // Label
      ctx.fillStyle = isUnlocked ? '#fff' : 'rgba(255,255,255,0.35)';
      ctx.font = (isUnlocked ? 'bold ' : '') + '13px -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(n.label, p.x, p.y + r + 6);
    });

    // Particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.life--;
      const alpha = p.life / p.maxLife;
      ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2); ctx.fill();
    });

    ctx.restore();
  }

  function spawnParticles(nx, ny, color, count) {
    const p = toScreen(nx, ny);
    for (let i = 0; i < count; i++) {
      particles.push({
        x: p.x, y: p.y,
        vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
        size: 2+Math.random()*3,
        life: 40+Math.random()*30,
        maxLife: 70,
        color: color
      });
    }
  }

  function getNodeAt(mx, my) {
    for (let i = nodes.length-1; i >= 0; i--) {
      const p = toScreen(nodes[i].x, nodes[i].y);
      const dx = mx - p.x, dy = my - p.y;
      if (Math.sqrt(dx*dx + dy*dy) < nodes[i].r + 8) return i;
    }
    return -1;
  }

  function showDetail(idx) {
    const n = nodes[idx];
    if (!n) return;
    selectedNode = idx;
    detailTitle.textContent = n.label;
    detailDesc.textContent = n.desc;
    detailTags.innerHTML = '';
    const isUnlocked = unlocked.has(idx);
    const canUnlock = !isUnlocked && idx > 0 && connections.some(([a,b]) => (a===idx||b===idx) && unlocked.has(a)&&unlocked.has(b));
    if (isUnlocked) {
      const tag = document.createElement('span');
      tag.className = 'tag ready'; tag.textContent = '✅ 已解锁';
      detailTags.appendChild(tag);
      btnRead.style.display = 'none';
    } else if (canUnlock) {
      const tag = document.createElement('span');
      tag.className = 'tag ready'; tag.textContent = '🔓 可解锁';
      detailTags.appendChild(tag);
      btnRead.style.display = 'inline-block';
      btnRead.textContent = '📖 阅读完成，解锁节点';
    } else {
      const tag = document.createElement('span');
      tag.className = 'tag locked'; tag.textContent = '🔒 需要先解锁前置节点';
      detailTags.appendChild(tag);
      btnRead.style.display = 'none';
    }
    detail.classList.add('show');
  }

  function unlockNode(idx) {
    if (unlocked.has(idx)) return;
    unlocked.add(idx);
    spawnParticles(nodes[idx].x, nodes[idx].y, nodes[idx].color, 40);
    unlockedCount.textContent = unlocked.size;
    const pct = Math.round((unlocked.size / nodes.length) * 100);
    barFill.style.width = pct + '%';
    hintText.textContent = unlocked.size >= nodes.length ? '🎉 全部解锁！探索完成！' : `已解锁 ${unlocked.size}/${nodes.length}，继续探索！`;
    detail.classList.remove('show');
    selectedNode = -1;
    draw();
  }

  function animate() {
    if (particles.length > 0) draw();
    animFrame = requestAnimationFrame(animate);
  }

  // Mouse events
  canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const idx = getNodeAt(mx, my);
    if (idx >= 0) {
      if (unlocked.has(idx) || connections.some(([a,b]) => (a===idx||b===idx) && unlocked.has(a)&&unlocked.has(b))) {
        showDetail(idx);
        return;
      }
    }
    isDragging = true;
    dragStartX = mx - offsetX * scale;
    dragStartY = my - offsetY * scale;
  });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (isDragging) {
      offsetX = (mx - dragStartX) / scale;
      offsetY = (my - dragStartY) / scale;
      draw();
    } else {
      const idx = getNodeAt(mx, my);
      hoveredNode = idx;
      canvas.style.cursor = idx >= 0 ? 'pointer' : 'grab';
      draw();
    }
  });

  canvas.addEventListener('mouseup', () => { isDragging = false; });
  canvas.addEventListener('mouseleave', () => { isDragging = false; hoveredNode = -1; });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / W;
    const my = (e.clientY - rect.top) / H;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.5, Math.min(3, scale * delta));
    if (newScale !== scale) {
      offsetX = (offsetX * scale - mx * W) / newScale + mx * W / newScale;
      offsetY = (offsetY * scale - my * H) / newScale + my * H / newScale;
      scale = newScale;
      zoomDisplay.textContent = Math.round(scale * 100) + '%';
      draw();
    }
  }, { passive: false });

  // Touch events
  let lastTouchDist = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const mx = t.clientX - rect.left, my = t.clientY - rect.top;
      const idx = getNodeAt(mx, my);
      if (idx >= 0) { showDetail(idx); return; }
      isDragging = true;
      dragStartX = mx - offsetX * scale;
      dragStartY = my - offsetY * scale;
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    }
  });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const t = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const mx = t.clientX - rect.left, my = t.clientY - rect.top;
      offsetX = (mx - dragStartX) / scale;
      offsetY = (my - dragStartY) / scale;
      draw();
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastTouchDist > 0) {
        const delta = dist / lastTouchDist;
        const newScale = Math.max(0.5, Math.min(3, scale * delta));
        scale = newScale;
        zoomDisplay.textContent = Math.round(scale * 100) + '%';
        draw();
      }
      lastTouchDist = dist;
    }
  });

  canvas.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

  // Button handlers
  btnRead.addEventListener('click', () => {
    if (selectedNode >= 0) unlockNode(selectedNode);
  });

  btnClose.addEventListener('click', () => {
    detail.classList.remove('show'); selectedNode = -1;
  });

  btnZoomIn.addEventListener('click', () => {
    scale = Math.min(3, scale * 1.2);
    zoomDisplay.textContent = Math.round(scale * 100) + '%';
    draw();
  });

  btnZoomOut.addEventListener('click', () => {
    scale = Math.max(0.5, scale * 0.8);
    zoomDisplay.textContent = Math.round(scale * 100) + '%';
    draw();
  });

  btnReset.addEventListener('click', () => {
    scale = 1; offsetX = 0; offsetY = 0;
    zoomDisplay.textContent = '100%';
    draw();
  });

  window.addEventListener('resize', resize);
  resize();
  animate();
})();
</script>
</body>
</html>
