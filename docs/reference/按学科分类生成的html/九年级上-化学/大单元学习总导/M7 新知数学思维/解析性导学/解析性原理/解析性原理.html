<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解析性原理 — 化学定量分析心法</title>
<style>
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --accent: #69b1ff;
  --bg: #f0f5ff;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 15px;
  --font-h1: 24px;
  --font-h2: 19px;
  --line-height: 1.7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-body);
  line-height: var(--line-height);
  color: var(--text);
  background: var(--bg);
  width: 100%; min-height: 100vh; padding: 0;
}
.container { width: 100%; max-width: none; padding: 30px 24px; }
.header { text-align: center; padding: 36px 20px; background: linear-gradient(135deg, var(--bg), #e6f0ff); border-radius: var(--border-radius); margin-bottom: 24px; }
.header h1 { font-size: var(--font-h1); color: var(--primary); margin-bottom: 6px; }
.header p { color: var(--text-secondary); font-size: 14px; }
.header .badge { display: inline-block; background: var(--primary); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; margin-top: 8px; }

.intro-box { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; margin-bottom: 24px; border: 1px solid var(--border); border-left: 4px solid var(--primary); }
.intro-box p { font-size: 14px; color: var(--text); line-height: 1.8; }

.principle-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
.principle-card { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
.principle-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
.principle-header .pnum { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.principle-header .pname { font-weight: 600; font-size: 15px; flex: 1; }
.principle-header .arrow { transition: transform .3s; color: var(--text-secondary); font-size: 12px; flex-shrink: 0; }
.principle-card.expanded .arrow { transform: rotate(180deg); }
.principle-body { max-height: 0; overflow: hidden; transition: max-height .45s ease; }
.principle-card.expanded .principle-body { max-height: 900px; }
.principle-body-inner { padding: 0 18px 16px 58px; border-top: 1px solid var(--border); padding-top: 12px; }
.pb-row { margin-bottom: 8px; }
.pb-label { font-weight: 600; color: var(--primary); font-size: 13px; margin-bottom: 2px; }
.pb-val { font-size: 14px; color: var(--text); }

.exercise-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
.exercise-card { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
.exercise-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
.exercise-header .e-icon { font-size: 20px; flex-shrink: 0; }
.exercise-header .e-info { flex: 1; }
.exercise-header .e-info .e-name { font-weight: 600; font-size: 15px; }
.exercise-header .e-info .e-sub { font-size: 13px; color: var(--text-secondary); }
.exercise-header .arrow { transition: transform .3s; color: var(--text-secondary); font-size: 12px; flex-shrink: 0; }
.exercise-card.expanded .arrow { transform: rotate(180deg); }
.exercise-body { max-height: 0; overflow: hidden; transition: max-height .45s ease; }
.exercise-card.expanded .exercise-body { max-height: 600px; }
.exercise-body-inner { padding: 0 18px 16px 50px; border-top: 1px solid var(--border); padding-top: 12px; }
.exercise-body-inner .eb-section { margin-bottom: 8px; }
.exercise-body-inner .eb-label { font-weight: 600; color: var(--primary); font-size: 13px; margin-bottom: 2px; }
.exercise-body-inner .eb-text { font-size: 14px; color: var(--text); }

.self-check { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; border: 1px solid var(--border); }
.self-check h3 { font-size: var(--font-h2); color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #f0f0f0; background: #fafafa; font-size: 14px; cursor: pointer; transition: all .2s; }
.check-item:hover { border-color: var(--accent); }
.check-item .cb { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; margin-top: 3px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; transition: all .2s; }
.check-item .cb.checked { background: #52c41a; border-color: #52c41a; }
.check-item .ct { flex: 1; }
.check-item.checked-item { background: #f6ffed; border-color: #b7eb8f; }

.section-title { font-size: var(--font-h2); color: var(--primary); margin: 24px 0 14px; display: flex; align-items: center; gap: 8px; }

.hint-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 10px 14px; margin-top: 8px; font-size: 13px; color: #8c6e00; display: none; }
.hint-box.show { display: block; }
.show-hint-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); cursor: pointer; font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.show-hint-btn:hover { border-color: var(--primary); color: var(--primary); }

@media (max-width: 640px) {
  .container { padding: 16px 12px; }
  .header { padding: 22px 14px; }
  .principle-body-inner { padding-left: 20px; }
  .exercise-body-inner { padding-left: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧠 解析性原理</h1>
    <p>从"蜡烛燃烧"案例中提炼的五条定量分析心法</p>
    <span class="badge">九年级 · 化学</span>
  </div>

  <div class="intro-box">
    <p>真正的学习不是"记住答案"，而是"学会怎么分析"。<strong>"蜡烛燃烧耗氧量"</strong>案例教会了你一套分析方法——把这套方法提炼成几条<strong>"心法"</strong>，以后遇到任何化学定量问题，你都可以直接调用。</p>
  </div>

  <div class="section-title">📐 五大解析性原理</div>
  <div class="principle-grid" id="principleGrid"></div>

  <div class="section-title">🏋️ 原理应用练习</div>
  <div class="exercise-grid" id="exerciseGrid"></div>

  <div class="section-title">✅ 自我检测</div>
  <div class="self-check" id="selfCheck">
    <h3>📋 对照以下问题检验你的掌握程度</h3>
    <div id="checkList"></div>
  </div>
</div>

<script>
var principles = [
  { num: 1, name: '定性→定量两步法', fields: [
    { label: '📖 说明', val: '不跳过"是什么"直接跳到"有多少"——先做定性判断，再做定量分析' },
    { label: '🧪 在示例中的体现', val: '先判断"蜡烛熄灭了是因为缺氧"（定性），再追问"消耗了多少氧"（定量）' },
    { label: '🔧 如何使用', val: '遇到化学问题，先问"发生了什么"，再问"发生了多少"' },
    { label: '🎯 适用场景', val: '任何化学变化分析、实验现象解释' },
    { label: '⚠️ 注意事项', val: '不要在定性阶段停留太久——定性的目的是为定量指引方向' }
  ]},
  { num: 2, name: '变量提取法', fields: [
    { label: '📖 说明', val: '从复杂现象中提取可测量的东西——时间、质量、体积、温度、浓度' },
    { label: '🧪 在示例中的体现', val: '从"蜡烛熄灭"现象中提取了"烧杯体积""燃烧时间"两个可测变量' },
    { label: '🔧 如何使用', val: '面对现象，列出"我能测量什么"，然后选择最容易测量的1-2个变量' },
    { label: '🎯 适用场景', val: '实验设计、数据分析、现象解释' },
    { label: '⚠️ 注意事项', val: '不是所有变量都需要测量——选那些"最有解释力"的变量' }
  ]},
  { num: 3, name: '基准参照法', fields: [
    { label: '📖 说明', val: '单独的数字没有意义——必须有一个"基准"才能判断大小' },
    { label: '🧪 在示例中的体现', val: '用"空气中含氧21%"作为基准，计算出密闭容器中氧气的总量' },
    { label: '🔧 如何使用', val: '找到已知数据作为参照（标准值、理论值、对照组的测量值）' },
    { label: '🎯 适用场景', val: '数据解释、结果评价、判断异常' },
    { label: '⚠️ 注意事项', val: '确认基准数据是可靠的（来自教材、文献或实验验证）' }
  ]},
  { num: 4, name: '比例推理法', fields: [
    { label: '📖 说明', val: '总量 × 比例 = 分量——这是一个万能的定量分析工具' },
    { label: '🧪 在示例中的体现', val: '氧气消耗量 = 烧杯容积 × 21%（含氧比例）' },
    { label: '🔧 如何使用', val: '找到"总量"和"比例"两个数据，用乘法估算分量' },
    { label: '🎯 适用场景', val: '成分分析、浓度计算、资源估算' },
    { label: '⚠️ 注意事项', val: '比例关系成立的前提——确认两个量之间确实是线性比例关系' }
  ]},
  { num: 5, name: '对比验证法', fields: [
    { label: '📖 说明', val: '让数据"说话"的最好方式是把不同条件下的数据放在一起对比' },
    { label: '🧪 在示例中的体现', val: '扣烧杯 vs 不扣烧杯的对比——用对比说明"氧气有限"这一结论' },
    { label: '🔧 如何使用', val: '设置对照组，在相同条件下比较不同变量对结果的影响' },
    { label: '🎯 适用场景', val: '实验设计、因果推断、结果验证' },
    { label: '⚠️ 注意事项', val: '确保"其他条件相同"——只有被测试的变量不同，对比才有意义' }
  ]}
];

var exercises = [
  { icon: '☕', name: '热水凉得有多快？', sub: '变量提取法 + 基准参照法', context: '早上你倒了一杯开水去上学，中午回来发现它凉了。请解析"一杯热水在室温下冷却的规律"。',
    hint: '你能测量什么变量？温度随时间的变化——数据点越多，规律越清晰。',
    principles: '变量提取法 + 基准参照法' },
  { icon: '🧴', name: '哪种除垢剂效果更好？', sub: '对比验证法 + 比例推理法', context: '家里水壶有水垢，你找到了白醋和除垢剂两种，但不知道哪个更有效。设计一个定量对比方案。',
    hint: '如何量化"除垢效果"？用什么方式测量？如何保证两种除垢剂的用量公平可比？',
    principles: '对比验证法 + 比例推理法' }
];

var selfChecks = [
  '我能否举出一个"只做定性分析不够，必须做定量分析"的例子？',
  '面对一个陌生的化学实验，我是否能说出"至少可以测量哪3个变量"？',
  '"21%→氧气含量"这个数据在解析中充当了什么角色？没有它，分析还能进行吗？',
  '对比验证法要求"其他条件相同"，如果做不到这一点，分析会有什么问题？',
  '这5条原理中，哪一条我最常用？哪一条最不常用？为什么？'
];

var checkState = {};

function renderPrinciples() {
  var grid = document.getElementById('principleGrid');
  var html = '';
  principles.forEach(function(p) {
    var fieldsHtml = '';
    p.fields.forEach(function(f) {
      fieldsHtml += '<div class="pb-row"><div class="pb-label">' + f.label + '</div><div class="pb-val">' + f.val + '</div></div>';
    });
    html += '<div class="principle-card">';
    html += '<div class="principle-header" onclick="toggleCard(this,\'principle\')">';
    html += '<div class="pnum">' + p.num + '</div>';
    html += '<div class="pname">' + p.name + '</div>';
    html += '<div class="arrow">▼</div></div>';
    html += '<div class="principle-body"><div class="principle-body-inner">' + fieldsHtml + '</div></div></div>';
  });
  grid.innerHTML = html;
}

function renderExercises() {
  var grid = document.getElementById('exerciseGrid');
  var html = '';
  exercises.forEach(function(e, i) {
    html += '<div class="exercise-card">';
    html += '<div class="exercise-header" onclick="toggleCard(this,\'exercise\')">';
    html += '<div class="e-icon">' + e.icon + '</div>';
    html += '<div class="e-info"><div class="e-name">' + e.name + '</div><div class="e-sub">建议原理：' + e.sub + '</div></div>';
    html += '<div class="arrow">▼</div></div>';
    html += '<div class="exercise-body"><div class="exercise-body-inner">';
    html += '<div class="eb-section"><div class="eb-label">📖 情境</div><div class="eb-text">' + e.context + '</div></div>';
    html += '<div class="eb-section"><div class="eb-label">💡 提示</div><div class="eb-text">' + e.hint + '</div></div>';
    html += '<div class="eb-section"><div class="eb-label">🔧 建议原理</div><div class="eb-text">' + e.principles + '</div></div>';
    html += '</div></div></div>';
  });
  grid.innerHTML = html;
}

function renderSelfCheck() {
  var list = document.getElementById('checkList');
  var html = '';
  selfChecks.forEach(function(q, i) {
    var key = 'sc-' + i;
    var checked = checkState[key] || false;
    html += '<div class="check-item' + (checked ? ' checked-item' : '') + '" onclick="toggleSelfCheck(' + i + ')">';
    html += '<div class="cb' + (checked ? ' checked' : '') + '">' + (checked ? '✓' : '') + '</div>';
    html += '<div class="ct">' + q + '</div></div>';
  });
  list.innerHTML = html;
}

function toggleCard(header, type) {
  var card = header.closest ? header.closest('.' + type + '-card') : header.parentElement;
  if (card) card.classList.toggle('expanded');
}

function toggleSelfCheck(i) {
  var key = 'sc-' + i;
  checkState[key] = !checkState[key];
  renderSelfCheck();
}

renderPrinciples();
renderExercises();
renderSelfCheck();
</script>
</body>
</html>
