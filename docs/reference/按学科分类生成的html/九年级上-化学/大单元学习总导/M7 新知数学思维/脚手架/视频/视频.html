<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频 — 化学中的定量思维</title>
<style>
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --accent: #69b1ff;
  --bg: #f0f5ff;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 15px;
  --font-h1: 24px;
  --font-h2: 19px;
  --line-height: 1.7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-body);
  line-height: var(--line-height);
  color: var(--text);
  background: var(--bg);
  width: 100%;
  min-height: 100vh;
  padding: 0;
}
.container { width: 100%; max-width: none; padding: 30px 24px; }
.header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, var(--bg), #e6f0ff); border-radius: var(--border-radius); margin-bottom: 30px; }
.header h1 { font-size: var(--font-h1); color: var(--primary); margin-bottom: 8px; }
.header p { color: var(--text-secondary); font-size: 14px; }
.header .badge { display: inline-block; background: var(--primary); color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; margin-top: 10px; }

/* tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn { padding: 10px 22px; border: 1px solid var(--border); background: var(--card-bg); border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--text-secondary); transition: all .25s; }
.tab-btn:hover { border-color: var(--primary); color: var(--primary); }
.tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* video cards */
.video-grid { display: flex; flex-direction: column; gap: 16px; }
.video-card { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; transition: box-shadow .25s; }
.video-card:hover { box-shadow: 0 4px 16px rgba(22,119,255,0.12); }
.video-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none; }
.video-header .num { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--primary); flex-shrink: 0; }
.video-header .info { flex: 1; }
.video-header .info .title { font-weight: 600; font-size: 15px; }
.video-header .info .sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.video-header .arrow { transition: transform .3s; color: var(--text-secondary); font-size: 12px; flex-shrink: 0; }
.video-card.expanded .arrow { transform: rotate(180deg); }
.video-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
.video-card.expanded .video-body { max-height: 800px; }
.video-body-inner { padding: 0 20px 20px 64px; border-top: 1px solid var(--border); padding-top: 14px; }
.video-body-inner .section { margin-bottom: 10px; }
.video-body-inner .section-label { font-weight: 600; color: var(--primary); font-size: 13px; margin-bottom: 4px; }
.video-body-inner .section-content { font-size: 14px; color: var(--text); }
.video-body-inner ul { list-style: none; padding: 0; }
.video-body-inner ul li { position: relative; padding-left: 16px; margin-bottom: 4px; font-size: 14px; }
.video-body-inner ul li::before { content: "•"; position: absolute; left: 4px; color: var(--accent); }
.tag-layer { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; margin-left: 8px; }
.tag-basic { background: #e6f7ff; color: #1890ff; }
.tag-adv { background: #fff7e6; color: #d46b08; }
.tag-challenge { background: #f6ffed; color: #52c41a; }
.done-btn { margin-top: 10px; padding: 6px 18px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all .25s; }
.done-btn:hover { border-color: var(--primary); color: var(--primary); }
.done-btn.done { background: #f6ffed; border-color: #52c41a; color: #52c41a; }
.source-box { margin-top: 30px; background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; border: 1px solid var(--border); }
.source-box h3 { font-size: var(--font-h2); margin-bottom: 10px; color: var(--primary); }
.source-box ul { list-style: none; padding: 0; }
.source-box ul li { padding: 4px 0; padding-left: 20px; position: relative; font-size: 14px; color: var(--text-secondary); }
.source-box ul li::before { content: "🔗"; position: absolute; left: 0; }
@media (max-width: 640px) {
  .container { padding: 16px 12px; }
  .header { padding: 24px 16px; }
  .tab-btn { padding: 8px 14px; font-size: 13px; }
  .video-body-inner { padding-left: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎬 化学中的定量思维</h1>
    <p>通过视频学习，从测量工具到数据分析，建立化学定量思维</p>
    <span class="badge">九年级 · 化学</span>
  </div>

  <div class="tabs" id="tabGroup">
    <button class="tab-btn active" data-layer="basic" onclick="switchLayer('basic')">🧪 基础层</button>
    <button class="tab-btn" data-layer="adv" onclick="switchLayer('adv')">📊 进阶层</button>
    <button class="tab-btn" data-layer="challenge" onclick="switchLayer('challenge')">🚀 挑战层</button>
  </div>

  <div class="video-grid" id="videoGrid"></div>

  <div class="source-box">
    <h3>📺 视频来源推荐</h3>
    <ul>
      <li>Bilibili：李永乐老师科普（化学定量分析相关视频）</li>
      <li>中国大学MOOC：中学化学实验视频</li>
      <li>YouTube：Crash Course Chemistry（英文字幕，第1—5集）</li>
    </ul>
  </div>
</div>

<script>
var videos = [
  { layer: 'basic', num: 1, title: '化学中的测量——从天平到原子力显微镜', sub: '认识测量工具的发展历程', tag: '基础', tagClass: 'tag-basic',
    tasks: [
      { label: '📌 观看任务', text: '找出化学测量工具的发展历程（从天平到电子显微镜）' },
      { label: '❓ 关键问题', items: ['这些测量工具分别测量什么？', '测量精度提高了多少倍？'] },
      { label: '⏸ 暂停思考', text: '当看到"拉瓦锡的天平"时——思考为什么天平被称为"化学革命的第一件武器"' },
      { label: '✏️ 输出任务', text: '绘制一张"化学测量工具发展时间线"图' }
    ] },
  { layer: 'basic', num: 2, title: '质量守恒定律——拉瓦锡的经典实验', sub: '重现化学史上的关键定量实验', tag: '基础', tagClass: 'tag-basic',
    tasks: [
      { label: '📌 观看任务', text: '记录拉瓦锡实验的完整步骤和测量数据' },
      { label: '❓ 关键问题', items: ['拉瓦锡测量了哪些物理量？', '他的结论和前人有什么不同？'] },
      { label: '⏸ 暂停思考', text: '拉瓦锡把金属放在密闭容器中加热前后称量——注意他分别称量了什么' },
      { label: '✏️ 输出任务', text: '用表格对比"燃素说"和"氧化说"对同一现象的解释' }
    ] },
  { layer: 'adv', num: 3, title: '如何用Excel分析化学实验数据', sub: '数据可视化与误差分析实操', tag: '进阶', tagClass: 'tag-adv',
    tasks: [
      { label: '📌 观看任务', text: '跟着视频实操，完成一组实验数据的图表绘制' },
      { label: '❓ 关键问题', items: ['折线图和柱状图分别适合什么数据？', '数据中的异常值应该如何处理？'] },
      { label: '⏸ 暂停思考', text: '当讲到"误差分析"时——暂停并整理你认为可能产生误差的原因' },
      { label: '✏️ 输出任务', text: '用自己收集的数据（或给定数据）完成一份完整的数据分析报告' }
    ] },
  { layer: 'adv', num: 4, title: 'TED演讲：为什么我们需要数据素养', sub: '数据时代公民的必备能力', tag: '进阶', tagClass: 'tag-adv',
    tasks: [
      { label: '📌 观看任务', text: '找出演讲中提到的"普通人因为不懂数据而犯错"的案例' },
      { label: '❓ 关键问题', items: ['数据素养为什么是现代公民的必备能力？', '你生活中有没有被数据误导的经历？'] },
      { label: '⏸ 暂停思考', text: '演讲者展示误导性图表时——暂停并思考"这个图表错在哪里"' },
      { label: '✏️ 输出任务', text: '写一篇200字的"数据素养与化学学习"反思' }
    ] },
  { layer: 'challenge', num: 5, title: '前沿科学——AI如何帮助化学家发现新规律', sub: '人工智能与化学定量分析的结合', tag: '挑战', tagClass: 'tag-challenge',
    tasks: [
      { label: '📌 观看任务', text: '找出AI在化学数据分析中的3个具体应用案例' },
      { label: '❓ 关键问题', items: ['AI发现规律的方式和科学家有什么不同？', 'AI会取代化学定量分析吗？'] },
      { label: '⏸ 暂停思考', text: '当讲到"机器学习预测新分子"时——思考这种做法和门捷列夫预测新元素有什么异同' },
      { label: '✏️ 输出任务', text: '就"AI是否应该参与化学实验设计"写一段辩论提纲（正方+反方）' }
    ] }
];

var doneSet = {};

function renderVideos(layer) {
  var grid = document.getElementById('videoGrid');
  var filtered = videos.filter(function(v) { return v.layer === layer; });
  var html = '';
  filtered.forEach(function(v) {
    var isDone = doneSet['v'+v.num] || false;
    var expanded = false;
    var tasksHtml = '';
    v.tasks.forEach(function(t) {
      tasksHtml += '<div class="section">';
      tasksHtml += '<div class="section-label">' + t.label + '</div>';
      tasksHtml += '<div class="section-content">';
      if (t.items) {
        tasksHtml += '<ul>';
        t.items.forEach(function(item) { tasksHtml += '<li>' + item + '</li>'; });
        tasksHtml += '</ul>';
      } else {
        tasksHtml += t.text;
      }
      tasksHtml += '</div></div>';
    });
    html += '<div class="video-card" data-num="' + v.num + '">';
    html += '<div class="video-header" onclick="toggleCard(this)">';
    html += '<div class="num">' + v.num + '</div>';
    html += '<div class="info"><div class="title">' + v.title + ' <span class="tag-layer ' + v.tagClass + '">' + v.tag + '</span></div>';
    html += '<div class="sub">' + v.sub + '</div></div>';
    html += '<div class="arrow">▼</div></div>';
    html += '<div class="video-body"><div class="video-body-inner">';
    html += tasksHtml;
    html += '<button class="done-btn' + (isDone ? ' done' : '') + '" onclick="markDone(this,' + v.num + ')">' + (isDone ? '✅ 已完成' : '◻ 标记完成') + '</button>';
    html += '</div></div></div>';
  });
  grid.innerHTML = html;
}

function switchLayer(layer) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.tab-btn[data-layer="'+layer+'"]').classList.add('active');
  renderVideos(layer);
}

function toggleCard(header) {
  var card = header.closest ? header.closest('.video-card') : header.parentElement;
  if (card) card.classList.toggle('expanded');
}

function markDone(btn, num) {
  var key = 'v' + num;
  doneSet[key] = !doneSet[key];
  if (doneSet[key]) {
    btn.textContent = '✅ 已完成';
    btn.classList.add('done');
  } else {
    btn.textContent = '◻ 标记完成';
    btn.classList.remove('done');
  }
}

renderVideos('basic');
</script>
</body>
</html>
