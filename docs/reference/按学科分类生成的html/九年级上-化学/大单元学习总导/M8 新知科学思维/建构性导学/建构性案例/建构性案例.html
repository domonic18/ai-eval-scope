<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建构性案例 — M8 新知科学思维</title>
<style>
:root {
  --primary: #1677ff;
  --primary-hover: #4096ff;
  --accent: #69b1ff;
  --bg: #f0f5ff;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 15px;
  --font-h1: 24px;
  --font-h2: 19px;
  --line-height: 1.7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-body);
  line-height: var(--line-height);
  color: var(--text);
  background: var(--bg);
  width: 100%;
  max-width: none;
  padding: 0;
}
.container {
  width: 100%;
  max-width: none;
  padding: 24px 20px;
  box-sizing: border-box;
}
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-hover));
  color: #fff;
  padding: 28px 24px;
  border-radius: var(--border-radius);
  margin-bottom: 24px;
}
.header h1 { font-size: var(--font-h1); margin-bottom: 8px; }
.header p { font-size: 14px; opacity: 0.9; }
.header .meta { font-size: 13px; opacity: 0.75; margin-top: 8px; }
.header .progress { font-size: 13px; margin-top: 10px; opacity: 0.85; }

/* Nav */
.nav-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.nav-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 2px solid var(--border);
  background: var(--card-bg);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn:hover { border-color: var(--primary); color: var(--primary); }
.nav-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.nav-btn .diff-dots { display: flex; gap: 2px; }
.nav-btn .diff-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.4;
}
.nav-btn.active .diff-dots span { opacity: 0.7; }

/* Case card */
.case-card {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 20px;
  display: none;
}
.case-card.active { display: block; }
.case-card .case-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--bg);
}
.case-card .case-top .diff-badge {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg);
  color: var(--primary);
}
.case-card .case-top .principle-tag {
  font-size: 12px;
  color: var(--text-secondary);
}
.case-card h2 {
  font-size: var(--font-h2);
  color: var(--primary);
  margin-bottom: 4px;
}
.case-card h3 {
  font-size: 16px;
  color: var(--text);
  margin: 14px 0 6px;
}
.case-card p { margin-bottom: 8px; font-size: 14px; }
.case-card ul, .case-card ol { padding-left: 18px; margin-bottom: 8px; font-size: 14px; }
.case-card li { margin-bottom: 4px; }

/* Info box */
.info-box {
  background: #e6f4ff;
  border-left: 4px solid var(--primary);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  margin: 8px 0;
  font-size: 14px;
}
.info-box.success {
  background: #f6ffed;
  border-left-color: #52c41a;
}

/* Rubric */
.rubric {
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.rubric-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.rubric-item:last-child { border-bottom: none; }
.rubric-item:hover { background: var(--bg); }
.rubric-item .cb {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: all 0.2s;
}
.rubric-item.done .cb {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 20px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: var(--primary);
  color: #fff;
  transition: background 0.2s;
}
.btn:hover { background: var(--primary-hover); }
.btn-outline {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--text);
}
.btn-outline:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: transparent;
}
.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.btn:disabled:hover { background: var(--primary); }

@media (max-width: 600px) {
  .container { padding: 12px 10px; }
  .header { padding: 18px 16px; }
  .nav-btn { font-size: 12px; padding: 6px 10px; }
  .case-card { padding: 14px; }
}
</style>
</head>

var currentCase = 0;

function init() {
  buildNav();
  renderCase(0);
  updateProgress();
}

function buildNav() {
  var nav = document.getElementById('navBar');
  if (!nav) return;
  cases.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.setAttribute('data-idx', i);
    var stars = '';
    if (i === 0) stars = '<span class="diff-dots"><span></span></span>';
    else if (i < 2) stars = '<span class="diff-dots"><span></span><span></span></span>';
    else if (i < 4) stars = '<span class="diff-dots"><span></span><span></span><span></span></span>';
    else if (i < 6) stars = '<span class="diff-dots"><span></span><span></span><span></span><span></span></span>';
    else stars = '<span class="diff-dots"><span></span><span></span><span></span><span></span><span></span></span>';
    btn.innerHTML = (i + 1) + ' ' + stars;
    btn.onclick = (function(idx) { return function() { goToCase(idx); }; })(i);
    nav.appendChild(btn);
  });
}

function renderCase(idx) {
  var c = cases[idx];
  if (!c) return;
  var container = document.getElementById('caseContainer');
  if (!container) return;
  var html = '<div class="case-card active">';
  html += '<div class="case-top">';
  html += '<h2>' + c.title + '</h2>';
  html += '<span class="diff-badge">难度 ' + c.diff + '</span>';
  html += '<span class="principle-tag">' + c.principle + '</span>';
  html += '</div>';

  c.content.forEach(function(block) {
    if (block.type === 'h3') {
      html += '<h3>' + block.text + '</h3>';
    } else if (block.type === 'p') {
      html += '<p>' + block.text + '</p>';
    } else if (block.type === 'ol') {
      html += '<ol>';
      block.items.forEach(function(item) {
        html += '<li>' + item + '</li>';
      });
      html += '</ol>';
    } else if (block.type === 'rubric') {
      html += '<div class="rubric" id="rubric' + idx + '">';
      block.items.forEach(function(item, ri) {
        html += '<div class="rubric-item" onclick="toggleRubric(this)">';
        html += '<span class="cb"></span>';
        html += '<span>' + item + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
  });

  html += '<div class="controls">';
  html += '<button class="btn" onclick="prevCase()" id="prevBtn"' + (idx === 0 ? ' disabled' : '') + '>← 上一个案例</button>';
  html += '<button class="btn" onclick="nextCase()" id="nextBtn"' + (idx === cases.length - 1 ? ' disabled' : '') + '>下一个案例 →</button>';
  if (idx > 0) {
    html += '<button class="btn btn-outline" onclick="resetRubric(' + idx + ')">🔄 重置自评</button>';
  }
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;
}

function goToCase(idx) {
  if (idx < 0 || idx >= cases.length) return;
  currentCase = idx;
  renderCase(idx);
  updateProgress();
  // Update nav
  var btns = document.querySelectorAll('.nav-btn');
  btns.forEach(function(b, i) {
    b.classList.toggle('active', i === idx);
  });
  document.getElementById('caseContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function nextCase() {
  if (currentCase < cases.length - 1) goToCase(currentCase + 1);
}

function prevCase() {
  if (currentCase > 0) goToCase(currentCase - 1);
}

function updateProgress() {
  var prog = document.getElementById('progressBar');
  if (prog) prog.textContent = '当前进度：案例 ' + (currentCase + 1) + ' / ' + cases.length;
}

function toggleRubric(el) {
  if (el) el.classList.toggle('done');
}

function resetRubric(idx) {
  var rubric = document.getElementById('rubric' + idx);
  if (!rubric) return;
  var items = rubric.querySelectorAll('.rubric-item');
  items.forEach(function(item) { item.classList.remove('done'); });
}

init();
</script>
