<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建构性案例 — 七阶友谊建构之旅</title>
<style>
:root {
  --primary: #434343;
  --primary-hover: #595959;
  --accent: #8c8c8c;
  --bg: #f5f5f5;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 15px;
  --font-h1: 22px;
  --font-h2: 18px;
  --line-height: 1.65;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--font-body);
  line-height: var(--line-height);
  width: 100%;
  padding: 0;
}
.container { width: 100%; max-width: none; padding: 24px; }
.hero {
  background: linear-gradient(135deg, #434343 0%, #595959 100%);
  color: #fff;
  padding: 32px 24px;
  border-radius: var(--border-radius);
  margin-bottom: 24px;
  text-align: center;
}
.hero h1 { font-size: var(--font-h1); margin-bottom: 8px; }
.hero p { font-size: 14px; opacity: 0.85; }
.hero .principles {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 12px;
}
.hero .principles span {
  background: rgba(255,255,255,0.2); padding: 4px 12px;
  border-radius: 12px; font-size: 12px;
}

.progress-bar {
  display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 24px; justify-content: center;
}
.progress-item {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 20px;
  font-size: 12px; cursor: pointer;
  background: var(--card-bg); border: 1px solid var(--border);
  transition: all 0.2s;
}
.progress-item:hover { border-color: var(--accent); }
.progress-item .dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.progress-item.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.level-1 .dot { background: #a8d8a8; }
.level-2 .dot { background: #7ec87e; }
.level-3 .dot { background: #54b854; }
.level-4 .dot { background: #2ea82e; }
.level-5 .dot { background: #1e8c1e; }
.level-6 .dot { background: #167016; }
.level-7 .dot { background: #0d540d; }

.case-main {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 20px;
  min-height: 300px;
}
.case-main .case-title {
  font-size: var(--font-h2);
  color: var(--primary);
  margin-bottom: 6px;
}
.case-main .case-tag {
  display: inline-block;
  background: var(--bg);
  color: var(--primary);
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  margin-bottom: 12px;
}
.case-main .case-difficulty {
  display: inline-block;
  margin-left: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}
.case-main .case-content { font-size: 14px; line-height: 1.8; }
.case-main .case-content strong { color: var(--primary); }
.case-main .case-content ul { padding-left: 20px; margin: 8px 0; }
.case-main .case-content li { margin-bottom: 4px; }

.nav-buttons {
  display: flex; justify-content: space-between; gap: 12px; margin-top: 16px;
}
.nav-btn {
  padding: 10px 24px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.2s;
}
.nav-btn:hover { background: var(--primary-hover); }
.nav-btn:disabled { background: var(--border); cursor: not-allowed; }
.nav-btn.secondary { background: var(--accent); }
.nav-btn.secondary:hover { background: #737373; }
.case-counter { text-align: center; padding: 8px; color: var(--text-secondary); font-size: 13px; }

.portfolio-box {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 20px;
}
.portfolio-box h3 { font-size: var(--font-h2); color: var(--primary); margin-bottom: 12px; }
.portfolio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 600px) { .portfolio-grid { grid-template-columns: 1fr; } }
.portfolio-item {
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 13px;
  transition: all 0.2s;
  cursor: default;
}
.portfolio-item .num { font-weight: 700; color: var(--primary); }
.portfolio-item .name { display: block; margin-top: 2px; }

@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.slide-in { animation: slideIn 0.35s ease; }

.footer {
  text-align: center; padding: 20px; color: var(--text-secondary);
  font-size: 13px; border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🏗️ 七阶友谊建构之旅</h1>
    <p>从个人故事到综合方案 · M10 新知哲学思维 · 人教版必修1 Unit 1</p>
    <div class="principles">
      <span>情境激活法</span>
      <span>目的导向法</span>
      <span>分步建构法</span>
      <span>模板脚手架法</span>
      <span>自评修正法</span>
    </div>
  </div>

  <div class="progress-bar" id="progressBar"></div>

  <div class="case-main" id="caseMain"></div>

  <div class="portfolio-box">
    <h3>📚 作品集清单</h3>
    <div class="portfolio-grid" id="portfolioGrid"></div>
  </div>

  <div class="footer">M10 新知哲学思维 · 建构性导学 · 完成全部7阶即可收获完整作品集</div>
</div>

<script>
const cases = [
  {
    title: "第1阶：我的友谊故事",
    tag: "个人理解型",
    difficulty: "★☆☆☆☆",
    level: 1,
    content: `<p><strong>任务：</strong>写一篇 80-100 词的英语短文，讲述你亲身经历的一段友谊故事，文末用 "From this experience, I learned that friendship is..." 收束。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>闭眼回想2分钟，列出5个关键词（人物、地点、事件、情绪、时间）</li>
      <li>用"开头→发展→转折→结尾"四段结构搭中文骨架</li>
      <li>逐句译为英文，使用 Unit 1 句式（"I will never forget...", "We used to..."）</li>
      <li>每段加1-2个具体细节增强感染力</li>
      <li>以感悟句收束全文</li>
    </ol>
    <p><strong>🏆 成果：</strong>My Friendship Story（英语档案用）</p>`
  },
  {
    title: "第2阶：校园友谊温度计",
    tag: "生活应用型",
    difficulty: "★★☆☆☆",
    level: 2,
    content: `<p><strong>任务：</strong>完成一份"友谊温度计"观察记录卡（英文），记录一周内观察到的校园友谊互动（5个场景），为每个场景给出评语和升温建议。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>设计英语表格模板（Date, Location, Observation, Feeling, Suggestion）</li>
      <li>连续3天，每天观察1-2个友谊互动场景</li>
      <li>分类标注：Warm Moment / Cool Moment / Neutral</li>
      <li>为每条记录写评语和建议</li>
      <li>底部用3-5句英语总结本周发现</li>
    </ol>
    <p><strong>🏆 成果：</strong>Friendship Thermometer Observation Card</p>`
  },
  {
    title: "第3阶：调解友谊裂痕",
    tag: "校园问题解决型",
    difficulty: "★★★☆☆",
    level: 3,
    content: `<p><strong>任务：</strong>两位同学因小组合作闹翻了。请你设计一份英语调解方案（含调解步骤+对话脚本），帮助他们化解矛盾。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>列出A和B的立场、感受和诉求（Conflict Analysis Table）</li>
      <li>设计调解流程：倾听→确认问题→换位思考→提方案→达成共识</li>
      <li>写调解员开场词（介绍角色、说明目的、建立信任）</li>
      <li>为每一步写2-4轮对话脚本</li>
      <li>拟一份 "Friendship Agreement" 和解协议</li>
    </ol>
    <p><strong>🏆 成果：</strong>Peer Mediation Plan & Dialogue Script</p>`
  },
  {
    title: "第4阶：友谊主题诗歌创作",
    tag: "学科表达型",
    difficulty: "★★★☆☆",
    level: 4,
    content: `<p><strong>任务：</strong>创作一首英语诗歌（8-16行），围绕友谊主题。可选形式：四行诗、俳句风格、自由诗、打油诗。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>列出与你的友谊故事相关的5-8个具体意象（物品、颜色、天气、动作）</li>
      <li>选择诗歌形式，了解其规则（如四行诗AABB押韵）</li>
      <li>将意象组织成诗行——先写下来，不求完美</li>
      <li>修改润色：意象是否传情？节奏是否流畅？押韵是否准确？</li>
      <li>配简笔画+写2-3句英语创作意图说明</li>
    </ol>
    <p><strong>🏆 成果：</strong>Friendship Poem with Creative Statement（校刊投稿用）</p>`
  },
  {
    title: "第5阶：友谊的心理学密码",
    tag: "跨学科整合型",
    difficulty: "★★★★☆",
    level: 5,
    content: `<p><strong>任务：</strong>基于心理学概念（如斯滕伯格爱情三角理论），建构你自己的友谊结构模型，制作一份中英双语图文分析报告。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>查阅心理学模型，用英语记录三个核心维度及定义</li>
      <li>画出你的 "Friendship Triangle"，给每个角命名</li>
      <li>为每个维度写一段英语例证（各60词左右），结合真实经历</li>
      <li>写分析总结（60-80词），说明你的模型与参考理论的异同</li>
    </ol>
    <p><strong>🏆 成果：</strong>My Friendship Triangle — Bilingual Report</p>`
  },
  {
    title: "第6阶：数字友谊生存指南",
    tag: "社会/未来情境型",
    difficulty: "★★★★☆",
    level: 6,
    content: `<p><strong>任务：</strong>制作一份 "Digital Friendship Survival Guide" 英语手册（至少3个主题板块），帮助同龄人思考数字时代的友谊问题。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>调查数字化友谊现状（微型问卷5题，访谈5位同学）</li>
      <li>从以下话题选3个：Online vs Offline / Social Media / Stay Connected / Digital Etiquette / True Friends Online</li>
      <li>每个板块写50-80词英语分析</li>
      <li>配1个案例+2-3条实用建议</li>
      <li>设计英语封面+slogan（如 "Friendship is not about Wi-Fi signal"）</li>
    </ol>
    <p><strong>🏆 成果：</strong>Digital Friendship Survival Guide（英语周展览用）</p>`
  },
  {
    title: "第7阶：班级友谊文化建设方案",
    tag: "综合创新型",
    difficulty: "★★★★★",
    level: 7,
    content: `<p><strong>任务：</strong>设计一份完整的 "Class Friendship Culture Building" 英语活动方案（3个活动+宣传海报），提交班主任评审。</p>
    <p><strong>建构步骤：</strong></p>
    <ol>
      <li>从前6阶素材中提取发现，做一次班级微型调研</li>
      <li>设计3个活动的英语名称和主题说明</li>
      <li>为每个活动编写：Purpose, Time, Materials, Steps, Expected Outcome</li>
      <li>设计英语宣传海报草图</li>
      <li>列出物料清单+时间+人员安排</li>
    </ol>
    <p><strong>🏆 成果：</strong>Class Friendship Culture Building Plan（完整方案+海报）</p>`
  }
];

const portfolio = [
  { num: 1, name: "My Friendship Story — 英语短文" },
  { num: 2, name: "Friendship Thermometer — 观察记录卡" },
  { num: 3, name: "Peer Mediation Plan — 调解方案" },
  { num: 4, name: "Friendship Poem — 英语诗歌" },
  { num: 5, name: "Friendship Triangle — 双语报告" },
  { num: 6, name: "Digital Friendship Guide — 英语手册" },
  { num: 7, name: "Friendship Culture Plan — 综合方案" }
];

let currentCase = 0;

function renderProgress() {
  const bar = document.getElementById('progressBar');
  cases.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'progress-item level-' + c.level + (i === currentCase ? ' active' : '');
    item.innerHTML = `<span class="dot"></span> 第${i+1}阶`;
    item.onclick = () => { currentCase = i; renderCase(); renderProgress(); };
    bar.appendChild(item);
  });
}

function renderCase() {
  const main = document.getElementById('caseMain');
  const c = cases[currentCase];
  main.innerHTML = `
    <div class="slide-in">
      <div class="case-title">${c.title}</div>
      <span class="case-tag">${c.tag}</span>
      <span class="case-difficulty">难度：${c.difficulty}</span>
      <div class="case-content">${c.content}</div>
      <div class="case-counter">${currentCase + 1} / ${cases.length}</div>
      <div class="nav-buttons">
        <button class="nav-btn" onclick="prevCase()" ${currentCase === 0 ? 'disabled' : ''}>◀ 上一阶</button>
        <button class="nav-btn secondary" onclick="nextCase()" ${currentCase === cases.length - 1 ? 'disabled' : ''}>下一阶 ▶</button>
      </div>
    </div>
  `;
  renderProgress();
}

function renderPortfolio() {
  const grid = document.getElementById('portfolioGrid');
  portfolio.forEach(p => {
    const item = document.createElement('div');
    item.className = 'portfolio-item';
    item.innerHTML = `<span class="num">#${p.num}</span> <span class="name">${p.name}</span>`;
    grid.appendChild(item);
  });
}

function nextCase() {
  if (currentCase < cases.length - 1) { currentCase++; renderCase(); }
}
function prevCase() {
  if (currentCase > 0) { currentCase--; renderCase(); }
}

renderProgress();
renderCase();
renderPortfolio();
</script>
</body>
</html>
