<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五维导学 · 导航罗盘</title>
<style>
:root {
  --primary: #434343;
  --primary-hover: #595959;
  --accent: #8c8c8c;
  --font-body: 15px;
  --font-h1: 22px;
  --font-h2: 18px;
  --line-height: 1.65;
  --col-cog:#1677ff;  --col-emo:#ff4d4f;  --col-skl:#52c41a;
  --col-met:#722ed1;  --col-val:#faad14;
  --col-cog-g:#1677ff44; --col-emo-g:#ff4d4f44; --col-skl-g:#52c41a44;
  --col-met-g:#722ed144; --col-val-g:#faad1444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; background:#0d0f1a; color:#e0e0e0; font-size:var(--font-body); line-height:var(--line-height); overflow-x:hidden; min-height:100vh; }
.wrapper { width:100%; max-width:none; padding:16px; display:flex; flex-direction:column; align-items:center; }

/* === HUD Header === */
#hud { width:100%; max-width:1200px; display:flex; justify-content:space-between; align-items:center; padding:12px 0; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
#hud h1 { font-size:var(--font-h1); font-weight:700; background:linear-gradient(135deg,#e0e0e0,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
#hud .score { font-size:13px; color:#888; background:rgba(255,255,255,.05); padding:6px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.08); }
#hud .score span { color:#51cf66; -webkit-text-fill-color:#51cf66; font-weight:600; }

/* === Main layout === */
#main { display:flex; width:100%; max-width:1200px; gap:16px; flex-wrap:wrap; }

/* Left: Radar chart */
#leftPanel { flex:0 0 200px; min-width:160px; }
#radarChart { width:100%; aspect-ratio:1; background:rgba(255,255,255,.03); border-radius:12px; border:1px solid rgba(255,255,255,.06); position:relative; overflow:hidden; }
#radarChart canvas { width:100%; height:100%; display:block; }
#radarTitle { font-size:12px; color:#888; text-align:center; margin-top:6px; }
@keyframes flashRed { 0%,100%{opacity:1} 50%{opacity:.3} }
.radar-warn { animation:flashRed .6s infinite; }

/* Center: Compass */
#centerPanel { flex:1; min-width:300px; display:flex; flex-direction:column; align-items:center; }
#compass { position:relative; width:min(60vw,500px); height:min(60vw,500px); margin:0 auto; }
#compass canvas { width:100%; height:100%; display:block; }
#scanHint { position:absolute; bottom:-40px; left:50%; transform:translateX(-50%); font-size:13px; color:#888; background:rgba(13,15,26,.9); padding:6px 16px; border-radius:20px; border:1px solid rgba(255,255,255,.08); white-space:nowrap; }

/* Right: Goal cards */
#rightPanel { flex:0 0 220px; min-width:180px; }
#goalPool { background:rgba(255,255,255,.03); border-radius:12px; border:1px solid rgba(255,255,255,.08); padding:12px; min-height:300px; }
#goalPool h3 { font-size:14px; color:#aaa; margin-bottom:10px; text-align:center; }
.goalCard { padding:10px 12px; border-radius:8px; margin-bottom:8px; cursor:grab; font-size:13px; transition:all .3s; user-select:none; touch-action:none; }
.goalCard:active { cursor:grabbing; }
.goalCard.cog { background:var(--col-cog-g); border:1px solid var(--col-cog); color:#91caff; }
.goalCard.emo { background:var(--col-emo-g); border:1px solid var(--col-emo); color:#ffa39e; }
.goalCard.skl { background:var(--col-skl-g); border:1px solid var(--col-skl); color:#95de64; }
.goalCard.met { background:var(--col-met-g); border:1px solid var(--col-met); color:#d3adf7; }
.goalCard.val { background:var(--col-val-g); border:1px solid var(--col-val); color:#ffe58f; }
.goalCard.matched { opacity:.5; pointer-events:none; text-decoration:line-through; }
.goalCard .dim { font-size:10px; opacity:.6; margin-top:2px; }

/* Bottom: Timeline */
#timeline { width:100%; max-width:1200px; margin-top:20px; background:rgba(255,255,255,.03); border-radius:12px; padding:16px; border:1px solid rgba(255,255,255,.06); }
#timeline h3 { font-size:14px; color:#aaa; margin-bottom:12px; }
.tl-track { display:flex; gap:4px; align-items:center; overflow-x:auto; padding:8px 0; }
.tl-node { flex:0 0 auto; padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; transition:all .2s; text-align:center; min-width:64px; }
.tl-node.done { background:#1f2d1f; color:#51cf66; border:1px solid #51cf6644; }
.tl-node.current { background:#2a2518; color:#ffd43b; border:1px solid #ffd43b44; font-weight:600; }
.tl-node.future { background:rgba(255,255,255,.05); color:#555; border:1px solid rgba(255,255,255,.06); }
.tl-node:hover { transform:translateY(-2px); }
.tl-arrow { color:#333; font-size:14px; flex:0 0 auto; }

/* === Quiz Modal === */
#quizOverlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); display:none; justify-content:center; align-items:center; }
#quizOverlay.show { display:flex; }
#quizBox { background:#1a1c2e; border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:28px; max-width:480px; width:90%; max-height:90vh; overflow-y:auto; }
#quizBox h2 { font-size:18px; margin-bottom:16px; color:#fff; }
.quiz-q { margin-bottom:16px; }
.quiz-q p { font-size:14px; color:#ccc; margin-bottom:8px; font-weight:500; }
.quiz-q label { display:block; padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.08); margin-bottom:4px; cursor:pointer; font-size:13px; color:#aaa; transition:all .2s; }
.quiz-q label:hover { border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.04); }
.quiz-q input:checked+span { color:#fff; }
.quiz-q input { display:none; }
.quiz-q input:checked ~ * { }
.quiz-q label:has(input:checked) { border-color:#4dabf7; background:rgba(77,171,247,.1); color:#fff; }
#quizResult { display:none; margin-top:16px; padding:16px; background:rgba(255,255,255,.05); border-radius:10px; }
#quizResult canvas { width:100%; max-width:200px; margin:0 auto; display:block; }
#quizResult h3 { font-size:15px; color:#fff; margin-bottom:8px; }
#quizResult p { font-size:13px; color:#888; }
.btn { padding:10px 24px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; transition:all .2s; }
.btn-primary { background:#4dabf7; color:#fff; }
.btn-primary:hover { background:#339af0; }
.btn-outline { background:transparent; border:1px solid rgba(255,255,255,.15); color:#ccc; }
.btn-outline:hover { background:rgba(255,255,255,.08); }
.btn-success { background:#51cf66; color:#fff; }
.btn-success:hover { background:#40c057; }
.btn-gold { background:#fab005; color:#1a1a2e; }
.btn-gold:hover { background:#f59f00; }
.btn-gold:disabled { opacity:.4; cursor:not-allowed; }

/* === Guide preview === */
#guidePreview { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); display:none; justify-content:center; align-items:center; }
#guidePreview.show { display:flex; }
#guideBox { background:#1a1c2e; border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:28px; max-width:520px; width:90%; max-height:85vh; overflow-y:auto; }
#guideBox h2 { font-size:18px; color:#fff; margin-bottom:12px; }
#guideBox .dim-card { padding:10px 14px; margin-bottom:8px; border-radius:8px; border-left:3px solid; }
#guideBox .dim-card h4 { font-size:14px; margin-bottom:4px; }
#guideBox .dim-card p { font-size:12px; color:#888; }
#guideBox .goals { list-style:none; padding:0; margin:8px 0; }
#guideBox .goals li { font-size:13px; color:#aaa; padding:4px 0; padding-left:16px; position:relative; }
#guideBox .goals li::before { content:'▸'; position:absolute; left:0; color:#555; }

/* === Notification === */
#notif { position:fixed; bottom:30px; right:30px; z-index:200; padding:12px 20px; border-radius:10px; font-size:14px; opacity:0; transition:all .4s; transform:translateY(20px); pointer-events:none; }
#notif.show { opacity:1; transform:translateY(0); }
#notif.success { background:#1f2d1f; color:#51cf66; border:1px solid #51cf6644; }
#notif.error { background:#2d1f1f; color:#ff6b6b; border:1px solid #ff6b6b44; }
#notif.info { background:#1f2a3d; color:#4dabf7; border:1px solid #4dabf744; }

@keyframes dimGlow { 0%,100%{opacity:1} 50%{opacity:.6} }
.dim-active { animation:dimGlow .8s infinite; }

@media (max-width:768px) {
  #main { flex-direction:column; }
  #leftPanel, #rightPanel { flex:1; min-width:0; }
  #compass { width:min(80vw,350px); height:min(80vw,350px); }
  #rightPanel .goalCard { font-size:12px; padding:8px 10px; }
}
</style>
</head>
<body>
<div class="wrapper">
  <div id="hud">
    <h1>🧭 五维导学罗盘</h1>
    <div class="score">配对进度: <span id="matchCount">0</span>/5</div>
    <button class="btn btn-outline" onclick="showQuiz()" style="font-size:12px;padding:6px 14px;">📋 前置自测</button>
  </div>

  <div id="main">
    <!-- Left: Radar -->
    <div id="leftPanel">
      <div id="radarChart">
        <canvas id="radarCanvas"></canvas>
      </div>
      <div id="radarTitle">五维平衡检测</div>
    </div>

    <!-- Center: Compass -->
    <div id="centerPanel">
      <div id="compass">
        <canvas id="compassCanvas"></canvas>
        <div id="scanHint">🔄 罗盘扫描中，点击扇区了解详情</div>
      </div>
    </div>

    <!-- Right: Goal cards -->
    <div id="rightPanel">
      <div id="goalPool">
        <h3>🎯 拖放目标卡片到对应扇区</h3>
        <div class="goalCard cog" data-dim="cog" draggable="true">理解核心语篇主题与词汇<br><span class="dim">🧠 认知维度</span></div>
        <div class="goalCard emo" data-dim="emo" draggable="true">唤起文化体验与情感共鸣<br><span class="dim">❤️ 情感维度</span></div>
        <div class="goalCard skl" data-dim="skl" draggable="true">掌握听说读写综合技能<br><span class="dim">⚙️ 技能维度</span></div>
        <div class="goalCard met" data-dim="met" draggable="true">反思监控自己的学习过程<br><span class="dim">🪞 元认知维度</span></div>
        <div class="goalCard val" data-dim="val" draggable="true">理解英语学习的文化与人生价值<br><span class="dim">⭐ 价值维度</span></div>
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-gold" id="exportBtn" onclick="showGuide()" disabled style="font-size:12px;padding:6px 14px;flex:1;">📥 导学案导出</button>
          <button class="btn btn-outline" onclick="resetMatch()" style="font-size:12px;padding:6px 14px;">↺ 重置</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom: Timeline -->
  <div id="timeline">
    <h3>📅 学习路径时间轴</h3>
    <div class="tl-track" id="tlTrack"></div>
  </div>
</div>

<!-- Quiz Modal -->
<div id="quizOverlay">
  <div id="quizBox">
    <h2>📋 前置知识快检</h2>
    <div class="quiz-q">
      <p>1. 用英语介绍中国文化时，你最先想到什么？</p>
      <label><input type="radio" name="q1" value="cog"><span>词汇和语法结构</span></label>
      <label><input type="radio" name="q1" value="emo"><span>想分享的文化情感</span></label>
      <label><input type="radio" name="q1" value="skl"><span>表达技巧和发音</span></label>
    </div>
    <div class="quiz-q">
      <p>2. 学习英语对你最大的挑战是什么？</p>
      <label><input type="radio" name="q2" value="cog"><span>理解和记忆新知识</span></label>
      <label><input type="radio" name="q2" value="met"><span>不知道如何有效学习</span></label>
      <label><input type="radio" name="q2" value="skl"><span>实际运用和表达</span></label>
    </div>
    <div class="quiz-q">
      <p>3. 你希望通过英语学习获得什么？</p>
      <label><input type="radio" name="q3" value="skl"><span>实用的交流能力</span></label>
      <label><input type="radio" name="q3" value="val"><span>更广阔的世界视野</span></label>
      <label><input type="radio" name="q3" value="emo"><span>跨文化交流的快乐</span></label>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="hideQuiz()">取消</button>
      <button class="btn btn-primary" onclick="submitQuiz()">提交自测</button>
    </div>
    <div id="quizResult">
      <h3>📊 你的起点画像</h3>
      <canvas id="quizRadarCanvas"></canvas>
      <p id="quizResultText" style="margin-top:8px;"></p>
      <button class="btn btn-outline" onclick="hideQuiz()" style="margin-top:12px;">关闭</button>
    </div>
  </div>
</div>

<!-- Guide Preview -->
<div id="guidePreview">
  <div id="guideBox">
    <h2>📥 五维导学案</h2>
    <div id="guideContent"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn-outline" onclick="hideGuide()">关闭</button>
      <button class="btn btn-success" onclick="captureGuide()">📷 截图保存</button>
    </div>
  </div>
</div>

<!-- Notification -->
<div id="notif"></div>

<script>
// ===== DATA =====
const DIMS = [
  { id:'cog', label:'认知维度', color:'#1677ff', icon:'🧠', desc:'理解核心语篇主题，掌握关键词汇与句型' },
  { id:'emo', label:'情感维度', color:'#ff4d4f', icon:'❤️', desc:'唤起文化体验与情感共鸣' },
  { id:'skl', label:'技能维度', color:'#52c41a', icon:'⚙️', desc:'掌握听说读看写的综合技能' },
  { id:'met', label:'元认知维度', color:'#722ed1', icon:'🪞', desc:'反思和监控自己的学习过程' },
  { id:'val', label:'价值维度', color:'#faad14', icon:'⭐', desc:'理解英语学习的文化与人生价值' },
];
const TL_DATA = [
  { id:'m2', label:'认知', left:'模块2', done:true },
  { id:'m3', label:'感知', left:'模块3', done:true },
  { id:'m4', label:'概念', left:'模块4', current:true },
  { id:'m5', label:'艺术', left:'模块5' },
  { id:'m6', label:'技术', left:'模块6' },
  { id:'m8', label:'科学', left:'模块8' },
  { id:'m9', label:'文化', left:'模块9' },
  { id:'m12', label:'应用', left:'模块12' },
  { id:'m13', label:'项目', left:'模块13' },
];
let matched = JSON.parse(localStorage.getItem('w5d_matched')||'[]');
let scanPhase = 0;
let animFrame = null;

// ===== COMPASS =====
const compassCanvas = document.getElementById('compassCanvas');
const cCtx = compassCanvas.getContext('2d');
let cW, cH, cR;
function resizeCompass() {
  const rect = document.getElementById('compass').getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  cW = rect.width; cH = rect.height; cR = Math.min(cW,cH)/2;
  compassCanvas.width = cW*dpr; compassCanvas.height = cH*dpr;
  compassCanvas.style.width = cW+'px'; compassCanvas.style.height = cH+'px';
  cCtx.setTransform(dpr,0,0,dpr,0,0);
}

let scanAngle = 0;
function drawCompass(t) {
  const cx = cW/2, cy = cH/2, r = cR * 0.85;
  cCtx.clearRect(0,0,cW,cH);

  // Background ring
  cCtx.beginPath(); cCtx.arc(cx,cy,r,0,Math.PI*2);
  cCtx.fillStyle = 'rgba(255,255,255,.02)';
  cCtx.fill();
  cCtx.strokeStyle = 'rgba(255,255,255,.06)';
  cCtx.lineWidth = 2; cCtx.stroke();

  // Sectors
  const n = 5;
  for(let i=0; i<n; i++) {
    const startA = -Math.PI/2 + i*2*Math.PI/n;
    const endA = startA + 2*Math.PI/n;
    const d = DIMS[i];
    const matchedThis = matched.includes(d.id);
    const isScanning = (scanPhase === i);

    cCtx.beginPath();
    cCtx.moveTo(cx,cy);
    cCtx.arc(cx,cy,r, startA, endA);
    cCtx.closePath();
    const alpha = matchedThis ? .25 : (isScanning ? .15 : .08);
    cCtx.fillStyle = isScanning ? d.color.replace(')','')+',0.3)' : d.color.replace(')','')+','+alpha+')';
    cCtx.fill();
    cCtx.strokeStyle = matchedThis ? d.color : 'rgba(255,255,255,.1)';
    cCtx.lineWidth = matchedThis ? 3 : 1;
    cCtx.stroke();

    // Label
    const midA = startA + Math.PI/n;
    const lr = r * 0.65;
    cCtx.fillStyle = isScanning || matchedThis ? d.color : 'rgba(255,255,255,.3)';
    cCtx.font = `bold ${isScanning?14:12}px -apple-system,sans-serif`;
    cCtx.textAlign = 'center'; cCtx.textBaseline = 'middle';
    cCtx.fillText(d.icon + (matchedThis?' ✓':''), cx+Math.cos(midA)*lr, cy+Math.sin(midA)*lr);
    cCtx.font = `${isScanning?11:10}px -apple-system,sans-serif`;
    cCtx.fillText(d.label, cx+Math.cos(midA)*(lr+26), cy+Math.sin(midA)*(lr+26));

    // Guide question on scan
    if(isScanning) {
      const qs = [
        '本单元要帮你理解什么核心问题？',
        '这堂课会唤起你怎样的情感体验？',
        '学完你将掌握什么具体能力？',
        '你将如何反思和监控自己的学习？',
        '这些知识会怎样改变你的世界观？'
      ];
      cCtx.fillStyle = d.color;
      cCtx.font = 'bold 13px -apple-system,sans-serif';
      cCtx.textAlign = 'center'; cCtx.textBaseline = 'bottom';
      cCtx.fillText(qs[i], cx, cy + r * 1.45);
    }
  }

  // Center
  const grad = cCtx.createRadialGradient(cx,cy,0,cx,cy,20);
  grad.addColorStop(0,'#ffd43b');
  grad.addColorStop(1,'#e8590c');
  cCtx.beginPath(); cCtx.arc(cx,cy,14,0,Math.PI*2);
  cCtx.fillStyle = grad; cCtx.fill();
  cCtx.strokeStyle = '#ffd43b'; cCtx.lineWidth=2; cCtx.stroke();
  cCtx.fillStyle='#fff'; cCtx.font='bold 10px sans-serif'; cCtx.textAlign='center'; cCtx.textBaseline='middle';
  cCtx.fillText('★',cx,cy+1);

  // Scan beam
  const beamA = t * 0.001;
  cCtx.beginPath(); cCtx.moveTo(cx,cy);
  cCtx.arc(cx,cy,r*1.1, beamA-0.15, beamA+0.15);
  cCtx.closePath();
  const beamGrad = cCtx.createRadialGradient(cx,cy,0,cx,cy,r*1.1);
  beamGrad.addColorStop(0,'rgba(255,255,255,.08)');
  beamGrad.addColorStop(1,'rgba(255,255,255,0)');
  cCtx.fillStyle = beamGrad; cCtx.fill();

  // Stamp
  if(matched.length === n) {
    cCtx.save();
    cCtx.translate(cx,cy);
    cCtx.rotate(t*0.0005);
    cCtx.fillStyle = 'rgba(81,207,102,.15)';
    cCtx.strokeStyle = '#51cf66'; cCtx.lineWidth=2;
    cCtx.font='bold 16px -apple-system,sans-serif'; cCtx.textAlign='center'; cCtx.textBaseline='middle';
    cCtx.beginPath(); cCtx.arc(0,0,r*0.45,0,Math.PI*2); cCtx.fill(); cCtx.stroke();
    cCtx.fillStyle='#51cf66'; cCtx.fillText('导学案就绪 ✓',0,0);
    cCtx.restore();
  }
}

// ===== RADAR =====
const radarCanvas = document.getElementById('radarCanvas');
const rCtx = radarCanvas.getContext('2d');
function resizeRadar() {
  const rect = document.getElementById('radarChart').getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  const size = Math.min(rect.width, rect.height)||200;
  radarCanvas.width = size*dpr; radarCanvas.height = size*dpr;
  radarCanvas.style.width = size+'px'; radarCanvas.style.height = size+'px';
  rCtx.setTransform(dpr,0,0,dpr,0,0);
}
function drawRadar() {
  const size = radarCanvas.width||200;
  const cx = size/2, cy = size/2, r = size*0.38;
  rCtx.clearRect(0,0,size,size);

  const values = DIMS.map(d => matched.includes(d.id) ? 0.9 + Math.random()*0.1 : 0.2 + Math.random()*0.3);
  const n = values.length;

  // Grid
  for(let ring=1; ring<=3; ring++) {
    rCtx.beginPath();
    for(let i=0; i<=n; i++) {
      const a = -Math.PI/2 + i*2*Math.PI/n;
      const x = cx + Math.cos(a)*r*ring/3, y = cy + Math.sin(a)*r*ring/3;
      i===0 ? rCtx.moveTo(x,y) : rCtx.lineTo(x,y);
    }
    rCtx.strokeStyle = 'rgba(255,255,255,.06)'; rCtx.lineWidth=1; rCtx.stroke();
  }

  // Axes
  for(let i=0; i<n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    rCtx.beginPath(); rCtx.moveTo(cx,cy); rCtx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    rCtx.strokeStyle = 'rgba(255,255,255,.08)'; rCtx.stroke();
  }

  // Data
  rCtx.beginPath();
  for(let i=0; i<=n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    const v = values[i%n];
    const x = cx + Math.cos(a)*r*v, y = cy + Math.sin(a)*r*v;
    i===0 ? rCtx.moveTo(x,y) : rCtx.lineTo(x,y);
  }
  rCtx.closePath();
  rCtx.fillStyle = 'rgba(77,171,247,.15)'; rCtx.fill();
  rCtx.strokeStyle = '#4dabf7'; rCtx.lineWidth=2; rCtx.stroke();

  // Labels
  for(let i=0; i<n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    const lr = r + 18;
    rCtx.fillStyle = DIMS[i].color; rCtx.font='9px -apple-system,sans-serif';
    rCtx.textAlign = 'center'; rCtx.textBaseline = 'middle';
    rCtx.fillText(DIMS[i].icon + DIMS[i].label, cx+Math.cos(a)*lr, cy+Math.sin(a)*lr);
    // percentage
    const p = Math.round(values[i]*100);
    rCtx.fillStyle = values[i] < 0.4 && !matched.includes(DIMS[i].id) ? '#ff6b6b' : '#888';
    rCtx.font = '8px -apple-system,sans-serif';
    rCtx.fillText(p+'%', cx+Math.cos(a)*(r*values[i]), cy+Math.sin(a)*(r*values[i])-8);
  }
}

// ===== QUIZ RADAR =====
const qrCanvas = document.getElementById('quizRadarCanvas');
let qrCtx, qrSize;
function initQuizRadar() {
  const rect = qrCanvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  qrSize = 200; qrCanvas.width = qrSize*dpr; qrCanvas.height = qrSize*dpr;
  qrCanvas.style.width = qrSize+'px'; qrCanvas.style.height = qrSize+'px';
  qrCtx = qrCanvas.getContext('2d'); qrCtx.setTransform(dpr,0,0,dpr,0,0);
}
function drawQuizRadar(scores) {
  if(!qrCtx) initQuizRadar();
  const cx = qrSize/2, cy = qrSize/2, r = qrSize*0.35;
  qrCtx.clearRect(0,0,qrSize,qrSize);
  const n = DIMS.length;

  for(let ring=1; ring<=3; ring++) {
    qrCtx.beginPath();
    for(let i=0; i<=n; i++) {
      const a = -Math.PI/2 + i*2*Math.PI/n;
      const x = cx+Math.cos(a)*r*ring/3, y = cy+Math.sin(a)*r*ring/3;
      i===0?qrCtx.moveTo(x,y):qrCtx.lineTo(x,y);
    }
    qrCtx.strokeStyle='rgba(255,255,255,.08)'; qrCtx.stroke();
  }
  for(let i=0; i<n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    qrCtx.beginPath(); qrCtx.moveTo(cx,cy); qrCtx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    qrCtx.strokeStyle='rgba(255,255,255,.06)'; qrCtx.stroke();
  }

  // User profile
  qrCtx.beginPath();
  for(let i=0; i<=n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    const v = scores[DIMS[i%n].id]||0.3;
    const x = cx+Math.cos(a)*r*v, y = cy+Math.sin(a)*r*v;
    i===0?qrCtx.moveTo(x,y):qrCtx.lineTo(x,y);
  }
  qrCtx.closePath();
  qrCtx.fillStyle='rgba(255,212,59,.12)'; qrCtx.fill();
  qrCtx.strokeStyle='#ffd43b'; qrCtx.lineWidth=2; qrCtx.stroke();

  // Ideal
  qrCtx.beginPath();
  for(let i=0; i<=n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    const x = cx+Math.cos(a)*r*0.85, y = cy+Math.sin(a)*r*0.85;
    i===0?qrCtx.moveTo(x,y):qrCtx.lineTo(x,y);
  }
  qrCtx.closePath();
  qrCtx.setLineDash([3,4]); qrCtx.strokeStyle='rgba(81,207,102,.4)'; qrCtx.stroke(); qrCtx.setLineDash([]);

  for(let i=0; i<n; i++) {
    const a = -Math.PI/2 + i*2*Math.PI/n;
    qrCtx.fillStyle=DIMS[i].color; qrCtx.font='9px -apple-system,sans-serif';
    qrCtx.textAlign='center'; qrCtx.textBaseline='middle';
    qrCtx.fillText(DIMS[i].icon, cx+Math.cos(a)*(r+14), cy+Math.sin(a)*(r+14));
  }
}

// ===== INTERACTIONS =====
let dragEl = null, dragOffX=0, dragOffY=0;

document.querySelectorAll('.goalCard[draggable]').forEach(card => {
  card.addEventListener('dragstart', e => {
    dragEl = card; e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.dataset.dim);
  });
});

document.getElementById('compass').addEventListener('dragover', e => e.preventDefault());
document.getElementById('compass').addEventListener('drop', e => {
  e.preventDefault();
  if(!dragEl) return;
  const dim = dragEl.dataset.dim;
  if(!matched.includes(dim)) {
    matched.push(dim); save();
    dragEl.classList.add('matched');
    document.getElementById('matchCount').textContent = matched.length;
    showNotif('✓ '+DIMS.find(d=>d.id===dim).label+' 配对成功！','success');
    if(matched.length === 5) {
      showNotif('🎉 全部配对完成！导学案已就绪','success');
      document.getElementById('exportBtn').disabled = false;
    }
    updateAll();
  } else {
    showNotif('该目标已完成配对','info');
  }
  dragEl = null;
});

// Touch support for mobile
document.querySelectorAll('.goalCard[draggable]').forEach(card => {
  card.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragEl = card;
    const rect = card.getBoundingClientRect();
    dragOffX = t.clientX - rect.left;
    dragOffY = t.clientY - rect.top;
    card.style.position = 'fixed'; card.style.zIndex = '50';
    card.style.width = rect.width+'px';
    card.style.left = (t.clientX - dragOffX)+'px';
    card.style.top = (t.clientY - dragOffY)+'px';
    card.style.opacity = '.8';
  }, {passive:true});

  card.addEventListener('touchmove', e => {
    e.preventDefault();
    if(!dragEl) return;
    const t = e.touches[0];
    dragEl.style.left = (t.clientX - dragOffX)+'px';
    dragEl.style.top = (t.clientY - dragOffY)+'px';
  }, {passive:false});

  card.addEventListener('touchend', e => {
    if(!dragEl) return;
    const t = e.changedTouches[0];
    const compass = document.getElementById('compass').getBoundingClientRect();
    // Check if dropped on compass
    if(t.clientX >= compass.left && t.clientX <= compass.right &&
       t.clientY >= compass.top && t.clientY <= compass.bottom) {
      const dim = dragEl.dataset.dim;
      if(!matched.includes(dim)) {
        matched.push(dim); save();
        dragEl.classList.add('matched');
        document.getElementById('matchCount').textContent = matched.length;
        showNotif('✓ '+DIMS.find(d=>d.id===dim).label+' 配对成功！','success');
        if(matched.length === 5) {
          showNotif('🎉 全部配对完成！导学案已就绪','success');
          document.getElementById('exportBtn').disabled = false;
        }
        updateAll();
      }
    }
    dragEl.style.position = ''; dragEl.style.zIndex = '';
    dragEl.style.left = ''; dragEl.style.top = ''; dragEl.style.width = '';
    dragEl.style.opacity = '';
    dragEl = null;
  }, {passive:true});
});

function resetMatch() {
  matched = []; save();
  document.querySelectorAll('.goalCard').forEach(c => c.classList.remove('matched'));
  document.getElementById('matchCount').textContent = '0';
  document.getElementById('exportBtn').disabled = true;
  updateAll();
  showNotif('已重置配对','info');
}

// ===== TIMELINE =====
function renderTimeline() {
  const track = document.getElementById('tlTrack');
  track.innerHTML = TL_DATA.map((d,i) => {
    const cls = d.done?'done':(d.current?'current':'future');
    const label = d.label;
    return `<div class="tl-node ${cls}" onclick="showNotif('${d.left||d.id}: 五维目标详情','info')">${label}</div>` +
      (i < TL_DATA.length-1 ? `<span class="tl-arrow">▸</span>` : '');
  }).join('');
}

// ===== QUIZ =====
function showQuiz() {
  document.getElementById('quizOverlay').classList.add('show');
  document.getElementById('quizResult').style.display = 'none';
}
function hideQuiz() { document.getElementById('quizOverlay').classList.remove('show'); }
function submitQuiz() {
  const ans = {};
  ['q1','q2','q3'].forEach(q => {
    const sel = document.querySelector(`input[name="${q}"]:checked`);
    ans[q] = sel ? sel.value : 'cog';
  });
  const scores = { cog:0.3, emo:0.3, skl:0.3, met:0.3, val:0.3 };
  Object.values(ans).forEach(v => { if(scores[v]!==undefined) scores[v] = Math.min(1, (scores[v]||0)+0.35); });
  // Normalize
  Object.keys(scores).forEach(k => scores[k] = Math.min(0.95, scores[k] + 0.15));

  document.getElementById('quizResult').style.display = 'block';
  document.querySelector('#quizBox h2').textContent = '📊 你的起点画像';
  setTimeout(() => drawQuizRadar(scores), 100);

  // Find biggest gap
  const ideal = { cog:0.85, emo:0.8, skl:0.85, met:0.75, val:0.8 };
  let maxGap = 0, maxDim = '';
  Object.keys(scores).forEach(k => {
    const gap = ideal[k] - scores[k];
    if(gap > maxGap) { maxGap = gap; maxDim = k; }
  });
  const dimName = DIMS.find(d=>d.id===maxDim)?.label||maxDim;
  document.getElementById('quizResultText').innerHTML = `📌 <strong>最大差距维度：${dimName}</strong><br>建议在学习中重点关注这一维度的提升。`;
}
function hideQuiz() { document.getElementById('quizOverlay').classList.remove('show'); }

function showGuide() {
  if(matched.length < 5) return;
  document.getElementById('guidePreview').classList.add('show');
  const content = document.getElementById('guideContent');
  content.innerHTML = DIMS.map(d => {
    const cls = matched.includes(d.id) ? d.color : '#555';
    return `<div class="dim-card" style="border-color:${d.color}">
      <h4 style="color:${d.color}">${d.icon} ${d.label}</h4>
      <p>${d.desc}</p>
      <ul class="goals">
        <li>${DIMS.find(dd=>dd.id===d.id).desc}</li>
      </ul>
    </div>`;
  }).join('') + `<div style="margin-top:12px;padding:10px;background:rgba(255,255,255,.04);border-radius:8px;">
    <p style="font-size:13px;color:#888;">📅 推荐学习路径：感知 → 概念 → 应用 → 项目 → 反思</p>
  </div>`;
}
function hideGuide() { document.getElementById('guidePreview').classList.remove('show'); }
function captureGuide() {
  showNotif('📷 导学案已保存至学习档案','success');
}

// ===== NOTIFICATION =====
function showNotif(msg, type='info') {
  const el = document.getElementById('notif');
  el.textContent = msg; el.className = 'show '+type;
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== SCAN SEQUENCE =====
function startScan() {
  let i = 0;
  const interval = setInterval(() => {
    if(i >= DIMS.length) { clearInterval(interval); return; }
    scanPhase = i;
    updateAll();
    i++;
  }, 3000);
}

// ===== UPDATE =====
function updateAll() {
  drawCompass(performance.now());
  drawRadar();
  renderTimeline();
}

// ===== ANIMATION LOOP =====
function animate(t) {
  drawCompass(t);
  animFrame = requestAnimationFrame(animate);
}

// ===== SAVE =====
function save() { localStorage.setItem('w5d_matched', JSON.stringify(matched)); }

// ===== LOAD SAVED =====
function loadSaved() {
  matched.forEach(dim => {
    const card = document.querySelector(`.goalCard[data-dim="${dim}"]`);
    if(card) card.classList.add('matched');
  });
  document.getElementById('matchCount').textContent = matched.length;
  if(matched.length === 5) document.getElementById('exportBtn').disabled = false;
}

// ===== INIT =====
resizeCompass(); resizeRadar();
loadSaved(); renderTimeline();
animFrame = requestAnimationFrame(animate);
startScan();

window.addEventListener('resize', () => { resizeCompass(); resizeRadar(); });
</script>
