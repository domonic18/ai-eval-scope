<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解析性案例 — 中西方友谊文化差异七阶分析</title>
<style>
:root {
  --primary: #434343;
  --primary-hover: #595959;
  --accent: #8c8c8c;
  --bg: #f5f5f5;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --font-body: 15px;
  --font-h1: 22px;
  --font-h2: 18px;
  --line-height: 1.65;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--font-body);
  line-height: var(--line-height);
  width: 100%;
  padding: 0;
}
.container { width: 100%; max-width: none; padding: 24px; }
.header {
  background: linear-gradient(135deg, #434343 0%, #595959 100%);
  color: #fff;
  padding: 32px 24px;
  border-radius: var(--border-radius);
  margin-bottom: 24px;
  text-align: center;
}
.header h1 { font-size: var(--font-h1); margin-bottom: 8px; font-weight: 700; }
.header p { font-size: 14px; opacity: 0.85; }
.case-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 24px; }
@media (min-width: 768px) { .case-grid { grid-template-columns: 1fr 1fr; } }
.case-card {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  padding: 20px;
  border-left: 4px solid var(--accent);
  transition: all 0.3s ease;
  cursor: pointer;
}
.case-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.case-card h3 { font-size: var(--font-h2); color: var(--primary); margin-bottom: 10px; }
.case-card .tag {
  display: inline-block;
  background: var(--bg);
  color: var(--primary);
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  margin-bottom: 10px;
}
.case-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; }
.case-card .expand-btn {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.case-card .expand-btn:hover { background: var(--primary-hover); }
.case-detail {
  display: none;
  margin-top: 14px;
  padding: 14px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}
.case-detail.show { display: block; }
.case-detail table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0;
  font-size: 13px;
}
.case-detail th, .case-detail td {
  border: 1px solid var(--border);
  padding: 8px 10px;
  text-align: left;
}
.case-detail th { background: var(--primary); color: #fff; }
.case-detail .principle {
  display: inline-block;
  background: #e6e6e6;
  color: var(--primary);
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
  margin: 2px;
}
.reflection-section {
  background: var(--card-bg);
  border-radius: var(--border-radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 24px;
}
.reflection-section h2 { font-size: var(--font-h2); color: var(--primary); margin-bottom: 16px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
.reflection-item {
  padding: 12px 16px;
  margin-bottom: 10px;
  background: var(--bg);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
.reflection-item:hover { background: #e8e8e8; }
.reflection-item .q { font-weight: 600; font-size: 14px; }
.reflection-item .hint {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: none;
}
.reflection-item .hint.show { display: block; }
.toggle-all {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 8px 20px;
  font-size: 14px;
  cursor: pointer;
  margin-top: 12px;
  transition: background 0.2s;
}
.toggle-all:hover { background: #737373; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.footer {
  text-align: center;
  padding: 20px;
  color: var(--text-secondary);
  font-size: 13px;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌍 中西方友谊文化差异</h1>
    <p>七阶解析性案例 · 运用解析性原理在7个不同情境中分析文化差异</p>
  </div>

  <div class="case-grid" id="caseGrid"></div>

  <div class="reflection-section">
    <h2>💭 综合反思</h2>
    <div id="reflectionList"></div>
    <button class="toggle-all" onclick="toggleAllHints()">展开所有思考提示</button>
  </div>

  <div class="footer">M9 新知文化思维 · 解析性导学 · 人教版 必修1 Unit 1 Friendship</div>
</div>

<script>
const cases = [
  {
    title: "案例一：餐厅里的"AA制"困惑",
    tag: "生活情境",
    brief: "你和美国交换生Mike吃完午饭后，他拿出计算器分账。你感到不自在——为什么他这样"计较"？",
    detail: '<p><strong>解析路径：</strong>识别问题→中美对"请客"的理解差异 → 确定对象→AA制行为 → 拆解要素→经济观念、人际关系、面子 → 解释原因→个人主义vs集体主义</p><p><strong>调用原理：</strong> <span class="principle">停一停原则</span> <span class="principle">三问原则</span></p><table><tr><th>现象</th><th>中国文化含义</th><th>美国文化含义</th></tr><tr><td>争着买单</td><td>表达友谊和慷慨</td><td>可能让对方感到压力</td></tr><tr><td>AA制</td><td>显得计较</td><td>平等、独立的表现</td></tr></table><p>💡 美国文化强调个人独立，AA制不是"计较"，而是表示"我们是平等的个体，不需要互相欠人情"。</p>'
  },
  {
    title: "案例二：课堂上"出风头"的交换生",
    tag: "校园情境",
    brief: "英国交换生Emma上课特别积极，有中国同学说她"爱出风头"。但她对其他积极的英国同学很欣赏。",
    detail: '<p><strong>解析路径：</strong>识别问题→课堂参与度的文化差异 → 确定对象→主动发言行为 → 拆解要素→师生关系、课堂文化、学习观念 → 寻找证据→Emma对同样积极的同学的态度</p><p><strong>调用原理：</strong> <span class="principle">三问原则</span> <span class="principle">找框架原则</span>（权力距离维度）</p><table><tr><th>现象</th><th>中国文化视角</th><th>英国文化视角</th></tr><tr><td>频繁举手发言</td><td>"爱表现"、"不谦虚"</td><td>"积极参与"、"好学生"</td></tr></table><p>💡 中国是高权力距离文化（尊重老师权威，学生不应抢话），英国是低权力距离文化（师生平等对话，积极提问是被鼓励的）。</p>'
  },
  {
    title: "案例三：邻居家的"随意串门"",
    tag: "家庭/社区情境",
    brief: "美国邻居经常不打电话就敲门约你散步。你妈妈觉得他们"没礼貌"，但你觉得他们很热情。",
    detail: '<p><strong>解析路径：</strong>识别问题→不打招呼就上门是否礼貌 → 确定对象→串门行为 → 拆解要素→隐私观念、邻里关系 → 解释原因→个人空间的定义差异</p><p><strong>调用原理：</strong> <span class="principle">停一停原则</span> <span class="principle">三问原则</span></p><table><tr><th>现象</th><th>中国文化含义</th><th>美国文化含义</th></tr><tr><td>不打招呼直接敲门</td><td>打扰、不尊重"家"的边界</td><td>友好的邻里互动、随性自然</td></tr></table><p>💡 美国社区文化中 neighborly friendliness 是一种传统，不提前约好反而代表了"我们够亲近，不需要预约"。</p>'
  },
  {
    title: "案例四：课文中的文化线索",
    tag: "学科核心情境",
    brief: "加拿大朋友来信说："I'm busy but I'll try to make time."——这是客套拒绝还是真心愿意？",
    detail: '<p><strong>解析路径：</strong>识别问题→"有空再约"的真实含义 → 确定对象→特定英语表达 → 拆解要素→时间观念、承诺风格 → 解释原因→直接vs间接沟通</p><p><strong>调用原理：</strong> <span class="principle">找框架原则</span>（高/低语境文化）</p><table><tr><th>表达方式</th><th>高语境文化解读</th><th>低语境文化解读</th></tr><tr><td>"try to make time"</td><td>可能是委婉拒绝</td><td>是真的会尽力安排</td></tr></table><p>💡 低语境文化中人们通常直接表达意图，如果不想见会说"I\'m sorry, I can\'t"。说"try"就真的是"会试"。</p>'
  },
  {
    title: "案例五：心理学+文化学分析",
    tag: "跨学科情境",
    brief: "中国学生说亲密朋友有2-3个，西方学生说5-7个——同一心理需求，数据为何不同？",
    detail: '<p><strong>解析路径：</strong>识别问题→数据差异的原因 → 确定对象→"朋友"概念 → 拆解要素→"亲密朋友"的文化定义差异 → 迁移判断→导致数据差异的是"词汇定义"而非"真实社交"</p><p><strong>调用原理：</strong> <span class="principle">三问原则</span> <span class="principle">重新评估原则</span></p><table><tr><th>维度</th><th>中国文化</th><th>西方文化</th></tr><tr><td>"亲密朋友"定义标准</td><td>深交、知心、长期</td><td>可分享心事、比较了解</td></tr></table><p>💡 如果统一"亲密朋友"的操作性定义（"我每周至少分享一次心事的对象"），中西方数据可能趋近。</p>'
  },
  {
    title: "案例六：留学生的"孤独墙"",
    tag: "社会议题情境",
    brief: "60%以上中国留学生表示"难以和本地学生成为真正的好朋友"——双向误解从何而来？",
    detail: '<p><strong>解析路径：</strong>识别问题→双向误解 → 确定对象→社交模式差异 → 拆解要素→交友节奏、深度标准、社交勇气 → 解释原因→中国：慢热但深入；西方：快速友好但分层</p><p><strong>调用原理：</strong> <span class="principle">全部4条原理综合运用</span></p><table><tr><th>阶段</th><th>中国学生表现</th><th>西方学生表现</th></tr><tr><td>初识</td><td>观察、谨慎</td><td>热情、开放</td></tr><tr><td>深入</td><td>慢但深</td><td>快但浅</td></tr><tr><td>误解</td><td>"他们只是表面友好"</td><td>"他们不想交朋友"</td></tr></table><p>💡 这不是谁的问题，而是两种交友模式的天然"错频"：中式的"由浅入深"和西式的"先广后精"需要时间来匹配节奏。</p>'
  },
  {
    title: "案例七：AI时代的跨文化友谊",
    tag: "综合迁移情境",
    brief: "AI交友实验中发现：用中国式委婉表达时AI会"误解"，用西方式直接表达时AI反而更"理解"你。",
    detail: '<p><strong>解析路径：</strong>识别问题→跨文化适应中的"谁让步" → 确定对象→交流模式的调整 → 拆解要素→文化身份vs沟通效率 → 结论→元文化能力的形成</p><p><strong>调用原理：</strong> <span class="principle">全部4条原理</span></p><p>💡 "第三种交流方式"可能同时包含中国式的尊重和西方式的直接，核心不是"谁适应谁"，而是建立一种双方都能接受的"共同文化空间"。</p>'
  }
];

const reflections = [
  { q: "哪个案例最容易分析？为什么？", hint: "帮助你发现自己的分析优势" },
  { q: "哪个案例最难？困难在哪里？", hint: "帮助你发现需要加强的分析环节" },
  { q: "四条解析性原理中，哪一条最常用？哪一条最难用？", hint: "评估你的工具掌握情况" },
  { q: "这些案例如何帮助你理解 Unit 1 Friendship 的核心主题？", hint: "建立与大单元的连接" },
  { q: "如果让你自己再补充一个案例，你会选什么情境？", hint: "测试你的迁移能力和创造力" }
];

function renderCases() {
  const grid = document.getElementById('caseGrid');
  cases.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'case-card';
    card.innerHTML = `
      <span class="tag">${c.tag}</span>
      <h3>${c.title}</h3>
      <p>${c.brief}</p>
      <button class="expand-btn" onclick="toggleCase(${i})">展开解析 ▼</button>
      <div class="case-detail" id="detail-${i}">${c.detail}</div>
    `;
    grid.appendChild(card);
  });
}

function renderReflections() {
  const list = document.getElementById('reflectionList');
  reflections.forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'reflection-item';
    item.innerHTML = `
      <div class="q" onclick="toggleHint(${i})">${i+1}. ${r.q} <span style="float:right;color:var(--accent)">💡</span></div>
      <div class="hint" id="hint-${i}">💡 ${r.hint}</div>
    `;
    list.appendChild(item);
  });
}

let hintsVisible = false;
function toggleHint(i) { document.getElementById(`hint-${i}`).classList.toggle('show'); }
function toggleAllHints() {
  hintsVisible = !hintsVisible;
  document.querySelectorAll('.hint').forEach(el => el.classList.toggle('show', hintsVisible));
}
function toggleCase(i) {
  const detail = document.getElementById(`detail-${i}`);
  detail.classList.toggle('show');
  const btn = detail.previousElementSibling;
  btn.textContent = detail.classList.contains('show') ? '收起解析 ▲' : '展开解析 ▼';
}

renderCases();
renderReflections();
</script>
</body>
</html>
