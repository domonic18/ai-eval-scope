<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>模块定位 — M2 学习新知的新价值与新使命</title>
<style>
:root {
  --primary: #434343;
  --primary-hover: #595959;
  --accent: #8c8c8c;
  --bg: #e8e8e8;
  --card-bg: #ffffff;
  --text: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --border: #d9d9d9;
  --border-radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --font-body: 15px;
  --font-h1: 22px;
  --font-h2: 18px;
  --line-height: 1.65;
  --chat-user: #434343;
  --chat-ai: #ffffff;
  --chat-bg: #e8e8e8;
  --bubble-ai: #ffffff;
  --bubble-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--chat-bg); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: var(--font-body); line-height: var(--line-height); color: var(--text); width: 100%;
}
/* 全屏聊天容器 */
.chat-wrapper {
  width: 100%; max-width: none; min-height: 100vh;
  display: flex; flex-direction: column; position: relative;
}
.chat-header {
  background: var(--primary); color: #fff; padding: 16px 20px;
  display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.chat-header .avatar {
  width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.chat-header .info { flex: 1; }
.chat-header .name { font-size: 14px; font-weight: 600; }
.chat-header .status { font-size: 11px; opacity: 0.8; }
.chat-header .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #52c41a; margin-right: 4px; animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
/* 消息区域 */
.chat-messages {
  flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column;
  gap: 12px; max-height: calc(100vh - 140px); overflow-y: auto;
}
/* 消息气泡 */
.message { display: flex; gap: 8px; max-width: 85%; animation: msgIn 0.3s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.ai { align-self: flex-start; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message .msg-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.message.ai .msg-avatar { background: var(--primary); color: #fff; }
.message.user .msg-avatar { background: #1677ff; color: #fff; }
.message .bubble {
  padding: 12px 16px; border-radius: 12px; position: relative;
  box-shadow: var(--bubble-shadow); font-size: var(--font-body);
}
.message.ai .bubble {
  background: var(--bubble-ai); color: var(--text);
  border-bottom-left-radius: 4px;
}
.message.user .bubble {
  background: var(--primary); color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble p { margin: 6px 0; }
.bubble ul { margin: 6px 0; padding-left: 20px; }
.bubble li { margin: 4px 0; }
.bubble strong { font-weight: 600; }
/* 打字指示器 */
.typing-indicator {
  align-self: flex-start; display: none; padding: 12px 16px;
  background: var(--bubble-ai); border-radius: 12px; border-bottom-left-radius: 4px;
  box-shadow: var(--bubble-shadow); gap: 4px; align-items: center;
}
.typing-indicator.show { display: flex; }
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  animation: typing-bounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
/* 快捷回复区 */
.quick-reply-area {
  position: sticky; bottom: 0; background: var(--card-bg);
  border-top: 1px solid var(--border); padding: 10px 16px 16px;
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
}
.quick-btn {
  padding: 10px 20px; border: 1px solid var(--primary); border-radius: 20px;
  background: var(--card-bg); color: var(--primary); font-size: 13px;
  cursor: pointer; transition: all 0.2s; font-weight: 500;
}
.quick-btn:hover { background: var(--primary); color: #fff; }
.quick-btn:disabled { display: none; }
/* 开场画面 */
.welcome-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; text-align: center; padding: 40px;
}
.welcome-screen h1 { color: var(--primary); font-size: var(--font-h1); margin-bottom: 12px; }
.welcome-screen p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
/* 底部安全区 */
.chat-footer { text-align: center; padding: 8px; font-size: 11px; color: var(--text-secondary); }
@media (max-width: 480px) {
  .message { max-width: 90%; }
  .chat-messages { padding: 12px; max-height: calc(100vh - 130px); }
  .quick-btn { font-size: 12px; padding: 8px 14px; }
}
</style>
</head>
<body>
<div class="chat-wrapper">
  <!-- 头部 -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <div class="name">AI 学习导师</div>
      <div class="status"><span class="status-dot"></span>在线 · 英语必修1</div>
    </div>
  </div>

  <!-- 消息区 -->
  <div class="chat-messages" id="chatMessages">
    <!-- 开场 -->
    <div class="message ai">
      <div class="msg-avatar">🤖</div>
      <div class="bubble">
        <p>👋 你好！我是你的 AI 学习导师。欢迎来到 <strong>M2 模块定位</strong>——"学习新知的新价值与新使命"。</p>
        <p>在这个模块中，我将带你深入探索学习这件事本身。准备好了吗？先点击下方的按钮开始吧！</p>
      </div>
    </div>
  </div>

  <!-- 打字指示器 -->
  <div class="typing-indicator" id="typingIndicator">
    <span class="typing-dot"></span>
    <span class="typing-dot"></span>
    <span class="typing-dot"></span>
  </div>

  <!-- 快捷回复区 -->
  <div class="quick-reply-area" id="quickReplyArea">
    <button class="quick-btn" data-step="1" onclick="handleQuickReply(1)">📖 本模块学习什么？</button>
    <button class="quick-btn" data-step="2" onclick="handleQuickReply(2)">❓ 本模块为什么重要？</button>
    <button class="quick-btn" data-step="3" onclick="handleQuickReply(3)">🔗 与大单元主题的关系</button>
    <button class="quick-btn" data-step="4" onclick="handleQuickReply(4)">🔄 前后模块的衔接</button>
    <button class="quick-btn" data-step="5" onclick="handleQuickReply(5)">🎯 预期学习成果</button>
  </div>

  <div class="chat-footer">M2 · 学习新知的新价值与新使命</div>
</div>

<script>
// 消息历史 - 已显示的内容
let shownSteps = new Set();
const messagesContainer = document.getElementById('chatMessages');
const typingIndicator = document.getElementById('typingIndicator');
// 消息内容
const stepContents = {
  1: {
    title: '📖 本模块学习什么？',
    content: `<p><strong>本模块带你探索"学习新知"这件事本身的 <em>新价值与新使命</em>。</strong></p>
    <p>具体来说，你将：</p>
    <ul>
      <li>围绕 <strong>Unit 1 Friendship</strong> 主题，学习如何<strong>解析</strong>一篇英语语篇——读懂字面意思和深层含义</li>
      <li>学习如何<strong>建构</strong>自己的英语表达——从零开始写出有深度、有情感的内容</li>
      <li>掌握一套可迁移的解析性和建构性学习方法</li>
      <li>利用多样化脚手架（工具库、问题榜、VR等）支持自己的学习</li>
    </ul>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:8px;">💡 点击下方其他按钮继续探索 →</p>`
  },
  2: {
    title: '❓ 本模块为什么重要？',
    content: `<p><strong>这个问题问得好！</strong></p>
    <p>因为：</p>
    <ul>
      <li>你不会<strong>只</strong>学"友谊"的单词和语法——你还将学会 <strong>如何学习</strong> 一个英语主题</li>
      <li>你将从"被动接收知识"转变为"<strong>主动建构理解</strong>"</li>
      <li>在信息爆炸的 AI 时代，<strong>会学习比学什么更重要</strong>——这正是"学习新知的新使命"</li>
    </ul>
    <p style="margin-top:8px;">这就像给你一把钥匙，而不仅仅是给你打开一扇门。有了这把钥匙，你以后可以打开任何一扇门。</p>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:8px;">💡 继续探索其他话题吧 →</p>`
  },
  3: {
    title: '🔗 本模块与大单元主题的关系',
    content: `<p><strong>Unit 1 Friendship</strong> 这个大单元的最终目标是让你能用英语深入理解和表达"友谊"这个主题。</p>
    <p><strong>M2 是整个大单元的方法论核心</strong>——它教你<strong>用什么方法</strong>去学习所有关于友谊的内容。</p>
    <p>打个比方：如果把 Unit 1 比作建造一栋房子，那么 M1 是给你看设计蓝图，M2 就是教你怎么用锤子、锯子和尺子。没有 M2，后面你就缺乏学习工具。</p>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:8px;">💡 点击下方按钮继续 →</p>`
  },
  4: {
    title: '🔄 本模块与前后模块的衔接',
    content: `<p>整个大单元的学习路径很清晰：</p>
    <ul>
      <li><strong>前接（M1 / 大单元总导）</strong>：大单元总导帮你建立了整体视野——你知道"友谊"这个主题的全貌</li>
      <li><strong>本模块（M2）</strong>：教你解析和建构的方法——这是你的"学习工具箱"</li>
      <li><strong>后续模块</strong>：你将用这些方法去学习更具体的友谊主题内容——友谊的历史、跨文化友谊、数字时代的友谊等</li>
    </ul>
    <p>就像学骑自行车：你先看别人骑（M1），然后学习怎么掌握平衡（M2），最后自己上路骑行（后续模块）。</p>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:8px;">💡 还有最后一个话题 →</p>`
  },
  5: {
    title: '🎯 预期学习成果',
    content: `<p><strong>完成本模块后，你将能够：</strong></p>
    <ul>
      <li>✅ 用英语写一段 <strong>200 词以上</strong>的关于友谊观点的表达</li>
      <li>✅ 掌握至少 <strong>3 条解析性原理</strong>和 <strong>3 条建构性原理</strong></li>
      <li>✅ 完成一套阶梯式的 <strong>七阶案例练习</strong></li>
      <li>✅ 形成自己的"<strong>英语学习方法工具箱</strong>"——以后学任何英语主题都有方法可循</li>
    </ul>
    <p style="margin-top:12px;">这些成果不仅是知识上的，更是能力上的——你将成为一名<strong>会学习的学习者</strong>！</p>
    <p style="color:var(--text-secondary);font-size:13px;margin-top:8px;">🎉 你已经了解了模块的全貌！点击下方按钮正式进入学习吧。</p>`
  }
};

function handleQuickReply(step) {
  if (shownSteps.has(step)) return;
  shownSteps.add(step);

  // 禁用当前按钮
  const btn = document.querySelector(`.quick-btn[data-step="${step}"]`);
  if (btn) btn.disabled = true;

  // 添加用户消息
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.innerHTML = `<div class="msg-avatar">👤</div><div class="bubble" style="background:var(--primary);color:#fff;">${stepContents[step].title}</div>`;
  messagesContainer.appendChild(userMsg);
  scrollToBottom();

  // 显示打字指示器
  typingIndicator.classList.add('show');
  scrollToBottom();

  // 1.2秒后显示AI回复
  setTimeout(() => {
    typingIndicator.classList.remove('show');

    const aiMsg = document.createElement('div');
    aiMsg.className = 'message ai';
    aiMsg.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble">${stepContents[step].content}</div>`;
    messagesContainer.appendChild(aiMsg);
    scrollToBottom();
  }, 1200);
}

function scrollToBottom() {
  setTimeout(() => {
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }, 50);
}

// 初始滚动到底部
scrollToBottom();
</script>
</body>
</html>
