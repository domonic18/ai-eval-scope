<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创建组织 — EvalScope</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="assets/theme.css">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth { z-index: 1; width: 100%; max-width: 408px; }
  .auth-head { text-align: center; margin-bottom: 28px; }
  .auth-head .logo { justify-content: center; margin-bottom: 22px; font-size: 17px; }
  .auth-head .logo-mark { width: 32px; height: 32px; }
  .auth-head h1 { font-size: 22px; font-weight: 650; margin-bottom: 6px; }
  .auth-head p { font-size: 14px; color: var(--text-secondary); }
  .auth-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 32px; }
  .auth-foot { text-align: center; margin-top: 22px; font-size: 13px; color: var(--text-secondary); }
  .auth-foot a { color: var(--accent); font-weight: 550; }
  .auth-foot a:hover { text-decoration: underline; }
  .back { display: inline-flex; align-items: center; gap: 6px; margin-top: 24px; font-size: 12px; color: var(--text-tertiary); }
  .back:hover { color: var(--text-secondary); }
  .slug-preview { font-family: var(--mono); font-size: 12px; color: var(--text-tertiary); }
  .slug-preview b { color: var(--signal); }
</style>
</head>
<body>
<div class="ambient"></div>

<div class="auth">
  <div class="auth-head">
    <a href="index.html" class="logo">
      <span class="logo-mark"><img src="assets/logo.svg" alt="" style="width:100%"></span>
      <span class="logo-text">Eval<b>Scope</b></span>
    </a>
    <h1>创建你的组织</h1>
    <p>注册即创建一个组织作为评估数据的租户空间</p>
  </div>

  <div class="auth-card">
    <form onsubmit="return false">
      <div class="field">
        <label>组织名称</label>
        <input class="input" type="text" placeholder="如：智能教育研发组" value="智能教育研发组">
        <div class="help slug-preview">访问地址：app.evalscope.io/<b>edu-rd</b></div>
      </div>
      <hr class="divider">
      <div class="field">
        <label>你的姓名</label>
        <input class="input" type="text" placeholder="如：张工" value="">
      </div>
      <div class="field">
        <label>邮箱</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
          <input class="input" type="email" placeholder="you@company.com" value="">
        </div>
      </div>
      <div class="field">
        <label>密码</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="input" type="password" placeholder="至少 8 位" value="">
        </div>
        <div class="help">至少 8 位，包含字母与数字</div>
      </div>
      <a href="dashboard.html" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:4px">创建组织并进入</a>
    </form>
  </div>

  <div class="auth-foot">已有账号？<a href="login.html">登录</a></div>
  <div style="text-align:center"><a href="index.html" class="back">← 返回首页</a></div>
</div>
</body>
</html>
