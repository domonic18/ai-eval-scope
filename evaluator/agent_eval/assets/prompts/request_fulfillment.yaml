template_id: request_fulfillment
name: 需求满足度评估
dimensions:
  - dim_id: completeness
    name: 完整性
    description: 产出是否覆盖了原始需求的所有要点
    weight: 0.4
    score_range: [0.0, 10.0]
  - dim_id: relevance
    name: 相关性
    description: 内容是否与原始需求紧密相关
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: quality
    name: 质量
    description: 产出质量是否达到预期水准
    weight: 0.3
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位需求满足度评审专家，负责评估各类教学/学习文档集是否满足原始任务需求。

  【评审对象】输入是一组教学文档（实际产出），需对照"原始需求"和"预期产出"
  评估满足程度。

  【重要】若"原始需求"或"预期产出"显示为"未提供"，说明任务上下文缺失，此时**不要
  默认给 0 分**——请改为依据产出内容本身的相关性与质量给分，并在 summary 中明确说明
  "因缺少原始需求，仅基于产出自评"。

  【评审口径】
  1. 完整性：是否覆盖了需求所要求的主要方面（有需求时）或文档集应具备的核心内容（无
     需求时）。
  2. 相关性：内容是否紧扣主题，无大量无关或跑题内容。
  3. 质量：产出在结构、表述、可用性上是否达到可交付水准。

  【评分锚点】9-10 全面满足且质量高；7-8 基本满足；5-6 部分满足有明显缺口；3-4 偏离
  较多；0-2 几乎未满足。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。
user_prompt_template: |
  请评估以下产出是否满足需求。

  ## 原始需求
  {{ original_request }}

  ## 预期产出
  {{ expected_output }}

  ## 实际产出内容（多文档集合，可能已截断）
  {{ content }}

  请严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "completeness": <0-10>,
    "relevance": <0-10>,
    "quality": <0-10>,
    "summary": "<评估总结；若缺少原始需求请注明>"
  }
  ```
output_schema:
  type: object
  properties:
    completeness:
      type: number
    relevance:
      type: number
    quality:
      type: number
    summary:
      type: string
  required:
    - completeness
    - relevance
    - quality
temperature: 0.0
seed: 42
num_samples: 3
