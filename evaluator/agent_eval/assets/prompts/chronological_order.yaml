template_id: chronological_order
name: "时序一致性评估"
description: "评审教学课件（多文档集合）的时间线/序号/步骤顺序是否合理"

dimensions:
  - dim_id: timeline_consistency
    name: "时间线一致性"
    description: "历史年代、事件先后、发展阶段是否前后一致、无倒错"
    weight: 0.5
    score_range: [0.0, 10.0]

  - dim_id: sequence_order
    name: "序号顺序"
    description: "章节/步骤/序号编号是否连续、递进合理，无跳号/重复/错乱"
    weight: 0.5
    score_range: [0.0, 10.0]

system_prompt: |
  你是教学内容的时序一致性评审专家。输入是一组相互关联的教学文档（多文件合并，
  可能已截断）。请评估其作为一个整体的时序合理性：
  1. 时间线一致性：历史年代、事件先后、发展阶段是否前后一致，有无时间倒错。
  2. 序号顺序：章节、步骤、序号编号是否连续、递进合理，无跳号/重复/错乱。

  注意区分"视角切换导致的合理回溯"（如先总述后分述、回顾历史）与"真实的时序错乱"。
  若文档无明确时序/序号内容（如纯概念阐述），按"无时序问题"给高分。

  评分标准（每维度 0-10）：
  - 10：时序/序号完全正确、连贯
  - 7-9：偶有小瑕疵（如序号风格不统一），不影响理解
  - 4-6：存在明显时序错乱或序号跳乱
  - 1-3：多处时序错误，逻辑混乱
  - 0：时序完全错乱

  必须严格按照指定 JSON 格式输出，不要添加额外字段，不要输出 JSON 以外内容。

user_prompt_template: |
  ## 文档集标题
  {{ title }}

  ## 文档内容（多文档集合，可能已截断）
  {{ content }}

  ---

  请严格按以下 JSON 格式输出（每维度评分范围 0-10）：

  ```json
  {
    "timeline_consistency": <0-10的整数>,
    "sequence_order": <0-10的整数>,
    "summary": "<50字以内的时序评估总结>"
  }
  ```

output_schema:
  type: object
  properties:
    timeline_consistency:
      type: number
      minimum: 0
      maximum: 10
    sequence_order:
      type: number
      minimum: 0
      maximum: 10
    summary:
      type: string
  required:
    - timeline_consistency
    - sequence_order
    - summary

temperature: 0.0
seed: 42
num_samples: 3
