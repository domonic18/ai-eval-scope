version: "1.0"
description: "课件生成评估规则集"

dimensions:
  - id: functional
    name: "功能性"
    weight: 1.0
  - id: effectiveness
    name: "效果性"
    weight: 1.0

cascade:
  - stage: format_gate
    name: "格式门控"
    stop_on_fail: true
  - stage: commonsense_gate
    name: "常识门控"
    stop_on_fail: false

rules:
  - id: FMT_001
    name: "输出格式有效"
    dimension: functional
    stage: format_gate
    description: "SUT 必须生成有效的 Markdown 或 HTML 文件"
    evaluator: format.response_format
    params:
      allowed_formats: ["md", "html"]
    weight: 1.0
    penalty_on_fail: -3

  # ─── 常识门控（commonsense）— 可按需 enabled: false 禁用某项 ───
  - id: COMMON_INFO
    name: "知识准确性"
    dimension: functional
    stage: commonsense_gate
    evaluator: commonsense.info_accuracy
    weight: 1.0
    enabled: true

  - id: COMMON_CHRONO
    name: "时序正确性"
    dimension: functional
    stage: commonsense_gate
    evaluator: commonsense.chronological_order
    weight: 1.0
    enabled: true   # 不关注时序的课件改 false 即禁用

  - id: COMMON_LOGIC
    name: "逻辑一致性"
    dimension: functional
    stage: commonsense_gate
    evaluator: commonsense.logical_consistency
    weight: 1.0
    enabled: true
