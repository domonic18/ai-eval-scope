- pattern: 早婚.*盛行.*初婚年龄.*偏低
  correct: 发达国家普遍晚婚，初婚年龄较高
  description: 误以为发达国家早婚盛行、初婚年龄偏低
  severity: error
  source: cmmlu_high_school_geography_103
- pattern: 崇尚多育多子.*重男轻女
  correct: 发达国家普遍少育，性别平等观念较强
  description: 误以为发达国家崇尚多育多子和重男轻女传统观念
  severity: error
  source: cmmlu_high_school_geography_103
- pattern: 宗教.*反对人口增殖
  correct: 发达国家宗教通常不反对人口增殖，甚至鼓励生育
  description: 误以为发达国家宗教普遍反对人口增殖
  severity: error
  source: cmmlu_high_school_geography_103
- pattern: 凌汛.*解冻
  correct: 凌汛是冰凌阻塞河道导致水位上涨的现象，解冻季节冰凌融化，凌汛现象会减弱或消失
  description: 误以为解冻季节凌汛现象仍然容易出现
  severity: error
  source: cmmlu_high_school_geography_104
- pattern: 解冻.*水位暴涨
  correct: 解冻季节冰雪融化，河流水量增加，水位可能上涨
  description: 误以为解冻季节水位不会暴涨
  severity: warning
  source: cmmlu_high_school_geography_104
- pattern: 解冻.*河岸决堤
  correct: 解冻季节冰雪融化可能导致河水泛滥，河岸决堤是可能发生的现象
  description: 误以为解冻季节河岸不会决堤
  severity: warning
  source: cmmlu_high_school_geography_104
- pattern: 汽车尾气.*排放量小
  correct: 汽车尾气和生产、生活废气排放量大是光化学烟雾的重要成因
  description: 误以为光化学烟雾事件发生时污染物排放量小
  severity: error
  source: cmmlu_high_school_geography_105
- pattern: 多气旋活动.*影响扩散
  correct: 气旋活动通常有利于污染物扩散，而非加重污染
  description: 误以为气旋活动会阻碍污染气体扩散
  severity: error
  source: cmmlu_high_school_geography_105
- pattern: 温室效应.*光化学烟雾
  correct: 温室效应与光化学烟雾的成因和机制不同，不是直接原因
  description: 混淆温室效应与光化学烟雾的成因
  severity: error
  source: cmmlu_high_school_geography_105
- pattern: 雪资源丰富
  correct: 张家口市冰雪经济发展的主要契机是政府大力推动，而非仅靠雪资源
  description: 误以为自然资源丰富是冰雪经济发展的直接契机，忽略了政策因素
  severity: error
  source: cmmlu_high_school_geography_106
- pattern: 交通网络完善
  correct: 交通网络完善是冰雪经济发展的结果或条件，而非2015年后的主要契机
  description: 误以为交通基础设施完善是冰雪经济迅速发展的直接契机
  severity: error
  source: cmmlu_high_school_geography_106
- pattern: 基础设施齐全
  correct: 基础设施齐全通常是冰雪经济发展的结果，而非最初的发展契机
  description: 误以为基础设施齐全能直接触发冰雪经济迅速发展
  severity: error
  source: cmmlu_high_school_geography_106
- pattern: 有农社区.*美化.*环境
  correct: 有农社区最主要的意义是实现物质的循环利用，而非单纯美化环境
  description: 误以为有农社区的主要功能是美化生活环境
  severity: error
  source: cmmlu_high_school_geography_107
- pattern: 有农社区.*便捷.*食物供应
  correct: 有农社区最主要的意义是实现物质的循环利用，而非提供便捷的食物供应
  description: 误以为有农社区的主要目的是提供便捷的食物供应
  severity: error
  source: cmmlu_high_school_geography_107
- pattern: 有农社区.*改变.*生产方式
  correct: 有农社区最主要的意义是实现物质的循环利用，而非改变居民的生产方式
  description: 误以为有农社区的主要意义是改变居民的生产方式
  severity: error
  source: cmmlu_high_school_geography_107
- pattern: 网上书店.*影响.*电信公司
  correct: 网上书店主要影响实体书店和实体银行，对电信公司影响较小
  description: 误以为网上书店会直接冲击电信公司业务
  severity: error
  source: cmmlu_high_school_geography_108
- pattern: 网上书店.*影响.*航空公司
  correct: 网上书店主要影响实体书店和实体银行，对航空公司影响较小
  description: 误以为网上书店会直接冲击航空公司业务
  severity: error
  source: cmmlu_high_school_geography_108
- pattern: 相对高度.*相加
  correct: 相对高度是两地的海拔高度之差，即8844米减去1934米等于6910米
  description: 误以为相对高度是两座山峰海拔高度之和
  severity: error
  source: cmmlu_high_school_geography_109
- pattern: 相对高度.*减错
  correct: 相对高度是8844米减去1934米等于6910米
  description: 计算相对高度时数值计算错误，可能混淆了数字
  severity: warning
  source: cmmlu_high_school_geography_109
- pattern: 劳动⼒.*⾃然条件.*⽓候资源
  correct: 影响农业的三大区位因素是自然条件、社会经济和科学技术
  description: 误将劳动力、自然条件和气候资源作为农业的三大区位因素，忽略了社会经济和科学技术的重要性
  severity: error
  source: cmmlu_high_school_geography_110
- pattern: 热量.*光照.*⽔分
  correct: 影响农业的三大区位因素是自然条件、社会经济和科学技术
  description: 误将热量、光照和水分作为农业的三大区位因素，这些只是自然条件中的具体要素
  severity: error
  source: cmmlu_high_school_geography_110
- pattern: ⽓候.*市场.*交通
  correct: 影响农业的三大区位因素是自然条件、社会经济和科学技术
  description: 误将气候、市场和交通作为农业的三大区位因素，气候属于自然条件，市场和交通属于社会经济，但缺少科学技术
  severity: error
  source: cmmlu_high_school_geography_110
- pattern: 安徽南部.*海鲜
  correct: 安徽省南部地处内陆山区，不靠海，传统菜肴选料以山货和腌腊制品为主
  description: 误以为安徽南部靠海，传统菜肴选料多用海鲜
  severity: error
  source: cmmlu_high_school_geography_111
- pattern: 安徽南部.*牛羊肉
  correct: 安徽省南部以山地为主，耕地稀少，传统菜肴选料以山货和腌腊制品为主，而非牛羊肉
  description: 误以为安徽南部传统菜肴选料多用牛羊肉
  severity: error
  source: cmmlu_high_school_geography_111
- pattern: 极地高气压带.*切断
  correct: 1月份北半球被明显切断的是副极地低气压带，而非极地高气压带
  description: 误以为极地高气压带在1月份会被切断
  severity: error
  source: cmmlu_high_school_geography_112
- pattern: 副热带高气压带.*切断
  correct: 1月份北半球被明显切断的是副极地低气压带，而非副热带高气压带
  description: 误以为副热带高气压带在1月份会被切断
  severity: error
  source: cmmlu_high_school_geography_112
- pattern: 植物死亡分解.*磷
  correct: 南海诸岛土壤中磷的主要来源是鸟粪和鸟类残体，而非植物死亡分解
  description: 误以为植物死亡分解是南海诸岛土壤富磷的主要来源
  severity: error
  source: cmmlu_high_school_geography_113
- pattern: 鱼类死亡分解.*磷
  correct: 南海诸岛土壤中磷的主要来源是鸟粪和鸟类残体，而非鱼类死亡分解
  description: 误以为鱼类死亡分解是南海诸岛土壤富磷的主要来源
  severity: error
  source: cmmlu_high_school_geography_113
- pattern: 珊瑚.*贝壳碎屑.*磷
  correct: 南海诸岛土壤中磷的主要来源是鸟粪和鸟类残体，而非珊瑚、贝壳碎屑
  description: 误以为珊瑚、贝壳碎屑是南海诸岛土壤富磷的主要来源
  severity: error
  source: cmmlu_high_school_geography_113
- pattern: 制造业高度发达
  correct: 清代东北地区地广人稀，有大量可开垦的土地，而非制造业发达
  description: 误以为闯关东是因为东北制造业发达
  severity: error
  source: cmmlu_high_school_geography_114
- pattern: 畜牧业水平高
  correct: 闯关东的主要原因是东北有大量可开垦的土地，而非畜牧业水平高
  description: 误以为闯关东是因为东北畜牧业发达
  severity: error
  source: cmmlu_high_school_geography_114
- pattern: 大量征兵抗战
  correct: 闯关东发生在清代，主要原因是东北有大量可开垦的土地，而非征兵抗战
  description: 误以为闯关东与抗战时期的征兵有关
  severity: error
  source: cmmlu_high_school_geography_114
- pattern: 1月.*南亚.*东南风
  correct: 1月份南亚受冬季风影响，主要风向为东北风
  description: 误以为1月份南亚盛行东南风
  severity: error
  source: cmmlu_high_school_geography_115
- pattern: 1月.*南亚.*西北风
  correct: 1月份南亚受冬季风影响，主要风向为东北风
  description: 误以为1月份南亚盛行西北风
  severity: error
  source: cmmlu_high_school_geography_115
- pattern: 1月.*南亚.*西南风
  correct: 1月份南亚受冬季风影响，主要风向为东北风
  description: 误以为1月份南亚盛行西南风（西南风为夏季风）
  severity: error
  source: cmmlu_high_school_geography_115
- pattern: 200毫米等降水量线.*阴山
  correct: 200毫米等降水量线大致经过阴山、祁连山、巴颜喀拉山一线
  description: 误以为200毫米等降水量线不经过阴山
  severity: error
  source: cmmlu_high_school_geography_116
- pattern: 200毫米等降水量线.*祁连山
  correct: 200毫米等降水量线大致经过阴山、祁连山、巴颜喀拉山一线
  description: 误以为200毫米等降水量线不经过祁连山
  severity: error
  source: cmmlu_high_school_geography_116
- pattern: 200毫米等降水量线.*巴颜喀拉山
  correct: 200毫米等降水量线大致经过阴山、祁连山、巴颜喀拉山一线
  description: 误以为200毫米等降水量线不经过巴颜喀拉山
  severity: error
  source: cmmlu_high_school_geography_116
- pattern: 替代煤和石油.*减轻.*大气污染
  correct: 可燃冰燃烧也会产生二氧化碳等污染物，只是比煤和石油污染小，不能完全消除大气污染
  description: 误以为可燃冰完全无污染，可完全替代煤和石油并消除大气污染
  severity: error
  source: cmmlu_high_school_geography_117
- pattern: 取代水电站.*改善大气质量
  correct: 水电站本身不排放污染物，可燃冰燃烧仍会产生二氧化碳，不能改善大气质量
  description: 误以为可燃冰可替代清洁的水电站并改善大气质量
  severity: error
  source: cmmlu_high_school_geography_117
- pattern: 无CO2排放.*减轻温室效应
  correct: 可燃冰主要成分是甲烷，燃烧会产生二氧化碳，不能减轻温室效应
  description: 误以为可燃冰燃烧不产生二氧化碳，可减轻温室效应
  severity: error
  source: cmmlu_high_school_geography_117
