subject: geography
description: 地理知识准确性规则（K-12 教育）
version: '1.0'
constants:
- name: 珠穆朗玛峰海拔
  extract_pattern: (?:珠穆朗玛峰|珠峰|珠穆朗玛).*?(?:海拔|高度|高).*(?:≈|＝|=|约为|约|为|是)\s*(\d+\.?\d*)\s*(?:米|m)
  value: 8848.86
  tolerance: 5
  description: 珠穆朗玛峰海拔 8848.86m（2020年中尼联合测量）
- name: 长江全长
  extract_pattern: (?:长江|长江干流).*?(?:全长|长度|约).*(?:≈|＝|=|约为|约|为|是)\s*(\d[\d,]*(?:\.\d+)?)\s*(?:公里|千米|km)
  value: 6300
  tolerance: 50
  description: 长江全长约6300km
- name: 黄河全长
  extract_pattern: (?:黄河|黄河干流).*?(?:全长|长度|约).*(?:≈|＝|=|约为|约|为|是)\s*(\d[\d,]*(?:\.\d+)?)\s*(?:公里|千米|km)
  value: 5464
  tolerance: 50
  description: 黄河全长约5464km
- name: 中国陆地面积
  extract_pattern: (?:中国|我国).*?(?:陆地面积|国土面积|领土面积|国土总面积).*(?:≈|＝|=|约为|约|为|是)\s*(\d[\d,]*(?:\.\d+)?)\s*(?:万?平方公里|万?km²)
  value: 960
  tolerance: 10
  description: 中国陆地面积约960万平方公里
- name: 地球表面积
  extract_pattern: (?:地球表面积|地球表面总面积).*(?:≈|＝|=|约为|约|为|是)\s*(\d+\.?\d*)\s*(?:亿平方公里|亿km²)
  value: 5.1
  tolerance: 0.2
  description: 地球表面积约5.1亿平方公里
- name: 地球海洋面积占比
  extract_pattern: (?:地球|地表).*?(?:海洋|海洋面积).*?(?:占比|占|比例|约为|约|为|是)\s*(\d+\.?\d*)\s*%?
  value: 71
  tolerance: 2
  description: 地球表面约71%被海洋覆盖
misconceptions:
- pattern: 长江.*?(?:全长|长度|约).*(?:5000|七千|7000|八千|8000|五千)\s*(?:公里|千米|km)
  correct: 长江全长约6300km
  description: 长江长度错误（正确值约6300km）
  severity: error
- pattern: 黄河.*?(?:全长|长度|约).*(?:3000|4000|6000|三千|四千|六千)\s*(?:公里|千米|km)
  correct: 黄河全长约5464km
  description: 黄河长度错误（正确值约5464km）
  severity: error
- pattern: (?:中国|我国).*?首都.*?(?:上海|南京|广州|深圳|重庆|成都|武汉|杭州)
  correct: 中国首都是北京
  description: 中国首都错误
  severity: error
- pattern: 四川.*?省会.*?重庆|重庆.*?四川.*?省会
  correct: 四川省会是成都，重庆是直辖市（1997年从四川分离）
  description: 四川省会错误（重庆是直辖市不是四川省会）
  severity: error
- pattern: 浙江.*?省会.*?南京|南京.*?浙江.*?省会
  correct: 浙江省会是杭州（南京是江苏省会）
  description: 浙江省会错误
  severity: error
- pattern: 江苏.*?省会.*?杭州|杭州.*?江苏.*?省会
  correct: 江苏省会是南京（杭州是浙江省会）
  description: 江苏省会错误
  severity: error
- pattern: 福建.*?省会.*?(?:厦门|泉州)
  correct: 福建省会是福州（厦门是经济特区，不是省会）
  description: 福建省会错误
  severity: warning
- pattern: 广东.*?省会.*?(?:深圳|东莞|佛山)
  correct: 广东省会是广州（深圳是经济特区，不是省会）
  description: 广东省会错误
  severity: warning
- pattern: 广西.*?省会
  correct: 广西是自治区，首府为南宁（非省会）
  description: 广西行政称谓不准确（应为首府）
  severity: warning
- pattern: 山东.*?省会.*?(?:青岛|烟台)
  correct: 山东省会是济南（青岛是副省级城市，不是省会）
  description: 山东省会错误
  severity: warning
- pattern: 辽宁.*?省会.*?(?:大连|鞍山)
  correct: 辽宁省会是沈阳（大连是副省级城市，不是省会）
  description: 辽宁省会错误
  severity: warning
- pattern: 河南.*?省会.*?(?:洛阳|开封)
  correct: 河南省会是郑州（洛阳、开封是历史古都，非现任省会）
  description: 河南省会错误
  severity: warning
- pattern: 新疆.*?不是.*?(?:最大的|面积最大)|最大的.*?省.*?不是.*?新疆
  correct: 新疆是中国面积最大的省级行政区，面积约166万平方公里
  description: 新疆面积事实错误
  severity: error
- pattern: 海南.*?不是.*?经济特区|经济特区.*?不.*?海南
  correct: 海南是中国最大的经济特区（1988年设立）
  description: 海南经济特区事实错误
  severity: error
- pattern: 台湾.*?不是.*?中国|台湾.*?独立
  correct: 台湾是中国领土不可分割的一部分
  description: 台湾归属事实错误
  severity: error
- pattern: 长江.*?注入.*?(?:黄海|南海|日本海|渤海)
  correct: 长江注入东海
  description: 长江入海口错误
  severity: error
- pattern: 黄河.*?注入.*?(?:东海|南海|日本海|渤海以外的海)
  correct: 黄河注入渤海
  description: 黄河入海口错误
  severity: error
- pattern: (?:最高峰|世界最高峰).*?不是.*?珠穆朗玛|珠穆朗玛.*?不是.*?(?:最高峰|世界最高)
  correct: 珠穆朗玛峰是世界最高峰，海拔8848.86m
  description: 世界最高峰事实错误
  severity: error
- pattern: 中国.*?没有.*?(?:内陆国|邻国|接壤)|中国.*?不与.*?接壤
  correct: 中国陆地边界线约2.2万千米，与14个国家接壤
  description: 中国邻国事实错误
  severity: error
- pattern: 北京.*?不.*?靠海|北京.*?内陆|北京.*?没有.*?出海
  correct: 北京距海约150km，虽不直接临海但距海较近，经天津可出海
  description: 北京地理位置表述不严谨
  severity: warning
- pattern: 我国只受东南季风的影响
  correct: 我国受东南季风和西南季风共同影响
  description: 误以为我国只受东南季风影响，忽略了西南季风的影响
  severity: error
  source: cmmlu_high_school_geography_0
- pattern: 季风气候都是夏季高温多雨，冬季寒冷干燥
  correct: 季风气候夏季高温多雨，但冬季特征因纬度而异，热带季风气候冬季高温
  description: 误以为所有季风气候冬季都寒冷干燥，忽略了热带季风气候冬季高温的特点
  severity: error
  source: cmmlu_high_school_geography_0
- pattern: 季风环流不属于大气环流
  correct: 季风环流是大气环流的重要组成部分
  description: 误以为季风环流不属于大气环流
  severity: error
  source: cmmlu_high_school_geography_0
- pattern: 蓄水池保湿作用强
  correct: 膜下滴灌生产效率高主要是因为灌水量小和地膜减少水分蒸发，蓄水池主要起储水作用而非保湿
  description: 误以为蓄水池的保湿作用是提高灌溉效率的主要原因
  severity: error
  source: cmmlu_high_school_geography_1
- pattern: 深层下渗作用强
  correct: 膜下滴灌通过控制灌水量和地膜覆盖减少深层下渗，深层下渗强反而会降低灌溉效率
  description: 误以为深层下渗强有利于提高灌溉生产效率
  severity: error
  source: cmmlu_high_school_geography_1
- pattern: 杭州.*桥梁最多
  correct: 世界桥梁最多的城市是意大利的威尼斯
  description: 误以为杭州是世界桥梁最多的城市
  severity: error
  source: cmmlu_high_school_geography_2
- pattern: 巴黎.*桥梁最多
  correct: 世界桥梁最多的城市是意大利的威尼斯
  description: 误以为巴黎是世界桥梁最多的城市
  severity: error
  source: cmmlu_high_school_geography_2
- pattern: 东京.*桥梁最多
  correct: 世界桥梁最多的城市是意大利的威尼斯
  description: 误以为东京是世界桥梁最多的城市
  severity: error
  source: cmmlu_high_school_geography_2
- pattern: 南美洲.*气候.*对称
  correct: 南美洲气候以赤道为中心南北对称分布
  description: 误以为南美洲气候是南北对称分布，实际是以赤道为中心对称
  severity: error
  source: cmmlu_high_school_geography_3
- pattern: 北美洲.*世界三大宗教.*发源地
  correct: 世界三大宗教（基督教、伊斯兰教、佛教）均发源于亚洲
  description: 误以为北美洲是世界三大宗教的发源地
  severity: error
  source: cmmlu_high_school_geography_3
- pattern: 巴拿马运河.*亚洲.*非洲.*分界线
  correct: 巴拿马运河是北美洲与南美洲的分界线
  description: 误以为巴拿马运河是亚洲与非洲的分界线
  severity: error
  source: cmmlu_high_school_geography_3
- pattern: 卡利甘达基峡谷.*最深
  correct: 世界最深的河谷是雅鲁藏布江河谷
  description: 误以为卡利甘达基峡谷是世界最深的河谷
  severity: error
  source: cmmlu_high_school_geography_4
- pattern: 塔拉河峡谷.*最深
  correct: 世界最深的河谷是雅鲁藏布江河谷
  description: 误以为塔拉河峡谷是世界最深的河谷
  severity: error
  source: cmmlu_high_school_geography_4
- pattern: 淡水河谷.*最深
  correct: 世界最深的河谷是雅鲁藏布江河谷
  description: 误以为淡水河谷是世界最深的河谷
  severity: error
  source: cmmlu_high_school_geography_4
- pattern: 水污染.*水浪费.*严重
  correct: 水污染和水浪费严重是导致水资源不足和用水紧张的原因之一
  description: 误以为水污染和水浪费与水资源不足无关
  severity: error
  source: cmmlu_high_school_geography_5
- pattern: 水资源时空分布不均
  correct: 水资源时空分布不均是导致水资源不足和用水紧张的原因之一
  description: 误以为水资源时空分布不均与水资源不足无关
  severity: error
  source: cmmlu_high_school_geography_5
- pattern: 人类对淡水的需求量增大
  correct: 人类对淡水的需求量增大是导致水资源不足和用水紧张的原因之一
  description: 误以为人类对淡水的需求量增大与水资源不足无关
  severity: error
  source: cmmlu_high_school_geography_5
- pattern: 忽如一夜春风来.*梨花
  correct: 该诗句描写的是天气现象，即突降大雪，而非气候特征
  description: 误将描写天气的诗句当作气候描述
  severity: error
  source: cmmlu_high_school_geography_6
- pattern: 夜来风雨声.*花落
  correct: 该诗句描写的是短时天气变化，而非长期气候特征
  description: 误将描写天气的诗句当作气候描述
  severity: error
  source: cmmlu_high_school_geography_6
- pattern: 东边日出西边雨.*无晴
  correct: 该诗句描写的是局部天气现象（对流雨），而非气候特征
  description: 误将描写天气的诗句当作气候描述
  severity: error
  source: cmmlu_high_school_geography_6
- pattern: 资源枯竭.*产业效益下降
  correct: 资源型城市的共性特点是采掘业产值占工业总产值比重较大，而非必然资源枯竭或效益下降
  description: 误将资源枯竭和产业效益下降视为所有资源型城市的共性特点，实际上这是部分资源型城市衰退阶段的表现
  severity: error
  source: cmmlu_high_school_geography_7
- pattern: 经济总量不足.*地方财力薄弱
  correct: 资源型城市的共性特点是采掘业产值占工业总产值比重较大，经济总量和财力并非其共性特征
  description: 误以为经济总量不足和地方财力薄弱是所有资源型城市的共性，实际上不同资源型城市经济状况差异较大
  severity: error
  source: cmmlu_high_school_geography_7
- pattern: 产业结构单一.*资源产业萎缩
  correct: 资源型城市的共性特点是采掘业产值占工业总产值比重较大，产业结构单一和资源产业萎缩是部分资源型城市后期的问题
  description: 误将产业结构单一和资源产业萎缩视为所有资源型城市的共性特点，实际上这是部分城市在衰退阶段的表现
  severity: error
  source: cmmlu_high_school_geography_7
- pattern: 烧煤做饭改为烧柴
  correct: 烧柴同样会产生二氧化碳，不符合低碳减排要求
  description: 误以为烧柴比烧煤更低碳，实际上两者都排放二氧化碳
  severity: error
  source: cmmlu_high_school_geography_8
- pattern: 街道彻夜灯火辉煌
  correct: 彻夜灯火浪费电能，增加碳排放，不符合低碳减排要求
  description: 误以为彻夜灯火与低碳无关，实际会增加能源消耗和碳排放
  severity: error
  source: cmmlu_high_school_geography_8
- pattern: 经常使用一次性用具
  correct: 一次性用具消耗资源并产生废弃物，不符合低碳减排要求
  description: 误以为使用一次性用具不影响低碳，实际会增加资源消耗和碳排放
  severity: error
  source: cmmlu_high_school_geography_8
- pattern: 发展燃气电力.*节省优质煤炭
  correct: 发展燃气电力可以替代部分煤炭消费，但无法解决优质煤源储量不足和西南地区供给问题
  description: 误以为发展燃气电力就能直接解决优质煤炭供给不足的问题
  severity: error
  source: cmmlu_high_school_geography_9
- pattern: 促进煤炭加工转换.*提高附加值
  correct: 煤炭加工转换提高附加值主要针对经济效益，不能直接解决优质煤源储量不足和区域供给问题
  description: 误以为提高煤炭附加值就能解决优质煤炭供给不足
  severity: error
  source: cmmlu_high_school_geography_9
- pattern: 发展集装箱运煤.*减少运输损耗
  correct: 减少运输损耗不能解决优质煤源储量不足的根本问题
  description: 误以为减少运输损耗就能弥补优质煤源储量不足
  severity: error
  source: cmmlu_high_school_geography_9
- pattern: 社会经济快速发展.*安全事故频发
  correct: 社会经济快速发展并不直接导致安全事故频发，而是可能增加风险暴露，但应急产业发展潜力大与事故频发无必然因果关系
  description: 误以为社会经济快速发展必然导致安全事故频发，从而成为应急产业潜力大的原因
  severity: error
  source: cmmlu_high_school_geography_10
- pattern: 自然灾害种类多.*频次高.*范围广
  correct: 自然灾害种类多、频次高、范围广是应急产业需求大的原因之一，但题目问的是'不包括'，该选项是正确原因
  description: 误将自然灾害特点视为应急产业潜力大的原因，但题目要求排除正确原因
  severity: warning
  source: cmmlu_high_school_geography_10
- pattern: 信息网络技术快速发展.*信息安全事故多
  correct: 信息网络技术快速发展可能导致信息安全事故增多，但这不是应急产业潜力大的主要原因，且题目要求排除正确原因
  description: 误以为信息安全事故多是应急产业潜力大的原因，但该选项是正确原因之一
  severity: warning
  source: cmmlu_high_school_geography_10
- pattern: 天体系统层次.*两个
  correct: 题目中涉及的地月系、太阳系、银河系共三个天体系统层次
  description: 误以为只有地月系和太阳系两个层次，忽略了银河系
  severity: error
  source: cmmlu_high_school_geography_11
- pattern: 天体系统层次.*四个
  correct: 题目中只涉及地月系、太阳系、银河系三个层次，没有四个
  description: 误以为有四个天体系统层次，可能多算了总星系或其他
  severity: error
  source: cmmlu_high_school_geography_11
- pattern: 天体系统层次.*一个
  correct: 题目中涉及地月系、太阳系、银河系共三个天体系统层次
  description: 误以为只有一个天体系统层次，忽略了不同级别的系统
  severity: error
  source: cmmlu_high_school_geography_11
- pattern: 内陆国家.*不必考虑.*海平面上升
  correct: 全球变暖导致的气候变化（如极端天气、冰川融化）会影响所有国家，内陆国家也需要考虑其影响
  description: 误以为只有沿海国家才受全球变暖影响
  severity: error
  source: cmmlu_high_school_geography_12
- pattern: 全球变暖.*降水增多.*农作物增产
  correct: 全球变暖可能导致极端降水事件增加，但总体会加剧干旱和洪涝，对农作物产量有负面影响
  description: 误以为全球变暖带来的降水增多必然使农作物增产
  severity: error
  source: cmmlu_high_school_geography_12
- pattern: 高纬度国家.*不需要防治全球变暖
  correct: 全球变暖对高纬度国家影响显著（如冰川融化、冻土解冻），所有国家都需要防治
  description: 误以为高纬度国家不受全球变暖影响
  severity: error
  source: cmmlu_high_school_geography_12
- pattern: 资本主义国家
  correct: 尼泊尔是发展中国家，其经济水平属于发展中国家范畴
  description: 误以为资本主义国家等同于发达国家，实际上资本主义国家包括发展中国家
