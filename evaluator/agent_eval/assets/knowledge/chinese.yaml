  description: 误以为泛指鱼类的陈述中的"鱼"是专指某一条鱼
  severity: error
  source: cmmlu_modern_chinese_105
- pattern: 老王喜欢钓鱼
  correct: '"老王喜欢钓鱼"中的"鱼"是泛指鱼类，表示钓鱼这项活动，而非专指某一条具体的鱼'
  description: 误以为表示活动或爱好的"鱼"是专指某一条鱼
  severity: error
  source: cmmlu_modern_chinese_105
- pattern: 老李很会烧鱼
  correct: '"老李很会烧鱼"中的"鱼"是泛指鱼类食材，而非专指某一条具体的鱼'
  description: 误以为表示烹饪食材的"鱼"是专指某一条鱼
  severity: error
  source: cmmlu_modern_chinese_105
- pattern: 察颜观色
  correct: 应为“察言观色”，指观察言语脸色揣摩对方心意
  description: 误将“言”写成“颜”，混淆了“言语”与“颜色”
  severity: error
  source: cmmlu_modern_chinese_106
- pattern: 无精打彩
  correct: 应为“无精打采”，形容没有精神、不振作
  description: 误将“采”写成“彩”，混淆了“神采”与“色彩”
  severity: error
  source: cmmlu_modern_chinese_106
- pattern: 所有的单元音韵母都可以自成音节
  correct: 并非所有单元音韵母都能自成音节，如ê、-i（舌尖元音）等不能独立成音节
  description: 误以为所有单元音韵母都能独立成音节
  severity: error
  source: cmmlu_modern_chinese_108
- pattern: 元音属于乐音，发音时声带有的振动，有的不振动
  correct: 元音发音时声带一定振动，属于乐音
  description: 误以为部分元音发音时声带不振动
  severity: error
  source: cmmlu_modern_chinese_108
- pattern: 所有的单元音韵母都必须同声母相拼
  correct: 部分单元音韵母（如a、o、e等）可以自成音节，不必与声母相拼
  description: 误以为所有单元音韵母必须与声母拼合
  severity: error
  source: cmmlu_modern_chinese_108
- pattern: 惆怅.*叠韵
  correct: 惆怅是双声词，声母相同（ch）
  description: 误以为惆怅是叠韵词
  severity: error
  source: cmmlu_modern_chinese_109
- pattern: 惆怅.*非双声叠韵
  correct: 惆怅是双声词，声母相同（ch）
  description: 误以为惆怅既非双声也非叠韵
  severity: error
  source: cmmlu_modern_chinese_109
- pattern: 惆怅.*音译
  correct: 惆怅是汉语固有词汇，不是音译词
  description: 误以为惆怅是音译词
  severity: error
  source: cmmlu_modern_chinese_109
- pattern: 扬长而去.*金牌
  correct: 扬长而去指大模大样地离开，不能用于形容赛跑冲向终点获得金牌
  description: 误以为扬长而去可以表示快速奔跑并取得胜利
  severity: error
  source: cmmlu_modern_chinese_110
- pattern: 红木的家具耐用
  correct: 在'红木的家具耐用'中，定语'红木的'与主语'家具'发生语义联系，而非与谓语'耐用'
  description: 误以为定语与谓语发生语义联系，实际定语修饰主语
  severity: error
  source: cmmlu_modern_chinese_111
- pattern: 伟大的中国人民站起来了
  correct: 在'伟大的中国人民站起来了'中，定语'伟大的'与主语'中国人民'发生语义联系，而非与谓语'站起来了'
  description: 误以为定语与谓语发生语义联系，实际定语修饰主语
  severity: error
  source: cmmlu_modern_chinese_111
- pattern: 飞奔的列车穿插过了隧道
  correct: 在'飞奔的列车穿插过了隧道'中，定语'飞奔的'与主语'列车'发生语义联系，而非与谓语'穿插过了隧道'
  description: 误以为定语与谓语发生语义联系，实际定语修饰主语
  severity: error
  source: cmmlu_modern_chinese_111
- pattern: 杜鹃花开遍山野.*比喻
  correct: 杜鹃花开遍山野，香飘万里。运用了夸张的修辞手法，强调花香浓郁、传播远。
  description: 误将夸张句判断为比喻句
  severity: error
  source: cmmlu_modern_chinese_112
- pattern: 姑娘银铃般的笑声.*夸张
  correct: 姑娘银铃般的笑声也跟着响起来。运用了比喻的修辞手法，将笑声比作银铃。
  description: 误将比喻句判断为夸张句
  severity: error
  source: cmmlu_modern_chinese_112
- pattern: 不读书.*拟人
  correct: 不读书，无以知窗外的精彩；不读书，无以知世界的宽广；不读书，无以知文化的力量。运用了排比的修辞手法。
  description: 误将排比句判断为拟人句
  severity: error
  source: cmmlu_modern_chinese_112
- pattern: 微风唤醒了沉睡的种子.*比喻
  correct: 微风唤醒了沉睡的种子。运用了拟人的修辞手法，赋予微风和种子人的动作。
  description: 误将拟人句判断为比喻句
  severity: error
  source: cmmlu_modern_chinese_112
- pattern: 亮晶晶地镶嵌
  correct: 状语'亮晶晶地'修饰动词'镶嵌'，与主语'星星'无直接语义联系
  description: 误以为状语'亮晶晶地'描述主语的状态，实际是描述动作的方式或状态
  severity: error
  source: cmmlu_modern_chinese_113
- pattern: 中流砥柱.*孜孜不倦
  correct: 中流砥柱和孜孜不倦的结构不同，前者是偏正结构，后者是并列结构
  description: 误以为中流砥柱和孜孜不倦结构相同
  severity: error
  source: cmmlu_modern_chinese_114
- pattern: 天翻地覆.*营私舞弊
  correct: 天翻地覆和营私舞弊的结构不同，前者是并列结构，后者是动宾结构
  description: 误以为天翻地覆和营私舞弊结构相同
  severity: error
  source: cmmlu_modern_chinese_114
- pattern: 毛遂自荐.*胸有成竹
  correct: 毛遂自荐和胸有成竹的结构不同，前者是主谓结构，后者是主谓结构但内部不同
  description: 误以为毛遂自荐和胸有成竹结构相同
  severity: error
  source: cmmlu_modern_chinese_114
- pattern: 粗制烂渣
  correct: 应为‘粗制滥造’，表示制作粗糙、不讲究质量
  description: 误将‘滥’写成‘烂’，混淆了‘滥’（过度、不节制）与‘烂’（腐烂、破碎）
  severity: error
  source: cmmlu_modern_chinese_115
- pattern: 味同嚼腊
  correct: 应为‘味同嚼蜡’，形容没有味道或毫无趣味
  description: 误将‘蜡’写成‘腊’，混淆了‘蜡’（蜂蜡、蜡烛）与‘腊’（腊月、腊肉）
  severity: error
  source: cmmlu_modern_chinese_115
domain_facts:
  classical_poetry:
  - title: 静夜思
    author: 李白
    dynasty: 唐
    first_line: 床前明月光
    full_text: 床前明月光，疑是地上霜。举头望明月，低头思故乡。
  - title: 春晓
    author: 孟浩然
    dynasty: 唐
    first_line: 春眠不觉晓
    full_text: 春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。
  - title: 咏鹅
    author: 骆宾王
    dynasty: 唐
    first_line: 鹅鹅鹅
    full_text: 鹅鹅鹅，曲项向天歌。白毛浮绿水，红掌拨清波。
  - title: 登鹳雀楼
    author: 王之涣
    dynasty: 唐
    first_line: 白日依山尽
    full_text: 白日依山尽，黄河入海流。欲穷千里目，更上一层楼。
  - title: 望庐山瀑布
    author: 李白
    dynasty: 唐
    first_line: 日照香炉生紫烟
    full_text: 日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。
  - title: 悯农
    author: 李绅
    dynasty: 唐
    first_line: 锄禾日当午
    full_text: 锄禾日当午，汗滴禾下土。谁知盘中餐，粒粒皆辛苦。
  - title: 咏柳
    author: 贺知章
    dynasty: 唐
    first_line: 碧玉妆成一树高
    full_text: 碧玉妆成一树高，万条垂下绿丝绦。不知细叶谁裁出，二月春风似剪刀。
  - title: 绝句
    author: 杜甫
    dynasty: 唐
    first_line: 两个黄鹂鸣翠柳
    full_text: 两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。
  - title: 江雪
    author: 柳宗元
    dynasty: 唐
    first_line: 千山鸟飞绝
    full_text: 千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。
  - title: 早发白帝城
    author: 李白
    dynasty: 唐
    first_line: 朝辞白帝彩云间
    full_text: 朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。
  - title: 望天门山
    author: 李白
    dynasty: 唐
    first_line: 天门中断楚江开
    full_text: 天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。
  - title: 夜宿山寺
    author: 李白
    dynasty: 唐
    first_line: 危楼高百尺
    full_text: 危楼高百尺，手可摘星辰。不敢高声语，恐惊天上人。
  - title: 山行
    author: 杜牧
    dynasty: 唐
    first_line: 远上寒山石径斜
    full_text: 远上寒山石径斜，白云深处有人家。停车坐爱枫林晚，霜叶红于二月花。
  - title: 清明
    author: 杜牧
    dynasty: 唐
    first_line: 清明时节雨纷纷
    full_text: 清明时节雨纷纷，路上行人欲断魂。借问酒家何处有，牧童遥指杏花村。
  - title: 枫桥夜泊
    author: 张继
    dynasty: 唐
    first_line: 月落乌啼霜满天
    full_text: 月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。
  - title: 游子吟
    author: 孟郊
    dynasty: 唐
    first_line: 慈母手中线
    full_text: 慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。
  - title: 赋得古原草送别
    author: 白居易
    dynasty: 唐
    first_line: 离离原上草
    full_text: 离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。远芳侵古道，晴翠接荒城。又送王孙去，萋萋满别情。
  - title: 忆江南
    author: 白居易
    dynasty: 唐
    first_line: 江南好
    full_text: 江南好，风景旧曾谙。日出江花红胜火，春来江水绿如蓝。能不忆江南？
  - title: 寻隐者不遇
    author: 贾岛
    dynasty: 唐
    first_line: 松下问童子
    full_text: 松下问童子，言师采药去。只在此山中，云深不知处。
  - title: 凉州词
    author: 王翰
    dynasty: 唐
    first_line: 葡萄美酒夜光杯
    full_text: 葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回？
  - title: 出塞
    author: 王昌龄
    dynasty: 唐
    first_line: 秦时明月汉时关
    full_text: 秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。
  - title: 九月九日忆山东兄弟
    author: 王维
    dynasty: 唐
    first_line: 独在异乡为异客
    full_text: 独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。
  - title: 送元二使安西
    author: 王维
    dynasty: 唐
    first_line: 渭城朝雨浥轻尘
    full_text: 渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。
  - title: 赠汪伦
    author: 李白
    dynasty: 唐
    full_text: 李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。
  - title: 黄鹤楼送孟浩然之广陵
    author: 李白
    dynasty: 唐
    full_text: 故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。
  - title: 别董大
    author: 高适
    dynasty: 唐
    full_text: 千里黄云白日曛，北风吹雁雪纷纷。莫愁前路无知己，天下谁人不识君。
  - title: 江南春
    author: 杜牧
    dynasty: 唐
    full_text: 千里莺啼绿映红，水村山郭酒旗风。南朝四百八十寺，多少楼台烟雨中。
  - title: 泊秦淮
    author: 杜牧
    dynasty: 唐
    full_text: 烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。
  - title: 夜雨寄北
    author: 李商隐
    dynasty: 唐
    full_text: 君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。
  - title: 饮湖上初晴后雨
    author: 苏轼
    dynasty: 宋
    full_text: 水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。
  - title: 题西林壁
    author: 苏轼
    dynasty: 宋
    full_text: 横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。
  - title: 惠崇春江晚景
    author: 苏轼
    dynasty: 宋
    full_text: 竹外桃花三两枝，春江水暖鸭先知。蒌蒿满地芦芽短，正是河豚欲上时。
  - title: 示儿
    author: 陆游
    dynasty: 宋
    full_text: 死去元知万事空，但悲不见九州同。王师北定中原日，家祭无忘告乃翁。
  - title: 游山西村
    author: 陆游
    dynasty: 宋
    full_text: 莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。
  - title: 小池
    author: 杨万里
    dynasty: 宋
    full_text: 泉眼无声惜细流，树阴照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。
  - title: 晓出净慈寺送林子方
    author: 杨万里
    dynasty: 宋
    full_text: 毕竟西湖六月中，风光不与四时同。接天莲叶无穷碧，映日荷花别样红。
  - title: 春日
    author: 朱熹
    dynasty: 宋
    full_text: 胜日寻芳泗水滨，无边光景一时新。等闲识得东风面，万紫千红总是春。
  - title: 泊船瓜洲
    author: 王安石
    dynasty: 宋
    full_text: 京口瓜洲一水间，钟山只隔数重山。春风又绿江南岸，明月何时照我还。
  - title: 元日
    author: 王安石
    dynasty: 宋
    full_text: 爆竹声中一岁除，春风送暖入屠苏。千门万户曈曈日，总把新桃换旧符。
  - title: 登飞来峰
    author: 王安石
    dynasty: 宋
    full_text: 飞来山上千寻塔，闻说鸡鸣见日升。不畏浮云遮望眼，自缘身在最高层。
  - title: 夏日绝句
    author: 李清照
    dynasty: 宋
    full_text: 生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。
  - title: 三衢道中
    author: 曾几
    dynasty: 宋
    full_text: 梅子黄时日日晴，小溪泛尽却山行。绿阴不减来时路，添得黄鹂四五声。
  - title: 村居
    author: 高鼎
    dynasty: 清
    full_text: 草长莺飞二月天，拂堤杨柳醉春烟。儿童散学归来早，忙趁东风放纸鸢。
  - title: 所见
    author: 袁枚
    dynasty: 清
    full_text: 牧童骑黄牛，歌声振林樾。意欲捕鸣蝉，忽然闭口立。
  - title: 己亥杂诗
    author: 龚自珍
    dynasty: 清
    full_text: 九州生气恃风雷，万马齐喑究可哀。我劝天公重抖擞，不拘一格降人才。
  - title: 竹石
    author: 郑燮
    dynasty: 清
    full_text: 咬定青山不放松，立根原在破岩中。千磨万击还坚劲，任尔东西南北风。
  - title: 墨梅
    author: 王冕
    dynasty: 元
    full_text: 吾家洗砚池头树，朵朵花开淡墨痕。不要人夸好颜色，只留清气满乾坤。
  - title: 天净沙·秋思
    author: 马致远
    dynasty: 元
    full_text: 枯藤老树昏鸦，小桥流水人家，古道西风瘦马。夕阳西下，断肠人在天涯。
  - title: 敕勒歌
    author: 佚名
    dynasty: 北朝
    full_text: 敕勒川，阴山下。天似穹庐，笼盖四野。天苍苍，野茫茫，风吹草低见牛羊。
  - title: 画鸡
    author: 唐寅
    dynasty: 明
    full_text: 头上红冠不用裁，满身雪白走将来。平生不敢轻言语，一叫千门万户开。
  - title: 示儿（其二）
    author: 陆游
    dynasty: 宋
    full_text: 秋夜将晓出篱门迎凉有感：三万里河东入海，五千仞岳上摩天。遗民泪尽胡尘里，南望王师又一年。
