  severity: error
  source: cmmlu_ancient_chinese_124
- pattern: 小知不及大知.*小年不及大年
  correct: 该句使用对比修辞，而‘秦時明月漢時關’使用的是互文修辞
  description: 误以为‘小知不及大知，小年不及大年’与‘秦時明月漢時關’表达方式相同
  severity: error
  source: cmmlu_ancient_chinese_124
- pattern: 雕题.*题写
  correct: 雕题指在额头上雕刻花纹，'题'意为额头
  description: 误将'题'理解为'题写'，忽略了古代文献中'题'指额头的用法
  severity: error
  source: cmmlu_ancient_chinese_125
- pattern: 雕题.*题目
  correct: 雕题指在额头上雕刻花纹，'题'意为额头
  description: 误将'题'理解为'题目'，混淆了现代常用义与古义
  severity: error
  source: cmmlu_ancient_chinese_125
- pattern: 雕题.*雕刻
  correct: 雕题指在额头上雕刻花纹，'题'意为额头，而非'雕刻'本身
  description: 误将'雕题'整体理解为'雕刻'，忽略了'题'的具体指代
  severity: error
