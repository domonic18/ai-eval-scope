- pattern: 调查.*动词.*可以做宾语
  correct: 动词可以做宾语，但名词也可以做宾语，不能作为判断动词的充分条件
  description: 误以为能做宾语就是动词
  severity: error
  source: cmmlu_modern_chinese_93
- pattern: 调查.*动词.*可以修饰名词
  correct: 动词可以修饰名词，但形容词也可以修饰名词，不能作为判断动词的充分条件
  description: 误以为能修饰名词就是动词
  severity: error
  source: cmmlu_modern_chinese_93
- pattern: 忧劳与逸豫
