  description: 误以为'飘飘乎如遗世独立'是描写箫声，实际该句是描写苏轼泛舟时的超然感受
  severity: error
  source: cmmlu_modern_chinese_100
- pattern: 寄蜉蝣于天地
  correct: 《前赤壁赋》中描写箫声的语句是'舞幽壑之潜蛟'
  description: 误以为'寄蜉蝣于天地'是描写箫声，实际该句是感叹人生短暂
