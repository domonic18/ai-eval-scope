  source: cmmlu_modern_chinese_89
- pattern: 裙子做好了
  correct: 在'裙子做好了'中，主语'裙子'是受事（被做的对象），而非工具
  description: 误以为'裙子做好了'的主语是工具，实际是受事主语
  severity: error
  source: cmmlu_modern_chinese_90
- pattern: 这块布做裙子
  correct: 在'这块布做裙子'中，主语'这块布'是材料（被用来做裙子的原料），而非工具
  description: 误以为'这块布做裙子'的主语是工具，实际是材料主语
  severity: error
  source: cmmlu_modern_chinese_90
- pattern: 朱自清.*济南的冬天
  correct: 《济南的冬天》是老舍的作品，不是朱自清的
  description: 误以为《济南的冬天》是朱自清的作品
  severity: error
  source: cmmlu_modern_chinese_91
- pattern: 调查.*动词.*能受数量短语修饰
  correct: 能受数量短语修饰是动词的语法特征之一，但仅凭这一点不足以判断词性
  description: 误以为能受数量短语修饰就是动词的充分条件
