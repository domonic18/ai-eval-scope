  source: cmmlu_ancient_chinese_123
- pattern: 通过.*声符相同
  correct: 通和过的声符分别是甬和咼，不相同
  description: 误以为通过声符相同
  severity: error
  source: cmmlu_ancient_chinese_123
- pattern: 江河.*声符相同
  correct: 江和河的声符分别是工和可，不相同
  description: 误以为江河声符相同
  severity: error
  source: cmmlu_ancient_chinese_123
- pattern: 輔依車.*車亦依輔
  correct: 该句使用比喻修辞，而‘秦時明月漢時關’使用的是互文修辞
  description: 误以为‘輔依車，車亦依輔’与‘秦時明月漢時關’表达方式相同
  severity: error
  source: cmmlu_ancient_chinese_124
- pattern: 賜女土地.*質之以犧牲
  correct: 该句为盟誓句式，而‘秦時明月漢時關’使用的是互文修辞
