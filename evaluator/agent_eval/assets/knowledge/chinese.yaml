  severity: error
  source: cmmlu_modern_chinese_76
- pattern: 近⽇.*就.*表示
  correct: 应改为'近日腾讯就各类防沉迷系统破解手段表示'，但'就...表示'搭配不当，应改为'对...表示'或'就...发表看法'
