  severity: error
  source: cmmlu_modern_chinese_77
- pattern: 《.*》选⾃《.*》。（.*年版）
  correct: 括号内的出版信息应紧跟在书名后，不应放在句号外
  description: 误以为括号内的出版信息可以放在句号后
  severity: error
  source: cmmlu_modern_chinese_77
- pattern: 到底要不要.*？
  correct: 陈述句末尾不用问号，此处“到底要不要”是陈述语气，应用句号
  description: 误以为含有疑问词的句子都需用问号
  severity: error
  source: cmmlu_modern_chinese_77
- pattern: 追求人生的高洁
  correct: 语段主旨是关注整体而非局部缺陷，而非追求高洁
  description: 误以为语段在倡导道德上的高洁追求
  severity: error
  source: cmmlu_modern_chinese_78
- pattern: 拼搏进取，填补空白
  correct: 语段主旨是看到整体（白纸）而非只关注缺陷（黑点），而非鼓励填补空白
  description: 误以为语段在倡导积极行动填补不足
  severity: error
  source: cmmlu_modern_chinese_78
- pattern: 拨得头筹
  correct: 应为‘拔得头筹’，‘拔’是夺取、取得的意思
  description: 误将‘拔得头筹’写成‘拨得头筹’，混淆了‘拔’和‘拨’的用法
  severity: error
  source: cmmlu_modern_chinese_79
- pattern: 浓绸
  correct: 应为‘浓稠’，‘稠’指液体浓度大
  description: 误将‘浓稠’写成‘浓绸’，混淆了‘稠’和‘绸’的字形和含义
  severity: error
  source: cmmlu_modern_chinese_79
- pattern: 绞形
  correct: 应为‘绞刑’，‘刑’指刑罚
  description: 误将‘绞刑’写成‘绞形’，混淆了‘刑’和‘形’的字形和含义
  severity: error
  source: cmmlu_modern_chinese_79
- pattern: 一定.*一.*上声
  correct: 在‘一定’中，‘一’读阳平（第二声）
  description: 误以为‘一’在‘一定’中读上声
  severity: error
  source: cmmlu_modern_chinese_80
- pattern: 一定.*一.*去声
  correct: 在‘一定’中，‘一’读阳平（第二声）
  description: 误以为‘一’在‘一定’中读去声
  severity: error
  source: cmmlu_modern_chinese_80
- pattern: 一定.*一.*阴平
  correct: 在‘一定’中，‘一’读阳平（第二声）
  description: 误以为‘一’在‘一定’中读阴平
  severity: error
  source: cmmlu_modern_chinese_80
- pattern: 夕阳中的新娘.*云彩
  correct: “夕阳中的新娘”比喻的是河畔的金柳，而非西天的云彩
  description: 误以为“夕阳中的新娘”比喻的是西天的云彩
  severity: error
  source: cmmlu_modern_chinese_81
- pattern: 夕阳中的新娘.*柔波
  correct: “夕阳中的新娘”比喻的是河畔的金柳，而非康河的柔波
  description: 误以为“夕阳中的新娘”比喻的是康河的柔波
  severity: error
  source: cmmlu_modern_chinese_81
- pattern: 夕阳中的新娘.*青荇
  correct: “夕阳中的新娘”比喻的是河畔的金柳，而非软泥上的青荇
  description: 误以为“夕阳中的新娘”比喻的是软泥上的青荇
  severity: error
  source: cmmlu_modern_chinese_81
- pattern: 易安居士.*王安石
  correct: 易安居士是李清照的号
  description: 误以为王安石号易安居士
  severity: error
  source: cmmlu_modern_chinese_82
- pattern: 易安居士.*辛弃疾
  correct: 易安居士是李清照的号
  description: 误以为辛弃疾号易安居士
  severity: error
  source: cmmlu_modern_chinese_82
- pattern: 易安居士.*苏东坡
  correct: 易安居士是李清照的号
  description: 误以为苏东坡号易安居士
  severity: error
  source: cmmlu_modern_chinese_82
- pattern: 真情.*形容词
  correct: “真情”是名词，不是形容词
  description: 误将名词“真情”当作形容词
  severity: error
  source: cmmlu_modern_chinese_83
- pattern: 火红.*形容词
  correct: “火红”是形容词，表示像火一样红
  description: 误以为“火红”不是形容词
  severity: error
  source: cmmlu_modern_chinese_83
- pattern: 火热.*形容词
  correct: “火热”是形容词，表示非常热或热烈
  description: 误以为“火热”不是形容词
  severity: error
  source: cmmlu_modern_chinese_83
- pattern: 词根.*词缀.*构成
  correct: 巧克力是音译外来词，由三个音节构成，不是由词根和词缀组合而成
  description: 误以为巧克力是派生词，由词根加词缀构成
  severity: error
  source: cmmlu_modern_chinese_84
- pattern: 三个词根.*构成
  correct: 巧克力是音译外来词，由三个音节构成，不是由三个词根复合而成
  description: 误以为巧克力是复合词，由三个词根构成
  severity: error
  source: cmmlu_modern_chinese_84
- pattern: 两个词根.*构成
  correct: 巧克力是音译外来词，由三个音节构成，不是由两个词根复合而成
  description: 误以为巧克力是复合词，由两个词根构成
  severity: error
  source: cmmlu_modern_chinese_84
- pattern: 龟缩.*单纯词
  correct: “龟缩”是由“龟”和“缩”两个语素构成的合成词，不是单纯词
  description: 误以为“龟缩”是单纯词，实际上它是合成词
  severity: error
  source: cmmlu_modern_chinese_85
- pattern: 龟缩.*主谓式
  correct: “龟缩”中“龟”修饰“缩”，表示像龟一样缩起来，是偏正式，不是主谓式
  description: 误以为“龟缩”是主谓式结构，实际上“龟”是状语修饰“缩”
  severity: error
  source: cmmlu_modern_chinese_85
- pattern: 龟缩.*补充式
  correct: “龟缩”中“缩”是中心语，“龟”是修饰语，是偏正式，不是补充式
  description: 误以为“龟缩”是补充式结构，实际上“龟”修饰“缩”而非补充说明
  severity: error
  source: cmmlu_modern_chinese_85
- pattern: 发音体不同
  correct: b、d、ɡ的发音体都是声带，发音不同是由于舌位前后不同
  description: 误以为b、d、ɡ发音不同是因为发音体不同
  severity: error
  source: cmmlu_modern_chinese_86
- pattern: 共鸣器形状不同
  correct: b、d、ɡ的共鸣器形状相同，发音不同是由于舌位前后不同
  description: 误以为b、d、ɡ发音不同是因为共鸣器形状不同
  severity: error
  source: cmmlu_modern_chinese_86
- pattern: 发音方法不同
  correct: b、d、ɡ的发音方法相同（都是不送气清塞音），发音不同是由于舌位前后不同
  description: 误以为b、d、ɡ发音不同是因为发音方法不同
  severity: error
  source: cmmlu_modern_chinese_86
- pattern: 仍怜故乡水.*万里送行舟.*思乡之情
  correct: 这两句诗通过拟人手法写故乡之水送别诗人，表达的是诗人对故乡的眷恋和离别时的伤感，而非思乡之情。
  description: 误以为诗句表达的是思乡之情，实际是离别之情
  severity: error
  source: cmmlu_modern_chinese_87
- pattern: 东风不与周郎便.*铜雀春深锁二乔.*赤壁之战.*改变
  correct: 杜牧的这两句诗是假设历史，认为如果东风不给周瑜方便，赤壁之战的结果可能改变，但并非杜牧本人的历史观点。
  description: 误以为杜牧在表达自己的历史观点，实际是假设性议论
  severity: error
  source: cmmlu_modern_chinese_87
- pattern: 大漠孤烟直.*长河落日圆.*诗中有画
  correct: 这两句诗确实描绘了塞外风光，体现了王维'诗中有画'的特点，但赏析中未指出其具体艺术特色。
  description: 误以为诗句赏析不恰当，实际赏析正确
  severity: warning
  source: cmmlu_modern_chinese_87
- pattern: 声调.*音长
  correct: 汉语声调由音高变化决定，与音长无关
  description: 误以为声调由音长决定
  severity: error
  source: cmmlu_modern_chinese_88
- pattern: 声调.*音强
  correct: 汉语声调由音高变化决定，与音强无关
  description: 误以为声调由音强决定
  severity: error
  source: cmmlu_modern_chinese_88
- pattern: 声调.*音色
  correct: 汉语声调由音高变化决定，与音色无关
  description: 误以为声调由音色决定
  severity: error
  source: cmmlu_modern_chinese_88
- pattern: 语重心长的话语.*心头回想
  correct: 语重心长的话语时时在我心头回响
  description: 误以为'回想'可以搭配'话语'作主语，实际上'回想'是人的动作，不能用于话语本身
  severity: error
  source: cmmlu_modern_chinese_89
- pattern: 通过.*活动.*可以使
  correct: 开展'每月少开一天车'的活动，可以使泰安的空气更加清新
  description: 误以为'通过'和'使'连用可以构成完整句子，实际上缺少主语导致成分残缺
  severity: error
  source: cmmlu_modern_chinese_89
- pattern: 不仅.*而且.*全校.*我班
  correct: 他的语文成绩不仅在我班名列前茅，而且在全校也很突出
  description: 误以为递进关系可以颠倒范围顺序，实际上应从范围小到大递进
