- pattern: 爪牙.*古今.*词义
  correct: 爪牙古今词义属于词义转移（褒贬变化），而非词义扩大
  description: 误以为爪牙从古义'得力助手'到今义'坏人的帮凶'是词义扩大，实际是感情色彩转移
