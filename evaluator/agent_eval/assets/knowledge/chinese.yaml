  description: 误以为“弑”不能带宾语
  severity: error
  source: cmmlu_ancient_chinese_109
- pattern: 弑.*庄重场合
  correct: “弑”含贬义，用于下杀上的行为，并非庄重场合
  description: 误以为“弑”用于庄重场合
  severity: error
  source: cmmlu_ancient_chinese_109
- pattern: 見笑於大方之家
  correct: 「見……於」是形式标志，该句为有形式标志被动句
  description: 误以为「見……於」结构不是被动句的形式标志
  severity: error
  source: cmmlu_ancient_chinese_110
- pattern: 百六家.*千三百一十八篇
  correct: 百六家、千三百一十八篇中的数字表示数量，而非分数
  description: 误将表示数量的数字理解为分数
