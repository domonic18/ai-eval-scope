  source: cmmlu_ancient_chinese_131
- pattern: 莫.*会意字
  correct: “莫”是会意字，“休”是会意字，“甘”是指事字，“武”是会意字，因此该组不全是会意字
  description: 误以为“莫、休、甘、武”都是会意字，实际上“甘”是指事字
  severity: error
