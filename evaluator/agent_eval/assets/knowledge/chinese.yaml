- pattern: 千萬臣而無數
  correct: 千萬臣而無數中的数字表示极多，而非分数
  description: 误将表示极多或虚指的数字理解为分数
  severity: error
  source: cmmlu_ancient_chinese_111
- pattern: 郑樵.*八卦
  correct: 《周易·系辞》和《说文解字》认为八卦为伏牺氏所作
  description: 误以为郑樵是八卦的作者
  severity: error
  source: cmmlu_ancient_chinese_112
- pattern: 神农氏.*八卦
  correct: 《周易·系辞》和《说文解字》认为八卦为伏牺氏所作，而非神农氏
  description: 误以为神农氏创作了八卦
  severity: error
  source: cmmlu_ancient_chinese_112
- pattern: 仓颉.*八卦
  correct: 《周易·系辞》和《说文解字》认为八卦为伏牺氏所作，仓颉是传说中造字者
  description: 误以为仓颉创作了八卦
  severity: error
  source: cmmlu_ancient_chinese_112
- pattern: 币.*本义
  correct: 在‘既至匈奴，置币遗单于’中，‘币’用的是引申义，指礼物、财物，而非本义‘帛’
  description: 误以为‘币’在此句中用的是本义（帛）
  severity: error
  source: cmmlu_ancient_chinese_113
- pattern: 币.*今义
  correct: 在‘既至匈奴，置币遗单于’中，‘币’用的是引申义，指礼物、财物，而非今义‘货币’
  description: 误以为‘币’在此句中用的是今义（货币）
  severity: error
  source: cmmlu_ancient_chinese_113
- pattern: 币.*假借义
  correct: 在‘既至匈奴，置币遗单于’中，‘币’用的是引申义，指礼物、财物，而非假借义
  description: 误以为‘币’在此句中用的是假借义
  severity: error
  source: cmmlu_ancient_chinese_113
- pattern: 孰与.*美
  correct: “孰与”在“吾孰与城北徐公美”中表示比较，意为“与……相比谁更”
  description: 误以为所有“孰与”都表示比较，忽略了“孰与”也可表示选择或反问
  severity: error
  source: cmmlu_ancient_chinese_114
- pattern: 孰与.*制天命
  correct: “孰与”在“从天而颂之，孰与制天命而用之”中表示选择，意为“哪里比得上”
  description: 误以为“孰与”只用于比较，忽略了其表示选择或反问的用法
  severity: error
  source: cmmlu_ancient_chinese_114
- pattern: 孰与.*秦王
  correct: “孰与”在“公之视廉将军孰与秦王”中表示比较，意为“与……相比谁更”
  description: 误以为所有“孰与”都表示比较，忽略了“孰与”也可表示选择或反问
  severity: error
  source: cmmlu_ancient_chinese_114
- pattern: 辩.*本义
  correct: 此处'辩'为假借字，通'变'，意为变化
  description: 误将'辩'理解为它的本义（辩论、辨别）
  severity: error
  source: cmmlu_ancient_chinese_115
- pattern: 辩.*常用义
  correct: 此处'辩'为假借字，通'变'，不是其常用义
  description: 误将'辩'理解为它的常用义（辩论、辨别）
  severity: error
  source: cmmlu_ancient_chinese_115
- pattern: 辩.*引申义
  correct: 此处'辩'为假借字，通'变'，不是其引申义
  description: 误将'辩'理解为它的引申义
  severity: error
  source: cmmlu_ancient_chinese_115
- pattern: 假借.*共.*恭
  correct: 共与恭是古今字关系，不是假借关系
  description: 误将古今字关系当作假借关系
  severity: error
  source: cmmlu_ancient_chinese_116
- pattern: 假借.*闕.*窺
  correct: 闕与窺是通假字关系，不是假借关系
  description: 误将通假字关系当作假借关系
  severity: error
  source: cmmlu_ancient_chinese_116
- pattern: 假借.*竟.*境
  correct: 竟与境是古今字关系，不是假借关系
  description: 误将古今字关系当作假借关系
  severity: error
  source: cmmlu_ancient_chinese_116
- pattern: 四库全书总目提要.*语句出处
  correct: 《四库全书总目提要》是目录学著作，用于查检古籍的版本、作者和内容提要，而非具体语句出处
  description: 误以为《四库全书总目提要》可以检索儒家经典的具体语句出处
  severity: error
  source: cmmlu_ancient_chinese_117
- pattern: 辞通.*语句出处
  correct: 《辞通》是查检古汉语双音词通假关系的工具书，不用于检索儒家经典语句出处
  description: 误以为《辞通》可以检索儒家经典的具体语句出处
  severity: error
  source: cmmlu_ancient_chinese_117
- pattern: 词诠.*语句出处
  correct: 《词诠》是解释古汉语虚词用法的工具书，不用于检索儒家经典语句出处
  description: 误以为《词诠》可以检索儒家经典的具体语句出处
  severity: error
  source: cmmlu_ancient_chinese_117
- pattern: 進之.*退之
  correct: '"進之"和"退之"中"進"和"退"是使动用法，表示"使……前进"和"使……后退"，不是为动关系'
  description: 误将动词的使动用法理解为为动关系
  severity: error
  source: cmmlu_ancient_chinese_118
- pattern: 诛戮弑.*词义轻重
  correct: 诛、戮、弑在感情色彩上不同，而非词义轻重
  description: 误以为这三个词的区别在于词义轻重
  severity: error
  source: cmmlu_ancient_chinese_119
- pattern: 诛戮弑.*使用条件
  correct: 诛、戮、弑在感情色彩上不同，而非使用条件
  description: 误以为这三个词的区别在于使用条件
  severity: error
  source: cmmlu_ancient_chinese_119
- pattern: 诛戮弑.*语法关系
  correct: 诛、戮、弑在感情色彩上不同，而非语法关系
  description: 误以为这三个词的区别在于语法关系
  severity: error
  source: cmmlu_ancient_chinese_119
- pattern: 各親其親，各子其子
  correct: “親”“子”在此为名词用作动词，意为“以……为亲”“以……为子”，并非状语
  description: 误将名词用作动词的结构当作状语
  severity: error
  source: cmmlu_ancient_chinese_120
- pattern: 经传释词.*注音字母
  correct: 《经传释词》按古声母顺序排列，不是按注音字母顺序
  description: 误以为《经传释词》按注音字母顺序排列
  severity: error
  source: cmmlu_ancient_chinese_121
- pattern: 辞源.*注音字母
  correct: 《辞源》按部首笔画顺序排列，不是按注音字母顺序
  description: 误以为《辞源》按注音字母顺序排列
  severity: error
  source: cmmlu_ancient_chinese_121
- pattern: 辞海.*注音字母
  correct: 《辞海》按部首笔画顺序排列，不是按注音字母顺序
  description: 误以为《辞海》按注音字母顺序排列
  severity: error
  source: cmmlu_ancient_chinese_121
- pattern: 何须焦尾始相知
  correct: 该句使用了比喻或借代，而非婉曲
  description: 误以为用典或比喻就是婉曲
  severity: error
  source: cmmlu_ancient_chinese_122
- pattern: 大夫不得造車馬
  correct: 该句使用了借代（以部分代整体），而非婉曲
  description: 误以为借代就是婉曲
  severity: error
  source: cmmlu_ancient_chinese_122
- pattern: 雷霆不作，風雨不興
  correct: 该句使用了互文或对偶，而非婉曲
  description: 误以为对偶或互文就是婉曲
  severity: error
  source: cmmlu_ancient_chinese_122
- pattern: 福祈.*声符相同
  correct: 福和祈的声符分别是畐和斤，不相同
  description: 误以为福和祈声符相同
