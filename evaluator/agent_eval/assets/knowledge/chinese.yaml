- pattern: 音色.*音位
  correct: 音位是从社会功能角度划分的抽象语音单位，不是从音色角度划分的最小语音单位
  description: 误以为音位是从音色角度划分的最小语音单位
  severity: error
  source: cmmlu_modern_chinese_99
- pattern: 耳得之而为声
  correct: 《前赤壁赋》中描写箫声的语句是'舞幽壑之潜蛟'
  description: 误以为'耳得之而为声'是描写箫声，实际该句是苏轼对声音的普遍描述
  severity: error
  source: cmmlu_modern_chinese_100
- pattern: 飘飘乎如遗世独立
