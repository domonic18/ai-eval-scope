- pattern: 看看情况再说吧
  correct: 在'看看情况再说吧'中，'再'表示条件，不重读
  description: 误以为所有'再'字句中的'再'都需要重读
  severity: error
  source: cmmlu_modern_chinese_104
- pattern: 下了班再去游泳
  correct: 在'下了班再去游泳'中，'再'表示时间顺序，不重读
  description: 误以为所有'再'字句中的'再'都需要重读
  severity: error
  source: cmmlu_modern_chinese_104
- pattern: 鱼生活在水里
