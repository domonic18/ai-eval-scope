- pattern: 访.*访问
  correct: 在古文中，“访”常指“征询、咨询”，而非现代汉语的“访问”
  description: 误将古文中“访”的“征询”义理解为现代汉语的“访问”
  severity: error
  source: cmmlu_ancient_chinese_132
- pattern: 词义.*缩小
  correct: 该句中'脚'指小腿，今义指足部，词义发生了转移而非缩小
  description: 误以为'脚'从古义小腿变为今义足部是词义缩小
