- pattern: 草慎武信.*会意字
  correct: 草、慎、武、信不全是会意字，其中草、慎、武是会意字，信是形声字
  description: 误以为信是会意字，实际上信是形声字（从人从言，言亦声）
  severity: error
  source: cmmlu_ancient_chinese_126
- pattern: 现责至秉.*会意字
  correct: 现、责、至、秉不全是会意字，其中现、责是形声字，至、秉是会意字
  description: 误以为现、责是会意字，实际上现和责是形声字
  severity: error
  source: cmmlu_ancient_chinese_126
- pattern: 从战天走.*会意字
  correct: 从、战、天、走不全是会意字，其中战是形声字，从、天、走是会意字
  description: 误以为战是会意字，实际上战是形声字（从戈单声）
  severity: error
  source: cmmlu_ancient_chinese_126
- pattern: 本无其字.*依声托事.*形声
  correct: 许慎的'本无其字，依声托事'是指假借，即借用同音字表示新义
  description: 误将假借的定义与形声混淆，形声是形符和声符组合造字
  severity: error
  source: cmmlu_ancient_chinese_127
- pattern: 本无其字.*依声托事.*转注
  correct: 许慎的'本无其字，依声托事'是指假借，转注是意义相近的字互相解释
  description: 误将假借的定义与转注混淆，转注重在意义关联
  severity: error
  source: cmmlu_ancient_chinese_127
- pattern: 本无其字.*依声托事.*会意
  correct: 许慎的'本无其字，依声托事'是指假借，会意是组合两个以上字形表示新义
  description: 误将假借的定义与会意混淆，会意是合体表意字
  severity: error
  source: cmmlu_ancient_chinese_127
- pattern: 視而可識，察而見意
  correct: 这是许慎对‘象形’的定义，而非‘转注’
  description: 误将象形的定义当作转注的定义
  severity: error
  source: cmmlu_ancient_chinese_130
- pattern: 比類合誼，以見指撝
  correct: 这是许慎对‘会意’的定义，而非‘转注’
  description: 误将会意的定义当作转注的定义
  severity: error
  source: cmmlu_ancient_chinese_130
- pattern: 本無其字，依聲記事
  correct: 这是许慎对‘假借’的定义，而非‘转注’
  description: 误将假借的定义当作转注的定义
  severity: error
  source: cmmlu_ancient_chinese_130
- pattern: 炎.*会意字
  correct: “炎”是会意字，“寒”是会意字，“贼”是形声字，“朱”是指事字，因此该组不全是会意字
  description: 误以为“炎、寒、贼、朱”都是会意字，实际上“贼”是形声字，“朱”是指事字
