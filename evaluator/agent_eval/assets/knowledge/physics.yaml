  description: 误将牛顿(N)当作基本单位
  severity: error
  source: cmmlu_high_school_physics_86
- pattern: kg.*V.*m/s
  correct: 国际单位制基本单位包括千克(kg)等，伏特(V)和米每秒(m/s)是导出单位
  description: 误将伏特(V)和米每秒(m/s)当作基本单位
  severity: error
  source: cmmlu_high_school_physics_86
- pattern: 上升.*动能.*势能.*2倍.*h.*2H/9
  correct: 上升至离地高度h处动能是势能2倍时，h=4H/9
  description: 误以为上升过程中动能与势能的比例关系对应的h为2H/9
  severity: error
  source: cmmlu_high_school_physics_87
- pattern: 上升.*动能.*势能.*2倍.*h.*H/9
  correct: 上升至离地高度h处动能是势能2倍时，h=4H/9
  description: 误以为上升过程中动能与势能的比例关系对应的h为H/9
  severity: error
  source: cmmlu_high_school_physics_87
- pattern: 上升.*动能.*势能.*2倍.*h.*3H/9
  correct: 上升至离地高度h处动能是势能2倍时，h=4H/9
  description: 误以为上升过程中动能与势能的比例关系对应的h为3H/9
  severity: error
  source: cmmlu_high_school_physics_87
- pattern: 力是产生运动和维持物体运动的原因
  correct: 力不是维持物体运动的原因，而是改变物体运动状态的原因
  description: 误以为力是维持物体运动所必需的，混淆了力与运动的关系
  severity: error
  source: cmmlu_high_school_physics_88
- pattern: 弹簧振子.*1.26.*加速
  correct: 经过1.26s（3.15个周期），振子从平衡位置向右运动，此时处于向右远离平衡位置的过程，速度减小，做减速运动
  description: 误以为经过多个周期后振子运动方向与初始方向相反或处于加速阶段
  severity: error
  source: cmmlu_high_school_physics_89
- pattern: 弹簧振子.*1.26.*向左
  correct: 经过1.26s（3.15个周期），振子仍处于向右运动阶段，并非向左运动
  description: 误以为经过多个周期后振子运动方向变为向左
  severity: error
  source: cmmlu_high_school_physics_89
- pattern: 很快获得速度
  correct: 低速挡启动是为了在发动机输出功率不太大的情况下获得较大的驱动力，而不是为了快速加速
  description: 误以为低速挡启动是为了让汽车快速获得速度
  severity: error
  source: cmmlu_high_school_physics_90
- pattern: 车速慢.*安全
  correct: 低速挡启动是为了获得较大的驱动力，而非单纯为了安全
  description: 误以为低速挡启动是为了车速慢更安全
  severity: error
  source: cmmlu_high_school_physics_90
- pattern: 操作规程.*不能违反
  correct: 低速挡启动是基于物理原理（功率与驱动力关系），而非仅因操作规程
  description: 误以为低速挡启动只是操作规程要求，缺乏物理原理理解
  severity: error
  source: cmmlu_high_school_physics_90
- pattern: 白气.*吸收热量
  correct: 液化过程放出热量，而不是吸收热量
  description: 误以为液化（白气形成）需要吸热
  severity: error
  source: cmmlu_high_school_physics_91
- pattern: 壶嘴.*白气.*水蒸气
  correct: 壶嘴冒出的白气是水蒸气液化形成的小水滴，不是水蒸气本身
  description: 误以为肉眼可见的白气就是水蒸气
  severity: error
  source: cmmlu_high_school_physics_91
- pattern: 冰棒.*白气.*升华.*水蒸气
  correct: 冰棒周围的白气是空气中的水蒸气遇冷液化形成的小水滴，不是升华形成的水蒸气
  description: 误以为冰棒周围的白气是冰升华形成的水蒸气
  severity: error
  source: cmmlu_high_school_physics_91
- pattern: 紫外线.*内层电子.*受激
  correct: 紫外线是原子的外层电子受激发产生的
  description: 误以为紫外线由内层电子跃迁产生
  severity: error
  source: cmmlu_high_school_physics_92
- pattern: X光.*原子核.*受激
  correct: X光是原子的内层电子受激发产生的
  description: 误以为X光由原子核受激发产生
  severity: error
  source: cmmlu_high_school_physics_92
- pattern: 9.0×10^4 kW
  correct: 功率P=Fv=1.2×10^7N×15m/s=1.8×10^8W=1.8×10^5kW
  description: 误将阻力数值或速度数值计算错误，得到9.0×10^4 kW
  severity: error
  source: cmmlu_high_school_physics_93
- pattern: 8.0×10^4 kW
  correct: 功率P=Fv=1.2×10^7N×15m/s=1.8×10^8W=1.8×10^5kW
  description: 误将阻力数值或速度数值计算错误，得到8.0×10^4 kW
  severity: error
  source: cmmlu_high_school_physics_93
- pattern: 8.0×10^3 kW
  correct: 功率P=Fv=1.2×10^7N×15m/s=1.8×10^8W=1.8×10^5kW
  description: 误将阻力数值或速度数值计算错误，得到8.0×10^3 kW
  severity: error
  source: cmmlu_high_school_physics_93
- pattern: 30.*40.*合.*0
  correct: 两个共点力夹角90°时，合力大小由勾股定理计算，为50N
  description: 误以为两个力大小相等方向相反时合力为0，但此处夹角90°且大小不等
  severity: error
  source: cmmlu_high_school_physics_94
- pattern: 30.*40.*合.*80
  correct: 两个共点力夹角90°时，合力大小由勾股定理计算，为50N，不是简单相加
  description: 误以为合力等于两个力大小的代数和，忽略了夹角影响
  severity: error
  source: cmmlu_high_school_physics_94
- pattern: 30.*40.*合.*110
  correct: 两个共点力夹角90°时，合力大小由勾股定理计算，为50N，不是简单相加
  description: 误以为合力等于两个力大小的代数和，忽略了夹角影响
  severity: error
  source: cmmlu_high_school_physics_94
- pattern: 体积很⼩.*质点
  correct: 物体能否看成质点取决于其尺寸对研究问题的影响，而非体积大小
  description: 误以为体积小的物体一定可以视为质点
  severity: error
  source: cmmlu_high_school_physics_95
- pattern: 质量很⼩.*质点
  correct: 物体能否看成质点取决于其尺寸对研究问题的影响，而非质量大小
  description: 误以为质量小的物体一定可以视为质点
  severity: error
  source: cmmlu_high_school_physics_95
- pattern: 低速.*质点|⾼速.*质点
  correct: 物体能否看成质点取决于其尺寸对研究问题的影响，与运动速度无关
  description: 误以为只有低速运动的物体才能视为质点
  severity: error
  source: cmmlu_high_school_physics_95
- pattern: 各自下落1m.*速度不同
  correct: 自由落体运动中，下落相同距离时速度相同，与质量无关
  description: 误以为质量大的物体下落相同距离后速度更大
  severity: error
  source: cmmlu_high_school_physics_96
- pattern: A加速度大于B加速度
  correct: 自由落体运动中，所有物体加速度均为重力加速度g，与质量无关
  description: 误以为质量大的物体自由落体加速度更大
  severity: error
  source: cmmlu_high_school_physics_96
- pattern: 同一时刻A速度大于B速度
  correct: 自由落体运动中，同时释放的物体在任意时刻速度相同，与质量无关
  description: 误以为质量大的物体自由落体速度更快
  severity: error
  source: cmmlu_high_school_physics_96
- pattern: 亚里士多德.*完全正确
  correct: 亚里士多德认为力决定速度的观点是错误的，力不是维持运动的原因，而是改变运动状态的原因
  description: 误认为亚里士多德的力与速度关系观点完全正确
  severity: error
  source: cmmlu_high_school_physics_97
- pattern: 力和质量.*决定速度
  correct: 力决定加速度而非速度，速度大小由加速度和初始条件共同决定
  description: 误认为力和质量直接决定物体速度大小
  severity: error
  source: cmmlu_high_school_physics_97
- pattern: 没有力物体不会运动
  correct: 没有力时物体可以保持匀速直线运动（牛顿第一定律）
  description: 误认为没有力物体就会停止运动
  severity: error
  source: cmmlu_high_school_physics_97
- pattern: 中央电视台新闻联播节目用时30分钟
  correct: 30分钟表示一段时间，是时间间隔，不是时刻
  description: 误将时间间隔（时长）当作时刻
  severity: error
  source: cmmlu_high_school_physics_98
- pattern: 2011年9月29日21时16分03秒.*发射
  correct: 2011年9月29日21时16分03秒是一个具体时刻，不是时间间隔
  description: 误将具体时刻当作时间间隔
  severity: error
  source: cmmlu_high_school_physics_98
- pattern: 2008年8月8日晚8时.*开始
  correct: 2008年8月8日晚8时是一个具体时刻，不是时间间隔
  description: 误将具体时刻当作时间间隔
  severity: error
  source: cmmlu_high_school_physics_98
- pattern: 子弹.*动能.*较大
  correct: 运动员的动能较大，因为动能与质量和速度平方成正比，运动员质量远大于子弹
  description: 误以为速度快的物体动能一定更大，忽略了质量的影响
  severity: error
  source: cmmlu_high_school_physics_99
- pattern: 二者.*动能.*一样
  correct: 运动员的动能较大，计算可得子弹动能约2450J，运动员动能约3000J
  description: 误以为两者动能相等，未进行实际计算
  severity: error
  source: cmmlu_high_school_physics_99
- pattern: 无法比较.*动能
  correct: 动能可以比较，根据公式Ek=1/2mv²计算即可
  description: 误以为不同单位或不同物体的动能无法比较
  severity: error
  source: cmmlu_high_school_physics_99
- pattern: 飞机机轮.*导电橡胶
  correct: 飞机机轮用导电橡胶制成是为了防止静电积累，属于静电防护而非静电应用
  description: 误将静电防护措施当作静电应用
  severity: error
  source: cmmlu_high_school_physics_100
- pattern: 织地毯.*不锈钢丝
  correct: 织地毯时夹一些不锈钢丝是为了导走静电，属于静电防护而非静电应用
  description: 误将静电防护措施当作静电应用
  severity: error
  source: cmmlu_high_school_physics_100
- pattern: 油罐车.*铁链
  correct: 油罐车拖一条铁链是为了导走静电，属于静电防护而非静电应用
  description: 误将静电防护措施当作静电应用
  severity: error
  source: cmmlu_high_school_physics_100
- pattern: F.*最⼤值.*导线.*与B平⾏
  correct: 当安培力最大时，通电导线一定与B垂直
  description: 误以为安培力最大时导线与磁场平行，实际上安培力最大时导线与磁场垂直
  severity: error
  source: cmmlu_high_school_physics_102
- pattern: B＝4T.*F⼀定为2N
  correct: 安培力大小还与导线与磁场的夹角有关，F=BILsinθ，B=4T时F不一定为2N
  description: 误以为给定B、I、L就能确定安培力，忽略了夹角的影响
  severity: error
  source: cmmlu_high_school_physics_102
- pattern: F＝0.*B.*⼀定为零
  correct: 安培力为零时，B不一定为零，可能是导线与磁场平行
  description: 误以为安培力为零则磁场必为零，忽略了导线与磁场平行的情况
  severity: error
  source: cmmlu_high_school_physics_102
- pattern: 跳在沙坑.*动量.*小
  correct: 跳在沙坑和水泥地上，人的动量变化相同，但沙坑延长了作用时间，从而减小了平均冲力
  description: 误以为沙坑能减小动量或动量变化
  severity: error
  source: cmmlu_high_school_physics_103
- pattern: 跳在沙坑.*冲量.*小
  correct: 跳在沙坑和水泥地上，人受到的冲量相同（等于动量变化），但沙坑延长了作用时间，从而减小了平均冲力
  description: 误以为沙坑能减小冲量
  severity: error
  source: cmmlu_high_school_physics_103
- pattern: 跳在沙坑.*动量变化.*小
  correct: 跳在沙坑和水泥地上，人的动量变化相同，但沙坑延长了作用时间，从而减小了平均冲力
  description: 误以为沙坑能减小动量变化
  severity: error
  source: cmmlu_high_school_physics_103
- pattern: 撑着钢柄雨伞
  correct: 金属物体易引雷，雷雨时不应使用金属柄雨伞
  description: 误以为钢柄雨伞可以防雷或无关紧要
  severity: error
  source: cmmlu_high_school_physics_104
- pattern: 躲在.*大树下
  correct: 大树易遭雷击，雷雨时不应躲在大树下
  description: 误以为大树能安全避雷
  severity: error
  source: cmmlu_high_school_physics_104
- pattern: 站在避雷针旁边
  correct: 避雷针引雷入地，站在其旁边有跨步电压危险
  description: 误以为避雷针附近绝对安全
  severity: error
  source: cmmlu_high_school_physics_104
- pattern: 受激辐射.*En增大
  correct: 受激辐射中原子从高能态跃迁到低能态，总能量En减小
  description: 误以为受激辐射使原子总能量增加
  severity: error
  source: cmmlu_high_school_physics_105
- pattern: 受激辐射.*Ep增大
  correct: 受激辐射中电子从高能级跃迁到低能级，电势能Ep减小
  description: 误以为受激辐射中电势能增加
  severity: error
  source: cmmlu_high_school_physics_105
- pattern: 受激辐射.*Ek减小
  correct: 受激辐射中电子从高能级跃迁到低能级，动能Ek增大
  description: 误以为受激辐射中电子动能减小
  severity: error
  source: cmmlu_high_school_physics_105
- pattern: 受激辐射.*En不变
  correct: 受激辐射中原子释放光子，总能量En减小
  description: 误以为受激辐射中原子总能量不变
  severity: error
  source: cmmlu_high_school_physics_105
- pattern: 停在机场的飞机
  correct: 乘客看到树木后退是以自己乘坐的飞机为参照系
  description: 误以为以静止的飞机为参照系时树木会后退
  severity: error
  source: cmmlu_high_school_physics_106
- pattern: 波速.*与.*频率成正⽐
  correct: 波速由介质决定，与波源频率无关
  description: 误以为波速与频率成正比
  severity: error
  source: cmmlu_high_school_physics_107
- pattern: 波速.*由介质和波源共同决定
  correct: 波速只由介质决定，与波源无关
  description: 误以为波源也影响波速
  severity: error
  source: cmmlu_high_school_physics_107
- pattern: 波速.*反映了质点振动的快慢
  correct: 波速反映振动在介质中传播的快慢，质点振动快慢由频率决定
  description: 混淆了波速与质点振动速度
  severity: error
  source: cmmlu_high_school_physics_107
- pattern: 35V.*电感器
  correct: 标有电容和电压参数的是电容器，不是电感器
  description: 误将电容器的参数标识（电压和电容值）当作电感器的标识
  severity: error
  source: cmmlu_high_school_physics_108
- pattern: 35V.*电阻器
  correct: 标有电容和电压参数的是电容器，不是电阻器
  description: 误将电容器的参数标识（电压和电容值）当作电阻器的标识
  severity: error
  source: cmmlu_high_school_physics_108
- pattern: 35V.*电源
  correct: 标有电容和电压参数的是电容器，不是电源
  description: 误将电容器的参数标识（电压和电容值）当作电源的标识
  severity: error
  source: cmmlu_high_school_physics_108
- pattern: 冲量.*向下.*m\(v1-v2\)
  correct: 地面对钢球的冲量方向向上，大小为m(v1+v2)
  description: 误以为冲量方向与弹回速度方向相同，或忽略了动量变化的方向性
  severity: error
  source: cmmlu_high_school_physics_109
- pattern: 冲量.*向下.*m\(v1\+v2\)
  correct: 地面对钢球的冲量方向向上，大小为m(v1+v2)
  description: 误以为冲量方向向下，且大小计算正确但方向错误
  severity: error
  source: cmmlu_high_school_physics_109
- pattern: 冲量.*向上.*m\(v1\+v2\)
  correct: 地面对钢球的冲量方向向上，大小为m(v1+v2)
  description: 误以为冲量大小为m(v1+v2)，但实际应为m(v1+v2)（注意v1和v2方向相反，动量变化为m(v1+v2)）
  severity: error
  source: cmmlu_high_school_physics_109
domain_facts:
  physical_quantities:
  - quantity: 长度
    symbol: L / s
    unit: 米 (m)
    common_units:
    - 千米(kkm)
    - 分米(dm)
    - 厘米(cm)
    - 毫米(mm)
    - 微米(μm)
    - 纳米(nm)
  - quantity: 质量
    symbol: m
    unit: 千克 (kg)
    common_units:
    - 克(g)
    - 毫克(mg)
    - 吨(t)
  - quantity: 时间
    symbol: t
    unit: 秒 (s)
    common_units:
    - 分(min)
    - 时(h)
    - 天(d)
  - quantity: 速度
    symbol: v
    unit: 米每秒 (m/s)
    common_units:
    - 千米每小时(km/h)
    conversion: 1 m/s = 3.6 km/h
  - quantity: 力
    symbol: F
    unit: 牛顿 (N)
  - quantity: 重力
    symbol: G
    unit: 牛顿 (N)
    formula: G = mg
  - quantity: 密度
    symbol: ρ
    unit: 千克每立方米 (kg/m³)
    common_units:
    - 克每立方厘米(g/cm³)
    conversion: 1 g/cm³ = 1000 kg/m³
  - quantity: 压强
    symbol: p
    unit: 帕斯卡 (Pa)
    formula: p = F/S
    common_units:
    - 千帕(kPa)
    - 标准大气压(atm)
  - quantity: 功
    symbol: W
    unit: 焦耳 (J)
    formula: W = Fs
  - quantity: 功率
    symbol: P
    unit: 瓦特 (W)
    formula: P = W/t
    common_units:
    - 千瓦(kW)
  - quantity: 电流
    symbol: I
    unit: 安培 (A)
    common_units:
    - 毫安(mA)
    - 微安(μA)
  - quantity: 电压
    symbol: U
    unit: 伏特 (V)
    common_units:
    - 千伏(kV)
    - 毫伏(mV)
  - quantity: 电阻
    symbol: R
    unit: 欧姆 (Ω)
    common_units:
    - 千欧(kΩ)
    - 兆欧(MΩ)
  - quantity: 温度
    symbol: t / T
    unit: 摄氏度 (°C) / 开尔文 (K)
    conversion: T = t + 273.15
  - quantity: 比热容
    symbol: c
    unit: 焦耳每千克摄氏度 (J/(kg·°C))
  - quantity: 热量
    symbol: Q
    unit: 焦耳 (J)
  - quantity: 能量
    symbol: E
    unit: 焦耳 (J)
  - quantity: 频率
    symbol: f
    unit: 赫兹 (Hz)
    common_units:
    - 千赫(kHz)
    - 兆赫(MHz)
  newtons_laws:
  - law: 牛顿第一定律（惯性定律）
    statement: 一切物体在没有受到力的作用时，总保持静止状态或匀速直线运动状态
    key_points:
    - 力不是维持运动的原因，而是改变运动状态的原因
    - 惯性是物体的固有属性，只与质量有关
    - 不受力的物体不存在，该定律是理想化推理的结论
    common_misconceptions:
    - 物体不受力就一定静止
    - 力是维持运动的原因
    - 惯性是一种力
  - law: 牛顿第二定律
    statement: 物体的加速度与所受合力成正比，与物体质量成反比
    formula: F = ma
    key_points:
    - 加速度方向与合力方向相同
    - 力是产生加速度的原因
    - 质量越大，相同力产生的加速度越小
    common_misconceptions:
    - 大物体受力大
    - 速度大的物体受力大
  - law: 牛顿第三定律（作用力与反作用力）
    statement: 两个物体之间的作用力和反作用力总是大小相等、方向相反、作用在同一直线上
    key_points:
    - 作用力和反作用力分别作用在两个物体上
    - 它们同时产生、同时消失、同时变化
    - 与二力平衡不同（二力平衡作用在同一物体上）
    common_misconceptions:
    - 作用力和反作用力可以抵消
    - 主动力大于被动力
  physics_formulas:
    mechanics:
    - name: 重力
      formula: G = mg
      description: g ≈ 9.8 N/kg
    - name: 密度
      formula: ρ = m/V
      description: m为质量，V为体积
    - name: 压强
      formula: p = F/S
      description: F为压力，S为受力面积
    - name: 液体压强
      formula: p = ρgh
      description: ρ为液体密度，h为深度
    - name: 浮力（阿基米德原理）
      formula: F_浮 = ρ_液 g V_排
      description: 排开液体所受的重力
    - name: 功
      formula: W = Fs
      description: F为力，s为在力的方向上移动的距离
    - name: 功率
      formula: P = W/t
      description: 做功快慢的物理量
    - name: 动能
      formula: E_k = ½mv²
      description: 与质量和速度有关
    - name: 势能（重力势能）
      formula: E_p = mgh
      description: 与质量和高度有关
    - name: 杠杆平衡条件
      formula: F₁L₁ = F₂L₂
      description: 动力×动力臂 = 阻力×阻力臂
    electricity:
    - name: 欧姆定律
      formula: I = U/R
      description: 电流等于电压除以电阻
    - name: 电功
      formula: W = UIt
      description: U电压、I电流、t时间
    - name: 电功率
      formula: P = UI
      description: 电功率等于电压乘以电流
    - name: 电功率（推导）
      formula: P = I²R = U²/R
      description: 由欧姆定律推导
    - name: 焦耳定律
      formula: Q = I²Rt
      description: 电流产生的热量
    thermal:
    - name: 吸热公式
      formula: Q_吸 = cm(t-t₀)
      description: c为比热容，m为质量
    - name: 放热公式
      formula: Q_放 = cm(t₀-t)
      description: 物体降温放热
    - name: 热平衡
      formula: Q_吸 = Q_放
      description: 无热损失时吸热等于放热
    - name: 热值（燃料放热）
      formula: Q = qm
      description: q 为热值(J/kg)，m 为燃料质量，完全燃烧放热
    - name: 热机效率
      formula: η = W_有/Q_总
      description: 有用功占燃料完全燃烧所释放能量的比例
    optics:
    - name: 光速
      formula: c = 3×10⁸ m/s
      description: 真空中的光速
    - name: 反射定律
      formula: 反射角 = 入射角
      description: 三线共面、法线居中、两角相等
    - name: 折射定律
      formula: n = sin i / sin r
      description: 入射角正弦与折射角正弦之比为定值（折射率）
    - name: 折射率与光速
      formula: n = c / v
      description: 真空光速 c 与介质中光速 v 之比，n≥1
    waves:
    - name: 波速公式
      formula: v = fλ
      description: 波速=频率×波长
    - name: 声速（空气）
      formula: v ≈ 340 m/s
      description: 15°C空气中
    - name: 周期与频率
      formula: T = 1/f
      description: 周期是频率的倒数（单位：秒）
  optical_imaging:
    - object: 凸透镜
      condition: u > 2f
      image: 倒立、缩小、实像
      position: f < v < 2f（异侧）
      application: 照相机、摄像头
    - object: 凸透镜
      condition: u = 2f
      image: 倒立、等大、实像
      position: v = 2f（异侧）
      application: 测焦距
    - object: 凸透镜
      condition: f < u < 2f
      image: 倒立、放大、实像
      position: v > 2f（异侧）
      application: 投影仪、幻灯机
    - object: 凸透镜
      condition: u = f
      image: 不成像（折射光线平行射出）
      position: 无
      application: 探照灯（平行光源）
    - object: 凸透镜
      condition: u < f
      image: 正立、放大、虚像
      position: v > u（同侧）
      application: 放大镜
    - object: 凹透镜
      condition: 任意物距
      image: 正立、缩小、虚像
      position: 同侧
      application: 近视眼镜
    - object: 平面镜
      condition: —
      image: 正立、等大、虚像
      position: 像距=物距（镜后）
      application: 梳妆镜、潜望镜
    - object: 凸面镜
      condition: —
      image: 正立、缩小、虚像
      position: 镜后
      application: 汽车后视镜（扩大视野）
    - object: 凹面镜
      condition: —
      image: —（对光线有会聚作用）
      position: —
      application: 太阳灶、手电筒反光碗、医生头灯
  states_of_matter:
    - process: 熔化
      transition: 固态→液态
      heat: 吸热
      condition: 晶体达到熔点且继续吸热
      example: 冰熔化成水（熔点 0℃）
    - process: 凝固
      transition: 液态→固态
      heat: 放热
      condition: 晶体达到凝固点且继续放热
      example: 水结成冰（凝固点 0℃）
    - process: 汽化
      transition: 液态→气态
      heat: 吸热
      forms: 蒸发（任意温度，表面）与沸腾（沸点，表面+内部）
      example: 水沸腾（标准大气压沸点 100℃）
    - process: 液化
      transition: 气态→液态
      heat: 放热
      methods: 降温或压缩体积
      example: 露水、水蒸气遇冷形成的"白气"
    - process: 升华
      transition: 固态→气态
      heat: 吸热
      example: 干冰升华、樟脑丸变小
    - process: 凝华
      transition: 气态→固态
      heat: 放热
      example: 霜、雪的形成、白炽灯泡壁发黑
  magnetism:
    - phenomenon: 奥斯特实验
      fact: 通电导线周围存在磁场（电流的磁效应）
      significance: 首次揭示电与磁的联系
    - phenomenon: 安培定则（右手螺旋定则）
      fact: 右手握住螺线管，四指弯曲方向与电流方向一致，大拇指所指为 N 极
      application: 判断通电螺线管的极性
    - phenomenon: 电磁感应（法拉第发现）
      fact: 闭合电路的一部分导体在磁场中做切割磁感线运动时，产生感应电流
      application: 发电机（机械能→电能）
    - phenomenon: 磁场对电流的作用
      fact: 通电导体在磁场中受到力的作用
      application: 电动机（电能→机械能）
    - phenomenon: 磁极相互作用
      fact: 同名磁极相互排斥，异名磁极相互吸引
    - phenomenon: 地磁场
      fact: 地球周围存在磁场；地磁北极在地理南极附近（存在磁偏角）
