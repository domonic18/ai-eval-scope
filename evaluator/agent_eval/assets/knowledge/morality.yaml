  severity: error
  source: cmmlu_high_school_politics_100
- pattern: 劳动者对提高自身素质的要求
  correct: 人才涌现的根本经济原因是市场对资源的优化配置，而非劳动者自身素质要求
  description: 误以为劳动者提高自身素质的要求是人才涌现的根本经济原因
  severity: error
  source: cmmlu_high_school_politics_100
- pattern: 对外开放引进了大量人才
  correct: 人才涌现的根本经济原因是市场对资源的优化配置，而非对外开放引进人才
  description: 误以为对外开放引进人才是人才涌现的根本经济原因
  severity: error
  source: cmmlu_high_school_politics_100
- pattern: 补偿贸易.*租赁贸易.*加工贸易
  correct: 商品结构复杂化主要指制成品贸易扩大、初级产品贸易减少，而非贸易形式多样化
  description: 误将贸易形式多样化当作商品结构复杂化的表现
  severity: error
  source: cmmlu_high_school_politics_101
- pattern: 同一商品.*不同国家.*生产
  correct: 商品结构复杂化主要指制成品贸易扩大、初级产品贸易减少，而非生产国际化
  description: 误将生产国际化（全球价值链分工）当作商品结构复杂化的表现
  severity: error
  source: cmmlu_high_school_politics_101
- pattern: 商品技术含量.*提高.*附加值.*增加
  correct: 商品结构复杂化主要指制成品贸易扩大、初级产品贸易减少，而非商品技术含量和附加值变化
  description: 误将商品技术含量和附加值提升当作商品结构复杂化的表现
  severity: error
  source: cmmlu_high_school_politics_101
- pattern: 非公有制经济.*设备先进.*规模大
  correct: 非公有制经济形式多样，包括个体经济、私营经济等，不一定都具有设备先进、规模大的特点
  description: 误以为所有非公有制经济都设备先进、规模大
  severity: error
  source: cmmlu_high_school_politics_102
- pattern: 非公有制经济.*关键作用.*国际地位
  correct: 非公有制经济对提高我国国际地位不起关键作用，关键作用主要依靠公有制经济等
  description: 误以为非公有制经济对提高国际地位具有关键作用
  severity: error
  source: cmmlu_high_school_politics_102
- pattern: 非公有制经济.*雇用劳动
  correct: 非公有制经济中的个体经济以劳动者个人劳动为基础，不以雇用劳动为基础
  description: 误以为所有非公有制经济都以雇用劳动为基础
  severity: error
  source: cmmlu_high_school_politics_102
- pattern: 我国粮食生产主要依靠国际市场供给
  correct: 我国粮食生产主要依靠国内自给，食用油原料部分依赖进口
  description: 误以为我国粮食生产主要依赖国际市场
  severity: error
  source: cmmlu_high_school_politics_103
- pattern: 食用油价格上涨主要由供给量决定
  correct: 食用油价格上涨受多种因素影响，包括国际市场价格、进口成本、供需关系等
  description: 误以为供给量是食用油价格上涨的唯一或主要决定因素
  severity: error
  source: cmmlu_high_school_politics_103
- pattern: 人才资源匮乏.*人才流失
  correct: 人才资源是第一资源，人才问题被提升为国家战略是因为人才在综合国力竞争中的核心地位
  description: 误以为人才问题被提升为国家战略仅因为人才匮乏和流失
  severity: error
  source: cmmlu_high_school_politics_104
- pattern: 人才资源.*配置.*宏观调控
  correct: 人才资源的配置主要依靠市场机制，国家宏观调控是辅助手段
  description: 误以为人才资源配置以国家宏观调控为基础
  severity: error
  source: cmmlu_high_school_politics_104
- pattern: 按生产要素分配.*缩小收入差距
  correct: 按生产要素分配可能扩大收入差距，而非缩小
  description: 误以为按生产要素分配能缩小收入差距
  severity: error
  source: cmmlu_high_school_politics_105
- pattern: 科技人员.*收入.*取决于.*使用价值
  correct: 科技人员的收入主要取决于其劳动创造的价值及市场供求，而非科技成果的使用价值
  description: 误以为科技人员收入由科技成果的使用价值决定
  severity: error
  source: cmmlu_high_school_politics_105
- pattern: 混合所有制.*主要实现形式
  correct: 混合所有制经济是基本经济制度的重要实现形式，但并非各种所有制的主要实现形式
  description: 误以为混合所有制经济将成为各种所有制的主要实现形式
  severity: error
  source: cmmlu_high_school_politics_106
- pattern: 混合所有制.*国民经济的主导
  correct: 国有经济是国民经济的主导，混合所有制经济不一定是主导
  description: 误以为混合所有制经济将成为国民经济的主导
  severity: error
  source: cmmlu_high_school_politics_106
- pattern: 国际商品价值.*社会劳动生产率.*成正比
  correct: 商品价值量与社会劳动生产率成反比，而非正比
  description: 误以为社会劳动生产率越高，商品价值量越大
  severity: error
  source: cmmlu_high_school_politics_107
- pattern: 世界市场价格.*国际商品价值决定
  correct: 世界市场价格由国际商品价值决定，但还受供求关系、竞争等因素影响
  description: 误以为世界市场价格仅由国际商品价值决定，忽略了其他影响因素
  severity: warning
  source: cmmlu_high_school_politics_107
- pattern: 商品重要.*价格高低.*主要原因
  correct: 商品价格高低主要由其价值决定，而非重要程度
  description: 误以为商品的重要性是决定价格高低的主要原因
  severity: error
  source: cmmlu_high_school_politics_107
- pattern: 增加经济建设支出.*货币政策
  correct: 增加经济建设支出属于财政政策，而非货币政策
  description: 误将财政政策手段当作货币政策
  severity: error
  source: cmmlu_high_school_politics_108
- pattern: 征收个人存款利息所得税.*货币政策
  correct: 征收个人存款利息所得税属于财政政策，而非货币政策
  description: 误将税收政策手段当作货币政策
  severity: error
  source: cmmlu_high_school_politics_108
- pattern: 保持较低的存贷款利率水平.*稳健
  correct: 稳健的货币政策下，存贷款利率水平应保持适度，不一定较低
  description: 误以为稳健的货币政策等同于低利率
  severity: warning
  source: cmmlu_high_school_politics_108
- pattern: 信用卡.*流行.*支付
  correct: 信用卡的流行程度与信用风险问题无直接因果关系
  description: 误以为信用卡流行就能说明信用风险问题
  severity: warning
  source: cmmlu_high_school_politics_109
- pattern: 电子货币.*弊大于利
  correct: 电子货币的利弊需要全面分析，不能简单断言弊大于利
  description: 片面认为电子货币弊大于利，忽视其便利性和经济作用
  severity: error
  source: cmmlu_high_school_politics_109
- pattern: 信用卡.*信用凭证
  correct: 信用卡是银行发行的信用凭证，但题目强调的是坏账风险而非凭证性质
  description: 混淆信用卡的凭证功能与信用风险问题
  severity: warning
  source: cmmlu_high_school_politics_109
- pattern: 联合国的创始国.*安理会常任理事国
  correct: 中国是联合国创始国和安理会常任理事国，但这并非中国给世界带来机遇和贡献的直接原因
  description: 误以为联合国创始国和常任理事国身份是中国贡献世界的直接原因
  severity: error
  source: cmmlu_high_school_politics_110
- pattern: 独立自主.*外交政策的基本立场
  correct: 独立自主是我国外交政策的基本立场，但这不是中国给世界带来机遇和贡献的直接原因
  description: 误以为独立自主的外交基本立场是中国贡献世界的直接原因
  severity: error
  source: cmmlu_high_school_politics_110
- pattern: 扩大劳务输出.*减少国际收支顺差
  correct: 扩大劳务输出会增加外汇收入，从而扩大国际收支顺差
  description: 误以为扩大劳务输出能减少顺差，实际上劳务输出增加外汇收入，会扩大顺差
  severity: error
  source: cmmlu_high_school_politics_111
- pattern: 鼓励居民海外旅游购物.*不利于国际收支平衡
  correct: 鼓励居民海外旅游购物会增加外汇支出，有利于减少顺差，促进国际收支平衡
  description: 误以为海外旅游购物会破坏平衡，实际上它有助于减少顺差，促进平衡
  severity: error
  source: cmmlu_high_school_politics_111
- pattern: 降低进口关税.*不利于国际收支平衡
  correct: 降低进口关税会促进进口，增加外汇支出，有利于减少顺差，促进国际收支平衡
  description: 误以为降低进口关税会破坏平衡，实际上它有助于减少顺差，促进平衡
  severity: error
  source: cmmlu_high_school_politics_111
- pattern: 公有制.*各个地方.*优势
  correct: 公有资产在社会总资产中占优势，国有经济控制国民经济命脉，但不同地方和行业可以有所差别
  description: 误以为公有制必须在每个地方都保持量和质的优势
  severity: error
  source: cmmlu_high_school_politics_112
- pattern: 公有制.*各个行业.*支配地位
  correct: 公有资产在社会总资产中占优势，国有经济控制国民经济命脉，但不同行业可以有所差别
  description: 误以为公有制必须在各个行业都占支配地位
  severity: error
  source: cmmlu_high_school_politics_112
- pattern: 混合所有制.*公有制.*50%以上
  correct: 公有资产在社会总资产中占优势，国有经济控制国民经济命脉，混合所有制经济中公有制成分不要求必须超过50%
  description: 误以为混合所有制经济中公有制成分必须保持在50%以上
  severity: error
  source: cmmlu_high_school_politics_112
- pattern: 增强集体经济.*主导地位
  correct: 集体经济是公有制经济的重要组成部分，但主导地位属于国有经济
  description: 误以为集体经济在公有制经济中占主导地位
  severity: error
  source: cmmlu_high_school_politics_113
- pattern: 集体经济.*公有制经济.*重要组成部分
  correct: 该表述本身正确，但题目中土地流转的做法并不直接说明这一关系
  description: 误将正确但无关的表述当作题目做法的直接体现
  severity: warning
  source: cmmlu_high_school_politics_113
- pattern: 克服个体经济.*力量单薄
  correct: 土地流转主要涉及集体经济，与个体经济无直接关联
  description: 误以为土地流转能解决个体经济的问题
  severity: error
  source: cmmlu_high_school_politics_113
- pattern: 国有经济.*国民经济主体
  correct: 公有制经济是国民经济的主体，国有经济是主导力量
  description: 误以为国有经济是国民经济的主体，混淆了国有经济与公有制经济的关系
  severity: error
  source: cmmlu_high_school_politics_114
- pattern: 国有经济.*广泛吸收社会分散资金
  correct: 广泛吸收社会分散资金、缓解就业压力、增加公共积累是集体经济或非公有制经济的作用
  description: 误将集体经济或非公有制经济的功能归为国有经济
  severity: error
  source: cmmlu_high_school_politics_114
- pattern: 公有制的最好实现形式
  correct: 股份制是公有制的主要实现形式，但不是唯一或绝对最好的实现形式
  description: 误以为股份制是公有制唯一或绝对最好的实现形式
  severity: error
  source: cmmlu_high_school_politics_115
- pattern: 具有明显的私有性质
  correct: 股份制本身是中性的，其性质取决于控股权归属，公有制控股时具有公有性质
  description: 误以为股份制必然具有私有性质
  severity: error
  source: cmmlu_high_school_politics_115
- pattern: 具有明显的公有制性质
  correct: 股份制本身是中性的，其性质取决于控股权归属，并非所有股份制都具有公有制性质
  description: 误以为股份制必然具有公有制性质
  severity: error
  source: cmmlu_high_school_politics_115
- pattern: 每个时代.*相同内涵
  correct: 思想道德建设的内涵随时代发展而变化，并非在每个时代都具有相同内涵
  description: 误以为思想道德建设的内涵是固定不变的
  severity: error
  source: cmmlu_high_school_politics_116
- pattern: 世界市场.*一体化
  correct: 世界市场一体化强调各国经济相互融合，而题目反映的是竞争和贸易摩擦
  description: 误将贸易摩擦和竞争加剧等同于市场一体化趋势
  severity: error
  source: cmmlu_high_school_politics_117
- pattern: 经济全球化.*发展
  correct: 经济全球化强调各国经济相互依赖，而题目反映的是竞争和贸易摩擦
  description: 误将贸易摩擦和竞争加剧等同于经济全球化发展
  severity: error
  source: cmmlu_high_school_politics_117
- pattern: 国家间.*经济联系.*紧密
  correct: 国家间经济联系紧密强调相互依存，而题目反映的是竞争和贸易摩擦
  description: 误将贸易摩擦和竞争加剧等同于国家间经济联系日益紧密
  severity: error
  source: cmmlu_high_school_politics_117
- pattern: 市场竞争激烈化
  correct: 当代世界市场呈现区域集团化趋势加强，而非单纯的市场竞争激烈化
  description: 误将区域经济合作加强理解为市场竞争激烈化
  severity: error
  source: cmmlu_high_school_politics_118
- pattern: 国际贸易方式多样化
  correct: 当代世界市场呈现区域集团化趋势加强，而非国际贸易方式多样化
  description: 误将区域经济合作加强理解为国际贸易方式多样化
  severity: error
  source: cmmlu_high_school_politics_118
- pattern: 加强宏观调控.*根本目标
  correct: 社会主义市场经济的根本目标是实现共同富裕，而非加强宏观调控
  description: 误以为加强宏观调控是社会主义市场经济的根本目标
  severity: error
  source: cmmlu_high_school_politics_119
- pattern: 加强宏观调控.*弥补.*缺陷
  correct: 宏观调控可以弥补市场调节的不足，但不能完全消除其缺陷和不足
  description: 误以为加强宏观调控就能完全弥补市场调节的缺陷和不足
  severity: error
  source: cmmlu_high_school_politics_119
- pattern: 倾销.*消费者受益
  correct: 倾销虽然短期价格低，但长期会破坏市场秩序，损害消费者利益
  description: 误以为倾销使消费者受益
  severity: error
  source: cmmlu_high_school_politics_120
- pattern: 反倾销.*不符合.*平等互利
  correct: 反倾销是维护公平贸易的合法手段，符合平等互利原则
  description: 误以为反倾销违背平等互利原则
  severity: error
  source: cmmlu_high_school_politics_120
- pattern: 以.*走出去.*为主.*引进来.*为辅
  correct: 我国坚持‘引进来’和‘走出去’相结合的战略，两者并重，而非以‘走出去’为主、‘引进来’为辅
  description: 误以为我国外贸战略应以‘走出去’为主、‘引进来’为辅
  severity: error
  source: cmmlu_high_school_politics_121
- pattern: 不需要保持公有制的优势地位
  correct: 我国必须坚持公有制的主体地位，这是社会主义基本经济制度的基础
  description: 误以为民营经济发展壮大后就不需要保持公有制优势地位
  severity: error
  source: cmmlu_high_school_politics_122
- pattern: 民营经济更加适应我国的国情
  correct: 公有制为主体、多种所有制经济共同发展，两者都适应我国国情
  description: 误以为民营经济比公有制更适应我国国情，忽视了公有制的主体地位
  severity: error
  source: cmmlu_high_school_politics_122
- pattern: 重在保护个人的私有财产
  correct: 物权法平等保护国家、集体、私人的物权，并非重在保护个人私有财产
  description: 误以为物权法主要保护个人私有财产，忽略了平等保护原则
  severity: error
  source: cmmlu_high_school_politics_123
- pattern: 重在提高股份制经济在公有制经济中的比重
  correct: 物权法不直接涉及提高股份制经济在公有制经济中的比重
  description: 误以为物权法的主要目的是调整公有制经济内部结构
  severity: error
  source: cmmlu_high_school_politics_123
- pattern: 有利于促进公有制经济和非公有制经济的共同发展
  correct: 物权法平等保护各类物权，有利于促进公有制经济和非公有制经济的共同发展
  description: 误以为物权法只促进非公有制经济或只促进公有制经济
  severity: warning
  source: cmmlu_high_school_politics_123
- pattern: 创新的本质是科技进步
  correct: 创新的本质是突破，即突破旧的思维定势、旧的常规戒律，科技进步只是创新的一种表现或结果
  description: 误以为创新的本质等同于科技进步，忽略了创新更广泛的含义
  severity: error
  source: cmmlu_high_school_politics_124
- pattern: 树立创新意识是变化发展原理的要求
  correct: 树立创新意识是辩证否定观和革命批判精神的要求，而非变化发展原理的直接要求
  description: 混淆了创新意识的哲学依据，错误地将变化发展原理作为树立创新意识的直接要求
  severity: error
  source: cmmlu_high_school_politics_124
- pattern: 创新的依据是矛盾客观性原理
  correct: 创新的哲学依据是辩证否定观和革命批判精神，而非矛盾客观性原理
  description: 误以为创新的依据是矛盾客观性原理，实际应基于辩证否定观
  severity: error
  source: cmmlu_high_school_politics_124
- pattern: 各种所有制经济.*地位.*平等
  correct: 在国民经济中，公有制经济占主体地位，非公有制经济是重要组成部分，二者地位不平等
  description: 误以为各种所有制经济在国民经济中的地位完全平等
  severity: error
  source: cmmlu_high_school_politics_125
- pattern: 取消非公有制经济.*限制
  correct: 我国鼓励、支持和引导非公有制经济发展，但并非取消所有限制
  description: 误以为我国将完全取消对非公有制经济的限制
  severity: error
  source: cmmlu_high_school_politics_125
- pattern: 非公有制企业.*一切财产.*受法律保护
  correct: 法律只保护非公有制企业的合法财产，非法财产不受保护
  description: 误以为非公有制企业的所有财产（包括非法所得）都受法律保护
  severity: error
  source: cmmlu_high_school_politics_126
- pattern: 家庭成员劳动.*基础
  correct: 个体经济以家庭成员劳动为基础，私营经济以雇佣劳动为基础
  description: 误以为个体经济和私营经济都以家庭成员劳动为基础
  severity: error
  source: cmmlu_high_school_politics_127
- pattern: 所有者个人劳动.*为主
  correct: 个体经济以所有者个人劳动为主，私营经济以雇佣劳动为主
  description: 误以为个体经济和私营经济都以所有者个人劳动为主
  severity: error
  source: cmmlu_high_school_politics_127
- pattern: 雇佣劳动.*为主
  correct: 私营经济以雇佣劳动为主，个体经济不以雇佣劳动为主
  description: 误以为个体经济和私营经济都以雇佣劳动为主
  severity: error
  source: cmmlu_high_school_politics_127
- pattern: 社会劳动生产率提高.*价格下降
  correct: 社会劳动生产率提高20%后，价值量变为原来的1/1.2，即1596/1.2=1330元
  description: 误以为社会劳动生产率提高后商品价值量直接乘以(1+提高比例)，实际应除以(1+提高比例)
  severity: error
  source: cmmlu_high_school_politics_128
- pattern: 人民币对美元升值.*美元标价减少
  correct: 人民币对美元升值5%后，1美元=6.7/1.05≈6.381元，美元标价=人民币价格/新汇率
  description: 误以为人民币升值后美元标价直接乘以(1-升值比例)，实际应除以(1+升值比例)
  severity: error
  source: cmmlu_high_school_politics_128
- pattern: 社会主义.*宏观调控
  correct: 宏观调控是手段，但材料主旨是共同富裕目标
  description: 误以为材料强调宏观调控能力，而非共同富裕目标
  severity: error
  source: cmmlu_high_school_politics_129
- pattern: 公有制.*基本标志
  correct: 公有制为主体是社会主义市场经济的基本标志，但材料未体现此内容
  description: 误以为材料在说明公有制主体地位，而非共同富裕目标
  severity: error
  source: cmmlu_high_school_politics_129
- pattern: 控制收入差距.*长期艰巨
  correct: 控制收入差距是长期任务，但材料主旨是共同富裕目标
  description: 误以为材料强调任务艰巨性，而非共同富裕目标
  severity: error
  source: cmmlu_high_school_politics_129
- pattern: 灌输各种思想和价值观
  correct: 公益活动旨在引导和弘扬正确的价值观，而非灌输各种思想和价值观
  description: 误以为公益活动是灌输各种思想和价值观，忽视了其引导和弘扬正确价值观的作用
  severity: error
  source: cmmlu_high_school_politics_130
- pattern: 提高科学文化修养
  correct: 该活动主要提升思想道德修养，而非科学文化修养
  description: 误以为公益活动主要提高科学文化修养，混淆了思想道德修养与科学文化修养
  severity: error
  source: cmmlu_high_school_politics_130
- pattern: 对文化市场加强管理、正确引导
  correct: 该活动属于思想道德建设范畴，而非对文化市场的管理引导
  description: 误以为公益活动是对文化市场的管理引导，混淆了思想道德建设与文化市场监管
  severity: error
  source: cmmlu_high_school_politics_130
- pattern: 跨国公司.*取代.*进出口贸易
  correct: 跨国公司并未取代各国或地区之间的进出口贸易，而是与贸易并存并相互促进
  description: 误以为跨国公司完全替代了传统的进出口贸易
  severity: error
  source: cmmlu_high_school_politics_131
- pattern: 跨国公司.*根本原因.*经济全球化
  correct: 跨国公司是经济全球化的重要推动力量，但并非根本原因，根本原因是生产力发展和科技进步
  description: 误将跨国公司视为经济全球化的根本原因
  severity: error
  source: cmmlu_high_school_politics_131
- pattern: 引进外资.*提高自主创新能力
  correct: 引进外资主要带来资金、技术和管理经验，但自主创新能力更多依赖国内研发投入和人才培养
  description: 误以为引进外资能直接提高自主创新能力
  severity: error
  source: cmmlu_high_school_politics_132
- pattern: 重视传统文化的继承
  correct: 仅继承而不创新会导致传统文化失去活力，需要创新以适应时代发展
  description: 误以为只要继承传统文化就能解决其生存危机，忽视了创新的必要性
  severity: error
  source: cmmlu_high_school_politics_133
- pattern: 重视传统文化的传播
  correct: 传播不能解决内容单调沉闷的问题，需要创新内容和形式
  description: 误以为加强传播就能吸引观众，忽视了内容创新才是根本
  severity: error
  source: cmmlu_high_school_politics_133
- pattern: 加大对传统文化的投入
  correct: 单纯增加投入无法解决内容吸引力不足的问题，需要创新
  description: 误以为资金投入是解决民间艺术困境的关键，忽视了创新才是核心
  severity: error
  source: cmmlu_high_school_politics_133
- pattern: 按劳动成果分配
  correct: 技术入股、股权奖励、分红属于按生产要素分配，而非按劳动成果分配
  description: 误将技术入股等激励方式归为按劳动成果分配
  severity: error
  source: cmmlu_high_school_politics_134
- pattern: 按技术要素分配
  correct: 技术入股、股权奖励、分红属于按生产要素分配，技术要素只是生产要素的一种，此处分配方式涵盖更广的生产要素
  description: 误以为技术入股等仅属于按技术要素分配，忽略了其他生产要素的参与
  severity: error
  source: cmmlu_high_school_politics_134
- pattern: 按劳分配所得和非按劳分配所得
  correct: 技术入股、股权奖励、分红属于按生产要素分配，而非按劳分配所得和非按劳分配所得的混合
  description: 误将技术入股等激励方式理解为按劳分配与非按劳分配的混合
  severity: error
  source: cmmlu_high_school_politics_134
- pattern: 方便了公民直接管理国家事务
  correct: 公民通过网站表达意愿是参与政治生活，但并非直接管理国家事务
  description: 误以为网络参与等同于直接管理国家事务
  severity: error
  source: cmmlu_high_school_politics_135
- pattern: 扩大了公民的政治权利
  correct: 网站开通拓宽了参与渠道，但并未扩大公民的法定政治权利
  description: 误以为拓宽参与渠道会扩大公民的政治权利
  severity: error
  source: cmmlu_high_school_politics_135
- pattern: 走出去.*基本立足点
  correct: 发展经济的基本立足点是扩大内需，而非‘走出去’
  description: 误以为‘走出去’是对外开放中发展经济的基本立足点
  severity: error
  source: cmmlu_high_school_politics_136
- pattern: 加快外贸发展.*速度.*扩大.*规模
  correct: 广东省更重视提高外贸质量和效益、优化结构，而非单纯追求速度和规模
  description: 误以为对外开放重点是加快外贸发展速度和扩大规模
  severity: error
  source: cmmlu_high_school_politics_136
- pattern: 创新利用外资形式.*提高利用外资质量
  correct: 题目强调优化外贸结构、提高质量和效益，而非侧重利用外资
  description: 误以为题目重点在于创新利用外资形式和提高利用外资质量
  severity: warning
  source: cmmlu_high_school_politics_136
- pattern: 资本主义生产方式占统治地位
  correct: 社会生产力和国际分工的发展是世界市场形成的根本原因
  description: 误将资本主义生产方式占统治地位当作世界市场形成的根本原因
  severity: error
  source: cmmlu_high_school_politics_137
- pattern: 第三次技术革命
  correct: 第三次技术革命是推动世界市场发展的因素，但不是根本原因
  description: 误将第三次技术革命当作世界市场形成的根本原因
  severity: error
  source: cmmlu_high_school_politics_137
- pattern: 资本.*技术密集型企业.*提高劳动报酬
  correct: 资本和技术密集型企业会降低劳动报酬在初次分配中的比重，因为资本和技术要素占比更高
  description: 误以为发展资本、技术密集型企业能提高劳动报酬比重
  severity: error
  source: cmmlu_high_school_politics_138
- pattern: 劳动密集型企业.*补贴.*提高劳动报酬
  correct: 对劳动密集型企业给予保护和补贴不一定能提高劳动报酬在初次分配中的比重，可能只是维持就业
  description: 误以为保护和补贴所有劳动密集型企业就能直接提高劳动报酬比重
  severity: error
  source: cmmlu_high_school_politics_138
- pattern: 扩大政府公共服务职能
  correct: 政府信息公开主要增强透明度、保障知情权和监督作用，并不直接扩大公共服务职能
  description: 误以为政府信息公开会直接扩大公共服务职能
  severity: error
  source: cmmlu_high_school_politics_139
- pattern: 对外开放.*基本立足点
  correct: 独立自主、自力更生是振兴中华的基本立足点，对外开放是重要条件而非基本立足点
  description: 误以为对外开放是振兴中华的基本立足点
  severity: error
  source: cmmlu_high_school_politics_140
- pattern: 履行.*降税承诺.*增加.*财政收入
  correct: 降低关税通常减少关税收入，但可能通过扩大贸易量间接增加其他税收，并非直接增加财政收入
  description: 误以为降低关税会直接增加财政收入
  severity: error
  source: cmmlu_high_school_politics_141
- pattern: 履行.*降税承诺.*维护.*经济安全
  correct: 降低关税可能加剧国内产业竞争，短期内可能对经济安全构成挑战，而非直接维护
  description: 误以为履行降税承诺直接有利于维护经济安全
  severity: error
  source: cmmlu_high_school_politics_141
- pattern: 扩大内需.*基本战略
  correct: 该决定强调外经贸战略转型，而非将扩大内需作为基本战略
  description: 误以为该决定的核心是扩大内需，实际是推动‘引进来’和‘走出去’并重
  severity: error
  source: cmmlu_high_school_politics_142
- pattern: 独立自主.*对外开放.*立足点
  correct: 独立自主是对外开放的立足点，但该决定并未强调这一点，而是聚焦于战略转型
  description: 误以为该决定强调独立自主作为对外开放的立足点，实际是推动双向开放
  severity: warning
  source: cmmlu_high_school_politics_142
- pattern: 利用外资.*自主创新.*产业升级
  correct: 该决定强调‘引进来’和‘走出去’并重，而非仅通过利用外资推动自主创新和产业升级
  description: 误以为该决定的核心是利用外资推动创新和升级，实际是战略转型
  severity: error
  source: cmmlu_high_school_politics_142
- pattern: 自愿原则.*兼顾各方利益
  correct: 自愿原则强调当事人自主决定民事活动，而非兼顾各方利益
  description: 误以为自愿原则要求兼顾各方利益
  severity: error
  source: cmmlu_legal_and_moral_basis_0
- pattern: 平等原则.*兼顾各方利益
  correct: 平等原则强调当事人法律地位平等，而非兼顾各方利益
  description: 误以为平等原则要求兼顾各方利益
  severity: error
  source: cmmlu_legal_and_moral_basis_0
- pattern: 诚实信用原则.*兼顾各方利益
  correct: 诚实信用原则要求当事人恪守信用、善意行使权利和履行义务，而非直接兼顾各方利益
  description: 误以为诚实信用原则等同于兼顾各方利益
  severity: error
  source: cmmlu_legal_and_moral_basis_0
- pattern: 政党制度.*决定国家性质
  correct: 国体决定国家性质，政党制度是政治制度的一部分
  description: 误以为政党制度决定国家性质
  severity: error
  source: cmmlu_legal_and_moral_basis_1
- pattern: 政体.*决定国家性质
  correct: 国体决定国家性质，政体是国体的表现形式
  description: 误以为政体决定国家性质
  severity: error
  source: cmmlu_legal_and_moral_basis_1
- pattern: 基本经济制度.*决定国家性质
  correct: 国体决定国家性质，基本经济制度是经济基础的一部分
  description: 误以为基本经济制度决定国家性质
  severity: error
  source: cmmlu_legal_and_moral_basis_1
- pattern: 鄙弃.*国土.*不尽如人意
  correct: 爱国者应理性看待国家发展中的不足，积极改进而非鄙弃
  description: 误以为爱国可以或应该鄙弃国家的不完美之处
  severity: error
  source: cmmlu_legal_and_moral_basis_2
- pattern: 一切领域.*与西方接轨
  correct: 爱国者应立足本国国情，有选择地借鉴西方经验，而非全盘西化
  description: 误以为爱国意味着全面模仿西方模式
  severity: error
  source: cmmlu_legal_and_moral_basis_2
- pattern: 热爱任何性质.*任何国家
  correct: 爱国者应热爱自己的祖国，而非盲目热爱任何国家
  description: 误以为爱国是泛泛地热爱所有国家
  severity: error
  source: cmmlu_legal_and_moral_basis_2
- pattern: 历法.*著作权
  correct: 历法不属于著作权法保护的客体，因其具有通用性和公共性
  description: 误以为历法受著作权法保护
  severity: error
  source: cmmlu_legal_and_moral_basis_4
- pattern: 通用数表.*著作权
  correct: 通用数表不属于著作权法保护的客体，因其缺乏独创性
  description: 误以为通用数表受著作权法保护
  severity: error
  source: cmmlu_legal_and_moral_basis_4
- pattern: 时事新闻.*著作权
  correct: 时事新闻不属于著作权法保护的客体，因其为单纯事实消息
  description: 误以为时事新闻受著作权法保护
  severity: error
  source: cmmlu_legal_and_moral_basis_4
- pattern: 道德规范.*行为准则
  correct: 道德规范是社会自发形成的，非国家制定或认可，不具有法律约束力
  description: 误将道德规范等同于由国家制定或认可的行为准则
  severity: error
  source: cmmlu_legal_and_moral_basis_5
- pattern: 纪律规范.*行为准则
  correct: 纪律规范是特定组织内部制定的，非国家制定或认可，不具有普遍法律效力
  description: 误将纪律规范等同于由国家制定或认可的行为准则
  severity: error
  source: cmmlu_legal_and_moral_basis_5
- pattern: 政策规范.*行为准则
  correct: 政策规范是政府或政党制定的指导性文件，非严格意义上的法律规范，不具有法律强制力
  description: 误将政策规范等同于由国家制定或认可的法律规范
  severity: error
  source: cmmlu_legal_and_moral_basis_5
- pattern: 调节功能.*反映社会现实
  correct: 认识功能反映社会现实特别是社会经济关系
  description: 误以为调节功能是反映社会现实的功能
  severity: error
  source: cmmlu_legal_and_moral_basis_6
- pattern: 评价功能.*反映社会现实
  correct: 认识功能反映社会现实特别是社会经济关系
  description: 误以为评价功能是反映社会现实的功能
  severity: error
  source: cmmlu_legal_and_moral_basis_6
- pattern: 教育功能.*反映社会现实
  correct: 认识功能反映社会现实特别是社会经济关系
  description: 误以为教育功能是反映社会现实的功能
  severity: error
  source: cmmlu_legal_and_moral_basis_6
- pattern: 诚实守信.*要求
  correct: 诚实守信侧重言行一致、信守承诺，而题目描述的是办事公道的要求
  description: 误将秉公办事、平等待人、清正廉洁等行为归为诚实守信的要求
  severity: error
  source: cmmlu_legal_and_moral_basis_7
- pattern: 爱岗敬业.*要求
  correct: 爱岗敬业侧重热爱岗位、勤奋工作，而题目描述的是办事公道的要求
  description: 误将秉公办事、平等待人、清正廉洁等行为归为爱岗敬业的要求
  severity: error
  source: cmmlu_legal_and_moral_basis_7
- pattern: 服务群众.*要求
  correct: 服务群众侧重为人民服务、满足群众需求，而题目描述的是办事公道的要求
  description: 误将秉公办事、平等待人、清正廉洁等行为归为服务群众的要求
  severity: error
  source: cmmlu_legal_and_moral_basis_7
- pattern: 婚姻法.*程序法
  correct: 《中华人民共和国婚姻法》属于实体法，而非程序法
  description: 误以为婚姻法是程序法
  severity: error
  source: cmmlu_legal_and_moral_basis_9
- pattern: 保险法.*程序法
  correct: 《中华人民共和国保险法》属于实体法，而非程序法
  description: 误以为保险法是程序法
  severity: error
  source: cmmlu_legal_and_moral_basis_9
- pattern: 立法法.*程序法
  correct: 《中华人民共和国立法法》属于宪法性法律，通常不归类为程序法
  description: 误以为立法法是程序法
  severity: error
  source: cmmlu_legal_and_moral_basis_9
- pattern: 法律适用.*社会舆论.*后盾
  correct: 法律适用的过程或结果以国家强制力为后盾，而非社会舆论
  description: 误以为法律适用的后盾是社会舆论
  severity: error
  source: cmmlu_legal_and_moral_basis_10
- pattern: 法律适用.*行政机关.*职权.*义务
  correct: 法律适用是司法机关（法院）的职权，而非行政机关的职权或义务
  description: 误以为法律适用的主体是行政机关
  severity: error
  source: cmmlu_legal_and_moral_basis_10
- pattern: 法律适用.*主体.*行政机关.*公职人员
  correct: 法律适用的主体是国家司法机关（法院）及其公职人员，而非行政机关
  description: 误以为法律适用的主体是国家行政机关及其公职人员
  severity: error
  source: cmmlu_legal_and_moral_basis_10
- pattern: 办事公道.*职业道德
  correct: 办事公道是职业道德中要求公平公正、不偏不倚的规范，而非题干描述的干一行爱一行、精益求精的内容
  description: 误将爱岗敬业的具体表现（干一行爱一行、精益求精）等同于办事公道
  severity: error
  source: cmmlu_legal_and_moral_basis_11
- pattern: 诚实守信.*职业道德
  correct: 诚实守信是职业道德中要求言行一致、信守承诺的规范，而非题干描述的干一行爱一行、精益求精的内容
  description: 误将爱岗敬业的具体表现（干一行爱一行、精益求精）等同于诚实守信
  severity: error
  source: cmmlu_legal_and_moral_basis_11
- pattern: 服务群众.*职业道德
  correct: 服务群众是职业道德中要求为人民服务的规范，而非题干描述的干一行爱一行、精益求精的内容
  description: 误将爱岗敬业的具体表现（干一行爱一行、精益求精）等同于服务群众
  severity: error
  source: cmmlu_legal_and_moral_basis_11
