  source: cmmlu_high_school_politics_28
- pattern: 按生产要素分配.*按个体劳动者劳动成果分配
  correct: 王某转租土地的收入属于按生产要素分配，张某经营土地的收入属于按劳分配，而非按个体劳动者劳动成果分配
