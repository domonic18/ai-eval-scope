  severity: error
  source: cmmlu_high_school_politics_85
- pattern: 发展速度.*越来越快
  correct: 外贸依存度提高反映经济联系加深，而非直接表明经济发展速度加快
  description: 误将外贸依存度提高等同于经济发展速度加快
  severity: error
  source: cmmlu_high_school_politics_85
- pattern: 出口商品结构.*优化
  correct: 外贸依存度提高反映经济联系加深，而非直接表明出口商品结构优化
  description: 误将外贸依存度提高等同于出口商品结构优化
  severity: error
  source: cmmlu_high_school_politics_85
- pattern: 按个体劳动者的劳动成果分配.*按劳分配.*按资本要素分配
  correct: 王某在国有银行的收入属于按劳分配，开出租车的收入属于按个体劳动者的劳动成果分配，炒股收入属于按资本要素分配
  description: 误以为按个体劳动者的劳动成果分配应排在按劳分配之前
  severity: error
  source: cmmlu_high_school_politics_86
- pattern: 按劳分配.*按劳动要素分配.*按管理要素分配
  correct: 王某在国有银行的收入是按劳分配，开出租车是按个体劳动者的劳动成果分配，炒股是按资本要素分配，而非按劳动要素或管理要素分配
  description: 混淆了按劳分配与按劳动要素分配，且错误地将炒股收入归为管理要素分配
  severity: error
  source: cmmlu_high_school_politics_86
- pattern: 按劳动要素分配.*按个体劳动者的劳动成果分配.*按资本要素分配
  correct: 王某在国有银行的收入是按劳分配，而非按劳动要素分配
  description: 误将国有银行的按劳分配当作按劳动要素分配
  severity: error
  source: cmmlu_high_school_politics_86
- pattern: 提高居民收入在国民收入分配中的比重
  correct: 该政策直接针对劳动报酬，属于初次分配中提高劳动报酬比重，而非整体居民收入在国民收入中的比重
  description: 混淆了劳动报酬在初次分配中的比重与居民收入在国民收入分配中的比重
  severity: error
  source: cmmlu_high_school_politics_87
- pattern: 初次分配注重效率，再分配注重公平
  correct: 当前政策强调初次分配也要注重公平，逐步提高劳动报酬比重，并非只注重效率
  description: 误以为初次分配只注重效率，再分配才注重公平
  severity: error
  source: cmmlu_high_school_politics_87
- pattern: 进一步强调效率优先，兼顾公平
  correct: 政策方向是提高劳动报酬比重，促进公平，而非继续强调效率优先
  description: 误以为当前政策仍坚持效率优先、兼顾公平的原则
  severity: error
  source: cmmlu_high_school_politics_87
- pattern: 林地.*入股.*房地产.*商品房
  correct: 林地承包经营权入股应限于农业生产经营，不得用于商品房开发
