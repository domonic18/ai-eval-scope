  description: 误将全球化背景下的市场竞争激烈化理解为区域集团化趋势加强
  severity: error
  source: cmmlu_high_school_politics_74
- pattern: 国际分工，生产专业化
  correct: 经济全球化导致市场竞争激烈化，而非国际分工和生产专业化
  description: 误将全球化竞争特点归因于国际分工和生产专业化
  severity: error
  source: cmmlu_high_school_politics_74
- pattern: 跨国公司的迅速发展
  correct: 经济全球化使市场竞争激烈化，而非跨国公司的迅速发展
  description: 误将全球化竞争特点归因于跨国公司的迅速发展
  severity: error
  source: cmmlu_high_school_politics_74
- pattern: 制定和执行财政政策
  correct: 中国人民银行是制定和执行货币政策的国家机关，财政政策由财政部制定和执行
  description: 误将中国人民银行与财政政策关联，混淆了货币政策与财政政策的职能分工
  severity: error
  source: cmmlu_high_school_politics_75
- pattern: 金融机构的领导力量
  correct: 中国人民银行是我国的中央银行，依法对金融机构进行监督管理，但并非领导力量
  description: 误以为中国人民银行是金融机构的领导力量，实际上其职能是宏观调控和金融监管
  severity: warning
  source: cmmlu_high_school_politics_75
- pattern: 意识具有目的性和计划性
  correct: 该诗句体现的是意识对人体生理活动的调节和控制作用，而非目的性和计划性
  description: 误将意识的目的性和计划性等同于对生理活动的调节作用
  severity: error
  source: cmmlu_high_school_politics_76
- pattern: 意识具有科学预见性
  correct: 意识不一定具有科学预见性，且该诗句未体现预见性，而是体现意识对生理活动的调节
  description: 误以为意识总是具有科学预见性，且混淆了预见性与调节控制作用
  severity: error
  source: cmmlu_high_school_politics_76
- pattern: 意识具有主动创造性和自觉选择性
  correct: 该诗句主要体现意识对生理活动的调节和控制，而非主动创造性和自觉选择性
  description: 误将意识的主动创造性和自觉选择性等同于对生理活动的调节控制作用
  severity: error
  source: cmmlu_high_school_politics_76
- pattern: 按劳分配制度.*留住人才
  correct: 留住人才需要按劳分配与按生产要素分配相结合，仅按劳分配不足以激励人才
  description: 误以为仅靠按劳分配制度就能有效留住人才
  severity: error
  source: cmmlu_high_school_politics_77
- pattern: 年薪制.*留住人才
  correct: 年薪制只是分配方式之一，不能全面解决人才激励问题，需要结合按劳分配和按生产要素分配
  description: 误以为实行年薪制就能有效留住人才
  severity: error
  source: cmmlu_high_school_politics_77
- pattern: 大幅度提高.*奖励.*津贴.*留住人才
  correct: 仅靠提高奖励和津贴不能全面解决人才激励问题，需要建立按劳分配与按生产要素分配相结合的分配制度
  description: 误以为仅靠提高奖励和津贴就能有效留住人才
  severity: error
  source: cmmlu_high_school_politics_77
- pattern: 充分发挥国家宏观调控的基础性作用
  correct: 在市场经济中，市场在资源配置中起决定性作用，国家宏观调控起辅助性作用
  description: 误以为国家宏观调控在市场经济中起基础性作用
  severity: error
  source: cmmlu_high_school_politics_78
- pattern: 价值规律.*管理
  correct: 国家发改委对‘大吨小标’货车的生产采取的是行政手段进行宏观调控，而非运用价值规律进行管理
  description: 误以为国家发改委的措施是运用价值规律进行管理
  severity: error
  source: cmmlu_high_school_politics_79
- pattern: 法律手段.*治理
  correct: 国家发改委对‘大吨小标’货车的生产采取的是行政手段进行宏观调控，而非运用法律手段进行治理
  description: 误以为国家发改委的措施是运用法律手段进行治理
  severity: error
  source: cmmlu_high_school_politics_79
- pattern: 经济手段.*调节
  correct: 国家发改委对‘大吨小标’货车的生产采取的是行政手段进行宏观调控，而非采取经济手段对市场进行的调节
  description: 误以为国家发改委的措施是采取经济手段对市场进行调节
  severity: error
  source: cmmlu_high_school_politics_79
- pattern: 国际市场.*伴随.*跨国公司.*产生
  correct: 国际市场在跨国公司产生之前就已存在，跨国公司是国际市场发展的产物
  description: 误以为国际市场是伴随跨国公司产生而发展起来的
  severity: error
  source: cmmlu_high_school_politics_80
- pattern: 国有资产在社会总资产中占优势
  correct: 公有制经济在社会总资产中占优势，而非仅国有资产
  description: 误以为国有资产必须在社会总资产中占优势，混淆了公有制经济与国有资产
  severity: error
  source: cmmlu_high_school_politics_81
- pattern: 巩固国有经济的主体地位
  correct: 公有制经济是主体，国有经济是主导，而非主体地位
  description: 误以为国有经济是主体，混淆了国有经济的主导地位与公有制经济的主体地位
  severity: error
  source: cmmlu_high_school_politics_81
- pattern: 真理是检验认识正确与否的标准
  correct: 实践是检验认识正确与否的唯一标准
  description: 误以为真理本身是检验认识的标准，实际上实践才是检验标准
  severity: error
  source: cmmlu_high_school_politics_82
- pattern: 哲学是科学的世界观
  correct: 哲学有科学与非科学之分，只有马克思主义哲学才是科学的世界观
  description: 误以为所有哲学都是科学的世界观
  severity: error
  source: cmmlu_high_school_politics_82
- pattern: 管理科学是哲学的基础
  correct: 具体科学是哲学的基础，管理科学是具体科学之一
  description: 误以为管理科学是哲学的基础，但哲学的基础是具体科学整体
  severity: error
  source: cmmlu_high_school_politics_82
- pattern: 国有企业职工的奖金和津贴.*按劳分配以外
  correct: 国有企业职工的奖金和津贴属于按劳分配收入
  description: 误以为国有企业职工的奖金和津贴不属于按劳分配
  severity: error
  source: cmmlu_high_school_politics_83
- pattern: 文化.*物质力量
  correct: 文化是一种精神力量，能够在人们认识世界、改造世界的过程中转化为物质力量，但本身不是物质力量
  description: 误以为文化是物质力量
  severity: error
  source: cmmlu_high_school_politics_84
- pattern: 经济.*脆弱
