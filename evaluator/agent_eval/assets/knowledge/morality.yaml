  description: 误将市场经济的开放性等同于优化资源配置，而忽略了题干中的自发性问题
  severity: error
  source: cmmlu_high_school_politics_95
- pattern: 盲目性.*资源浪费
  correct: 市场调节的盲目性指决策滞后导致资源浪费，而题干描述的是企业为私利偷逃税费的自发性
  description: 混淆了市场调节的盲目性与自发性，盲目性强调信息滞后，自发性强调逐利行为
