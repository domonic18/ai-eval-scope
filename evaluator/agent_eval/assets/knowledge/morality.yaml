  source: cmmlu_legal_and_moral_basis_70
- pattern: 行政诉讼法.*评判.*合法性
  correct: 行政诉讼法主要规范行政诉讼程序，而非评判行为合法性
  description: 误以为行政诉讼法可以评判行为合法性
  severity: error
  source: cmmlu_legal_and_moral_basis_70
- pattern: 民法通则.*评判.*合法性
  correct: 民法通则是调整民事关系的基本法律，而非评判行为合法性
  description: 误以为民法通则可以评判行为合法性
  severity: error
  source: cmmlu_legal_and_moral_basis_70
- pattern: 民族区域自治制度.*根本政治制度
  correct: 我国的根本政治制度是人民代表大会制度，民族区域自治制度是我国的基本政治制度之一
  description: 误将民族区域自治制度当作根本政治制度
  severity: error
  source: cmmlu_legal_and_moral_basis_71
- pattern: 共产党领导的多党合作和政治协商制度.*根本政治制度
  correct: 我国的根本政治制度是人民代表大会制度，共产党领导的多党合作和政治协商制度是我国的基本政治制度之一
  description: 误将共产党领导的多党合作和政治协商制度当作根本政治制度
  severity: error
  source: cmmlu_legal_and_moral_basis_71
- pattern: 人民民主专政制度.*根本政治制度
  correct: 我国的根本政治制度是人民代表大会制度，人民民主专政是我国的国体（国家性质），而非根本政治制度
  description: 误将人民民主专政制度当作根本政治制度
  severity: error
  source: cmmlu_legal_and_moral_basis_71
- pattern: 家庭美德.*社会公共生活.*最基本.*行动准则
  correct: 家庭美德是调节家庭生活方面关系和行为的道德准则，而非社会公共生活的基本准则
  description: 误将家庭美德等同于社会公共生活的基本准则
  severity: error
  source: cmmlu_legal_and_moral_basis_74
- pattern: 法在政治建设方面的作用
  correct: 维护公平正义、协调人与自然关系、推动和谐社会建设属于法在社会建设方面的作用
  description: 误将社会建设方面的作用归为政治建设方面的作用
  severity: error
  source: cmmlu_legal_and_moral_basis_75
- pattern: 法在文化建设方面的作用
  correct: 维护公平正义、协调人与自然关系、推动和谐社会建设属于法在社会建设方面的作用
  description: 误将社会建设方面的作用归为文化建设方面的作用
  severity: error
  source: cmmlu_legal_and_moral_basis_75
- pattern: 法在经济建设方面的作用
  correct: 维护公平正义、协调人与自然关系、推动和谐社会建设属于法在社会建设方面的作用
  description: 误将社会建设方面的作用归为经济建设方面的作用
  severity: error
  source: cmmlu_legal_and_moral_basis_75
- pattern: 罚款.*附加刑
  correct: 罚款是行政处罚，不是刑罚中的附加刑；附加刑包括罚金、没收财产、剥夺政治权利、驱逐出境等
  description: 混淆了行政处罚中的罚款与刑罚中的罚金
  severity: error
  source: cmmlu_legal_and_moral_basis_76
- pattern: 管制.*附加刑
  correct: 管制是主刑，不是附加刑
  description: 误以为管制属于附加刑
  severity: error
  source: cmmlu_legal_and_moral_basis_76
- pattern: 拘役.*附加刑
  correct: 拘役是主刑，不是附加刑
  description: 误以为拘役属于附加刑
  severity: error
  source: cmmlu_legal_and_moral_basis_76
- pattern: 社会经济关系的发展变化并不必然引起道德的发展变化
  correct: 社会经济关系的发展变化必然引起道德的发展变化，道德是经济关系的反映
  description: 误以为社会经济关系变化与道德变化无关或非必然相关
  severity: error
  source: cmmlu_legal_and_moral_basis_77
- pattern: 道德调整的社会关系范围极为有限
  correct: 道德调整的社会关系范围广泛，涉及社会生活的各个方面
  description: 误以为道德只调整少数社会关系
  severity: error
  source: cmmlu_legal_and_moral_basis_77
- pattern: 有什么样的道德就有什么样的社会经济关系
  correct: 社会经济关系决定道德，而非道德决定社会经济关系
  description: 颠倒道德与社会经济关系的决定与被决定关系
  severity: error
  source: cmmlu_legal_and_moral_basis_77
- pattern: 怎样协调个人与他人的关系
  correct: 人生态度回答的是人应该怎样对待生活
  description: 误以为人生态度回答的是如何协调个人与他人的关系
  severity: error
  source: cmmlu_legal_and_moral_basis_78
- pattern: 什么样的人生才有意义
  correct: 人生态度回答的是人应该怎样对待生活
  description: 误以为人生态度回答的是什么样的人生才有意义
  severity: error
  source: cmmlu_legal_and_moral_basis_78
- pattern: 人为什么活着
  correct: 人生态度回答的是人应该怎样对待生活
  description: 误以为人生态度回答的是人为什么活着
  severity: error
  source: cmmlu_legal_and_moral_basis_78
- pattern: 互相服务.*要求
  correct: 自觉遵守规章制度、秉公办事、平等待人、清正廉洁等体现的是办事公道的要求，而非互相服务的要求
  description: 误将办事公道的具体表现（秉公办事、平等待人、清正廉洁）归为互相服务的要求
  severity: error
  source: cmmlu_legal_and_moral_basis_80
- pattern: 精益求精.*要求
  correct: 自觉遵守规章制度、秉公办事、平等待人、清正廉洁等体现的是办事公道的要求，而非精益求精的要求
  description: 误将办事公道的具体表现（秉公办事、平等待人、清正廉洁）归为精益求精的要求
  severity: error
  source: cmmlu_legal_and_moral_basis_80
- pattern: 预先分析.*预测
  correct: 法的预测作用是指人们根据法律可以预先估计相互间行为的法律后果，而非指引作用
  description: 混淆了法的指引作用与预测作用
  severity: error
  source: cmmlu_legal_and_moral_basis_81
- pattern: 提供.*行为模式
  correct: 法的指引作用是通过规范为人们提供行为模式，但该干扰项表述不完整，指引作用的核心是引导人们自己如何行为
  description: 对指引作用的理解过于宽泛，未区分指引作用与其他规范作用的区别
  severity: warning
  source: cmmlu_legal_and_moral_basis_81
- pattern: 名誉权.*财产权
  correct: 名誉权属于人身权，而非财产权
  description: 误以为名誉权是财产权
  severity: error
  source: cmmlu_legal_and_moral_basis_82
- pattern: 肖像权.*财产权
  correct: 肖像权属于人身权，而非财产权
  description: 误以为肖像权是财产权
  severity: error
  source: cmmlu_legal_and_moral_basis_82
- pattern: 姓名权.*财产权
  correct: 姓名权属于人身权，而非财产权
  description: 误以为姓名权是财产权
  severity: error
  source: cmmlu_legal_and_moral_basis_82
- pattern: 男女平等.*要求
  correct: 男女平等是家庭美德中关于性别权利平等的要求，而非关于劳动和节约的要求
  description: 误将男女平等的要求与勤俭持家的要求混淆
  severity: error
  source: cmmlu_legal_and_moral_basis_83
- pattern: 尊老爱幼.*要求
  correct: 尊老爱幼是家庭美德中关于尊敬长辈、关爱晚辈的要求，而非关于劳动和节约的要求
  description: 误将尊老爱幼的要求与勤俭持家的要求混淆
  severity: error
  source: cmmlu_legal_and_moral_basis_83
- pattern: 夫妻和谐.*要求
  correct: 夫妻和谐是家庭美德中关于夫妻关系和睦的要求，而非关于劳动和节约的要求
  description: 误将夫妻和谐的要求与勤俭持家的要求混淆
  severity: error
  source: cmmlu_legal_and_moral_basis_83
- pattern: 与时俱进.*法治核心
  correct: 社会主义法治的核心内容是依法治国
  description: 误以为与时俱进是社会主义法治的核心内容
  severity: error
  source: cmmlu_legal_and_moral_basis_84
- pattern: 公平正义.*法治核心
  correct: 社会主义法治的核心内容是依法治国
  description: 误以为公平正义是社会主义法治的核心内容
  severity: error
  source: cmmlu_legal_and_moral_basis_84
- pattern: 改革创新.*法治核心
  correct: 社会主义法治的核心内容是依法治国
  description: 误以为改革创新是社会主义法治的核心内容
  severity: error
  source: cmmlu_legal_and_moral_basis_84
- pattern: 敬业好学.*表现
  correct: 勇于开拓创新、积极参与竞争、不怕困难、不畏艰险、奋发向上、永远进步是勇于进取的表现
  description: 误将勇于进取的品质归为敬业好学
  severity: error
  source: cmmlu_legal_and_moral_basis_85
- pattern: 正直无私.*表现
  correct: 勇于开拓创新、积极参与竞争、不怕困难、不畏艰险、奋发向上、永远进步是勇于进取的表现
  description: 误将勇于进取的品质归为正直无私
  severity: error
  source: cmmlu_legal_and_moral_basis_85
- pattern: 文明礼貌.*表现
  correct: 勇于开拓创新、积极参与竞争、不怕困难、不畏艰险、奋发向上、永远进步是勇于进取的表现
  description: 误将勇于进取的品质归为文明礼貌
  severity: error
  source: cmmlu_legal_and_moral_basis_85
- pattern: 公务员法.*经济法
  correct: 公务员法属于行政法，调整的是公务员管理关系，而非国民经济运行中的经济关系
  description: 误以为公务员法属于经济法范畴
  severity: error
  source: cmmlu_legal_and_moral_basis_87
- pattern: 合同法.*经济法
  correct: 合同法属于民法，调整平等主体间的合同关系，不属于经济法
  description: 误以为合同法属于经济法
  severity: error
  source: cmmlu_legal_and_moral_basis_87
- pattern: 商标法.*经济法
  correct: 商标法属于知识产权法，通常归入民法范畴，而非经济法
  description: 误以为商标法属于经济法
  severity: error
  source: cmmlu_legal_and_moral_basis_87
- pattern: 道德.*起源于人性.*情感
  correct: 道德产生于人类的历史发展和人们的社会实践中，而非人性中的情感、欲望
  description: 误以为道德源于人性中的情感和欲望
  severity: error
  source: cmmlu_legal_and_moral_basis_88
- pattern: 道德.*先天.*良知
  correct: 道德产生于人类的历史发展和人们的社会实践中，而非人先天具有的良知和善良意志
  description: 误以为道德源于人先天具有的良知和善良意志
  severity: error
  source: cmmlu_legal_and_moral_basis_88
- pattern: 道德.*神.*启示.*上帝
  correct: 道德产生于人类的历史发展和人们的社会实践中，而非神的启示或上帝的意志
  description: 误以为道德源于神的启示或上帝的意志
  severity: error
  source: cmmlu_legal_and_moral_basis_88
- pattern: 有信念.*有目标
  correct: 四有是指有理想、有道德、有文化、有纪律
  description: 误将'有信念'和'有目标'作为四有内容
  severity: error
  source: cmmlu_legal_and_moral_basis_89
- pattern: 危害结果.*犯罪构成.*必备
  correct: 危害行为是任何犯罪构成都必须具备的客观要件，危害结果不是必备要件
  description: 误以为危害结果是所有犯罪构成的必备客观要件
  severity: error
  source: cmmlu_legal_and_moral_basis_91
- pattern: 因果关系.*犯罪构成.*必备
  correct: 危害行为与危害结果之间的因果关系不是任何犯罪构成都必须具备的客观要件
  description: 误以为因果关系是所有犯罪构成的必备客观要件
  severity: error
  source: cmmlu_legal_and_moral_basis_91
- pattern: 危害行为与危害结果.*犯罪构成.*必备
  correct: 只有危害行为是任何犯罪构成都必须具备的客观要件，危害行为与危害结果同时具备并非必备
  description: 误以为危害行为与危害结果都是所有犯罪构成的必备客观要件
  severity: error
  source: cmmlu_legal_and_moral_basis_91
- pattern: 理想信念.*思想性
  correct: 理想信念具有时代性，不同时代有不同的理想内容
  description: 误以为理想信念主要体现为思想性，而忽略了其随时代变化的特点
  severity: error
  source: cmmlu_legal_and_moral_basis_92
- pattern: 理想信念.*崇高性
  correct: 理想信念具有时代性，不同时代有不同的理想内容
  description: 误以为理想信念主要体现为崇高性，而忽略了其随时代变化的特点
  severity: error
  source: cmmlu_legal_and_moral_basis_92
- pattern: 理想信念.*阶级性
  correct: 理想信念具有时代性，不同时代有不同的理想内容
  description: 误以为理想信念主要体现为阶级性，而忽略了其随时代变化的特点
  severity: error
  source: cmmlu_legal_and_moral_basis_92
- pattern: 法律规范包括规范性文件
  correct: 法律规范是规范性文件的内容，规范性文件是法律规范的载体，二者并非包含关系
  description: 误以为法律规范包含规范性文件，实际上法律规范是规范性文件的核心内容
  severity: error
  source: cmmlu_legal_and_moral_basis_93
- pattern: 法律规范与其他社会规范.*完全相同
  correct: 法律规范与其他社会规范在设定人们行为的范围和程度上存在差异，并非完全相同
  description: 误以为法律规范与其他社会规范在行为设定上完全一致
  severity: error
  source: cmmlu_legal_and_moral_basis_93
- pattern: 法律规范与法律条文.*完全相同
  correct: 法律规范与法律条文的内涵及外在表现形式不同，法律规范是内容，法律条文是表现形式
  description: 误以为法律规范与法律条文在内涵和外在表现形式上完全相同
  severity: error
  source: cmmlu_legal_and_moral_basis_93
- pattern: 艰苦奋斗.*荣.*骄奢淫逸.*耻
  correct: 艰苦奋斗与骄奢淫逸主要涉及生活作风和资源利用，而非服务人民、关爱他人等社会责任
  description: 误将艰苦奋斗等同于服务人民的社会责任
  severity: error
  source: cmmlu_legal_and_moral_basis_94
- pattern: 崇尚科学.*荣.*愚昧无知.*耻
  correct: 崇尚科学与愚昧无知主要涉及科学态度和知识，而非服务人民、关爱他人等社会责任
  description: 误将崇尚科学等同于服务人民的社会责任
  severity: error
  source: cmmlu_legal_and_moral_basis_94
- pattern: 遵纪守法.*荣.*违法乱纪.*耻
  correct: 遵纪守法与违法乱纪主要涉及法律遵守，而非服务人民、关爱他人等社会责任
  description: 误将遵纪守法等同于服务人民的社会责任
  severity: error
  source: cmmlu_legal_and_moral_basis_94
- pattern: 法是最高统治者意志的体现
  correct: 法是被奉为国家意志的统治阶级意志，而非个人意志
  description: 误以为法是最高统治者的个人意志
  severity: error
  source: cmmlu_legal_and_moral_basis_95
- pattern: 统治阶级的意志都是法律
  correct: 只有被奉为国家意志的统治阶级意志才是法律
  description: 误以为统治阶级的所有意志都是法律
  severity: error
  source: cmmlu_legal_and_moral_basis_95
- pattern: 法是统治阶级意志的简单相加
  correct: 法是统治阶级整体意志的体现，而非简单相加
  description: 误以为法是统治阶级成员意志的简单总和
  severity: error
  source: cmmlu_legal_and_moral_basis_95
- pattern: 强迫.*爱
  correct: 恋爱应基于双方自愿，强迫或诱骗对方接受自己的爱是不道德的
  description: 误以为可以通过强迫或诱骗手段获得爱情
  severity: error
  source: cmmlu_legal_and_moral_basis_96
- pattern: 只求曾经拥有.*不求天长地久
  correct: 恋爱应认真负责，不应视为游戏或只追求短暂体验
  description: 误以为恋爱可以随意开始和结束，不负责任
  severity: error
  source: cmmlu_legal_and_moral_basis_96
- pattern: 不允许.*中断.*恋爱关系
  correct: 恋爱关系应尊重双方自由，任何一方都有权终止关系
  description: 误以为恋爱关系一旦建立就不可解除，出于占有目的限制对方
  severity: error
  source: cmmlu_legal_and_moral_basis_96
- pattern: 道德起源于人性中的情感或欲望
  correct: 道德产生于人类历史的发展和人们的社会实践中，而非单纯源于人性中的情感或欲望
  description: 误以为道德仅由人的内在情感或欲望决定，忽视了社会实践和历史发展的作用
  severity: error
  source: cmmlu_legal_and_moral_basis_97
- pattern: 道德起源于人先天具有的某种良知
  correct: 道德产生于人类历史的发展和人们的社会实践中，而非人先天具有的良知
  description: 误以为道德是与生俱来的先天观念，忽略了其社会历史根源
  severity: error
  source: cmmlu_legal_and_moral_basis_97
- pattern: 道德起源于.*天.*意志.*神.*启示
  correct: 道德产生于人类历史的发展和人们的社会实践中，而非源于天意或神启
  description: 误以为道德由超自然力量或神灵赋予，否定了其社会性和实践性
  severity: error
  source: cmmlu_legal_and_moral_basis_97
- pattern: 损公肥私.*损人利己
  correct: 公私兼顾、不损公肥私是社会主义初级阶段最基本的道德要求
  description: 误以为损公肥私、损人利己是社会主义初级阶段的基本道德要求
  severity: error
  source: cmmlu_legal_and_moral_basis_98
- pattern: 无私奉献.*一心为公
  correct: 无私奉献、一心为公是更高层次的道德要求，不是最基本的
  description: 误以为无私奉献、一心为公是社会主义初级阶段最基本的道德要求
  severity: error
  source: cmmlu_legal_and_moral_basis_98
- pattern: 护法的重要性
  correct: 沈家本强调法律制定后必须被遵守，否则形同虚设，因此这句话强调的是守法的重要性
  description: 误将'法立而不行'理解为维护法律的重要性，而非遵守法律
  severity: error
  source: cmmlu_legal_and_moral_basis_99
- pattern: 立法的重要性
