  source: cmmlu_legal_and_moral_basis_158
- pattern: 个人对自己生命存在的肯定
  correct: 个人对自己生命存在的肯定属于自我价值，而非社会价值
  description: 混淆了自我价值与社会价值，将自我肯定当作社会价值
  severity: error
  source: cmmlu_legal_and_moral_basis_158
- pattern: 发展社会主义市场经济
  correct: 全体中国人民共同的理想信念是建设有中国特色的社会主义
  description: 误以为发展社会主义市场经济是共同的理想信念，实际上它是建设中国特色社会主义的一部分
  severity: error
  source: cmmlu_legal_and_moral_basis_160
- pattern: 建立社会主义制度
  correct: 全体中国人民共同的理想信念是建设有中国特色的社会主义
  description: 误以为建立社会主义制度是共同的理想信念，实际上社会主义制度已建立，当前目标是建设中国特色社会主义
  severity: error
  source: cmmlu_legal_and_moral_basis_160
- pattern: 实现共产主义理想
  correct: 全体中国人民共同的理想信念是建设有中国特色的社会主义
  description: 误以为实现共产主义理想是现阶段的共同理想信念，实际上它是长远目标，现阶段是建设中国特色社会主义
  severity: error
  source: cmmlu_legal_and_moral_basis_160
- pattern: 既不关心社会和他人利益.*也不想过多地危害
  correct: 为人民服务要求积极关心社会和他人利益，而非消极不危害
  description: 误以为不危害他人和社会就等同于为人民服务
  severity: error
  source: cmmlu_legal_and_moral_basis_161
- pattern: 为了一己之私利.*不惜损害他人和社会的利益
  correct: 为人民服务要求维护他人和社会利益，而非损害
  description: 误以为自私自利的行为也符合为人民服务的要求
  severity: error
  source: cmmlu_legal_and_moral_basis_161
- pattern: 人人为自己.*上帝为大家
  correct: 为人民服务强调互助互利，而非个人主义或依赖神助
  description: 误以为个人主义或宗教观念可替代为人民服务
  severity: error
  source: cmmlu_legal_and_moral_basis_161
- pattern: 人与自然和谐相处.*核心
  correct: 社会主义道德建设的核心是为人民服务，而非以人与自然和谐相处为核心
  description: 误以为社会主义道德建设的核心是人与自然和谐相处
  severity: error
  source: cmmlu_legal_and_moral_basis_162
- pattern: 公民道德.*核心
  correct: 社会主义道德建设的核心是为人民服务，而非以公民道德为核心
  description: 误以为社会主义道德建设的核心是公民道德
  severity: error
  source: cmmlu_legal_and_moral_basis_162
- pattern: 集体主义.*核心
  correct: 社会主义道德建设的核心是为人民服务，集体主义是社会主义道德建设的原则，而非核心
  description: 混淆了社会主义道德建设的核心与原则，误以为核心是集体主义
  severity: error
  source: cmmlu_legal_and_moral_basis_162
- pattern: 抢劫行为.*犯罪客体
  correct: 抢劫行为属于犯罪客观方面，是犯罪行为的具体表现，而非犯罪客体（犯罪客体是刑法所保护的社会关系）
  description: 误将犯罪行为本身当作犯罪客体
  severity: error
  source: cmmlu_legal_and_moral_basis_163
- pattern: 抢劫行为.*犯罪主观方面
  correct: 抢劫行为属于犯罪客观方面，是外在的、可观察的行为，而非犯罪主观方面（主观方面指犯罪故意或过失等心理状态）
  description: 误将犯罪行为归入主观方面
  severity: error
  source: cmmlu_legal_and_moral_basis_163
- pattern: 抢劫行为.*犯罪主体
  correct: 抢劫行为属于犯罪客观方面，是行为本身，而非犯罪主体（犯罪主体指实施犯罪的自然人或单位）
  description: 误将犯罪行为当作犯罪主体
  severity: error
  source: cmmlu_legal_and_moral_basis_163
- pattern: 尽量拉近人际空间距离
  correct: 人际交往中应保持适当的空间距离，过度拉近可能引起不适
  description: 误以为人际空间距离越近越好
  severity: error
  source: cmmlu_legal_and_moral_basis_164
- pattern: 时刻提防、猜疑他人
  correct: 人际交往应建立在信任基础上，猜疑会破坏关系
  description: 误以为提防猜疑是人际交往的必要方法
  severity: error
  source: cmmlu_legal_and_moral_basis_164
- pattern: 冷漠严肃，不苟言笑
  correct: 人际交往需要热情友善，冷漠严肃会阻碍沟通
  description: 误以为冷漠严肃有助于人际交往
  severity: error
  source: cmmlu_legal_and_moral_basis_164
- pattern: 信念.*不会轻易改变
  correct: 信念具有稳定性，但并非绝对不变，可能随认识和实践发展而调整
  description: 误以为信念一旦形成就完全不可改变
  severity: error
  source: cmmlu_legal_and_moral_basis_165
- pattern: 信念.*认识.*情感.*意志.*统一体
  correct: 信念是认识、情感和意志的有机统一体，但该表述本身正确，此处作为干扰项可能被误判
  description: 该干扰项本身正确，但题目要求选出错误选项，故不产出
  severity: warning
  source: cmmlu_legal_and_moral_basis_165
- pattern: 人生经历.*造成
  correct: 不同的人生态度决定了对逆境的应对和顺境的感受，而非人生经历本身
  description: 误以为人生经历直接决定人的心理状态和行为选择
  severity: error
  source: cmmlu_legal_and_moral_basis_167
- pattern: 人生处境.*造成
  correct: 不同的人生态度决定了对逆境的应对和顺境的感受，而非人生处境本身
  description: 误以为人生处境直接决定人的心理状态和行为选择
  severity: error
  source: cmmlu_legal_and_moral_basis_167
- pattern: 人生道路.*造成
  correct: 不同的人生态度决定了对逆境的应对和顺境的感受，而非人生道路本身
  description: 误以为人生道路直接决定人的心理状态和行为选择
  severity: error
  source: cmmlu_legal_and_moral_basis_167
- pattern: 不加分析地全盘认同当下的现实
  correct: 应当辩证分析现实，既要看到现实中的积极因素，也要正视其不足，并通过实践改变现实
  description: 误以为接受现实就是完全认同现实，缺乏批判性思考
  severity: error
  source: cmmlu_legal_and_moral_basis_168
- pattern: 对现实大失所望，逃避或反对现实
  correct: 面对理想与现实的矛盾，应保持理性，通过积极实践缩小差距，而非消极逃避或对抗
  description: 误以为理想与现实的矛盾只能通过失望和逃避来应对
  severity: error
  source: cmmlu_legal_and_moral_basis_168
- pattern: 对理想失去信心.*告别理想
  correct: 理想与现实的矛盾是正常的，应坚定信念，在实践中努力将理想转化为现实
  description: 误以为理想与现实的矛盾意味着理想不可实现，从而放弃追求
  severity: error
  source: cmmlu_legal_and_moral_basis_168
- pattern: 道德.*易变
  correct: 道德规范具有相对稳定性，并非易变
  description: 误以为道德规范容易变化
  severity: error
  source: cmmlu_legal_and_moral_basis_171
- pattern: 道德.*强制
  correct: 道德依靠社会舆论、内心信念和传统习惯来调节，不具有强制性
  description: 误以为道德调节具有强制性
  severity: error
  source: cmmlu_legal_and_moral_basis_171
- pattern: 道德.*决定.*经济基础
  correct: 道德属于上层建筑，由社会经济基础决定，而非决定经济基础
  description: 误以为道德能直接决定社会经济基础的性质
  severity: error
  source: cmmlu_legal_and_moral_basis_171
- pattern: 君使臣以礼，臣事君以忠
  correct: 这句话体现的是君臣之间的礼义关系，而非心系民生苦乐、推动历史进步的爱国主义情怀
  description: 误将君臣伦理关系等同于心系民生的爱国主义品质
  severity: error
  source: cmmlu_legal_and_moral_basis_174
- pattern: 知之为知之，不知为不知，是知也
  correct: 这句话体现的是诚实求知的学习态度，而非心系民生苦乐、推动历史进步的爱国主义品质
  description: 误将求知态度等同于心系民生的爱国主义品质
  severity: error
  source: cmmlu_legal_and_moral_basis_174
- pattern: 老吾老，以及人之老；幼吾幼，以及人之幼
  correct: 这句话体现的是推己及人的仁爱思想，而非心系民生苦乐、推动历史进步的爱国主义品质
  description: 误将仁爱思想等同于心系民生的爱国主义品质
  severity: error
  source: cmmlu_legal_and_moral_basis_174
- pattern: 司法局.*审查决定.*公诉
  correct: 提起公诉的案件由人民检察院审查决定
  description: 误以为司法局负责审查决定公诉案件
  severity: error
  source: cmmlu_legal_and_moral_basis_175
- pattern: 公安机关.*审查决定.*公诉
  correct: 提起公诉的案件由人民检察院审查决定
  description: 误以为公安机关负责审查决定公诉案件
  severity: error
  source: cmmlu_legal_and_moral_basis_175
- pattern: 人民法院.*审查决定.*公诉
  correct: 提起公诉的案件由人民检察院审查决定
  description: 误以为人民法院负责审查决定公诉案件
  severity: error
  source: cmmlu_legal_and_moral_basis_175
- pattern: 社会的存在不依赖于个人
  correct: 社会是由个人组成的，社会的存在和发展依赖于个人的活动和贡献
  description: 误以为社会可以脱离个人而独立存在
  severity: error
  source: cmmlu_legal_and_moral_basis_177
- pattern: 个人可以不依赖于社会而存在
  correct: 个人无法脱离社会而独立生存和发展，社会是个人存在的基础
  description: 误以为个人可以完全脱离社会独立存在
  severity: error
  source: cmmlu_legal_and_moral_basis_177
- pattern: 个人只能被社会所决定
  correct: 个人与社会是相互影响、相互作用的，个人具有主观能动性，并非完全被动地被社会决定
  description: 误以为个人完全被动，没有能动性，只能被社会决定
  severity: error
  source: cmmlu_legal_and_moral_basis_177
- pattern: 德治属于物质文明
  correct: 德治属于精神文明、道德建设
  description: 误以为德治属于物质文明范畴
  severity: error
  source: cmmlu_legal_and_moral_basis_178
- pattern: 德治属于传统文明
  correct: 德治属于精神文明、道德建设，而非传统文明
  description: 误以为德治属于传统文明范畴
  severity: error
  source: cmmlu_legal_and_moral_basis_178
- pattern: 法治属于精神文明
  correct: 法治属于政治文明、政治建设
  description: 误以为法治属于精神文明范畴
  severity: error
  source: cmmlu_legal_and_moral_basis_178
- pattern: 金钱至上.*人生目的
  correct: 为人民服务的人生目的是科学、高尚的人生目的
  description: 误以为金钱至上是值得终身遵奉的人生目的
  severity: error
  source: cmmlu_legal_and_moral_basis_179
- pattern: 以个人为中心.*人生目的
  correct: 为人民服务的人生目的是科学、高尚的人生目的
  description: 误以为以个人为中心是值得终身遵奉的人生目的
  severity: error
  source: cmmlu_legal_and_moral_basis_179
- pattern: 满足个体感官需要.*快乐.*人生目的
  correct: 为人民服务的人生目的是科学、高尚的人生目的
  description: 误以为满足个体感官需要和快乐是值得终身遵奉的人生目的
  severity: error
  source: cmmlu_legal_and_moral_basis_179
- pattern: 德治.*前提
  correct: 法治的前提是法制，即完备的法律制度体系
  description: 误以为德治是法治的前提
  severity: error
  source: cmmlu_legal_and_moral_basis_180
- pattern: 专制.*前提
  correct: 法治的前提是法制，而非专制
  description: 误以为专制是法治的前提
  severity: error
  source: cmmlu_legal_and_moral_basis_180
- pattern: 礼治.*前提
  correct: 法治的前提是法制，而非礼治
  description: 误以为礼治是法治的前提
  severity: error
  source: cmmlu_legal_and_moral_basis_180
- pattern: 民法.*核心地位|民法.*最高法律效力
  correct: 宪法在我国法律体系中居于核心地位，具有最高法律效力
  description: 误以为民法是法律体系的核心或具有最高效力
  severity: error
  source: cmmlu_legal_and_moral_basis_182
- pattern: 行政法.*核心地位|行政法.*最高法律效力
  correct: 宪法在我国法律体系中居于核心地位，具有最高法律效力
  description: 误以为行政法是法律体系的核心或具有最高效力
  severity: error
  source: cmmlu_legal_and_moral_basis_182
- pattern: 刑法.*核心地位|刑法.*最高法律效力
  correct: 宪法在我国法律体系中居于核心地位，具有最高法律效力
  description: 误以为刑法是法律体系的核心或具有最高效力
  severity: error
  source: cmmlu_legal_and_moral_basis_182
- pattern: 正确认识自我价值和社会价值的关系
  correct: 实现人生价值的根本途径是进行有意识、有目的的创造性实践活动
  description: 误以为正确认识价值关系就是实现人生价值的根本途径
  severity: error
  source: cmmlu_legal_and_moral_basis_183
- pattern: 培养积极进取的人生态度
  correct: 实现人生价值的根本途径是进行有意识、有目的的创造性实践活动
  description: 误以为积极进取的人生态度是实现人生价值的根本途径
  severity: error
  source: cmmlu_legal_and_moral_basis_183
- pattern: 自觉提高自我的主体素质和能力
  correct: 实现人生价值的根本途径是进行有意识、有目的的创造性实践活动
  description: 误以为提高主体素质和能力是实现人生价值的根本途径
  severity: error
  source: cmmlu_legal_and_moral_basis_183
- pattern: 诚信原则.*人际交往
  correct: 一视同仁、不嫌贫爱富体现的是平等原则，而非诚信原则
  description: 误将平等对待他人的要求归因于诚信原则
  severity: error
  source: cmmlu_legal_and_moral_basis_184
- pattern: 互助原则.*人际交往
  correct: 一视同仁、不嫌贫爱富体现的是平等原则，而非互助原则
  description: 误将平等对待他人的要求归因于互助原则
  severity: error
  source: cmmlu_legal_and_moral_basis_184
- pattern: 宽容原则.*人际交往
  correct: 一视同仁、不嫌贫爱富体现的是平等原则，而非宽容原则
  description: 误将平等对待他人的要求归因于宽容原则
  severity: error
  source: cmmlu_legal_and_moral_basis_184
- pattern: 心系民生苦乐.*推动历史进步
  correct: 这些历史事件主要体现的是抵御外来侵略、捍卫国家主权的精神，而非直接关注民生苦乐
  description: 误以为抗击外敌的事迹主要体现关心民生和推动社会进步
  severity: error
  source: cmmlu_legal_and_moral_basis_185
- pattern: 维护祖国统一.*促进民族团结
  correct: 这些历史事件主要体现的是抵御外来侵略、捍卫国家主权的精神，而非内部统一和民族团结
  description: 误以为抗击外敌的事迹主要体现维护国家统一和民族团结
  severity: error
  source: cmmlu_legal_and_moral_basis_185
- pattern: 开发祖国山河.*创造中华文明
  correct: 这些历史事件主要体现的是抵御外来侵略、捍卫国家主权的精神，而非开发山河和创造文明
  description: 误以为抗击外敌的事迹主要体现建设性贡献
  severity: error
  source: cmmlu_legal_and_moral_basis_185
- pattern: 个人的理想信念.*社会的理想信念
  correct: 这句话强调的是理想与信念的结合，而非个人与社会的结合
  description: 误将理想与信念的结合理解为个人理想与社会理想的结合
  severity: error
  source: cmmlu_legal_and_moral_basis_186
- pattern: 超越.*生活体验.*实际行动
  correct: 理想信念应建立在现实基础上，不能脱离生活体验和实际行动
  description: 误以为理想信念应超越现实生活
  severity: error
  source: cmmlu_legal_and_moral_basis_186
- pattern: 对不同的理想信念进行辨别和选择
  correct: 这句话强调的是理想与信念的内在统一，而非对不同理想信念的辨别选择
  description: 误将理想与信念的结合理解为对不同理想信念的辨别选择
  severity: error
  source: cmmlu_legal_and_moral_basis_186
- pattern: 统治阶级所有成员意志的总和
  correct: 法不是统治阶级所有成员意志的简单总和，而是通过国家意志表现出来的统治阶级的整体意志
  description: 误以为法是统治阶级每个成员个人意志的相加
  severity: error
  source: cmmlu_legal_and_moral_basis_187
- pattern: 统治阶级的所有意志都是法
  correct: 并非统治阶级的所有意志都是法，只有上升为国家意志的那部分意志才成为法
  description: 误以为统治阶级的一切意志都直接等同于法律
  severity: error
  source: cmmlu_legal_and_moral_basis_187
- pattern: 国家最高统治者意志的体现
  correct: 法不是国家最高统治者个人意志的体现，而是通过国家意志表现出来的统治阶级的整体意志
  description: 误以为法是最高统治者个人意志的体现，而非统治阶级的整体意志
  severity: error
  source: cmmlu_legal_and_moral_basis_187
- pattern: 救亡图存.*抵御外侮
  correct: 新时期我国爱国主义的主题是建设和发展中国特色社会主义
  description: 误以为救亡图存、抵御外侮是新时期爱国主义的主题
  severity: error
  source: cmmlu_legal_and_moral_basis_188
- pattern: 实现民族独立和人民解放
  correct: 新时期我国爱国主义的主题是建设和发展中国特色社会主义
  description: 误以为实现民族独立和人民解放是新时期爱国主义的主题
  severity: error
  source: cmmlu_legal_and_moral_basis_188
- pattern: 维护世界和平
  correct: 新时期我国爱国主义的主题是建设和发展中国特色社会主义
  description: 误以为维护世界和平是新时期爱国主义的主题
  severity: error
  source: cmmlu_legal_and_moral_basis_188
- pattern: 证据.*完整性
  correct: 证据的完整性指证据本身和证据链的完整，而非强调客观性
  description: 误以为'捕风捉影'和'主观臆断'强调的是证据的完整性
  severity: error
  source: cmmlu_legal_and_moral_basis_189
- pattern: 证据.*合法性
  correct: 证据的合法性指证据的收集和形式符合法律规定，而非强调客观性
  description: 误以为'捕风捉影'和'主观臆断'强调的是证据的合法性
  severity: error
  source: cmmlu_legal_and_moral_basis_189
- pattern: 证据.*关联性
  correct: 证据的关联性指证据与待证事实之间存在联系，而非强调客观性
  description: 误以为'捕风捉影'和'主观臆断'强调的是证据的关联性
  severity: error
  source: cmmlu_legal_and_moral_basis_189
- pattern: 消极地依赖自然
  correct: 人通过劳动和实践，根据自己的需要利用和改造自然，而非消极依赖
  description: 误以为人与自然的关系是消极依赖，忽视了人的能动性
  severity: error
  source: cmmlu_legal_and_moral_basis_190
- pattern: 独立于自然
  correct: 人不能独立于自然，人是自然的一部分，与自然相互依存
  description: 误以为人可以脱离自然而独立存在
  severity: error
  source: cmmlu_legal_and_moral_basis_190
- pattern: 人高于自然
  correct: 人不是高于自然，而是自然的一部分，需尊重自然规律
  description: 误以为人凌驾于自然之上，忽视人与自然的平等关系
  severity: error
  source: cmmlu_legal_and_moral_basis_190
- pattern: 社会关系.*决定.*人生态度
  correct: 社会关系的总和决定人的本质，而非人生态度
  description: 误以为社会关系决定人生态度
  severity: error
  source: cmmlu_legal_and_moral_basis_191
- pattern: 社会关系.*决定.*人生目的
  correct: 社会关系的总和决定人的本质，而非人生目的
  description: 误以为社会关系决定人生目的
  severity: error
  source: cmmlu_legal_and_moral_basis_191
- pattern: 社会关系.*决定.*人生道路
  correct: 社会关系的总和决定人的本质，而非人生道路
  description: 误以为社会关系决定人生道路
  severity: error
  source: cmmlu_legal_and_moral_basis_191
- pattern: 家庭美德.*主要内容
  correct: 文明礼貌、助人为乐、爱护公物、保护环境、遵纪守法是社会公德的主要内容，而非家庭美德
  description: 误将社会公德的内容归为家庭美德
  severity: error
  source: cmmlu_legal_and_moral_basis_192
- pattern: 环境道德.*主要内容
  correct: 文明礼貌、助人为乐、爱护公物、保护环境、遵纪守法是社会公德的主要内容，而非环境道德
  description: 误将社会公德的内容归为环境道德
  severity: error
  source: cmmlu_legal_and_moral_basis_192
- pattern: 职业道德.*主要内容
  correct: 文明礼貌、助人为乐、爱护公物、保护环境、遵纪守法是社会公德的主要内容，而非职业道德
  description: 误将社会公德的内容归为职业道德
  severity: error
  source: cmmlu_legal_and_moral_basis_192
- pattern: 建设和谐社会
  correct: 社会主义道德建设的核心是为人民服务
  description: 误以为建设和谐社会是道德建设的核心
  severity: error
  source: cmmlu_legal_and_moral_basis_193
- pattern: 为他人着想
  correct: 社会主义道德建设的核心是为人民服务，而非泛泛的为他人着想
  description: 误以为为他人着想是道德建设的核心
  severity: error
  source: cmmlu_legal_and_moral_basis_193
- pattern: 维护社会稳定
  correct: 社会主义道德建设的核心是为人民服务，维护社会稳定是目标之一而非核心
  description: 误以为维护社会稳定是道德建设的核心
  severity: error
  source: cmmlu_legal_and_moral_basis_193
- pattern: 规章制度.*道德
  correct: 道德规范依靠社会舆论、传统习俗和内心信念维系，而规章制度依靠组织纪律强制力
  description: 误以为规章制度与道德规范一样依靠内心信念和舆论维系
  severity: error
  source: cmmlu_legal_and_moral_basis_195
- pattern: 国家政策.*道德
  correct: 道德规范依靠社会舆论、传统习俗和内心信念维系，而国家政策依靠行政手段推行
  description: 误以为国家政策与道德规范一样依靠内心信念和舆论维系
  severity: error
  source: cmmlu_legal_and_moral_basis_195
- pattern: 法律规范.*道德
  correct: 道德规范依靠社会舆论、传统习俗和内心信念维系，而法律规范依靠国家强制力保障实施
  description: 误以为法律规范与道德规范一样依靠内心信念和舆论维系
  severity: error
  source: cmmlu_legal_and_moral_basis_195
- pattern: 维护小团体的利益
  correct: 社会主义集体主义原则反对狭隘的小团体主义，强调集体利益与个人正当利益的统一
  description: 误将小团体利益等同于集体利益，混淆了集体主义与小团体主义
  severity: error
  source: cmmlu_legal_and_moral_basis_196
- pattern: 先私后公，先己后人
  correct: 社会主义集体主义原则要求先公后私、先人后己，而非先私后公
  description: 错误理解集体主义中个人与集体的先后顺序，颠倒公私关系
  severity: error
  source: cmmlu_legal_and_moral_basis_196
- pattern: 压制个人，束缚个性
  correct: 社会主义集体主义原则重视和保障个人的正当利益与个性发展，而非压制个人
  description: 误以为集体主义会压制个人自由和个性，忽视了集体对个人正当利益的保障
  severity: error
  source: cmmlu_legal_and_moral_basis_196
- pattern: 集体主义.*道德建设核心
  correct: 我国社会主义道德建设的核心是为人民服务，集体主义是社会主义道德建设的原则
  description: 误将集体主义当作道德建设的核心，混淆了核心与原则
  severity: error
  source: cmmlu_legal_and_moral_basis_197
- pattern: 个人主义.*道德建设核心
  correct: 我国社会主义道德建设的核心是为人民服务，个人主义是与之对立的价值观
  description: 误以为个人主义是道德建设的核心，违背社会主义道德方向
  severity: error
  source: cmmlu_legal_and_moral_basis_197
- pattern: 利他主义.*道德建设核心
  correct: 我国社会主义道德建设的核心是为人民服务，利他主义是西方伦理概念，并非我国道德建设核心
  description: 误将利他主义等同于为人民服务，混淆了不同伦理体系的核心概念
  severity: error
  source: cmmlu_legal_and_moral_basis_197
- pattern: 担保法.*程序法
  correct: 《中华人民共和国担保法》属于民商法实体法，而非程序法
  description: 误以为担保法是程序法，实际上它是规范担保关系的实体法
  severity: error
  source: cmmlu_legal_and_moral_basis_198
- pattern: 公司法.*程序法
  correct: 《中华人民共和国公司法》属于商法实体法，而非程序法
  description: 误以为公司法是程序法，实际上它是规范公司组织与行为的实体法
  severity: error
  source: cmmlu_legal_and_moral_basis_198
- pattern: 维护国家统一.*促进民族团结
  correct: 这些历史事件体现的是抵御外来侵略、捍卫国家主权的精神，而非维护统一和民族团结
  description: 误将抗击外敌的历史事件归因于维护国家统一和民族团结的爱国主义表现
  severity: error
  source: cmmlu_legal_and_moral_basis_199
- pattern: 人民政协.*依法治国
  correct: 实现依法治国的根本保证是党的领导
  description: 误以为人民政协是依法治国的根本保证
  severity: error
  source: cmmlu_legal_and_moral_basis_201
- pattern: 人民当家作主.*依法治国
  correct: 实现依法治国的根本保证是党的领导
  description: 误以为人民当家作主是依法治国的根本保证
  severity: error
  source: cmmlu_legal_and_moral_basis_201
- pattern: 人民代表大会.*依法治国
  correct: 实现依法治国的根本保证是党的领导
  description: 误以为人民代表大会是依法治国的根本保证
  severity: error
  source: cmmlu_legal_and_moral_basis_201
- pattern: 富贵不能淫.*威武不能屈
  correct: 这是个人道德理想，而非社会理想
  description: 误将个人道德修养目标当作社会理想
  severity: error
  source: cmmlu_legal_and_moral_basis_202
- pattern: 三十亩地一头牛.*老婆孩子热炕头
  correct: 这是个人生活理想，而非社会理想
  description: 误将个人生活追求当作社会理想
  severity: error
  source: cmmlu_legal_and_moral_basis_202
- pattern: 谋一个适合自己的职位.*干一番益于人民的事业
  correct: 这是个人职业理想，而非社会理想
  description: 误将个人职业规划当作社会理想
  severity: error
  source: cmmlu_legal_and_moral_basis_202
- pattern: 资产阶级道德
  correct: 资产阶级道德以个人主义为核心，社会主义道德以集体主义为核心，后者更适应现时代社会经济关系
  description: 误以为资产阶级道德是现时代最先进的道德
  severity: error
  source: cmmlu_legal_and_moral_basis_203
- pattern: 宏观调控原则
  correct: 行政法的基本原则包括行政合法性原则、合理性原则和程序正当原则，宏观调控原则不属于行政法基本原则
  description: 误将宏观调控原则当作行政法的基本原则
  severity: error
  source: cmmlu_legal_and_moral_basis_204
- pattern: 诚实信用原则
  correct: 行政法的基本原则包括行政合法性原则、合理性原则和程序正当原则，诚实信用原则是民法基本原则而非行政法基本原则
  description: 误将诚实信用原则当作行政法的基本原则
  severity: error
  source: cmmlu_legal_and_moral_basis_204
- pattern: 罪刑法定原则
  correct: 行政法的基本原则包括行政合法性原则、合理性原则和程序正当原则，罪刑法定原则是刑法基本原则而非行政法基本原则
  description: 误将罪刑法定原则当作行政法的基本原则
  severity: error
  source: cmmlu_legal_and_moral_basis_204
- pattern: 选择与社会主导价值观相一致的人生价值目标
  correct: 实现人生价值的根本途径是进行有意识、有目的的创造性实践活动，而非仅选择与价值观一致的目标
  description: 误以为选择与社会价值观一致的目标是实现人生价值的根本途径，忽视了实践活动的决定性
  severity: error
  source: cmmlu_legal_and_moral_basis_207
- pattern: 依法治国.*本质要求
  correct: 依法治国是社会主义法治的核心内容，而非本质要求
  description: 误以为依法治国是社会主义法治的本质要求
  severity: error
  source: cmmlu_legal_and_moral_basis_208
- pattern: 服务大局.*本质要求
  correct: 服务大局是社会主义法治的重要使命，而非本质要求
  description: 误以为服务大局是社会主义法治的本质要求
  severity: error
  source: cmmlu_legal_and_moral_basis_208
- pattern: 公平正义.*本质要求
  correct: 公平正义是社会主义法治的价值追求，而非本质要求
  description: 误以为公平正义是社会主义法治的本质要求
  severity: error
  source: cmmlu_legal_and_moral_basis_208
- pattern: 党的领导.*道德建设核心
  correct: 我国社会主义道德建设的核心是为人民服务，党的领导是根本保证而非核心
  description: 误以为党的领导是道德建设的核心
  severity: error
  source: cmmlu_legal_and_moral_basis_209
- pattern: 以德治国.*道德建设核心
  correct: 我国社会主义道德建设的核心是为人民服务，以德治国是治国方略而非核心
  description: 误以为以德治国是道德建设的核心
  severity: error
  source: cmmlu_legal_and_moral_basis_209
- pattern: 陶冶情操.*道德修养
  correct: 道德修养的根本途径是勤于实践，加强道德行为训练，而非仅靠陶冶情操
  description: 误以为陶冶情操是道德修养的根本途径
  severity: error
  source: cmmlu_legal_and_moral_basis_210
- pattern: 闭门思过.*道德修养
  correct: 道德修养的根本途径是勤于实践，加强道德行为训练，而非仅靠闭门思过和自我批评
  description: 误以为闭门思过和自我批评是道德修养的根本途径
  severity: error
  source: cmmlu_legal_and_moral_basis_210
- pattern: 学思明理.*道德修养
  correct: 道德修养的根本途径是勤于实践，加强道德行为训练，而非仅靠学思明理提高道德认识
  description: 误以为学思明理是道德修养的根本途径
  severity: error
  source: cmmlu_legal_and_moral_basis_210
- pattern: 司法行政机关.*审查决定.*公诉
  correct: 提起公诉的案件由人民检察院审查决定
  description: 误以为司法行政机关负责审查决定公诉案件
  severity: error
  source: cmmlu_legal_and_moral_basis_211
- pattern: 拒绝接受其他民族.*先进东西
  correct: 爱国主义不排斥学习其他民族的先进文化和技术
  description: 误以为爱国主义意味着封闭排外，拒绝外来先进事物
  severity: error
  source: cmmlu_legal_and_moral_basis_212
- pattern: 爱历史上.*任何国家
  correct: 爱国主义爱的是现实中的祖国，而非历史上任何性质的任何国家
  description: 误以为爱国主义要求无条件爱所有历史形态的国家
  severity: error
  source: cmmlu_legal_and_moral_basis_212
- pattern: 鄙视.*离弃祖国.*不尽如人意
  correct: 爱国主义应理性看待祖国不足，积极改进而非鄙视离弃
  description: 误以为爱国主义要求对祖国缺点持鄙视和离弃态度
  severity: error
  source: cmmlu_legal_and_moral_basis_212
- pattern: 法律技术.*构成要素
  correct: 法律规范是法的构成要素中最主要的部分，具体规定权利、义务及法律后果
  description: 误以为法律技术是法的构成要素中最主要的部分
  severity: error
  source: cmmlu_legal_and_moral_basis_213
- pattern: 法律原则.*构成要素
  correct: 法律规范是法的构成要素中最主要的部分，具体规定权利、义务及法律后果
  description: 误以为法律原则是法的构成要素中最主要的部分
  severity: error
  source: cmmlu_legal_and_moral_basis_213
- pattern: 法律概念.*构成要素
  correct: 法律规范是法的构成要素中最主要的部分，具体规定权利、义务及法律后果
  description: 误以为法律概念是法的构成要素中最主要的部分
  severity: error
  source: cmmlu_legal_and_moral_basis_213
domain_facts:
  national_symbols:
  - symbol: 国旗
    description: 五星红旗
    details: 红色象征革命，大星代表中国共产党，四颗小星代表四个阶级
  - symbol: 国歌
    description: 《义勇军进行曲》
    details: 田汉作词，聂耳作曲
  - symbol: 国徽
    description: 中间是五星照耀下的天安门，周围是谷穗和齿轮
    details: 象征中国人民自五四运动以来的新民主主义革命斗争和工人阶级领导的工农联盟
  - symbol: 首都
    description: 北京
    details: null
  key_dates:
  - holiday: 国庆节
    date: 10月1日
    year_established: 1949
    significance: 中华人民共和国成立
  - holiday: 建党节
    date: 7月1日
    year_established: 1921
    significance: 中国共产党成立
  - holiday: 建军节
    date: 8月1日
    year_established: 1927
    significance: 南昌起义
  - holiday: 少先队建队日
    date: 10月13日
    year_established: 1949
    significance: 中国少年先锋队成立
  - holiday: 青年节
    date: 5月4日
    year_established: 1919
    significance: 五四运动
  - holiday: 教师节
    date: 9月10日
    year_established: 1985
    significance: 尊师重教
  - holiday: 国家宪法日
    date: 12月4日
    year_established: 2014
    significance: 增强全社会宪法意识，弘扬宪法精神
  - holiday: 儿童节
    date: 6月1日
    year_established: 1949
    significance: 保障儿童权利，促进儿童健康成长
  - holiday: 学雷锋纪念日
    date: 3月5日
    year_established: 1963
    significance: 毛泽东题词'向雷锋同志学习'，弘扬助人为乐精神
  - holiday: 中国人民抗日战争胜利纪念日
    date: 9月3日
    year_established: 1945
    significance: 铭记抗战历史，珍爱和平
  - holiday: 南京大屠杀死难者国家公祭日
    date: 12月13日
    year_established: 2014
    significance: 悼念30万遇难同胞，牢记历史、珍爱和平
  constitution_basics:
  - fact: 宪法地位
    description: 宪法是国家的根本法，具有最高法律效力
  - fact: 宪法内容
    description: 规定国家根本制度和根本任务、公民基本权利和义务
  - fact: 宪法的修改
    description: 由全国人民代表大会常委会或五分之一以上全国人大代表提议，并由全国人大以全体代表三分之二以上多数通过
  - fact: 宪法日
    description: 12月4日是国家宪法日（2014年设立）
  - fact: 宪法实施
    description: 全国各族人民、一切国家机关和武装力量、各政党和各社会团体、各企业事业组织都必须遵守宪法
  socialist_core_values:
  - value: 富强
    level: 国家层面
    description: 国家繁荣昌盛、人民共同富裕
  - value: 民主
    level: 国家层面
    description: 人民当家作主
  - value: 文明
    level: 国家层面
    description: 社会进步、文化繁荣的精神标识
  - value: 和谐
    level: 国家层面
    description: 人与人、人与社会、人与自然和睦相处
  - value: 自由
    level: 社会层面
    description: 在法律范围内自主活动和不受干涉的权利
  - value: 平等
    level: 社会层面
    description: 公民在法律面前一律平等
  - value: 公正
    level: 社会层面
    description: 公平正义
  - value: 法治
    level: 社会层面
    description: 依法治国，法律面前人人平等
  - value: 爱国
    level: 个人层面
