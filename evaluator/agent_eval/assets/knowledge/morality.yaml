  severity: error
  source: cmmlu_high_school_politics_94
- pattern: 禁止.*地方保护.*治本之策
  correct: 规范市场秩序的治本之策是形成以道德为支撑、法律为保障的社会信用制度，而非禁止地方保护等行为
  description: 误以为禁止地方保护等具体行为是规范市场秩序的根本措施
  severity: error
  source: cmmlu_high_school_politics_94
- pattern: 竞争.*市场经济.*必然条件
  correct: 竞争是市场经济的重要特征，但并非必然条件，且题干描述的是自发性而非竞争
