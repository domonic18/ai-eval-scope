subject: morality
description: 道德与法治知识库：国家象征、重要纪念日、宪法基础知识
version: '1.0'
constants:
- name: 中国国土面积
  extract_pattern: 中国.*国土面积.*?(\d+)万
  value: 960.0
  tolerance: 5.0
misconceptions:
- pattern: (?:中国)?首都(?:不是|不是)?北京
  correct: 中国的首都是北京
  description: 中华人民共和国首都是北京
  severity: error
- pattern: 五星红旗不是国旗
  correct: 五星红旗是中华人民共和国的国旗
  description: 五星红旗是中华人民共和国国旗
  severity: error
- pattern: 国歌不是义勇军进行曲
  correct: 中华人民共和国国歌是《义勇军进行曲》
  description: 《义勇军进行曲》由田汉作词、聂耳作曲，是中华人民共和国国歌
  severity: error
- pattern: 国庆节不是10月1日
  correct: 国庆节是10月1日（1949年10月1日中华人民共和国成立）
  description: 1949年10月1日是中华人民共和国国庆日
  severity: error
- pattern: 建党节不是7月1日
  correct: 建党节是7月1日（1921年7月中国共产党成立）
  description: 1921年7月中国共产党成立，7月1日为建党节
  severity: error
- pattern: 建军节不是8月1日
  correct: 建军节是8月1日（1927年8月1日南昌起义）
  description: 1927年8月1日南昌起义，8月1日为建军节
  severity: error
- pattern: 少先队建队日不是10月13日
  correct: 少先队建队日是10月13日（1949年10月13日中国少年先锋队成立）
  description: 1949年10月13日中国少年先锋队成立
  severity: error
- pattern: 人民代表大会制度不是根本政治制度
  correct: 人民代表大会制度是我国的根本政治制度
  description: 人民代表大会制度是中国的根本政治制度
  severity: error
- pattern: 宪法不是根本法
  correct: 宪法是国家的根本法，具有最高法律效力
  description: 宪法是治国安邦的总章程，具有最高法律效力
  severity: error
- pattern: 混合所有制经济.*性质.*公有制经济
  correct: 混合所有制经济的性质取决于控股权，不能简单归为公有制或非公有制
  description: 误以为混合所有制经济一定是公有制经济
  severity: error
  source: cmmlu_high_school_politics_0
- pattern: 混合所有制经济.*性质.*非公有制经济
  correct: 混合所有制经济的性质取决于控股权，不能简单归为公有制或非公有制
  description: 误以为混合所有制经济一定是非公有制经济
  severity: error
  source: cmmlu_high_school_politics_0
- pattern: 初次分配注重效率.*社会保障体系.*削弱
  correct: 初次分配处理好效率和公平的关系，有助于完善社会保障体系，而非削弱其作用
  description: 误以为初次分配强调公平会削弱社会保障体系
  severity: error
  source: cmmlu_high_school_politics_2
- pattern: 初次分配.*效率和公平.*生产效率和经济发展.*影响
  correct: 初次分配处理好效率和公平的关系，有利于激发劳动者积极性，促进生产效率和经济发展
  description: 误以为初次分配注重公平会阻碍生产效率和经济发展
  severity: error
  source: cmmlu_high_school_politics_2
- pattern: 放弃和选择是同等重要的两个方面
  correct: 放弃和选择是对立统一的关系，并非简单等同
  description: 误以为放弃和选择在重要性上完全等同，忽略了二者的对立统一关系
  severity: error
  source: cmmlu_high_school_politics_3
- pattern: 不同的思想意识具有相同的反作用
  correct: 不同的思想意识对事物发展具有不同的反作用
  description: 误以为所有思想意识的反作用相同，忽略了意识的性质差异
  severity: error
  source: cmmlu_high_school_politics_3
- pattern: 回避矛盾也不失为一种聪明的做法
  correct: 矛盾是客观存在的，不能回避，应积极面对和解决
  description: 误以为回避矛盾是聪明的做法，忽略了矛盾的普遍性和客观性
  severity: error
  source: cmmlu_high_school_politics_3
- pattern: 生产要素.*按贡献.*参与分配.*冲击.*按劳分配
  correct: 生产要素按贡献参与分配不会冲击按劳分配的主体地位，二者是互补关系
  description: 误以为生产要素按贡献参与分配会削弱按劳分配的主体地位
  severity: error
  source: cmmlu_high_school_politics_4
- pattern: 生产要素.*按贡献.*参与分配.*快速.*小康
  correct: 生产要素按贡献参与分配有利于提高效率，但人民生活快速达到小康水平需要多方面条件
  description: 误以为生产要素按贡献参与分配能直接导致人民生活快速达到小康水平
  severity: error
  source: cmmlu_high_school_politics_4
- pattern: 基本经济制度的基础
  correct: 公有制经济是我国基本经济制度的基础，民营经济是社会主义市场经济的重要组成部分
  description: 误以为民营经济是基本经济制度的基础，混淆了公有制与民营经济的地位
  severity: error
  source: cmmlu_high_school_politics_5
- pattern: 先进生产力的代表
  correct: 先进生产力的代表通常指工人阶级或科技创新主体，而非民营经济整体
  description: 误将民营经济整体视为先进生产力的代表，忽略了其多元性
  severity: error
  source: cmmlu_high_school_politics_5
- pattern: 社会主义经济的重要组成部分
  correct: 民营经济是社会主义市场经济的重要组成部分，而非社会主义经济（公有制经济）的重要组成部分
  description: 混淆了社会主义经济与社会主义市场经济的区别，社会主义经济特指公有制经济
  severity: error
  source: cmmlu_high_school_politics_5
- pattern: 分配制度决定.*基本经济制度
  correct: 基本经济制度由生产关系一定要适应生产力发展的客观规律决定，分配制度是基本经济制度的表现
  description: 误以为分配制度决定基本经济制度，混淆了经济制度与分配制度的关系
  severity: error
  source: cmmlu_high_school_politics_6
- pattern: 社会主义性质决定.*基本经济制度
  correct: 基本经济制度由生产力发展水平决定，社会主义性质是制度特征而非根本决定因素
  description: 误以为社会主义性质直接决定基本经济制度，忽略了生产力决定生产关系的根本规律
  severity: error
  source: cmmlu_high_school_politics_6
- pattern: 国情决定.*基本经济制度
  correct: 基本经济制度由生产关系一定要适应生产力发展的客观规律决定，国情是影响因素而非根本决定因素
  description: 误以为国情直接决定基本经济制度，混淆了国情与生产力决定作用的层次
  severity: error
  source: cmmlu_high_school_politics_6
- pattern: 我国在与东盟的贸易中一直处于劣势
  correct: 贸易逆差不等于劣势，我国对东盟出口增长迅速，贸易结构动态变化
  description: 误将单季度贸易逆差视为长期劣势，忽视贸易增长和结构变化
  severity: error
  source: cmmlu_high_school_politics_7
- pattern: 东盟是我国最大的贸易伙伴
  correct: 东盟是重要贸易伙伴，但并非我国最大的贸易伙伴（最大贸易伙伴通常为欧盟或美国）
  description: 误以为东盟是我国最大贸易伙伴，实际数据不支持
  severity: error
  source: cmmlu_high_school_politics_7
- pattern: 市场调节.*盲目性
  correct: 电视购物诈骗体现的是市场调节的自发性，而非盲目性
  description: 误将市场调节的盲目性用于描述欺诈行为
  severity: error
  source: cmmlu_high_school_politics_8
- pattern: 市场竞争.*必然结果
  correct: 电视购物诈骗不是市场竞争的必然结果，而是市场调节自发性的表现
  description: 误认为欺诈行为是市场竞争的必然结果
  severity: error
  source: cmmlu_high_school_politics_8
- pattern: 中国共产党.*履行.*职能
  correct: 中国共产党是执政党，履行政治领导职能，具体经济社会管理职能由政府行使
  description: 误以为中国共产党直接履行经济社会发展的具体职能
  severity: error
  source: cmmlu_high_school_politics_9
- pattern: 彻底消除贸易摩擦
  correct: 贸易摩擦只能缓解或减少，无法彻底消除
  description: 误以为通过加强贸易合作可以完全消除贸易摩擦
  severity: error
  source: cmmlu_high_school_politics_10
- pattern: 财政收入的主要来源
  correct: 关税是我国税收的重要税种，但财政收入的主要来源是税收整体，而非关税单独
  description: 误以为关税是财政收入的主要来源
  severity: error
  source: cmmlu_high_school_politics_11
- pattern: 专门对出口商品征收
  correct: 关税主要是对进口商品征收，出口商品通常不征或退税
  description: 误以为关税专门对出口商品征收
  severity: error
  source: cmmlu_high_school_politics_11
- pattern: 市场调控的主要杠杆
  correct: 关税是调节进出口的手段之一，但市场调控的主要杠杆是财政政策和货币政策
  description: 误以为关税是市场调控的主要杠杆
  severity: error
  source: cmmlu_high_school_politics_11
- pattern: 定期存款.*利息.*年息.*3.6%.*三年
  correct: 定期存款利息=本金×年利率×存期，10万元×3.6%×3年=10800元
  description: 误以为定期存款利息计算中存期与利率的乘积关系有误，导致结果偏差
  severity: error
  source: cmmlu_high_school_politics_12
- pattern: 混合所有制经济.*按劳分配与按资本要素分配相结合
  correct: 股份合作制属于集体经济，其分配方式是按资本要素分配与按劳分配相结合
  description: 误以为股份合作制是混合所有制经济
  severity: error
  source: cmmlu_high_school_politics_13
- pattern: 集体经济.*按劳分配与按个体劳动者的劳动成果分配相结合
  correct: 股份合作制的分配方式是按资本要素分配与按劳分配相结合，而非与按个体劳动者的劳动成果分配相结合
  description: 误以为股份合作制的分配方式包含按个体劳动者的劳动成果分配
  severity: error
  source: cmmlu_high_school_politics_13
- pattern: 国有经济.*按个体劳动者的劳动成果分配与按资本要素分配相结合
  correct: 股份合作制属于集体经济，分配方式是按资本要素分配与按劳分配相结合
  description: 误以为股份合作制是国有经济，且分配方式包含按个体劳动者的劳动成果分配
  severity: error
  source: cmmlu_high_school_politics_13
- pattern: 证券投资.*商业银行.*主要业务
  correct: 商业银行的主要业务是吸收存款、发放贷款和办理结算，证券投资不属于其主要业务
  description: 误以为证券投资是商业银行的主要业务
  severity: error
  source: cmmlu_high_school_politics_14
- pattern: 信托投资.*商业银行.*主要业务
  correct: 商业银行的主要业务是吸收存款、发放贷款和办理结算，信托投资不属于其主要业务
  description: 误以为信托投资是商业银行的主要业务
  severity: error
  source: cmmlu_high_school_politics_14
- pattern: 商业保险.*商业银行.*主要业务
  correct: 商业银行的主要业务是吸收存款、发放贷款和办理结算，商业保险不属于其主要业务
  description: 误以为商业保险是商业银行的主要业务
  severity: error
  source: cmmlu_high_school_politics_14
- pattern: 技术入股.*按劳分配
  correct: 技术入股属于按生产要素分配中的技术要素分配
  description: 误将技术入股收入归为按劳分配，混淆了按劳分配与按生产要素分配
  severity: error
  source: cmmlu_high_school_politics_15
- pattern: 技术入股.*按资本要素分配
  correct: 技术入股属于按生产要素分配中的技术要素分配，而非资本要素分配
  description: 误将技术入股收入归为按资本要素分配，混淆了技术要素与资本要素
  severity: error
  source: cmmlu_high_school_politics_15
- pattern: 技术入股.*按劳动要素分配
  correct: 技术入股属于按生产要素分配中的技术要素分配，而非按劳动要素分配
  description: 误将技术入股收入归为按劳动要素分配，混淆了技术要素与劳动要素
  severity: error
  source: cmmlu_high_school_politics_15
- pattern: 世博会.*经济意义.*只有d
  correct: 申办世博会对我国的经济意义包括扩大投资和消费需求、促进经济结构调整、增加就业、扩大开放促进国内企业参与国际竞争等多个方面
  description: 误以为世博会的经济意义仅限于扩大开放和促进国际竞争
  severity: error
  source: cmmlu_high_school_politics_16
- pattern: 世博会.*经济意义.*只有cd
  correct: 申办世博会对我国的经济意义包括扩大投资和消费需求、促进经济结构调整、增加就业、扩大开放促进国内企业参与国际竞争等多个方面
  description: 误以为世博会的经济意义仅限于增加就业和扩大开放
  severity: error
  source: cmmlu_high_school_politics_16
- pattern: 世博会.*经济意义.*只有bcd
  correct: 申办世博会对我国的经济意义包括扩大投资和消费需求、促进经济结构调整、增加就业、扩大开放促进国内企业参与国际竞争等多个方面
  description: 误以为世博会的经济意义不包括扩大投资和消费需求
  severity: error
  source: cmmlu_high_school_politics_16
- pattern: 取代美元.*第一大贸易结算货币
  correct: 人民币在区域贸易中使用增加，但短期内无法取代美元成为全球第一大贸易结算货币
  description: 误以为在区域贸易中使用人民币结算就能使人民币取代美元成为全球主要结算货币
  severity: error
  source: cmmlu_high_school_politics_17
- pattern: 大量发行人民币.*提高国际竞争力
  correct: 大量发行人民币会导致通货膨胀，反而削弱企业国际竞争力
  description: 误以为增发人民币能提升企业竞争力，忽视了通货膨胀的负面影响
  severity: error
  source: cmmlu_high_school_politics_17
- pattern: 人民币就会升值.*购买力增强
  correct: 使用人民币结算不必然导致人民币升值，汇率受多种因素影响
  description: 误以为在贸易中使用人民币结算会自动导致人民币升值和购买力增强
  severity: error
  source: cmmlu_high_school_politics_17
- pattern: 主观唯心主义.*坚白论
  correct: 公孙龙的《坚白论》认为‘白’与‘坚’可以独立于具体事物而存在，属于客观唯心主义，而非主观唯心主义
  description: 误将公孙龙的观点归为主观唯心主义，实际上其主张‘白’‘坚’是独立于人的意识之外的抽象实体
  severity: error
  source: cmmlu_high_school_politics_18
- pattern: 辩证的观点.*坚白论
  correct: 公孙龙割裂了‘白’与‘坚’的统一性，属于形而上学的观点，而非辩证的观点
  description: 误认为公孙龙的观点是辩证的，实际上他否认了事物属性的内在联系，是形而上学的
  severity: error
  source: cmmlu_high_school_politics_18
- pattern: 贸易保护主义.*不损害本国利益
  correct: 贸易保护主义在短期内可能保护部分本国产业，但长期会损害本国消费者利益和整体经济效率
  description: 误以为贸易保护主义不损害本国利益
  severity: error
  source: cmmlu_high_school_politics_19
- pattern: 贸易保护主义.*有利于独立自主
  correct: 贸易保护主义阻碍国际分工与合作，不利于经济全球化，而非真正促进独立自主
  description: 误以为贸易保护主义有利于独立自主
  severity: error
  source: cmmlu_high_school_politics_19
- pattern: 政府.*基础性作用
  correct: 在市场经济条件下，市场在资源配置中起决定性作用，政府发挥宏观调控作用
  description: 误以为政府在资源配置中起基础性作用，混淆了市场与政府的角色
  severity: error
  source: cmmlu_high_school_politics_20
- pattern: 少监督.*少管理
  correct: 政府应依法履行监督和管理职能，不能弱化必要的监管
  description: 误以为政府应减少监督和管理，忽视了政府监管的必要性
  severity: error
  source: cmmlu_high_school_politics_20
- pattern: 不能用行政手段
  correct: 政府可以运用行政手段等宏观调控工具调节经济活动，但需合理使用
  description: 误以为政府完全不能用行政手段调控经济，否认了宏观调控的合法性
  severity: error
  source: cmmlu_high_school_politics_20
- pattern: 公有制经济控制国民经济命脉
  correct: 国有经济控制国民经济命脉，而非公有制经济整体
  description: 误以为公有制经济整体控制国民经济命脉，混淆了公有制与国有经济
  severity: error
  source: cmmlu_high_school_politics_21
- pattern: 公有资产在各领域中占主体
  correct: 公有资产在社会总资产中占优势，而非在各领域中都占主体
  description: 误以为公有资产必须在所有领域都占主体地位
  severity: error
  source: cmmlu_high_school_politics_21
- pattern: 优先发展大型国有企业
  correct: 坚持公有制主体地位需要增强国有经济控制力，而非单纯优先发展大型国企
  description: 误以为优先发展大型国有企业就能实现公有制主体地位
  severity: warning
  source: cmmlu_high_school_politics_21
- pattern: 中国.*主导作用
  correct: 中国—东盟自由贸易区是平等互利、合作共赢的区域合作组织，中国不发挥主导作用
  description: 误以为中国在东盟自由贸易区中起主导作用
  severity: error
  source: cmmlu_high_school_politics_22
- pattern: 劳动收入.*属于按劳分配
  correct: 劳动收入不一定属于按劳分配，按劳分配只存在于公有制经济中，其他所有制经济中的劳动收入属于按生产要素分配等
  description: 误以为所有劳动收入都是按劳分配，忽略了所有制性质对分配方式的决定作用
  severity: error
  source: cmmlu_high_school_politics_23
- pattern: 劳动收入.*属于按劳动力价值分配
  correct: 劳动收入不一定属于按劳动力价值分配，按劳动力价值分配主要存在于私营经济、外资经济中，公有制经济中的劳动收入属于按劳分配
  description: 误以为所有劳动收入都是按劳动力价值分配，忽略了公有制经济中按劳分配的存在
