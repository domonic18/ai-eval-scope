  source: cmmlu_high_school_politics_98
- pattern: 指导成员国摆脱国际收支困境
  correct: 世贸组织主要关注贸易规则，不直接指导成员国解决国际收支问题
  description: 误以为世贸组织能有效指导成员国摆脱国际收支困境
  severity: error
  source: cmmlu_high_school_politics_98
- pattern: 农产品.*出口.*有利
  correct: 经济全球化对发展中国家农产品出口可能带来竞争压力，而非必然有利
