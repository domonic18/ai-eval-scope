  severity: error
  source: cmmlu_chinese_history_214
- pattern: 合议既成.*《天津条约》
  correct: 合议既成是指甲午战争后签订《马关条约》
  description: 误将《马关条约》签订后的洋务高潮与《天津条约》混淆
  severity: error
  source: cmmlu_chinese_history_214
- pattern: 合议既成.*《北京条约》
  correct: 合议既成是指甲午战争后签订《马关条约》
  description: 误将《马关条约》签订后的洋务高潮与《北京条约》混淆
  severity: error
  source: cmmlu_chinese_history_214
- pattern: 逐渐由官办向官督商办转变
