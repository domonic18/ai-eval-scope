subject: history
description: 中国与世界历史知识准确性规则（K-12 教育）
version: '1.0'
constants:
- name: 中华人民共和国成立
  extract_pattern: (?:中华人民共和国|新中国).*成立.*(?:于|在|公元)\s*(\d{4})|成立(?:于|在)\s*(\d{4})年.*中华人民共和国
  value: 1949
  tolerance: 0
  description: 1949年10月1日
- name: 鸦片战争爆发
  extract_pattern: (?:鸦片战争|第一次鸦片战争).*(?:爆发|开始|发生).*(?:于|在|公元)?\s*(\d{4})|(?:于|在)\s*(\d{4})年.*(?:鸦片战争|第一次鸦片战争)
  value: 1840
  tolerance: 0
  description: 1840年
- name: 五四运动
  extract_pattern: (?:五四运动|五四爱国运动).*(?:爆发|发生|于|在).*(?:公元)?\s*(\d{4})|(?:于|在)\s*(\d{4})年.*(?:五四|五·四)
  value: 1919
  tolerance: 0
  description: 1919年5月4日
- name: 中国共产党成立
  extract_pattern: (?:中国共产党|中共).*成立.*(?:于|在|公元)?\s*(\d{4})|成立(?:于|在)\s*(\d{4})年.*(?:中国共产党|中共)
  value: 1921
  tolerance: 0
  description: 1921年7月
- name: 辛亥革命
  extract_pattern: (?:辛亥革命|武昌起义).*(?:爆发|发生|于|在).*(?:公元)?\s*(\d{4})|(?:于|在)\s*(\d{4})年.*(?:辛亥革命|武昌起义)
  value: 1911
  tolerance: 0
  description: 1911年
- name: 秦统一六国
  extract_pattern: (?:秦始皇|秦王嬴政|秦).*统一.*六国.*(?:于|在|公元).*?(-?\d{3,4})|(?:于|在).*?(-?\d{3,4})年.*秦.*统一
  value: -221
  tolerance: 0
  description: 公元前221年
- name: 成吉思汗建立蒙古
  extract_pattern: (?:成吉思汗|铁木真|蒙古汗国|蒙古帝国).*建立.*(?:于|在|公元)?\s*(\d{4})|(?:于|在)\s*(\d{4})年.*(?:成吉思汗|铁木真).*建立
  value: 1206
  tolerance: 0
  description: 1206年
- name: 郑和下西洋
  extract_pattern: (?:郑和|三保太监).*下西洋.*(?:于|在|首次|第一次|开始).*(?:公元)?\s*(\d{4})|(?:于|在)\s*(\d{4})年.*郑和.*下西洋
  value: 1405
  tolerance: 0
  description: 1405年首次出发
misconceptions:
- pattern: 祖冲之.*(?:唐朝|宋代|明朝|清代|汉代|晋代|唐代|宋朝|明代|清代|汉代|晋代|唐人|宋人|明人|清人|汉人)
  correct: 祖冲之（429-500）是南北朝时期数学家，非唐宋明清汉晋
  description: 祖冲之朝代归属错误
  severity: warning
- pattern: (?:唐朝|宋代|明朝|清代|汉代|唐代|宋朝|明代|清朝|汉人).*祖冲之|祖冲之是(?:唐朝|宋代|明朝|清代|汉代|唐代|宋朝|明代|清朝)
  correct: 祖冲之（429-500）是南北朝时期数学家
  description: 祖冲之朝代归属错误（反向匹配）
  severity: warning
- pattern: 刘徽.*(?:唐朝|宋代|明朝|清代|汉代|南北朝)
  correct: 刘徽（约225-295）是三国魏时期数学家，非唐宋明清汉南北朝
  description: 刘徽朝代归属错误
  severity: error
- pattern: (?:唐朝|宋代|明朝|清代|汉代|南北朝).*刘徽|刘徽是(?:唐朝|宋代|明朝|清代|汉代|南北朝)
  correct: 刘徽（约225-295）是三国魏时期数学家
  description: 刘徽朝代归属错误（反向匹配）
  severity: error
- pattern: 张衡.*(?:唐朝|宋代|明朝|清代)
  correct: 张衡（78-139）是东汉科学家，非唐宋明清
  description: 张衡朝代归属错误
  severity: error
- pattern: (?:唐朝|宋代|明朝|清代).*张衡|张衡是(?:唐朝|宋代|明朝|清代)
  correct: 张衡（78-139）是东汉科学家
  description: 张衡朝代归属错误（反向匹配）
  severity: error
- pattern: 沈括.*(?:唐朝|明朝|清代|元代)
  correct: 沈括（1031-1095）是北宋科学家，非唐明清元
  description: 沈括朝代归属错误
  severity: error
- pattern: (?:唐朝|明朝|清代|元代).*沈括|沈括是(?:唐朝|明朝|清代|元代)
  correct: 沈括（1031-1095）是北宋科学家
  description: 沈括朝代归属错误（反向匹配）
  severity: error
- pattern: 宋应星.*(?:唐朝|宋代|元代|清代)
  correct: 宋应星（1587-1666）是明末科学家，非唐宋元清
  description: 宋应星朝代归属错误
  severity: error
- pattern: (?:唐朝|宋代|元代|清代).*宋应星|宋应星是(?:唐朝|宋代|元代|清代)
  correct: 宋应星（1587-1666）是明末科学家
  description: 宋应星朝代归属错误（反向匹配）
  severity: error
- pattern: 华罗庚.*古代|华罗庚.*古人|古代.*华罗庚
  correct: 华罗庚（1910-1985）是近现代数学家，不是古代人物
  description: 华罗庚时代归属错误
  severity: error
- pattern: 陈景润.*古代|陈景润.*古人|古代.*陈景润
  correct: 陈景润（1933-1996）是近现代数学家，不是古代人物
  description: 陈景润时代归属错误
  severity: error
- pattern: 高斯.*(?:中国|中国的|中国人|我国|我国古代)
  correct: 高斯（Carl Friedrich Gauss，1777-1855）是德国数学家，不是中国人
  description: 高斯国籍归属错误
  severity: error
- pattern: 中华人民共和国.*成立.*(?:194[0-8]|195[0-9]|193\d)年?
  correct: 中华人民共和国成立于1949年10月1日
  description: 新中国成立年份错误
  severity: error
- pattern: (?:鸦片战争|第一次鸦片战争).*(?:183\d|184[1-9]|18[56789]\d)年?
  correct: 鸦片战争爆发于1840年
  description: 鸦片战争年份错误
  severity: error
- pattern: (?:五四运动|五四).*(?:191[0-8]|192\d|190\d)年?
  correct: 五四运动发生于1919年5月4日
  description: 五四运动年份错误
  severity: error
- pattern: (?:中国共产党|中共).*成立.*(?:192[02-9]|19[01]\d|193\d)年?
  correct: 中国共产党成立于1921年7月
  description: 中共成立年份错误
  severity: error
- pattern: (?:辛亥革命|武昌起义).*(?:191[02]|190\d|192\d|18\d\d)年?
  correct: 辛亥革命爆发于1911年
  description: 辛亥革命年份错误
  severity: error
- pattern: (?:秦始皇|秦).*统一.*六国.*(?:-?2[012]\d|-?23\d|-?19\d|-?18\d)年?
  correct: 秦统一六国在公元前221年
  description: 秦统一六国年份错误
  severity: error
- pattern: (?:成吉思汗|铁木真).*建立.*蒙古.*(?:11\d\d|12[0-57-9]\d|13\d\d)年?
  correct: 成吉思汗于1206年建立蒙古汗国
  description: 成吉思汗建国年份错误
  severity: error
- pattern: 郑和.*下西洋.*(?:13\d\d|14[0-9]\d|14[1-9]\d|15[1-9]\d)年?
  correct: 郑和于1405年首次下西洋
  description: 郑和下西洋年份错误
  severity: error
- pattern: (?:秦始皇|嬴政).*统一.*文字.*(?:楷书|行书|草书|简体)
  correct: 秦始皇统一文字为小篆（隶书也在秦朝发展，但统一推行的是小篆）
  description: 秦始皇统一文字应为小篆
  severity: warning
- pattern: 造纸术.*蔡伦.*发明
  correct: 蔡伦改进了造纸术（西汉已有植物纤维纸），并非发明造纸术
  description: 蔡伦改进而非发明造纸术
  severity: warning
- pattern: 四大发明.*唐代
  correct: 四大发明（造纸术、印刷术、火药、指南针）成熟时期不同，并非都在唐代
  description: 四大发明成熟时期不同
  severity: warning
- pattern: 工商业者.*倡导革命.*新中坚力量
  correct: 工商业者并非普遍倡导革命，其政治态度多样，部分支持立宪或改良
  description: 误以为工商业者整体是革命的中坚力量
  severity: error
  source: cmmlu_chinese_history_0
- pattern: 工商业者.*传统的社会群体
  correct: 工商业者是伴随民族资本主义产生而兴起的新社会力量，不属于传统群体
  description: 误以为工商业者仍属于传统社会群体
  severity: error
  source: cmmlu_chinese_history_0
- pattern: 工商业者.*有利可图
  correct: 工商业者投身社会事务主要出于民族意识和责任感，而非单纯逐利
  description: 误以为工商业者参与社会事务只为谋取私利
  severity: error
  source: cmmlu_chinese_history_0
- pattern: 商品化生产普遍
  correct: 材料反映的是土地所有权与经营权分离，佃农租种土地，并非强调农产品商品化程度
  description: 误将土地租佃关系等同于农业商品化生产
  severity: error
  source: cmmlu_chinese_history_1
- pattern: 利润微不足道
  correct: 材料未涉及农业生产利润高低，地主出租土地本身即说明有利可图
  description: 误以为地主出租土地是因为农业利润低
  severity: error
  source: cmmlu_chinese_history_1
- pattern: 土地所有权变更极为频繁
  correct: 材料显示土地所有权集中于城居地主，但未体现频繁变更
  description: 误将土地集中等同于所有权频繁变更
  severity: error
  source: cmmlu_chinese_history_1
- pattern: 除井田.*民得买卖
  correct: 铁制农具普及促进了土地私有制发展，但‘除井田，民得买卖’是战国时期商鞅变法的内容，并非直接由铁器普及导致
  description: 误以为铁器普及直接导致井田制废除和土地自由买卖
  severity: error
  source: cmmlu_chinese_history_2
- pattern: 宗庙之牺.*畎亩之勤
  correct: 铁制农具普及使牛耕技术推广，但‘宗庙之牺为畎亩之勤’描述的是牛耕代替人力，而非铁器普及的直接结果
  description: 误以为铁器普及直接导致祭祀用牛转为农耕用牛
  severity: error
  source: cmmlu_chinese_history_2
- pattern: 初税田
  correct: 铁制农具普及提高了农业生产力，但‘初税田’是春秋时期鲁国的税制改革，并非铁器普及的直接社会影响
  description: 误以为铁器普及直接导致初税亩制度的出现
  severity: error
  source: cmmlu_chinese_history_2
- pattern: 经济受到鸦片战争的破坏
  correct: 鸦片战争后中国经济受到冲击，但人均消费英国棉纱棉布低的主因是小农经济自给自足
  description: 误以为鸦片战争直接导致中国棉纺织品消费低
  severity: error
  source: cmmlu_chinese_history_3
- pattern: 实行保护本国经济的政策
  correct: 当时中国并未实行系统的保护本国经济政策，消费低源于小农经济的自然抵制
  description: 误以为清政府有意识地保护本国经济
  severity: error
  source: cmmlu_chinese_history_3
- pattern: 经济的发展水平低于印度
  correct: 中国经济发展水平并不低于印度，消费低是因小农经济自给自足而非经济落后
  description: 误以为中国整体经济水平低于印度
  severity: error
  source: cmmlu_chinese_history_3
- pattern: 日内瓦会议.*成功
  correct: 日内瓦会议主要解决印度支那和朝鲜问题，并非运用'和而不同'思想处理不同社会制度国家关系的范例
  description: 误以为日内瓦会议是运用'和而不同'思想处理不同社会制度国家关系的成功范例
  severity: error
  source: cmmlu_chinese_history_4
- pattern: 《中苏友好同盟互助条约》.*成功
  correct: 《中苏友好同盟互助条约》是同一社会制度国家间的同盟条约，不体现'和而不同'思想
  description: 误以为签订《中苏友好同盟互助条约》是运用'和而不同'思想处理不同社会制度国家关系的范例
  severity: error
  source: cmmlu_chinese_history_4
- pattern: 香港.*澳门.*回归
  correct: 香港、澳门回归是解决领土主权问题，并非处理不同社会制度国家间关系的范例
  description: 误以为香港、澳门回归是运用'和而不同'思想处理不同社会制度国家关系的范例
  severity: error
  source: cmmlu_chinese_history_4
- pattern: 直接证据
  correct: 传说不能作为直接证据，但能反映历史信息
  description: 误以为传说可以直接作为历史证据
  severity: error
  source: cmmlu_chinese_history_5
- pattern: 证明了.*真实存在
  correct: 传说不能证明历史人物的真实存在
  description: 误以为传说可以证明历史人物真实存在
  severity: error
  source: cmmlu_chinese_history_5
- pattern: 没有史料价值
  correct: 传说具有一定的史料价值，能折射历史信息
  description: 误以为传说完全没有史料价值
  severity: error
  source: cmmlu_chinese_history_5
- pattern: 农业技术.*重要性
  correct: 这段话主要强调儒家对农业的重视，而非单纯讨论农业技术的重要性
  description: 误以为这段话的核心是强调农业技术和重要性，而忽略了其儒家思想背景
  severity: error
  source: cmmlu_chinese_history_6
- pattern: 历法.*农业
  correct: 这段话主要强调儒家对农业的重视，历法与农业的关系只是其中提及的一个方面，并非主旨
  description: 误以为这段话的核心是历法与农业的关系，而忽略了其强调儒家思想的整体意图
  severity: error
  source: cmmlu_chinese_history_6
- pattern: 改进生产工具
  correct: 这段话主要强调儒家对农业的重视，改进生产工具的意义只是其中提及的一个例子，并非主旨
  description: 误以为这段话的核心是改进生产工具的意义，而忽略了其强调儒家思想的整体意图
  severity: error
  source: cmmlu_chinese_history_6
- pattern: 废止.*海禁
  correct: 明隆庆开海是有条件地开放海禁，并未完全废止
  description: 误以为隆庆开海是完全废止了海禁政策
  severity: error
  source: cmmlu_chinese_history_7
- pattern: 巡抚.*决策权
  correct: 巡抚只是提出建议，最终决策权在皇帝
  description: 误以为巡抚拥有对外贸易的最终决策权
  severity: error
  source: cmmlu_chinese_history_7
- pattern: 朝贡贸易.*瓦解
  correct: 材料未体现朝贡贸易体系瓦解，只是开放了民间海外贸易
  description: 误以为隆庆开海意味着官方朝贡贸易体系已瓦解
  severity: error
  source: cmmlu_chinese_history_7
- pattern: 八七会议.*武装反抗
  correct: 八七会议发生在1927年，不是长征期间；长征期间的政策调整是发表‘八一宣言’，号召停止内战，一致抗日
  description: 误以为八七会议是长征期间的政策调整
  severity: error
  source: cmmlu_chinese_history_8
- pattern: 七大.*确立毛泽东思想
  correct: 七大召开于1945年，不是长征期间；长征期间的政策调整是发表‘八一宣言’，号召停止内战，一致抗日
  description: 误以为七大是长征期间的政策调整
  severity: error
  source: cmmlu_chinese_history_8
- pattern: 遵义会议.*纠正.*左倾
  correct: 遵义会议纠正了军事路线错误，但题目问的是针对民族矛盾加剧的方针调整，即发表‘八一宣言’号召停止内战、一致抗日
  description: 误以为遵义会议是应对民族矛盾加剧的政策调整
  severity: error
  source: cmmlu_chinese_history_8
- pattern: 中央集权
  correct: 《周礼·考工记》描述的王城布局体现的是中正有序的礼制思想，而非中央集权
  description: 误将王城规划中的对称、等级秩序等同于中央集权政治制度
  severity: error
  source: cmmlu_chinese_history_9
- pattern: 敬天法祖
  correct: 《周礼·考工记》中左宗庙右社稷体现的是宗法礼制，但整体布局核心思想是中正有序
  description: 误以为宗庙和社稷的布局直接代表敬天法祖，忽略了整体规划的中正有序原则
  severity: warning
  source: cmmlu_chinese_history_9
- pattern: 君权神授
  correct: 《周礼·考工记》的王城设计强调礼制秩序，而非君权神授的政治神学
  description: 误将王城规划的等级秩序解释为君权神授思想
  severity: error
  source: cmmlu_chinese_history_9
- pattern: 官员考核.*民本思想
  correct: 中国古代官员考核主要依据政绩、德行和法度，而非单一的民本思想
  description: 误以为官员考核的主要依据是民本思想
  severity: error
  source: cmmlu_chinese_history_10
- pattern: 官民.*共同政治诉求
  correct: 古代官民之间并非具有共同政治诉求，官员代表皇权统治，民众处于被统治地位
  description: 误以为官民之间存在共同的政治诉求
  severity: error
  source: cmmlu_chinese_history_10
- pattern: 宗族关系.*执政基础
  correct: 中国古代执政基础是皇权专制和官僚体系，而非宗族关系
  description: 误以为宗族关系是古代执政的基础
  severity: error
  source: cmmlu_chinese_history_10
- pattern: 受人凌辱.*甲午战败
  correct: 李鸿章在《示文儿》信中提到的'受人凌辱'泛指列强侵略，并非特指甲午战败
  description: 误以为'受人凌辱'仅指甲午战败，忽略了信中对工商业落后导致国家受辱的总体论述
  severity: error
  source: cmmlu_chinese_history_11
- pattern: 洋务运动.*抵制.*侵略
