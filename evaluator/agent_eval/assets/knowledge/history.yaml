  severity: error
  source: cmmlu_chinese_history_319
- pattern: 《天津条约》.*惩办.*首祸诸臣
  correct: 《天津条约》是1858年第二次鸦片战争期间签订，不涉及惩办首祸诸臣、禁止科举等内容
  description: 误以为《天津条约》包含惩办首祸诸臣等条款
  severity: error
