- pattern: 拒绝参加城邦举行的戏剧表演
  correct: 拒绝参加戏剧表演属于个人文化选择，并非严重威胁民主政治的行为，不会因此被陶片放逐
  description: 误以为不参加城邦文化活动会触发陶片放逐法
