- pattern: 余粮征集制
  correct: 余粮征集制是强制征收农民余粮，不允许自由商品交换
  description: 误以为余粮征集制允许农民进行商品交换
  severity: error
  source: cmmlu_chinese_history_187
- pattern: 农业集体化
  correct: 农业集体化是将农民土地集中经营，限制个体商品交换
  description: 误以为农业集体化允许农民自由出售农产品
  severity: error
  source: cmmlu_chinese_history_187
- pattern: 减耕减产.*补贴
  correct: 减耕减产补贴是鼓励减少生产，与允许商品交换无关
  description: 误以为减耕减产补贴措施体现了允许农民进行商品交换
  severity: error
  source: cmmlu_chinese_history_187
- pattern: 加速.*国民经济.*恢复
  correct: 一五计划期间国民经济已基本恢复，粮食计划供应制度主要服务于工业化战略
  description: 误以为粮食计划供应制度加速了国民经济恢复，实际上国民经济恢复在1952年底已基本完成
  severity: error
  source: cmmlu_chinese_history_188
- pattern: 缓解.*灾害.*粮食短缺
  correct: 粮食计划供应制度并非针对灾害，而是为保障工业化战略实施而实行的长期制度
  description: 误以为粮食计划供应制度是为了缓解灾害造成的粮食短缺，实际是工业化战略的配套措施
  severity: error
  source: cmmlu_chinese_history_188
- pattern: 有利于.*资本主义工商业改造
  correct: 粮食计划供应制度与资本主义工商业改造无直接关系，主要服务于工业化战略
  description: 误以为粮食计划供应制度有利于资本主义工商业改造，实际两者是不同领域的政策
  severity: error
  source: cmmlu_chinese_history_188
- pattern: 中国.*近代文明.*对西方.*吸引力
  correct: 西方文化吸收中国文化是基于自身发展需求，而非中国近代文明的吸引力
  description: 误以为中国近代文明对西方具有吸引力，实际是西方基于自身发展需求吸收中国文化
  severity: error
  source: cmmlu_chinese_history_189
- pattern: 中西文化.*交融.*过程.*相似
  correct: 中西文化交融过程存在明显差异，西方主动吸收而中国被迫转型
  description: 误以为中西文化交融过程相似，实际西方是主动吸收，中国是被动转型
  severity: error
  source: cmmlu_chinese_history_189
- pattern: 文化.*自身魅力.*决定.*传播程度
  correct: 文化传播程度不仅取决于自身魅力，还受对方文化发展需求等因素影响
  description: 误以为文化传播程度完全由自身魅力决定，忽略了其他因素如对方文化发展需求
  severity: error
  source: cmmlu_chinese_history_189
- pattern: 西汉州刺史.*明监察御史
  correct: 西汉州刺史为地方监察官，明监察御史为中央监察官，二者地位和职权不同
  description: 误以为西汉州刺史与明监察御史在地位和职权上大体相当
  severity: error
  source: cmmlu_chinese_history_190
- pattern: 宋提点刑狱司.*明通政司
  correct: 宋提点刑狱司主管地方司法刑狱，明通政司掌内外章奏和臣民密封申诉，二者职能不同
  description: 误以为宋提点刑狱司与明通政司在地位和职权上大体相当
  severity: error
  source: cmmlu_chinese_history_190
- pattern: 东周诸侯国.*元省制
  correct: 东周诸侯国是分封制下的独立政权，元省制是中央集权下的地方行政机构，二者性质不同
  description: 误以为东周诸侯国与元省制在地位和职权上大体相当
  severity: error
  source: cmmlu_chinese_history_190
- pattern: 淮海战役.*解放.*王府百货
  correct: 王府百货店位于北京，北京和平解放发生在平津战役胜利后
  description: 误以为淮海战役胜利后解放了北京地区
  severity: error
  source: cmmlu_chinese_history_191
- pattern: 辽沈战役.*解放.*王府百货
  correct: 王府百货店位于北京，北京和平解放发生在平津战役胜利后
  description: 误以为辽沈战役胜利后解放了北京地区
  severity: error
  source: cmmlu_chinese_history_191
- pattern: 渡江战役.*解放.*王府百货
  correct: 王府百货店位于北京，北京和平解放发生在平津战役胜利后，渡江战役解放的是南京等地
  description: 误以为渡江战役胜利后解放了北京地区
  severity: error
  source: cmmlu_chinese_history_191
- pattern: 政权是由枪杆子中取得的
  correct: 提出“政权是由枪杆子中取得的”的是毛泽东
  description: 误以为该论断出自陈独秀
  severity: error
  source: cmmlu_chinese_history_192
- pattern: 中共.*一大.*上海组.*代表
  correct: 陈独秀未参加中共一大，不是上海组的代表
  description: 误以为陈独秀是中共一大的上海组代表
  severity: error
  source: cmmlu_chinese_history_192
- pattern: 指挥.*八一.*南昌起义
  correct: 指挥南昌起义的是周恩来、贺龙等，不是陈独秀
  description: 误以为陈独秀指挥了南昌起义
  severity: error
  source: cmmlu_chinese_history_192
- pattern: 马可·波罗.*传到欧洲
  correct: 马可·波罗是13世纪来华的旅行家，但许多中国物品早在更早时期就通过阿拉伯人传入欧洲
  description: 误以为马可·波罗是主要传播者，忽略了阿拉伯人在东西方交流中的关键作用
  severity: error
  source: cmmlu_chinese_history_193
- pattern: 奥斯曼土耳其.*传到欧洲
  correct: 奥斯曼土耳其兴起于13世纪末，而中国物品早在唐宋时期就已通过阿拉伯人传入欧洲
  description: 误以为奥斯曼土耳其人是传播者，实际上其兴起时间晚于中国物品西传的主要时期
  severity: error
  source: cmmlu_chinese_history_193
- pattern: 中国商人.*传到欧洲
  correct: 古代中国商人主要活跃在东亚和东南亚，将中国物品传到欧洲的主要中介是阿拉伯商人
  description: 误以为中国商人直接远航欧洲传播物品，忽略了阿拉伯商人的中介作用
  severity: error
  source: cmmlu_chinese_history_193
- pattern: 普遍认同.*一国两制
  correct: 两岸同胞对‘一国两制’的认同程度存在差异，并非普遍认同
  description: 误以为所有台湾同胞都普遍认同‘一国两制’构想
  severity: error
  source: cmmlu_chinese_history_194
- pattern: 台商投资.*厦门房地产
  correct: 金门居民在厦门购地置产是民间交流行为，不特指台商投资
  description: 将金门居民个人购房行为等同于台商投资
  severity: error
  source: cmmlu_chinese_history_194
- pattern: 台湾当局放弃.*经济交流限制
  correct: 台湾当局并未完全放弃对两岸经济交流的限制
  description: 误以为台湾当局已完全取消对两岸经济交流的限制
  severity: error
  source: cmmlu_chinese_history_194
- pattern: 地方商业.*官员经营
  correct: 地方商业并非均由官员经营，材料反映的是官员兼营商业的现象
  description: 误以为材料表明所有地方商业都由官员经营
  severity: error
  source: cmmlu_chinese_history_195
- pattern: 政府摒弃.*抑商政策
  correct: 清前期政府并未摒弃传统抑商政策，材料反映的是商业发展对社会风气的影响
  description: 误以为材料表明政府放弃了抑商政策
  severity: error
  source: cmmlu_chinese_history_195
- pattern: 仕商身份.*完全打破
  correct: 材料反映仕商身份界限有所松动，但并未完全打破
  description: 误以为材料表明仕商身份界限已完全消失
  severity: error
  source: cmmlu_chinese_history_195
- pattern: 恻隐之心.*《道德经》
  correct: 此段文字出自《孟子》，是孟子关于四端说的论述
  description: 误将孟子关于四端说的经典论述归为道家经典《道德经》
  severity: error
  source: cmmlu_chinese_history_196
- pattern: 恻隐之心.*《庄子》
  correct: 此段文字出自《孟子》，是孟子关于四端说的论述
  description: 误将孟子关于四端说的经典论述归为道家经典《庄子》
  severity: error
  source: cmmlu_chinese_history_196
- pattern: 恻隐之心.*《韩非子》
  correct: 此段文字出自《孟子》，是孟子关于四端说的论述
  description: 误将孟子关于四端说的经典论述归为法家经典《韩非子》
  severity: error
  source: cmmlu_chinese_history_196
- pattern: 君主集权.*强化
  correct: 科举制主要体现选才标准的变化，而非直接强化君主集权
  description: 误以为科举制的主要作用是强化君主集权
  severity: error
  source: cmmlu_chinese_history_197
- pattern: 选官.*思想品德
  correct: 科举制以分科考试、差额录取为主，注重知识水平而非思想品德
  description: 误以为科举制仍重视思想品德选拔
  severity: error
  source: cmmlu_chinese_history_197
- pattern: 官员特权.*否定
  correct: 科举制打破了门阀特权，但并未完全否定官员特权
  description: 误以为科举制彻底否定了所有官员特权
  severity: warning
  source: cmmlu_chinese_history_197
- pattern: 鸦片战争.*平等国家关系
  correct: 鸦片战争是英国为维护鸦片贸易、打开中国市场而发动的侵略战争，并非因中国不愿建立平等国家关系
  description: 误以为鸦片战争的根本原因是中外平等关系问题，而非英国侵略
  severity: error
  source: cmmlu_chinese_history_198
- pattern: 鸦片战争.*非正义
  correct: 鸦片战争是典型的非正义侵略战争，其非正义性不容否认
  description: 误以为鸦片战争的非正义性可以因其他原因被淡化或否定
  severity: error
  source: cmmlu_chinese_history_198
- pattern: 建立了汉朝与西方的联系
  correct: 张骞出使西域开启了中国与中亚的交往，但并未直接建立与西方的联系
  description: 误以为张骞出使西域直接建立了汉朝与西方的联系，实际上主要交往范围在中亚
  severity: error
  source: cmmlu_chinese_history_199
- pattern: 开辟了沟通中西的丝绸之路
  correct: 张骞出使西域为丝绸之路的开通奠定了基础，但丝绸之路是后来逐步形成的，并非由张骞一人开辟
  description: 误以为张骞出使西域直接开辟了丝绸之路，实际上他只是提供了关键信息
  severity: error
  source: cmmlu_chinese_history_199
- pattern: 确立了汉朝对西域的管辖权
  correct: 张骞出使西域并未确立汉朝对西域的管辖权，汉朝对西域的管辖是在后来设立的西域都护府等机构实现的
  description: 误以为张骞出使西域直接确立了汉朝对西域的管辖权
  severity: error
  source: cmmlu_chinese_history_199
- pattern: 国家行政权逐渐转移到君主手中
  correct: 自秦汉至宋元，君主权力逐渐加强，但国家行政权始终掌握在君主手中，并非逐渐转移
  description: 误以为国家行政权是从其他地方转移到君主手中，实际上君主一直掌握行政权
  severity: error
  source: cmmlu_chinese_history_200
- pattern: 宰相逐渐退出权力中心
  correct: 自秦汉至宋元，宰相权力逐渐被削弱，但并未退出权力中心，直到明清才废除宰相
  description: 误以为宰相在宋元时期已退出权力中心
  severity: error
  source: cmmlu_chinese_history_200
- pattern: 世卿世禄的贵族政治逐渐被打破
  correct: 世卿世禄的贵族政治在秦汉时期已被打破，并非自秦汉至宋元逐渐被打破
  description: 误以为世卿世禄的贵族政治在秦汉至宋元时期才逐渐被打破
  severity: error
  source: cmmlu_chinese_history_200
- pattern: 尊严的部分.*共和制
  correct: 尊严的部分指君主制，具有激发和保留崇敬之心的功能
  description: 误以为尊严的部分是共和制，混淆了君主制与共和制的功能
  severity: error
  source: cmmlu_chinese_history_201
- pattern: 尊严的部分.*立宪制
  correct: 尊严的部分指君主制，而非立宪制；立宪制是效率的部分
  description: 误以为尊严的部分是立宪制，混淆了立宪制与君主制的角色
  severity: error
  source: cmmlu_chinese_history_201
- pattern: 批判右倾错误的危害
  correct: 毛泽东意在阐释中国革命的性质，而非批判右倾错误
  description: 误以为毛泽东这段话是在批判右倾错误，实际上是在分析中国半殖民地半封建社会的特殊性，说明中国革命的性质不同于俄国
  severity: error
  source: cmmlu_chinese_history_202
- pattern: 借鉴俄国革命的经验
  correct: 毛泽东意在阐释中国革命的性质，而非借鉴俄国革命经验
  description: 误以为毛泽东是在借鉴俄国革命经验，实际上他是在对比中俄不同，强调中国资产阶级的革命性，从而阐释中国革命的性质
  severity: error
  source: cmmlu_chinese_history_202
- pattern: 扩大中国共产党的阶级基础
  correct: 毛泽东意在阐释中国革命的性质，而非扩大党的阶级基础
  description: 误以为毛泽东这段话是为了扩大党的阶级基础，实际上是在分析中国社会性质，说明中国革命与俄国革命的不同
  severity: error
  source: cmmlu_chinese_history_202
- pattern: 康熙帝.*亲政.*国耻
  correct: 康熙帝在位时期清朝国力强盛，并无割地赔款的国耻
  description: 误以为康熙帝时期有割地赔款的国耻
  severity: error
  source: cmmlu_chinese_history_203
- pattern: 乾隆帝.*亲政.*国耻
  correct: 乾隆帝在位时期清朝处于鼎盛，并无割地赔款的国耻
  description: 误以为乾隆帝时期有割地赔款的国耻
  severity: error
  source: cmmlu_chinese_history_203
- pattern: 宣统帝.*亲政.*更张
  correct: 宣统帝即位时年幼，未亲政，且清朝很快灭亡，无锐志更张之举
  description: 误以为宣统帝亲政并推行改革
  severity: error
  source: cmmlu_chinese_history_203
- pattern: 外来技术.*促进手工业发展
  correct: 外来技术冲击了传统手工业，导致其衰落而非发展
  description: 误以为外来技术传入会促进传统手工业发展，实际是打击了传统手工业
  severity: error
  source: cmmlu_chinese_history_204
- pattern: 洋货.*在口岸.*抵制
  correct: 洋货大量涌入并占据市场，并未遭到普遍抵制
  description: 误以为洋货在口岸遭到抵制，实际材料显示洋货广泛流通
  severity: error
  source: cmmlu_chinese_history_204
- pattern: 经营洋货.*店铺增多
  correct: 材料未提及店铺增多，而是强调传统手工业因洋货冲击而衰落
  description: 误以为材料反映经营洋货的店铺增多，实际材料侧重传统手工业的衰退
  severity: warning
  source: cmmlu_chinese_history_204
- pattern: 主权平等原则
  correct: 香港主权回归中国后，香港作为特别行政区不享有主权平等，而是遵循‘一国两制’原则
  description: 误以为香港与中国是主权平等关系，混淆了特别行政区与主权国家的地位
  severity: error
  source: cmmlu_chinese_history_205
- pattern: 三权分立原则
  correct: 香港特别行政区实行的是行政主导体制，而非三权分立原则
  description: 误以为香港政治体制采用三权分立，实际是行政主导
  severity: error
  source: cmmlu_chinese_history_205
- pattern: 地方自治原则
  correct: 香港享有的是高度自治权，而非一般的地方自治，且受‘一国两制’框架约束
  description: 误将香港的高度自治等同于普通地方自治，忽略了‘一国两制’的特殊性
  severity: error
  source: cmmlu_chinese_history_205
- pattern: 建立社会主义市场经济体制
  correct: 1979年中央决定直接导致设立经济特区，而非建立社会主义市场经济体制（后者于1992年十四大提出）
  description: 误将1979年广东福建先走一步的决定与1992年才提出的社会主义市场经济体制目标混淆
  severity: error
  source: cmmlu_chinese_history_206
- pattern: 开展国企改革
  correct: 1979年中央决定直接导致设立经济特区，国企改革是1984年后逐步推进的
  description: 误以为1979年决定直接引发国企改革，实际国企改革晚于经济特区设立
  severity: error
  source: cmmlu_chinese_history_206
- pattern: 推行家庭鞋产承包责任制
  correct: 1979年中央决定直接导致设立经济特区，家庭联产承包责任制是农村改革内容，与广东福建先走一步无关
  description: 误将农村改革（家庭联产承包责任制）与广东福建对外开放的决定混淆
  severity: error
  source: cmmlu_chinese_history_206
- pattern: 放纵欲望.*祸害.*苏格拉底
  correct: 苏格拉底主张节制欲望，但‘放纵欲望是最大的祸害’是亚里士多德的观点
  description: 误将亚里士多德关于欲望的观点归为苏格拉底
  severity: error
  source: cmmlu_chinese_history_207
- pattern: 去人欲.*李贽
  correct: 李贽主张‘穿衣吃饭即是人伦物理’，反对‘去人欲’；‘去人欲’是朱熹的观点
  description: 误将朱熹的‘去人欲’主张归为李贽
  severity: error
  source: cmmlu_chinese_history_207
- pattern: 穿衣吃饭.*人伦物理.*朱熹
  correct: ‘穿衣吃饭即是人伦物理’是李贽的观点，朱熹主张‘存天理，去人欲’
