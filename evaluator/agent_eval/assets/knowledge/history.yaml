  source: cmmlu_chinese_history_209
- pattern: 不愿史书记录.*真实言行
  correct: 宋太祖担心史官如实记录自己的过失，而非不愿记录真实言行
  description: 误以为宋太祖完全拒绝史书记录，实则他担心的是过失被记录
