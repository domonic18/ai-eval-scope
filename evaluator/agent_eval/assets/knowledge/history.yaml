  severity: error
  source: cmmlu_chinese_history_264
- pattern: 募役法.*保甲法
  correct: 募役法和保甲法主要解决徭役和军事问题，并非直接针对生产少导致的积贫积弱
  description: 误以为募役法和保甲法是王安石为根本解决生产少问题而推行的核心措施
