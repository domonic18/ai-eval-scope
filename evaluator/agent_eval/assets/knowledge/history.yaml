  source: cmmlu_world_history_31
- pattern: 二月革命推翻沙皇专
  correct: 列宁演讲中提到的革命是指彼得格勒武装起义（十月革命），而非二月革命
  description: 误以为列宁演讲中的革命是二月革命
  severity: error
  source: cmmlu_world_history_31
- pattern: 公开发表《四月提纲》
  correct: 列宁演讲中提到的革命是指彼得格勒武装起义（十月革命），而非《四月提纲》的发表
