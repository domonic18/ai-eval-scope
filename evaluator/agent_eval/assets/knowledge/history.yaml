    - dynasty: 中华人民共和国
      start_year: 1949
      end_year: null
      note: 新中国成立
  historical_figures:
    scientists:
    - name: 祖冲之
      dynasty: 南北朝
      period: 429-500
      contribution: 将圆周率精确到小数点后7位（3.1415926~3.1415927），著《缀术》
    - name: 刘徽
      dynasty: 三国魏
      period: 约225-295
      contribution: 割圆术计算圆周率至3.1416，著《九章算术注》
    - name: 张衡
      dynasty: 东汉
      period: 78-139
      contribution: 发明地动仪、浑天仪，天文历法
    - name: 沈括
      dynasty: 北宋
      period: 1031-1095
      contribution: 著《梦溪笔谈》，被誉为中国科学史里程碑
    - name: 宋应星
      dynasty: 明末
      period: 1587-1666
      contribution: 著《天工开物》，系统总结农业和手工业技术
    - name: 华罗庚
      dynasty: 近现代
      period: 1910-1985
      contribution: 解析数论、典型群、优选法推广
    - name: 陈景润
      dynasty: 近现代
      period: 1933-1996
      contribution: 哥德巴赫猜想'1+2'证明
    - name: 高斯
      dynasty: 德国
      period: 1777-1855
      contribution: 数论、微分几何、统计学基础，数学王子
    political_figures:
    - name: 秦始皇（嬴政）
      dynasty: 秦
      period: 前259-前210
      contribution: 统一六国、统一度量衡文字、修长城
    - name: 汉武帝（刘彻）
      dynasty: 西汉
      period: 前156-前87
      contribution: 罢黜百家独尊儒术、张骞通西域
    - name: 唐太宗（李世民）
      dynasty: 唐
      period: 598-649
      contribution: 贞观之治
    - name: 成吉思汗（铁木真）
      dynasty: 蒙古
      period: 1162-1227
      contribution: 1206年建立蒙古汗国
    - name: 朱元璋
      dynasty: 明
      period: 1328-1398
      contribution: 建立明朝
    - name: 孙中山
      dynasty: 近现代
      period: 1866-1925
      contribution: 辛亥革命、创立民国
    inventors:
    - name: 蔡伦
      dynasty: 东汉
      period: 约61-121
      contribution: 改进造纸术（西汉已有纸）
    - name: 毕昇
      dynasty: 北宋
      period: 约970-1051
      contribution: 发明活字印刷术
    - name: 郑和
      dynasty: 明
      period: 1371-1433
      contribution: 1405年起七次下西洋
  key_events:
    ancient:
    - event: 夏朝建立
      date: 约公元前2070年
      significance: 中国第一个王朝，启建立
    - event: 商鞅变法
      date: 公元前356年
      significance: 秦国富国强兵的基础
    - event: 秦统一六国
      date: 公元前221年
      significance: 中国首次大一统
    - event: 张骞通西域
      date: 公元前138年
      significance: 开辟丝绸之路
    - event: 造纸术改进
      date: 东汉（约105年）
      significance: 蔡伦改进造纸术
    - event: 活字印刷术发明
      date: 北宋（约1040年）
      significance: 毕昇发明泥活字
    - event: 成吉思汗建立蒙古汗国
      date: 1206年
      significance: 蒙古帝国奠基
    - event: 郑和首次下西洋
      date: 1405年
      significance: 世界航海史壮举
    modern:
    - event: 鸦片战争
      date: 1840年
      significance: 中国近代史开端
    - event: 太平天国运动
      date: 1851-1864年
      significance: 中国历史上规模最大的农民起义之一
    - event: 洋务运动
      date: 19世纪60-90年代
      significance: 自强求富、引进西方技术
    - event: 甲午中日战争
      date: 1894-1895年
      significance: 签订《马关条约》
    - event: 戊戌变法
      date: 1898年
      significance: 百日维新
    - event: 辛亥革命
      date: 1911年
      significance: 推翻清王朝、结束帝制
    - event: 五四运动
      date: 1919年5月4日
      significance: 新民主主义革命开端
    - event: 中国共产党成立
      date: 1921年7月
      significance: 开天辟地的大事变
    - event: 南昌起义
      date: 1927年8月1日
      significance: 建军节的由来
    - event: 九一八事变
      date: 1931年9月18日
      significance: 日本侵华开端
    - event: 七七事变（卢沟桥事变）
      date: 1937年7月7日
      significance: 全面抗日战争爆发
    - event: 日本投降
      date: 1945年8月15日
      significance: 抗日战争胜利
    - event: 中华人民共和国成立
      date: 1949年10月1日
      significance: 中国人民站起来了
    - event: 改革开放
      date: 1978年
      significance: 十一届三中全会，开启现代化建设新时期
