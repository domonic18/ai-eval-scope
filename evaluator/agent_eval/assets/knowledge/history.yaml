  source: cmmlu_chinese_history_265
- pattern: 将兵法.*均输法
  correct: 将兵法和均输法分别涉及军事和物资调配，并非直接解决生产少导致的积贫积弱
  description: 误以为将兵法和均输法是王安石为根本解决生产少问题而推行的措施
  severity: error
  source: cmmlu_chinese_history_265
- pattern: 金砖国家.*区域一体化经济组织
  correct: 金砖国家是新兴市场国家间的合作机制，而非区域一体化经济组织
  description: 误以为金砖国家是类似欧盟的区域一体化经济组织
  severity: error
  source: cmmlu_chinese_history_266
- pattern: 国际竞争.*日益激烈.*世界.*动荡不安
  correct: 国际竞争虽然存在，但和平与发展仍是时代主题，世界并非越来越动荡不安
  description: 误以为国际竞争必然导致世界越来越动荡不安
  severity: warning
  source: cmmlu_chinese_history_266
- pattern: 康有为.*保皇党.*支持
  correct: 陈独秀认为复辟帝制的主要原因是社会惰性和守旧武人、学者，而非康有为等保皇党人的支持推动
  description: 误以为陈独秀将帝制复辟归因于康有为等保皇党人的支持
  severity: error
  source: cmmlu_chinese_history_267
- pattern: 辛亥革命.*未.*确立.*民主共和
  correct: 陈独秀认为复辟帝制的原因是社会惰性阻碍新法，而非辛亥革命未确立民主共和制
  description: 误以为陈独秀认为辛亥革命未真正确立民主共和制是复辟原因
