  description: 误以为韩非也通过私学培养人才
  severity: error
  source: cmmlu_chinese_history_55
- pattern: 清政府.*排外
  correct: 1898年戊戌政变后，清政府并未立即加强排外活动，而是继续维持对外关系
  description: 误以为戊戌政变后清政府立即转向排外政策
  severity: error
  source: cmmlu_chinese_history_56
- pattern: 君主立宪.*广泛支持
  correct: 戊戌变法时期君主立宪思想并未得到社会广泛支持，仅局限于部分知识分子和官员
  description: 误以为戊戌变法时期君主立宪已获社会广泛认同
  severity: error
  source: cmmlu_chinese_history_56
- pattern: 列强.*干涉.*借口
  correct: 该报道是西方媒体对光绪帝安危的猜测，并非列强寻找干涉中国内政的借口
  description: 误以为西方媒体报道是列强干涉中国内政的借口
  severity: error
  source: cmmlu_chinese_history_56
- pattern: 打破.*经济封锁
  correct: 经济封锁主要影响物资流通，而非直接提高单位面积产量
  description: 误以为打破经济封锁是粮食增产的主要原因
  severity: error
  source: cmmlu_chinese_history_57
- pattern: 政治.*精力.*增产
  correct: 当时根据地主要精力用于革命斗争和土地改革，而非单纯增产
  description: 误以为根据地政治工作直接以增产为主要目标
  severity: error
  source: cmmlu_chinese_history_57
- pattern: 红军.*奋战.*保卫.*生产
  correct: 红军奋战保卫的是根据地安全，而非直接提高单位面积产量
  description: 误以为红军作战直接导致粮食增产
  severity: error
  source: cmmlu_chinese_history_57
- pattern: 现实主义
  correct: 现实主义强调客观真实和理性再现，而非怀疑理性、探索离奇形式
  description: 误以为现实主义符合对理性社会的怀疑和形式技巧的探索
  severity: error
  source: cmmlu_chinese_history_58
- pattern: 古典主义
  correct: 古典主义崇尚理性、秩序和规范，不怀疑理性基础
  description: 误以为古典主义具有怀疑理性和探索离奇形式的特点
  severity: error
  source: cmmlu_chinese_history_58
- pattern: 浪漫主义
  correct: 浪漫主义强调情感和想象，但并非致力于探索离奇别致的形式技巧，也不以怀疑理性社会为核心
  description: 误以为浪漫主义符合对理性社会的怀疑和形式技巧的探索
  severity: error
  source: cmmlu_chinese_history_58
- pattern: 国企改革没有取得实质性成效
  correct: 该案例反映的是资金匮乏问题，而非国企改革整体成效
  description: 误将资金短缺问题等同于国企改革没有成效
  severity: error
  source: cmmlu_chinese_history_59
- pattern: 国企内部的腐败问题较为严重
  correct: 题目未提及腐败问题，资金缺口主要源于历史建设投资不足
  description: 错误地将资金缺口归因于内部腐败
  severity: error
  source: cmmlu_chinese_history_59
- pattern: 自给自足的自然经济解体
  correct: 农产品商品化趋势增强，但自然经济仍占主导地位，并未解体
  description: 误以为农产品商品化增强意味着自然经济已经解体
  severity: error
  source: cmmlu_chinese_history_60
- pattern: 生产力水平.*质的飞跃
  correct: 农产品商品化增强主要反映商品经济发展，不代表生产力出现质的飞跃
  description: 误将商品流通扩大等同于生产力根本性变革
  severity: error
  source: cmmlu_chinese_history_60
- pattern: 优先发展重工业方针的弊端
  correct: 优先发展重工业方针是20世纪50年代中国工业化战略的一部分，但打油诗反映的是人民公社化运动中的平均主义问题，而非重工业方针的弊端
  description: 误将人民公社化运动中的平均主义问题归因于优先发展重工业方针
  severity: error
  source: cmmlu_chinese_history_61
- pattern: 社会主要矛盾发生了转移
  correct: 20世纪50年代中国社会主要矛盾仍是人民对于建立先进的工业国的要求同落后的农业国的现实之间的矛盾，打油诗反映的是人民公社化运动中的具体问题，而非主要矛盾转移
  description: 误以为打油诗背景是社会主要矛盾转移，实际是人民公社化运动中的平均主义问题
  severity: error
  source: cmmlu_chinese_history_61
- pattern: 经济体制妨碍了生产力发展
  correct: 打油诗反映的是人民公社化运动中平均主义分配方式的问题，而非一般意义上的经济体制妨碍生产力发展
  description: 将人民公社化运动中的具体问题泛化为经济体制整体妨碍生产力发展
  severity: warning
  source: cmmlu_chinese_history_61
- pattern: 中国.*加入.*关税与贸易总协定
  correct: 中国在1948年尚未加入《关税与贸易总协定》，该协定于1947年签署，中国是创始缔约国之一，但1948年时处于内战，实际参与有限
  description: 误以为中国在1948年已正式加入《关税与贸易总协定》
  severity: error
  source: cmmlu_chinese_history_62
- pattern: 上海.*沦陷.*孤岛
  correct: 上海在1937年至1941年期间被称为‘孤岛’，1948年已全面解放，不再处于孤岛状态
  description: 误以为1948年上海仍处于‘孤岛’时期
  severity: error
  source: cmmlu_chinese_history_62
- pattern: 推动土地改革进一步深入
  correct: 1948年10月底，中共中央要求培训干部的目的是为工作重心从农村转向城市做准备，而非推动土地改革
  description: 误以为1948年底的干部培训是为了深化土地改革，实际是为工作重心转移做准备
  severity: error
  source: cmmlu_chinese_history_63
- pattern: 重视科学和文化以推进工业化建设
  correct: 1948年10月底，中共中央要求培训干部的目的是为工作重心从农村转向城市做准备，而非直接推进工业化建设
  description: 误以为干部培训是为了推进工业化建设，实际是为工作重心转移做准备
  severity: error
  source: cmmlu_chinese_history_63
- pattern: 提高执政能力以发展社会主义生产
  correct: 1948年10月底，中共中央要求培训干部的目的是为工作重心从农村转向城市做准备，而非发展社会主义生产
  description: 误以为干部培训是为了发展社会主义生产，实际是为工作重心转移做准备
  severity: error
  source: cmmlu_chinese_history_63
- pattern: 能量辐射.*运动原则
  correct: 该理论（相对论）主要意义在于修正经典力学的时空观，而非发现能量辐射的运动原则
  description: 误将相对论的意义与能量辐射的运动原则混淆
  severity: error
  source: cmmlu_chinese_history_64
- pattern: 预见海王星.*准确性
  correct: 预见海王星存在的是牛顿力学（万有引力定律），而非该理论
  description: 误以为该理论（相对论）能预见海王星的存在
  severity: error
  source: cmmlu_chinese_history_64
- pattern: 以实验为基础.*近代科学
  correct: 开创以实验为基础的近代科学是伽利略等人的工作，而非该理论
  description: 误将该理论（相对论）与近代科学实验方法的开创者混淆
  severity: error
  source: cmmlu_chinese_history_64
- pattern: 1999.*九届人大.*依法治国
  correct: 1997年中共十五大确立了非公有制经济是社会主义市场经济的重要组成部分，消除了对个体私营经济的制度性歧视
  description: 误以为依法治国战略是消除对非公有制经济歧视的制度性决策
  severity: error
  source: cmmlu_chinese_history_65
- pattern: 1984.*经济体制改革决定
  correct: 1984年决定主要涉及城市经济体制改革，但未明确非公有制经济的地位；1997年十五大才正式确立非公有制经济是社会主义市场经济的重要组成部分
  description: 误以为1984年经济体制改革决定解决了对非公有制经济的制度性歧视
  severity: error
  source: cmmlu_chinese_history_65
- pattern: 1992.*南方谈话
  correct: 南方谈话解放了思想，但制度性决策是1997年十五大正式确立非公有制经济地位
  description: 误以为南方谈话直接提供了消除恐私症的制度性决策
  severity: error
  source: cmmlu_chinese_history_65
- pattern: 难以招募.*技术人员.*机器设备
  correct: 近代民族企业面临的主要困难是与外国资本竞争和官府束缚，而非技术人才和设备的缺乏
  description: 误以为近代民族企业的主要困难是技术人才和设备不足
  severity: error
  source: cmmlu_chinese_history_66
- pattern: 工人.*增加薪酬.*缩矩工时
  correct: 近代民族企业的主要困境是外部竞争和官府压制，而非内部劳资矛盾
  description: 误以为工人罢工是近代民族企业创办的主要困难
  severity: error
  source: cmmlu_chinese_history_66
- pattern: 企业.*经营管理.*弊端
  correct: 近代民族企业的主要问题来自外部环境（外国资本和官府），而非内部管理
  description: 误以为经营管理不善是近代民族企业创办的主要障碍
  severity: error
  source: cmmlu_chinese_history_66
- pattern: 还魂纸.*生产遍布全国各地
  correct: 还魂纸主要在北方生产，江南地区因竹贱而不以为然
  description: 误以为还魂纸在全国各地都有生产，实际上北方更普遍
  severity: error
  source: cmmlu_chinese_history_67
- pattern: 还魂纸.*制造工艺更加复杂
  correct: 还魂纸制造工艺更简单，省去了煮浸之力
  description: 误以为还魂纸工艺更复杂，实际是简化了流程
  severity: error
  source: cmmlu_chinese_history_67
- pattern: 还魂纸.*扩大了原料来源
  correct: 还魂纸的原料来源并未扩大，而是利用废纸回收
  description: 误以为还魂纸扩大了原料来源，实际是回收利用废纸
  severity: error
  source: cmmlu_chinese_history_67
- pattern: 皇权渐趋衰弱
  correct: 明朝内阁首辅权倾一时是君主集权加强的表现，皇权并未衰弱
  description: 误以为内阁首辅权力膨胀意味着皇权衰弱
  severity: error
  source: cmmlu_chinese_history_68
- pattern: 首辅权力失控
  correct: 内阁首辅的权力来源于皇帝信任，并未失控，仍是君主集权加强的体现
  description: 误以为首辅操纵朝政是权力失控，实际是皇权强化的结果
  severity: error
  source: cmmlu_chinese_history_68
- pattern: 内阁取代六部
  correct: 内阁是皇帝顾问机构，并未取代六部，六部仍直接对皇帝负责
  description: 误以为内阁取代了六部的行政职能
  severity: error
  source: cmmlu_chinese_history_68
- pattern: 人身依附关系强化
  correct: 明清时期商品经济发展，雇工人身依附关系减弱而非强化
  description: 误以为雇工待遇改善意味着人身依附关系加强
  severity: error
  source: cmmlu_chinese_history_69
- pattern: 社会矛盾日益尖锐
  correct: 材料反映雇工待遇提高，是经济发展而非社会矛盾尖锐的表现
  description: 误将雇工要求改善待遇解读为社会矛盾激化
  severity: error
  source: cmmlu_chinese_history_69
- pattern: 政府积极推行重政策
  correct: 明清政府并未积极推行重商政策，材料变化源于经济自发发展
  description: 误以为政府政策主导了经济变化
  severity: error
  source: cmmlu_chinese_history_69
- pattern: 宣传伸民权、设议院、变法图存
  correct: 梁启超在1920年欧洲考察后质疑科学万能论，而非主张伸民权、设议院、变法图存
  description: 误将梁启超1920年后的态度等同于其早期维新变法主张
  severity: error
  source: cmmlu_chinese_history_70
- pattern: 中学为体，西学为用
  correct: 梁启超在1920年欧洲考察后质疑科学万能论，而非主张‘中学为体，西学为用’
  description: 误将梁启超的态度等同于洋务派的主张
  severity: error
  source: cmmlu_chinese_history_70
- pattern: 阻止西方科学在中国传播
  correct: 梁启超质疑的是科学万能论，而非阻止西方科学在中国传播
  description: 误以为梁启超反对科学本身，实际上他反对的是对科学的盲目崇拜
  severity: error
  source: cmmlu_chinese_history_70
- pattern: 人民公社化运动
  correct: 日记描述的是农业合作化（互助组），人民公社化运动是1958年后更大规模、更高程度的集体化
  description: 误将农业合作化（互助组阶段）等同于人民公社化运动
  severity: error
  source: cmmlu_chinese_history_71
- pattern: 家庭联产承包责任制
  correct: 家庭联产承包责任制是1978年改革开放后实行的，与日记中描述的互助组、合作化时期不同
  description: 误将农业合作化时期与家庭联产承包责任制混淆
  severity: error
  source: cmmlu_chinese_history_71
- pattern: 三年经济困难
  correct: 日记描述的是农业合作化（1953-1956年），‘三年经济困难’时期是1959-1961年
  description: 误将农业合作化时期与‘三年经济困难’时期混淆
  severity: error
  source: cmmlu_chinese_history_71
- pattern: 竭力塑造战时政府的形象
  correct: 国民党禁止进步宣传名词是为了维护一党专政，而非单纯塑造战时政府形象
  description: 误以为国民党禁止宣传名词是为了塑造政府形象，实际目的是压制民主和异见
  severity: error
  source: cmmlu_chinese_history_72
- pattern: 努力缓和与其他党派的关系
  correct: 国民党禁止宣传名词是为了压制其他党派和民主声音，而非缓和关系
  description: 误以为国民党在努力缓和党派关系，实际是加强一党专政
  severity: error
  source: cmmlu_chinese_history_72
- pattern: 与中共争夺抗战的领导权
  correct: 国民党禁止宣传名词是为了维护一党专政，而非单纯争夺抗战领导权
  description: 误以为国民党行为仅针对中共争夺领导权，实际是全面压制民主和进步思想
  severity: error
  source: cmmlu_chinese_history_72
- pattern: 英雄史观
  correct: 韩非主张进步史观，认为历史是不断发展的，而非由英雄人物决定
  description: 误以为韩非强调英雄人物在历史中的作用
  severity: error
  source: cmmlu_chinese_history_73
- pattern: 循环史观
  correct: 韩非主张进步史观，认为历史是向前发展的，而非循环往复
  description: 误以为韩非认为历史是循环的
  severity: error
  source: cmmlu_chinese_history_73
- pattern: 天命史观
  correct: 韩非主张进步史观，认为历史发展取决于人力而非天命
  description: 误以为韩非相信天命决定历史
  severity: error
  source: cmmlu_chinese_history_73
- pattern: 民族资本主义初步发展
  correct: 洋务运动创办的军事工业和民用工业属于官办或官督商办，并非民族资本主义的初步发展
  description: 误将洋务派官办企业等同于民族资本主义的发展
  severity: error
  source: cmmlu_chinese_history_74
- pattern: 近代工业体系已逐步建立
  correct: 洋务运动仅建立了少数近代工矿企业，尚未形成完整的近代工业体系
  description: 误以为洋务运动已建立近代工业体系
  severity: error
  source: cmmlu_chinese_history_74
- pattern: 优先发展重工业成为共识
  correct: 洋务运动时期并未形成优先发展重工业的共识，且材料未体现此内容
  description: 误以为洋务运动时期已有优先发展重工业的共识
  severity: error
  source: cmmlu_chinese_history_74
- pattern: 20世纪60年代.*原子能
  correct: 中国跨入原子能时代开始于20世纪50年代
  description: 误以为中国原子能时代始于20世纪60年代
  severity: error
  source: cmmlu_chinese_history_75
- pattern: 20世纪70年代.*原子能
  correct: 中国跨入原子能时代开始于20世纪50年代
  description: 误以为中国原子能时代始于20世纪70年代
  severity: error
  source: cmmlu_chinese_history_75
- pattern: 20世纪40年代.*原子能
  correct: 中国跨入原子能时代开始于20世纪50年代
  description: 误以为中国原子能时代始于20世纪40年代
  severity: error
  source: cmmlu_chinese_history_75
- pattern: 19世纪中期
  correct: 民国建立于1912年，属于20世纪初期
  description: 误以为民国建立于19世纪中期
  severity: error
  source: cmmlu_chinese_history_76
- pattern: 20世纪中期
  correct: 民国建立于1912年，属于20世纪初期
  description: 误以为民国建立于20世纪中期
  severity: error
  source: cmmlu_chinese_history_76
- pattern: 19世纪末期
  correct: 民国建立于1912年，属于20世纪初期
  description: 误以为民国建立于19世纪末期
  severity: error
  source: cmmlu_chinese_history_76
- pattern: 领事裁判权
  correct: 领事裁判权指外国人在华犯罪由本国领事裁判，而非一国获利各国共享
  description: 误将领事裁判权等同于最惠国待遇的共享特权
  severity: error
  source: cmmlu_chinese_history_77
- pattern: 居住及租地权
  correct: 居住及租地权指外国人在华租地居住，不涉及一国所得他国共享的贸易特权
  description: 误以为居住及租地权具有最惠国待遇的共享性质
  severity: error
  source: cmmlu_chinese_history_77
- pattern: 门户开放.*政策
  correct: 门户开放政策是美国提出的对华商业机会均等主张，并非一国所得他国自然共享的片面最惠国待遇
  description: 误将门户开放政策等同于片面最惠国待遇的自动共享机制
  severity: error
  source: cmmlu_chinese_history_77
- pattern: 开始开眼看世界
  correct: 19世纪八九十年代，中国已进入洋务运动后期，开眼看世界始于鸦片战争后的林则徐、魏源等人
  description: 误以为19世纪八九十年代才‘开始’开眼看世界，实际上开眼看世界始于鸦片战争后
  severity: error
  source: cmmlu_chinese_history_78
- pattern: 普遍接受西式教育
  correct: 当时只有少数知识分子和洋务学堂学生接触西学，远未达到‘普遍接受西式教育’的程度
  description: 夸大了西式教育在19世纪末中国的普及程度
  severity: error
  source: cmmlu_chinese_history_78
- pattern: 对苏联经验的反思
  correct: 当时中国正处于全面学习苏联经验的时期，尚未出现对苏联经验的反思潮流
  description: 误以为1954年中国已开始反思苏联经验，实际上当时是全面学习苏联的时期
  severity: error
  source: cmmlu_chinese_history_79
- pattern: 科学研究已与国际前沿接轨
  correct: 1954年中国科学研究尚处于起步阶段，主要学习苏联，未与国际前沿全面接轨
  description: 误以为1954年中国科学研究已与国际前沿接轨，实际上当时主要依赖苏联技术
  severity: error
  source: cmmlu_chinese_history_79
- pattern: 科教兴国战略
  correct: 科教兴国战略是1995年提出的，1954年尚未展开
  description: 误以为1954年已实施科教兴国战略，实际上该战略提出于1995年
  severity: error
  source: cmmlu_chinese_history_79
- pattern: 《时务报》.*开创.*先例
  correct: 《时务报》并非国人办报的先例，此前已有《申报》等国人创办的报纸
  description: 误以为《时务报》是国人办报的开端
  severity: error
  source: cmmlu_chinese_history_80
- pattern: 国人所办.*报纸.*市场需求极大
  correct: 《时务报》发行量高不代表所有国人办的报纸市场需求都极大，仅反映特定时期维新派报纸的成功
  description: 过度概括，认为所有国人办的报纸都有巨大市场需求
  severity: error
  source: cmmlu_chinese_history_80
- pattern: 通俗性报刊.*广受.*欢迎
  correct: 《时务报》是政论性报刊，并非通俗性报刊，其成功不代表通俗性报刊广受欢迎
  description: 混淆了《时务报》的政论性质与通俗性报刊
  severity: error
  source: cmmlu_chinese_history_80
- pattern: 文明演进视角
  correct: 毛泽东从阶级斗争视角分析通商口岸，强调帝国主义剥削和买办阶级的形成
  description: 误以为毛泽东从文明演进角度看待通商口岸
  severity: error
  source: cmmlu_chinese_history_81
- pattern: 全球视角
  correct: 毛泽东从阶级斗争视角分析通商口岸，强调帝国主义剥削和买办阶级的形成
  description: 误以为毛泽东从全球视角看待通商口岸
  severity: error
  source: cmmlu_chinese_history_81
- pattern: 近代化视角
  correct: 毛泽东从阶级斗争视角分析通商口岸，强调帝国主义剥削和买办阶级的形成
  description: 误以为毛泽东从近代化视角看待通商口岸
  severity: error
  source: cmmlu_chinese_history_81
- pattern: 创办京师大学堂.*维新运动序幕
  correct: 创办京师大学堂是戊戌变法中的举措，并非拉开维新运动序幕的事件
  description: 误以为创办京师大学堂是维新运动的开端
  severity: error
  source: cmmlu_chinese_history_83
- pattern: 签订《马关条约》.*维新运动序幕
  correct: 《马关条约》是甲午战争后签订的不平等条约，是维新运动的背景而非序幕
  description: 误以为《马关条约》的签订直接拉开了维新运动序幕
  severity: error
  source: cmmlu_chinese_history_83
- pattern: 颁布“明定国是”诏.*维新运动序幕
  correct: 颁布“明定国是”诏是戊戌变法开始的标志，而非维新运动序幕
  description: 误以为颁布“明定国是”诏是维新运动的开端
  severity: error
  source: cmmlu_chinese_history_83
- pattern: 抑商政策阻碍区域经济发展
  correct: 明代中后期商品经济发展，区域分工明显，抑商政策并未阻碍区域经济发展
  description: 误以为抑商政策阻碍了区域经济发展，而实际上区域分工是商品经济发展的表现
  severity: error
  source: cmmlu_chinese_history_84
- pattern: 手工业技术水平日趋平衡
  correct: 明代中后期手工业呈现区域化分工，各地技术水平各有专长，并非日趋平衡
  description: 误以为手工业技术水平趋于平衡，而实际是区域分工导致各地专长不同
  severity: error
  source: cmmlu_chinese_history_84
- pattern: 区域间有着不同的市场需求
  correct: 题干反映的是生产分工而非市场需求差异，松江织布、芜湖浆染体现的是区域化生产分工
  description: 误将区域化分工理解为市场需求差异，而实际是生产环节的区域分工
  severity: error
  source: cmmlu_chinese_history_84
- pattern: 壮大得益于政府的支持
  correct: 上海发昌机器厂是民族资本主义企业，其发展主要依靠自身经营和市场需求，而非政府支持
  description: 误以为民族资本主义企业的发展主要依赖政府扶持
  severity: error
  source: cmmlu_chinese_history_85
- pattern: 中国最早的近代企业
  correct: 上海发昌机器厂是较早的近代民族企业，但并非中国最早的近代企业
  description: 误以为上海发昌机器厂是中国最早的近代企业
  severity: error
  source: cmmlu_chinese_history_85
- pattern: 官营手工业转型而来
  correct: 上海发昌机器厂是由手工锻铁作坊发展而来，属于民间资本创办，并非官营手工业转型
  description: 误以为该厂是由官营手工业转型而来
  severity: error
  source: cmmlu_chinese_history_85
- pattern: 新型区域外交合作
  correct: 1972年中国外交突破主要体现在打破美国孤立遏制，而非新型区域外交合作
  description: 误以为1972年中国外交重点是推进新型区域外交合作
  severity: error
  source: cmmlu_chinese_history_86
- pattern: 重点建立.*亚非.*外交关系
  correct: 1972年中国与五大洲国家建交，并非仅重点建立与亚非的外交关系
  description: 误以为1972年中国外交仅重点发展与亚非国家的关系
  severity: error
  source: cmmlu_chinese_history_86
- pattern: 开始独立自主.*步入国际舞台
  correct: 新中国成立后即独立自主步入国际舞台，1972年外交突破是打破美国孤立遏制
  description: 误以为1972年是中国开始独立自主步入国际舞台的时间点
  severity: error
  source: cmmlu_chinese_history_86
- pattern: 民众的信仰.*推高.*神.*地位
  correct: 关羽信仰的升级主要源于官方加封，而非民众信仰自发推高
  description: 误以为关羽神化是民众信仰推动的结果，忽略了官方意识形态的主导作用
  severity: error
  source: cmmlu_chinese_history_87
- pattern: 关羽.*个人品德.*决定.*崇拜
  correct: 关羽崇拜的形成是官方意识形态塑造的结果，而非仅由其个人品德决定
  description: 误以为关羽崇拜完全源于其个人品德，忽略了官方加封和意识形态需求
  severity: error
  source: cmmlu_chinese_history_87
- pattern: 历代皇帝.*好恶.*决定.*崇拜
  correct: 关羽崇拜的取向符合官方意识形态要求，而非仅由皇帝个人好恶决定
  description: 误以为关羽崇拜完全取决于历代皇帝的个人好恶，忽略了其与官方意识形态的契合
  severity: error
  source: cmmlu_chinese_history_87
- pattern: 交通运输网络通畅
  correct: 秦国大型水利工程的完成主要依靠国家强大的组织能力，而非交通运输网络
  description: 误以为交通运输网络通畅是秦国完成大型水利工程的主要原因
  severity: error
  source: cmmlu_chinese_history_88
- pattern: 铁制生产工具普及
  correct: 铁制生产工具普及是生产力发展的表现，但秦国大型水利工程的关键在于国家组织能力
  description: 误以为铁制生产工具普及是秦国完成大型水利工程的主要原因
  severity: error
  source: cmmlu_chinese_history_88
- pattern: 公田制度逐渐完善
  correct: 战国后期公田制度逐渐瓦解，秦国大型水利工程依靠国家组织能力而非公田制度
  description: 误以为公田制度逐渐完善是秦国完成大型水利工程的主要原因
  severity: error
  source: cmmlu_chinese_history_88
- pattern: 皇帝专称减少了对皇权的限制
  correct: 皇帝专称体现了皇权的独尊和权威，并非减少了对皇权的限制
  description: 误以为皇帝专称削弱了皇权，实际上专称强化了皇权的神圣性和独特性
  severity: error
  source: cmmlu_chinese_history_89
- pattern: 女性解放最早兴起于上海
  correct: 女性解放是近代中国整体社会变革的一部分，上海只是表现较为突出的城市之一，并非最早兴起地
  description: 误以为女性解放最早在上海兴起，忽略了其他地区也有早期妇女解放运动
  severity: error
  source: cmmlu_chinese_history_90
- pattern: 男女间实现了权利上的平等
  correct: 20世纪初中国女性虽获得一定解放，但并未实现男女权利上的完全平等
  description: 误以为当时男女已实现权利平等，实际上仍存在诸多不平等
  severity: error
  source: cmmlu_chinese_history_90
- pattern: 女学兴起导致传统礼教崩溃
  correct: 女学兴起是传统礼教受到冲击的表现之一，但并非导致其崩溃的唯一或直接原因
  description: 误以为女学兴起直接导致传统礼教崩溃，忽略了其他社会变革因素
  severity: error
  source: cmmlu_chinese_history_90
- pattern: 宋代地主.*社会责任感
  correct: 宋代地主减免佃户租课是出于自身经济利益考虑，而非社会责任感
  description: 误以为宋代地主减免租课是出于社会责任感，实际是为了防止佃户流失导致土地荒芜
  severity: error
  source: cmmlu_chinese_history_91
- pattern: 宋代地主.*土地剥削.*积累财富
  correct: 宋代地主通过租佃关系获取财富，但材料强调的是地主为维持生产而减免租课的经济理性
  description: 误以为材料主要反映地主剥削积累财富，实际是反映佃户有选择权导致地主需调整策略
  severity: warning
  source: cmmlu_chinese_history_91
- pattern: 宋代.*开始出现.*租佃关系
  correct: 宋代租佃关系已普遍存在，材料反映的是佃户有较大选择权和自由度
  description: 误以为宋代才开始出现租佃关系，实际租佃关系在宋代之前就已存在
  severity: error
  source: cmmlu_chinese_history_91
- pattern: 改制中易服更易推行
  correct: 维新派重视易服是为了营造改制的社会氛围，而非易服本身更易推行
  description: 误以为维新派重视易服是因为易服作为改制措施更容易实施
  severity: error
  source: cmmlu_chinese_history_92
- pattern: 中国需改变对外形象
  correct: 维新派重视易服主要是为了营造改制的社会氛围，而非单纯改变对外形象
  description: 误以为维新派易服的主要目的是改善中国在国际上的形象
  severity: error
  source: cmmlu_chinese_history_92
- pattern: 长袍马褂代表了守旧势力
  correct: 维新派重视易服是为了营造改制的社会氛围，而非因为长袍马褂代表守旧势力
  description: 误以为维新派易服是因为长袍马褂象征守旧势力而需要废除
  severity: error
  source: cmmlu_chinese_history_92
- pattern: 《王位继承法》——《权利法案》——“光荣革命”
  correct: 历史事件的正确等级顺序应为“光荣革命”——《权利法案》——《王位继承法》
  description: 误以为《王位继承法》早于《权利法案》和“光荣革命”，混淆了英国历史事件的先后顺序
  severity: error
  source: cmmlu_chinese_history_93
- pattern: 中途岛战役——斯大林格勒战役——阿拉曼战役
  correct: 二战中三大战役的正确时间顺序是阿拉曼战役（1942年10月）、斯大林格勒战役（1942年7月-1943年2月）、中途岛战役（1942年6月），但题目要求的是事件等级层次，而非时间顺序
  description: 误以为这三个战役属于同一等级层次，实际上它们是不同战场上的独立战役，不具有包含关系
  severity: error
  source: cmmlu_chinese_history_93
- pattern: 新中国的外交政策——睦邻外交——中美建交
  correct: 新中国外交政策的正确等级层次应为新中国的外交政策——睦邻外交——中美建交，但中美建交不属于睦邻外交范畴
  description: 误以为中美建交属于睦邻外交，实际上中美建交是独立的外交事件，不属于睦邻外交的范畴
  severity: error
  source: cmmlu_chinese_history_93
- pattern: 反对白话文.*反对文言文
  correct: 该学者提倡使用白话文，并非同时反对两者
  description: 误以为学者既反对白话文又反对文言文
  severity: error
  source: cmmlu_chinese_history_94
- pattern: 科学.*看待读经
  correct: 该学者旨在提倡白话文，而非强调科学地看待读经问题
  description: 误以为学者在强调科学地看待读经问题
  severity: error
  source: cmmlu_chinese_history_94
- pattern: 纠正.*文学革命.*形式主义
  correct: 该学者旨在提倡白话文，而非纠正文学革命的形式主义倾向
  description: 误以为学者在纠正文学革命的形式主义倾向
  severity: error
  source: cmmlu_chinese_history_94
- pattern: 上海是重要的通商口岸
  correct: 材料强调的是上海出口比重变化反映的传统经济格局变动，而非单纯的口岸重要性
  description: 误以为材料仅说明上海作为通商口岸的地位，忽略了其反映的经济格局变化
  severity: error
  source: cmmlu_chinese_history_95
- pattern: 中国卷入资本主义世界市场
  correct: 材料主要体现中国出口格局变化，而非全面卷入世界市场的程度
  description: 过度解读材料，将出口增长等同于全面卷入资本主义世界市场
  severity: warning
  source: cmmlu_chinese_history_95
- pattern: 上海取代广州贸易地位
  correct: 材料显示上海出口比重上升，但未直接说明取代广州的贸易地位
  description: 误以为材料直接证明上海取代广州，实际是出口份额变化反映经济格局调整
  severity: error
  source: cmmlu_chinese_history_95
- pattern: 经济地位优越
  correct: 唐代商人经济地位虽高，但政治地位低下，且受法律和社会观念限制
  description: 误以为经济地位优越意味着社会地位全面优越
  severity: error
  source: cmmlu_chinese_history_96
- pattern: 古代官吏主要来源于科举选官
  correct: 科举制是古代选官的重要途径之一，但并非所有官吏都来源于科举，还有恩荫、荐举等其他方式
  description: 误以为古代所有官吏都通过科举选拔
  severity: error
  source: cmmlu_chinese_history_97
- pattern: 科举制彻底抛弃门第等级观念
  correct: 科举制打破了门第限制，但并未彻底抛弃门第等级观念，世家大族仍有一定优势
  description: 误以为科举制完全消除了门第等级观念
  severity: error
  source: cmmlu_chinese_history_97
- pattern: 科举制完全符合社会的发展需要
  correct: 科举制在历史上发挥了积极作用，但并非完全符合所有时期的社会发展需要，也存在弊端
  description: 误以为科举制在任何时期都完全适应社会发展
  severity: error
  source: cmmlu_chinese_history_97
- pattern: 诗界革命.*民主革命
  correct: 诗界革命是梁启超在维新变法背景下提出的文学改良主张，服务于救亡图存，而非民主革命
  description: 误将诗界革命与民主革命思想混淆
  severity: error
  source: cmmlu_chinese_history_98
- pattern: 诗界革命.*改良思想的开端
  correct: 诗界革命是维新变法时期文学改良的一部分，并非改良思想的开端
  description: 误以为诗界革命标志着改良思想的起点
  severity: error
  source: cmmlu_chinese_history_98
- pattern: 诗界革命.*白话文运动
  correct: 诗界革命主张诗歌革新，但白话文运动是五四新文化运动的内容，两者不同
  description: 误将诗界革命与后来的白话文运动混为一谈
  severity: error
  source: cmmlu_chinese_history_98
- pattern: 治国法律
  correct: 李鸿章主张学习西方制造技术，而非治国法律
  description: 误以为李鸿章主张学习西方政治制度
  severity: error
  source: cmmlu_chinese_history_99
- pattern: 教育之法
  correct: 李鸿章主张学习西方制造技术，而非教育方法
  description: 误以为李鸿章主张学习西方教育制度
  severity: error
  source: cmmlu_chinese_history_99
- pattern: 经商之法
  correct: 李鸿章主张学习西方制造技术，而非商业方法
  description: 误以为李鸿章主张学习西方商业模式
  severity: error
  source: cmmlu_chinese_history_99
- pattern: 政府官员廉洁
  correct: 晚清官场腐败，办厂需送礼才能获批，说明官员并不廉洁
  description: 误以为官员不收礼是廉洁表现，实际是因未送礼而受阻
  severity: error
  source: cmmlu_chinese_history_100
- pattern: 总督办事高效
  correct: 总督多次批示才解决问题，说明办事效率低，而非高效
  description: 误将多次批示视为高效，实际反映审批流程繁琐
  severity: error
  source: cmmlu_chinese_history_100
- pattern: 封建势力强大
  correct: 材料强调地方士绅反对和总督支持，但核心是民企创办困难，而非封建势力强大
  description: 误将地方士绅反对等同于封建势力强大，偏离材料主旨
  severity: warning
  source: cmmlu_chinese_history_100
- pattern: 政府放弃对食盐贸易的控制
  correct: 明清时期政府严格控制食盐贸易，实行盐引制度
  description: 误以为政府放弃了对食盐贸易的控制
  severity: error
  source: cmmlu_chinese_history_101
- pattern: 商人社会地位显著提高
  correct: 明清时期商人社会地位虽有改善，但农本思想仍占主导，并未显著提高
  description: 误以为商人社会地位在明清时期显著提高
  severity: error
  source: cmmlu_chinese_history_101
- pattern: 近代科学追求王权公平
  correct: 近代科学追求的是对自然规律的认识和支配，而非王权公平
  description: 误以为近代科学的目标是追求王权公平
  severity: error
  source: cmmlu_chinese_history_102
- pattern: 启蒙运动倡导阶级平等
  correct: 启蒙运动倡导的是人的自由、平等和理性，而非特指阶级平等
  description: 误以为启蒙运动的核心是阶级平等
  severity: error
  source: cmmlu_chinese_history_102
- pattern: 哲学意识支配世界繁荣
  correct: 启蒙思想家认为理性与科学进步推动世界繁荣，而非哲学意识直接支配
  description: 误以为哲学意识本身直接支配世界繁荣
  severity: error
  source: cmmlu_chinese_history_102
- pattern: 工作重心.*社会主义现代化建设.*转变
  correct: 中共八大提出把党和国家的工作重心转移到社会主义建设上来，但‘社会主义现代化建设’的正式提法是在十一届三中全会后
  description: 误以为中共八大就明确提出了‘社会主义现代化建设’的工作重心转变
  severity: error
  source: cmmlu_chinese_history_103
- pattern: 全面总结.*新民主主义革命.*经验
  correct: 中共八大主要讨论社会主义建设问题，而非总结新民主主义革命经验
  description: 误以为中共八大的主要内容是总结新民主主义革命经验
  severity: error
  source: cmmlu_chinese_history_103
- pattern: 明确提出.*社会主义初级阶段.*理论
  correct: 社会主义初级阶段理论是在1987年中共十三大上明确提出的
  description: 误以为中共八大就提出了社会主义初级阶段理论
  severity: error
  source: cmmlu_chinese_history_103
- pattern: 最早提出.*民族主义
  correct: 孙中山并非中国近代民族主义主张的最早提出者，但他是重要的倡导者和实践者
  description: 误以为孙中山是中国近代民族主义的最早提出者
  severity: error
  source: cmmlu_chinese_history_104
- pattern: 推翻了满清贵族的统治.*光复
  correct: 辛亥革命推翻了清王朝，但并未彻底完成‘光复’国家的大业，且材料强调民族统一而非单纯排满
  description: 误以为孙中山主张的‘光复’是单纯推翻满清贵族统治，忽略了其‘五族共和’的民族统一思想
  severity: error
  source: cmmlu_chinese_history_104
- pattern: 民族革命和民主革命的完美结合
  correct: 孙中山的民族革命与民主革命虽有联系，但材料未体现‘完美结合’，且其民族主义主张更侧重‘五族共和’
  description: 误以为孙中山已实现民族革命与民主革命的完美结合，忽略了历史局限性
  severity: error
  source: cmmlu_chinese_history_104
- pattern: 背离.*孔子.*儒学
  correct: 汉代儒学继承并发展了孔子的儒学思想，并非背离
  description: 误以为汉代儒学与孔子思想完全对立
  severity: error
  source: cmmlu_chinese_history_105
- pattern: 五经.*为.*阐发.*孔子
  correct: 五经是先秦典籍，并非为阐发孔子思想而作，孔子曾整理它们
  description: 误以为五经是为阐发孔子思想而编写的
  severity: error
  source: cmmlu_chinese_history_105
- pattern: 焚书.*儒学.*断绝
  correct: 秦始皇焚书坑儒并未使儒学传统完全断绝，汉代儒学得以复兴
  description: 误以为秦始皇焚书导致儒学传统彻底中断
  severity: error
  source: cmmlu_chinese_history_105
- pattern: 人民政权得到巩固
  correct: 1949年9月政协会议召开时，人民政权尚未完全巩固，会议主要任务是建立中央政府和制定宪章
  description: 误以为1949年9月政协会议召开时人民政权已经巩固
  severity: error
  source: cmmlu_chinese_history_106
- pattern: 人民代表大会制度的确立
  correct: 人民代表大会制度是在1954年宪法中正式确立的，1949年政协会议代行人大职权
  description: 误以为1949年政协会议确立了人民代表大会制度
  severity: error
  source: cmmlu_chinese_history_106
- pattern: 人民生活水平提高
  correct: 1949年新中国成立初期，人民生活水平尚未显著提高，会议主要解决政权和组织问题
  description: 误以为1949年政协会议反映了人民生活水平提高
  severity: error
  source: cmmlu_chinese_history_106
- pattern: 休养生息.*消费观念
  correct: 休养生息政策主要恢复农业生产，并未直接改变消费观念
  description: 误以为休养生息政策直接导致消费观念改变
  severity: error
  source: cmmlu_chinese_history_107
- pattern: 抑商政策.*重大转变
  correct: 汉初抑商政策并未发生重大转变，只是商业发展冲击了原有规制
  description: 误以为朝廷主动改变了抑商政策
  severity: error
  source: cmmlu_chinese_history_107
- pattern: 官员.*商人.*社会地位.*一致
  correct: 官员与商人的社会地位并未趋同，只是商人僭越礼制
  description: 误以为官员与商人社会地位趋于一致
  severity: error
  source: cmmlu_chinese_history_107
- pattern: 愚昧无知
  correct: 学子坚持科举反映了当时社会的价值取向和功名利禄的追求，并非愚昧无知
  description: 误以为科举制度下的学子行为是愚昧无知的表现
  severity: error
  source: cmmlu_chinese_history_108
- pattern: 失去人才选拔功能
  correct: 科举制在清末仍具有人才选拔功能，但存在弊端，材料并未否定其选拔功能
  description: 误以为材料表明科举制完全失去人才选拔功能
  severity: error
  source: cmmlu_chinese_history_108
- pattern: 批判.*追求功名利禄
  correct: 材料并未批判学子追求功名利禄，而是指出其背后有忍耐禀赋等复杂原因
  description: 误以为材料是在批判学子追求功名利禄
  severity: error
  source: cmmlu_chinese_history_108
- pattern: 列强发动侵华战争.*户籍管理
  correct: 咸丰年间南方人口统计缺失的主要原因是太平天国等农民起义冲击了统治秩序，而非列强侵华战争
  description: 误将人口统计缺失归因于列强侵华战争，忽略了同期农民起义的直接影响
  severity: error
  source: cmmlu_chinese_history_109
- pattern: 清政府调整政策.*放松.*户籍管理
  correct: 清政府并未主动放松户籍管理，人口统计缺失是因农民起义导致统治秩序崩溃
  description: 误以为清政府主动调整户籍政策导致统计缺失
  severity: error
  source: cmmlu_chinese_history_109
- pattern: 清朝吏治腐败.*户籍管理混乱
  correct: 吏治腐败并非咸丰年间人口统计突然缺失的主要原因，根本原因是农民起义冲击了统治秩序
  description: 将人口统计缺失简单归因于长期存在的吏治腐败，忽略了农民起义的突发性冲击
  severity: error
  source: cmmlu_chinese_history_109
- pattern: 外儒内法.*春秋决狱
  correct: 春秋决狱体现的是法律儒家化，而非外儒内法
  description: 误将春秋决狱理解为外儒内法，实际上它是儒家思想对法律的渗透
  severity: error
  source: cmmlu_chinese_history_110
- pattern: 理性化.*春秋决狱
  correct: 春秋决狱以伦理道德为标准，缺乏法律理性
  description: 误以为春秋决狱具有理性化色彩，实际上它强调伦理而非法律逻辑
  severity: error
  source: cmmlu_chinese_history_110
- pattern: 追求平等.*民国.*政治斗争核心
  correct: 民国时期重视公民意识教育，但追求平等并非当时政治斗争的核心
  description: 误以为追求平等是民国时期政治斗争的核心内容
  severity: error
  source: cmmlu_chinese_history_111
- pattern: 民国时期.*教育.*根本变化
  correct: 民国时期教育有所发展，但并未发生根本变化
  description: 误以为民国时期中国教育发生了根本变化
  severity: error
  source: cmmlu_chinese_history_111
- pattern: 辛亥革命后.*民主共和观念深入人心
  correct: 辛亥革命后民主共和观念有所传播，但材料强调的是公民意识教育，而非观念深入人心
  description: 误以为材料直接体现民主共和观念深入人心
  severity: warning
  source: cmmlu_chinese_history_111
- pattern: GDP.*反映.*经济.*证实.*国家.*地位.*方向
  correct: GDP反映经济规模，但国家的地位和发展方向由经济性质、制度、综合国力等多因素决定
  description: 误以为GDP能直接证实国家的地位和发展方向
  severity: error
  source: cmmlu_chinese_history_112
- pattern: GDP.*只能.*反映.*经济.*不能.*反映.*国家.*地位.*方向
  correct: GDP是反映经济状况的重要指标，但国家的地位和发展方向还需结合其他因素分析
  description: 误以为GDP完全不能反映国家的地位和发展方向
  severity: error
  source: cmmlu_chinese_history_112
- pattern: GDP.*国际地位.*变化趋势.*反方向
  correct: GDP国际地位变化趋势与国家国际地位变化趋势并非简单反比关系，需具体分析
  description: 误以为GDP国际地位变化趋势与国家国际地位变化趋势经常成反方向
  severity: error
  source: cmmlu_chinese_history_112
- pattern: 强制去富.*抑其骄
  correct: 董仲舒主张以适度调节使富者示贵而不骄，而非强制去除富裕
  description: 误以为董仲舒主张通过强制手段打压富人
  severity: error
  source: cmmlu_chinese_history_113
- pattern: 劫富济贫.*均贫富
  correct: 董仲舒主张调均财富使上下相安，而非劫富济贫式的平均主义
  description: 误以为董仲舒主张通过剥夺富人财富来平均分配
  severity: error
  source: cmmlu_chinese_history_113
- pattern: 竭力济贫.*抚其忧
  correct: 董仲舒主张使贫者足以养生而不至于忧，而非单方面竭力救济
  description: 误以为董仲舒主张仅通过大力救济穷人解决问题
  severity: error
  source: cmmlu_chinese_history_113
- pattern: 《民报》
  correct: 毛泽东学生时代受《新青年》影响，而非《民报》
  description: 误以为毛泽东欣赏的是同盟会机关报《民报》
  severity: error
  source: cmmlu_chinese_history_114
- pattern: 《时务报》
  correct: 《时务报》是维新派报刊，毛泽东学生时代已不崇拜梁启超和康有为，他欣赏的是《新青年》
  description: 误以为毛泽东仍受维新派报刊《时务报》影响
  severity: error
  source: cmmlu_chinese_history_114
- pattern: 《申报》
  correct: 《申报》是商业性报纸，毛泽东学生时代欣赏的是《新青年》
  description: 误以为毛泽东受《申报》影响
  severity: error
  source: cmmlu_chinese_history_114
- pattern: 雕版印刷限用于官方刻书
  correct: 雕版印刷在宋代已广泛应用于官方和民间，书坊遍及全国各地
  description: 误以为雕版印刷只用于官方刻书，忽略了民间书坊的普及
  severity: error
  source: cmmlu_chinese_history_115
- pattern: 活字印刷已取代雕版印刷
  correct: 宋代雕版印刷仍占主导地位，活字印刷尚未取代雕版印刷
  description: 误以为活字印刷在宋代已完全取代雕版印刷
  severity: error
  source: cmmlu_chinese_history_115
- pattern: 宰相冯道发明雕版印刷术
  correct: 雕版印刷术在唐代已出现，冯道主持的是儒家经典的刻版印刷，并非发明者
  description: 误以为冯道是雕版印刷术的发明者
  severity: error
  source: cmmlu_chinese_history_115
- pattern: 已完成对军队的西式改革
  correct: 甲午战争前中国军队的西式改革尚未完成，北洋水师等近代化建设仍在进行中
  description: 误以为甲午战争前中国已完成军队西式改革
  severity: error
  source: cmmlu_chinese_history_116
- pattern: 集权制度有利于作战指挥
  correct: 清朝集权制度在甲午战争中因官僚腐败和指挥僵化反而阻碍了作战指挥
  description: 误以为清朝集权制度在战争中能有效支持作战指挥
  severity: error
  source: cmmlu_chinese_history_116
- pattern: 能获得更广泛的外部援助
  correct: 甲午战争前中国并未获得广泛外部援助，西方列强多持观望或偏袒日本态度
  description: 误以为中国在甲午战争中能获得广泛外部援助
  severity: error
  source: cmmlu_chinese_history_116
- pattern: 井田制.*百姓
  correct: 井田制是土地制度，与‘百姓’含义从贵族到民众的变化无直接因果关系
  description: 误以为井田制的推行导致了‘百姓’含义的变化
  severity: error
  source: cmmlu_chinese_history_117
- pattern: 百家争鸣.*百姓
  correct: 百家争鸣是思想文化现象，并非‘百姓’含义变化的直接原因
  description: 误以为百家争鸣局面的出现导致了‘百姓’含义的变化
  severity: error
  source: cmmlu_chinese_history_117
- pattern: 分封制.*百姓
  correct: 分封制在战国以后逐渐衰落，而非加强，且其加强不会导致‘百姓’成为民众通称
  description: 误以为分封制的加强导致了‘百姓’含义的变化
  severity: error
  source: cmmlu_chinese_history_117
- pattern: 信息传播业.*结构性调整
  correct: 该办法旨在建立集中统一的新闻宣传制度，而非进行信息传播业的结构性调整
  description: 误以为该办法的目的是调整信息传播业结构
  severity: error
  source: cmmlu_chinese_history_118
- pattern: 及时通报.*国内国际形势
  correct: 该办法的核心是统一新闻发布权，建立集中宣传制度，而非单纯为了及时通报形势
  description: 误以为该办法的主要目的是及时通报形势
  severity: error
  source: cmmlu_chinese_history_118
- pattern: 高效.*新闻宣传网
  correct: 该办法旨在建立集中统一的新闻宣传制度，而非单纯追求宣传网的高效
  description: 误以为该办法的目的是建立高效的宣传网
  severity: error
  source: cmmlu_chinese_history_118
- pattern: 从制度到文化
  correct: 甲午战争后，思考层次变化是从器物到制度
  description: 误以为甲午战争后的思考是从制度层面转向文化层面
  severity: error
  source: cmmlu_chinese_history_119
- pattern: 从技术到器物
  correct: 甲午战争后，思考层次变化是从器物到制度
  description: 误以为甲午战争后的思考是从技术转向器物
  severity: error
  source: cmmlu_chinese_history_119
- pattern: 从制度到思想
  correct: 甲午战争后，思考层次变化是从器物到制度
  description: 误以为甲午战争后的思考是从制度转向思想
  severity: error
  source: cmmlu_chinese_history_119
- pattern: 大力提倡白话文.*阅读报纸.*激增
  correct: 白话文运动始于1917年，晚于武昌起义（1911年），不是当时报纸数量激增的主要原因
  description: 误以为白话文运动在武昌起义后立即推动了报纸销量增长
  severity: error
  source: cmmlu_chinese_history_120
- pattern: 普遍赞成民主共和.*反对君主专制
  correct: 当时民众对民主共和的认同尚不普遍，报纸激增主要源于人们对社会变革的关注
  description: 误以为武昌起义后民众普遍赞成民主共和
  severity: error
  source: cmmlu_chinese_history_120
- pattern: 《临时约法》.*言论.*出版.*自由
  correct: 《临时约法》颁布于1912年3月，但报纸激增在约法颁布前已发生，主要原因是社会变革带来的信息需求
  description: 误以为《临时约法》是报纸数量激增的直接原因
  severity: error
  source: cmmlu_chinese_history_120
- pattern: 联合国大会职责是维护世界和平与安全
  correct: 联合国安理会的主要职责是维护国际和平与安全，联合国大会主要讨论和审议事项
  description: 误以为联合国大会承担维护和平与安全的主要职责
  severity: error
  source: cmmlu_chinese_history_121
- pattern: 中国政府反对联合国安理会决议
  correct: 中国投弃权票表示不赞成但未反对，不等于反对该决议
  description: 误将弃权票等同于反对票
  severity: error
  source: cmmlu_chinese_history_121
- pattern: 联合国的军事行动违背了大国一致原则
  correct: 安理会常任理事国投弃权票不构成否决，该决议符合大国一致原则
  description: 误以为弃权票违反大国一致原则
  severity: error
  source: cmmlu_chinese_history_121
- pattern: 皇权渐趋衰落
  correct: 明朝废丞相、设内阁，本质是君主集权加强，皇权并未衰落
  description: 误以为内阁首辅权倾一时意味着皇权衰落，实际上首辅权力源于皇帝信任，是君主集权加强的表现
  severity: error
  source: cmmlu_chinese_history_122
- pattern: 革命性质.*根本转变
  correct: 该时期中国革命性质仍是新民主主义革命，未发生根本转变
  description: 误以为毛泽东描述的现象表明革命性质发生了根本转变
  severity: error
  source: cmmlu_chinese_history_123
- pattern: 国民党.*扶助农工
  correct: 国民党并未在农村调整扶助农工政策，该现象体现的是中共动员群众的效果
  description: 误以为国民党在农村调整了扶助农工政策
  severity: error
  source: cmmlu_chinese_history_123
- pattern: 工农武装割据.*日益成熟
  correct: 该文描述的现象发生在工农武装割据理论形成之前，不能说明该理论日益成熟
  description: 误以为该现象表明中共工农武装割据理论日益成熟
  severity: error
  source: cmmlu_chinese_history_123
- pattern: 皮币.*货币管理
  correct: 皮币是强制诸侯购买以削弱其经济实力的工具，并非货币管理措施
  description: 误以为皮币的发行是为了加强货币管理
  severity: error
  source: cmmlu_chinese_history_124
- pattern: 皮币.*地方控制
  correct: 皮币针对的是诸侯王，而非地方行政控制
  description: 误以为皮币实现了对地方的控制
  severity: error
  source: cmmlu_chinese_history_124
- pattern: 皮币.*思想统一
  correct: 皮币是经济手段，与思想统一无关
  description: 误以为皮币确立了思想上的统一
  severity: error
  source: cmmlu_chinese_history_124
- pattern: 宗族利益.*保护
  correct: 西晋时私拿养子财物无罪，体现的是儒家伦理对家庭关系的调整，而非宗族利益保护
  description: 误以为法律变化反映宗族利益保护，实际是儒家伦理强化
  severity: error
  source: cmmlu_chinese_history_125
- pattern: 养子亲子.*权利相同
  correct: 西晋时养子与亲子在私拿财物上均无罪，但并非所有权利相同，法律变化体现的是儒家伦理对养子地位的认可
  description: 误以为养子与亲子权利完全等同，实际是儒家伦理强化下的特定法律调整
  severity: error
  source: cmmlu_chinese_history_125
- pattern: 血缘亲情.*淡化
  correct: 西晋时私拿养子财物无罪，反映的是儒家伦理对家庭关系的重视，而非血缘亲情淡化
  description: 误以为法律变化表明血缘亲情淡化，实际是儒家伦理强化了家庭伦理
  severity: error
  source: cmmlu_chinese_history_125
- pattern: 泰勒斯.*文明.*痛苦
  correct: 泰勒斯是古希腊自然哲学家，主张水是万物本原，并未讨论文明与痛苦的关系
  description: 误以为泰勒斯与《道德经》观点相悖
  severity: error
  source: cmmlu_chinese_history_126
- pattern: 亚里士多德.*文明.*痛苦
  correct: 亚里士多德主张理性与幸福，但并非直接与《道德经》的文明痛苦观相悖
  description: 误以为亚里士多德的观点与《道德经》截然相反
  severity: error
  source: cmmlu_chinese_history_126
- pattern: 普岁塔哥拉.*文明.*痛苦
  correct: 普岁塔哥拉（普罗泰戈拉）是智者学派代表，主张人是万物的尺度，未直接反对文明痛苦论
  description: 误以为普岁塔哥拉与《道德经》观点相悖
  severity: error
  source: cmmlu_chinese_history_126
- pattern: 已形成统一国内市场
  correct: 清初区域经济发展不平衡，尚未形成统一国内市场
  description: 误以为清初已形成统一国内市场
  severity: error
  source: cmmlu_chinese_history_127
- pattern: 苏州是江南经济中心
  correct: 材料中苏州只是江南地区之一，与芜湖、扬州、江宁、杭州等分其势，并非唯一经济中心
  description: 误以为苏州是江南唯一经济中心
  severity: error
  source: cmmlu_chinese_history_127
- pattern: 工商业市镇繁荣发展
  correct: 材料强调区域经济发展不平衡，而非工商业市镇繁荣发展
  description: 误将材料主旨理解为工商业市镇繁荣发展
  severity: error
  source: cmmlu_chinese_history_127
- pattern: 世界棉纺织业渐趋萎缩
  correct: 一战后世界棉纺织业并未萎缩，而是西方列强恢复了对华经济侵略
  description: 误以为一战后世界棉纺织业萎缩导致中国棉纺织业衰落
  severity: error
  source: cmmlu_chinese_history_128
- pattern: 官僚资本挤压民族企业
  correct: 一战后中国棉纺织业衰落的主因是西方列强经济侵略和投资过度，而非官僚资本挤压
  description: 误将官僚资本挤压民族企业作为一战后棉纺织业衰落的原因
  severity: error
  source: cmmlu_chinese_history_128
- pattern: 培养经世致用的人才
  correct: 宋明理学的根本出发点是规范社会秩序，实现社会和谐，而非培养经世致用的人才
  description: 误以为宋明理学的核心目标是培养实用型人才
  severity: error
  source: cmmlu_chinese_history_129
- pattern: 树立理学的统治地位
  correct: 宋明理学的根本出发点是规范社会秩序，实现社会和谐，而非单纯树立理学的统治地位
  description: 误以为理学的主要目的是维护自身统治地位
  severity: error
  source: cmmlu_chinese_history_129
- pattern: 修身养性，提高个人修养
  correct: 宋明理学的根本出发点是规范社会秩序，实现社会和谐，修身养性只是实现这一目标的手段而非根本出发点
  description: 误以为理学的根本出发点是个人修养而非社会秩序
  severity: error
  source: cmmlu_chinese_history_129
- pattern: 经济理论问题引起民众的普遍关注
  correct: 当时只有部分知识分子关注中国经济性质问题，并非民众普遍关注
  description: 误以为经济理论问题在当时引起了民众的普遍关注
  severity: error
  source: cmmlu_chinese_history_130
- pattern: 知识界对中国社会性质的认识相同
  correct: 当时知识界对中国社会性质存在不同认识，并非完全一致
  description: 误以为当时知识界对中国社会性质的认识是统一的
  severity: error
  source: cmmlu_chinese_history_130
- pattern: 官僚资本主义在中国迅速膨胀
  correct: 20世纪30年代中期，官僚资本主义尚未迅速膨胀，这一现象主要出现在抗战后期
  description: 误以为20世纪30年代中期官僚资本主义已迅速膨胀
  severity: error
  source: cmmlu_chinese_history_130
- pattern: 隶书.*楷书.*发展
  correct: 隶书由篆书演变而来，楷书是在隶书之后发展的字体
  description: 误以为隶书是在楷书基础上发展而来，实际上隶书早于楷书
  severity: error
  source: cmmlu_chinese_history_131
- pattern: 隶书.*汉代.*狱官.*创
  correct: 隶书起源于秦代，由狱吏程邈整理或为适应公文书写而创，并非汉代狱官所创
  description: 误以为隶书是汉代狱官所创，实际上隶书在秦代已出现
  severity: error
  source: cmmlu_chinese_history_131
- pattern: 隶书.*秦代.*八大篆书
  correct: 隶书是秦代八体之一，但八体包括大篆、小篆、隶书等，隶书并非篆书字体
  description: 误以为隶书是篆书的一种，实际上隶书是与篆书不同的字体
  severity: error
  source: cmmlu_chinese_history_131
- pattern: 君主专制被颠覆
  correct: 皇帝受制于其他势力是君权至上制度下权力分配失衡的表现，并非君主专制被颠覆
  description: 误以为皇帝权力被削弱意味着君主专制制度被推翻
  severity: error
  source: cmmlu_chinese_history_132
- pattern: 中央集权体制遭到破坏
  correct: 皇帝受制于其他势力是中央集权体制内部权力斗争的结果，并非体制本身被破坏
  description: 误以为皇帝权力萎缩等同于中央集权体制瓦解
  severity: error
  source: cmmlu_chinese_history_132
- pattern: 君主权力受到制约
  correct: 皇帝受制于其他势力是君权至上制度下权力被侵蚀，而非制度性制约
  description: 误以为皇帝权力被削弱是制度性制约，而非权力失衡
  severity: error
  source: cmmlu_chinese_history_132
- pattern: 敢于反抗专制暴政
  correct: 孟子强调个人品德修养，而非直接反抗专制暴政
  description: 误以为孟子言论主要倡导反抗专制暴政
  severity: error
  source: cmmlu_chinese_history_133
- pattern: 勇于突破礼制束缚
  correct: 孟子主张在礼制框架内完善个人品德，而非突破礼制束缚
  description: 误以为孟子言论鼓励突破礼制束缚
  severity: error
  source: cmmlu_chinese_history_133
- pattern: 坚持个人独特性格
  correct: 孟子强调培养普遍性的浩然之气和品德，而非突出个人独特性格
  description: 误以为孟子言论重在坚持个人独特性格
  severity: error
  source: cmmlu_chinese_history_133
- pattern: 积极参与制定国际政治经济秩序规则
  correct: 中国参加维和行动体现的是以联合国为中心的多边外交，而非直接参与制定国际规则
  description: 误将维和行动等同于参与制定国际规则
  severity: error
  source: cmmlu_chinese_history_134
- pattern: 建立新型区域合作组织
  correct: 维和行动是联合国框架下的全球性行动，不属于区域合作组织范畴
  description: 误以为维和行动属于区域合作组织活动
  severity: error
  source: cmmlu_chinese_history_134
- pattern: 已成为世界政治格局多极化中的一极
  correct: 中国参加维和行动体现的是多边外交，而非直接表明中国已成为多极化中的一极
  description: 误将维和行动作为中国成为多极化一极的证据
  severity: error
  source: cmmlu_chinese_history_134
- pattern: 顽固派.*洋务派.*批评
  correct: 该言论批评洋务派只学西方皮毛，是维新派对洋务派的批评
  description: 误以为批评洋务派只学西方皮毛的是顽固派
  severity: error
  source: cmmlu_chinese_history_135
- pattern: 洋务派.*顽固派.*批评
  correct: 该言论批评洋务派只学西方皮毛，不是洋务派对顽固派的批评
  description: 误以为该言论是洋务派批评顽固派
  severity: error
  source: cmmlu_chinese_history_135
- pattern: 洋务派.*维新派.*批评
  correct: 该言论批评洋务派只学西方皮毛，不是洋务派对维新派的批评
  description: 误以为该言论是洋务派批评维新派
  severity: error
  source: cmmlu_chinese_history_135
- pattern: 工作重心转向经济领域
  correct: 经济部的设立是为了适应战争需要，而非工作重心转向经济领域
  description: 误以为经济部的设立意味着国民政府工作重心转向经济领域
  severity: error
  source: cmmlu_chinese_history_136
- pattern: 提高了后方百姓生活水平
  correct: 经济部的设立主要是为了战时经济统制，并未显著提高后方百姓生活水平
  description: 误以为经济部的设立提高了后方百姓生活水平
  severity: error
  source: cmmlu_chinese_history_136
- pattern: 导致抗战时期行政效率的低下
  correct: 经济部的设立是为了集中管理经济事务，并非导致行政效率低下的原因
  description: 误以为经济部的设立导致抗战时期行政效率低下
  severity: error
  source: cmmlu_chinese_history_136
- pattern: 资本主义国家
  correct: 殖民地半殖民地国家革命后建立的是新民主主义国家，而非资本主义国家
  description: 误以为殖民地半殖民地国家革命后直接建立资本主义国家
  severity: error
  source: cmmlu_chinese_history_137
- pattern: 社会主义国家
  correct: 殖民地半殖民地国家革命后建立的是新民主主义国家，这是向社会主义过渡的形式，而非直接建立社会主义国家
  description: 误以为殖民地半殖民地国家革命后直接建立社会主义国家
  severity: error
  source: cmmlu_chinese_history_137
- pattern: 民主主义国家
  correct: 毛泽东所指的国家形式是新民主主义国家，而非一般的民主主义国家
  description: 混淆了民主主义国家与新民主主义国家的概念
  severity: error
  source: cmmlu_chinese_history_137
- pattern: 现代企业制度.*试点
  correct: 现代企业制度试点始于1990年代，而非1980年代农村改革初期
  description: 误以为现代企业制度试点与农村改革同时期开始
  severity: error
  source: cmmlu_chinese_history_138
- pattern: 非公有制经济.*主导
  correct: 非公有制经济在1980年代尚未起主导作用，公有制经济仍占主体地位
  description: 误以为非公有制经济在1980年代已起主导作用
  severity: error
  source: cmmlu_chinese_history_138
- pattern: 报纸舆论.*专制政府控制
  correct: 材料中描述者肯定报纸的教化功能，并未提及专制政府控制舆论
  description: 误以为材料反映了报纸舆论受政府控制
  severity: error
  source: cmmlu_chinese_history_139
- pattern: 报纸宣传.*变革根本动
  correct: 材料强调报纸开启民智，但未将报纸宣传视为变革的根本动力
  description: 误以为报纸宣传是变革的根本动力
  severity: error
  source: cmmlu_chinese_history_139
- pattern: 报纸产业多元化
  correct: 材料中提及多种报纸，但描述者主要肯定其教化功能，而非倡导产业多元化
  description: 误以为描述者倡导报纸产业多元化
  severity: warning
  source: cmmlu_chinese_history_139
- pattern: 抛弃孔夫子.*觉醒
  correct: 《劝学篇》主张‘中体西用’，并非抛弃孔夫子，而是主张在维护传统纲常名教的前提下学习西方技术
  description: 误以为《劝学篇》主张彻底抛弃儒家传统才能实现中国觉醒
  severity: error
  source: cmmlu_chinese_history_140
- pattern: 全面否定传统文化
  correct: 《劝学篇》主张‘中体西用’，并非全面否定传统文化，而是强调以中国传统文化为根本
  description: 误以为《劝学篇》是对传统文化的全面否定
  severity: error
  source: cmmlu_chinese_history_140
- pattern: 张扬自我
  correct: 诗中表达的是人与万物同理、顺应自然的境界，而非张扬自我
  description: 误以为诗中体现的是张扬自我的人生态度
  severity: error
  source: cmmlu_chinese_history_141
- pattern: 无为而治
  correct: 诗中主旨是人与万物同理，而非道家无为而治的政治理念
  description: 误以为诗中体现的是无为而治的思想
  severity: error
  source: cmmlu_chinese_history_141
- pattern: 募兵制.*加剧.*贫富分化
  correct: 募兵制通过优厚待遇养兵，并未直接加剧社会贫富分化
  description: 误以为募兵制导致贫富差距扩大
  severity: error
  source: cmmlu_chinese_history_142
- pattern: 募兵制.*弱化.*地方控制
  correct: 募兵制由中央统一招募管理，并未弱化对地方的控制
  description: 误以为募兵制削弱了中央对地方的控制力
  severity: error
  source: cmmlu_chinese_history_142
- pattern: 募兵制.*提升.*战斗力
  correct: 募兵制虽兵员众多，但并未显著提升军队战斗力
  description: 误以为募兵制直接增强了军队作战能力
  severity: error
  source: cmmlu_chinese_history_142
- pattern: 君主寿命.*差异
  correct: 商周王位继承方式不同（兄终弟及 vs 父子相传），而非君主寿命差异导致代数不同
  description: 误以为商周王代数差异主要由君主寿命长短造成
  severity: error
  source: cmmlu_chinese_history_143
- pattern: 血缘纽带.*弱化
  correct: 西周宗法制强化了血缘纽带，而非弱化
  description: 误以为西周王位继承代数减少意味着血缘关系弱化
  severity: error
  source: cmmlu_chinese_history_143
- pattern: 禅让制度.*影响
  correct: 西周实行宗法制和嫡长子继承制，禅让制在夏朝已终结
  description: 误以为西周仍受禅让制影响
  severity: error
  source: cmmlu_chinese_history_143
- pattern: 创作形式.*《诗经》.*一致
  correct: 司马迁认为司马相如赋的讽谏精神与《诗经》相似，而非创作形式一致
  description: 误以为司马迁在比较司马相如赋与《诗经》的创作形式相同
  severity: error
  source: cmmlu_chinese_history_144
- pattern: 克服文辞铺张
  correct: 司马迁指出司马相如赋有‘虚辞滥说’的铺张问题，并未认为其克服了文辞铺张
  description: 误以为司马迁认为司马相如赋克服了文辞铺张的弊病
  severity: error
  source: cmmlu_chinese_history_144
- pattern: 吸取西汉败亡
  correct: 司马迁生活在西汉中期，当时西汉尚未败亡，不可能提及吸取败亡教训
  description: 误以为司马迁在赋中提及吸取西汉败亡的教训
  severity: error
  source: cmmlu_chinese_history_144
- pattern: 行省制.*巩固.*中央统治.*国家统一
  correct: 行省制实现了中央集权和地方分权的有机结合，而非单纯巩固中央统治
  description: 误以为行省制仅强化中央集权，忽略了其地方分权特征
  severity: error
  source: cmmlu_chinese_history_145
- pattern: 行省制.*着眼于.*政治.*统治.*军事.*控制
  correct: 行省制实现了中央集权和地方分权的有机结合，而非仅着眼于政治和军事控制
  description: 误以为行省制仅侧重政治军事功能，忽略了其制度演化的综合特征
  severity: error
  source: cmmlu_chinese_history_145
- pattern: 行省制.*借鉴.*郡县制.*优点.*摈弃.*两宋.*缺点
  correct: 行省制实现了中央集权和地方分权的有机结合，而非简单借鉴郡县制优点并摈弃两宋缺点
  description: 误以为行省制是郡县制优点与两宋缺点的机械组合，忽略了其制度创新
  severity: error
  source: cmmlu_chinese_history_145
- pattern: 侧重提倡务实之风
  correct: 《明定国是诏》强调以圣贤义理为根本，同时博采西学，体现的是在维护传统基础上的渐进改良，而非单纯提倡务实
  description: 误以为诏书仅强调务实，忽略了其维护传统根基的保守性
  severity: error
  source: cmmlu_chinese_history_146
- pattern: 兼具改良与革命的色彩
  correct: 戊戌变法是改良运动，不包含革命色彩，革命主张推翻现有制度
  description: 混淆了改良与革命的区别，戊戌变法主张在现有体制内改革
  severity: error
  source: cmmlu_chinese_history_146
- pattern: 与洋务运动的宗旨并无不同
  correct: 戊戌变法主张政治制度变革，而洋务运动仅学习西方技术，二者宗旨不同
  description: 误以为戊戌变法和洋务运动宗旨相同，忽略了政治改革层面的差异
  severity: error
  source: cmmlu_chinese_history_146
- pattern: 大秦.*奥斯曼帝国
  correct: 东汉时期的大秦指罗马帝国，而非奥斯曼帝国
  description: 误以为东汉时期的大秦是奥斯曼帝国
  severity: error
  source: cmmlu_chinese_history_147
- pattern: 大秦.*波斯帝国
  correct: 东汉时期的大秦指罗马帝国，而非波斯帝国
  description: 误以为东汉时期的大秦是波斯帝国
  severity: error
  source: cmmlu_chinese_history_147
- pattern: 大秦.*亚历山大帝国
  correct: 东汉时期的大秦指罗马帝国，而非亚历山大帝国
  description: 误以为东汉时期的大秦是亚历山大帝国
  severity: error
  source: cmmlu_chinese_history_147
- pattern: 官方原始记录.*口述史料
  correct: 《明太祖实录》属于官修史书，是文献史料而非口述史料
  description: 误将《明太祖实录》归类为口述史料
  severity: error
  source: cmmlu_chinese_history_148
- pattern: 《实录》.*第二手史料
  correct: 《明太祖实录》是官修史书，属于第一手史料（原始史料）
  description: 误以为《实录》是第二手史料
  severity: error
  source: cmmlu_chinese_history_148
- pattern: 第一则材料.*文献史料.*实录感
  correct: 文献史料虽重要，但实物史料（如户贴原件）更能反映历史原貌
  description: 误以为文献史料比实物史料更具实录感
  severity: error
  source: cmmlu_chinese_history_148
- pattern: 清政府鼓励民间设厂
  correct: 清政府鼓励民间设厂的政策主要是在甲午战争后（1895年后）才逐步推行，而题目所述1870年代机器缫丝业的兴起主要受新式企业引领
  description: 误以为1870年代清政府已积极鼓励民间设厂
  severity: error
  source: cmmlu_chinese_history_149
- pattern: 外国资本输入的刺激
  correct: 外国资本输入对近代工业有影响，但1870年代珠江三角洲机器缫丝业的直接兴起主要受本地新式企业（如继昌隆缫丝厂）的引领和示范作用
  description: 误将外国资本输入视为1870年代机器缫丝业兴起的直接原因
  severity: error
  source: cmmlu_chinese_history_149
- pattern: 广州被列为通商口岸
  correct: 广州在1842年《南京条约》中已被列为通商口岸，与1870年代机器缫丝业兴起无直接关联
  description: 误以为广州开埠是1870年代机器缫丝业兴起的直接原因
  severity: error
  source: cmmlu_chinese_history_149
- pattern: 剪发齐眉.*普遍选择
  correct: 剪发齐眉在当时并非妇女的普遍选择，而是部分新潮女性的行为，且遭到官方禁止
  description: 误以为剪发齐眉是当时妇女的普遍现象
  severity: error
  source: cmmlu_chinese_history_150
- pattern: 处罚措施.*民国法治精神
  correct: 处罚措施体现了对传统习俗的维护，而非民国法治精神，因为其禁止的是个人发型选择，带有封建色彩
  description: 误以为民国时期的处罚措施体现了法治精神，实际上反映了对传统礼教的维护
  severity: error
  source: cmmlu_chinese_history_150
- pattern: 男女平等思想.*深入人心
  correct: 材料中禁止妇女剪男式发型，说明男女平等思想在当时并未深入人心，反而受到压制
  description: 误以为男女平等思想在民国初期已广泛普及，实际上传统观念仍占主导
  severity: error
  source: cmmlu_chinese_history_150
- pattern: 分封王国子弟.*调整统治者内部关系
  correct: 主父偃建议推恩令，表面是分封子弟以宣扬仁孝，实际目的是削弱诸侯国势力
  description: 误以为推恩令的主要目的是调整内部关系，而非削弱地方势力
  severity: error
  source: cmmlu_chinese_history_151
- pattern: 广建侯国.*拱卫中央政权
  correct: 推恩令通过分封诸侯子弟，使封国变小，实际是削弱而非拱卫中央政权
  description: 误以为广建侯国是为了加强中央，实际是分散和削弱诸侯势力
  severity: error
  source: cmmlu_chinese_history_151
- pattern: 近代化得益于西方扩张
  correct: 西方扩张客观上带来了近代化因素，但近代化的根本动力是中国社会内部变革和中国人民的奋斗
  description: 误以为中国沿海城市近代化完全归功于西方扩张，忽视了西方侵略的破坏性和中国自身的主体性
  severity: error
  source: cmmlu_chinese_history_152
- pattern: 西方扩张是近代中国各种变化的主导因素
  correct: 西方扩张是外部刺激，但近代中国变化的主导因素是中国社会内部矛盾、中国人民的抗争与探索
  description: 夸大西方扩张的作用，将其视为近代中国变化的主导因素，忽视了内因的决定性作用
  severity: error
  source: cmmlu_chinese_history_152
- pattern: 人民.*唯一机关
  correct: 第一届全国人民代表大会制定了我国第一部社会主义类型的宪法，但人民代表大会制度并非人民行使政治权力的唯一机关
  description: 误以为第一届全国人民代表大会是人民行使政治权力的唯一机关
  severity: error
  source: cmmlu_chinese_history_153
- pattern: 规定权力属于人民.*开始成为国家主人
  correct: 1949年新中国成立时，人民就已经成为国家主人，权力属于人民已在《共同纲领》中规定
  description: 误以为第一届全国人民代表大会才首次规定权力属于人民、人民开始成为国家主人
  severity: error
  source: cmmlu_chinese_history_153
- pattern: 海选产生
  correct: 第一届全国人民代表大会代表是通过普选产生，而非海选
  description: 误以为第一届全国人民代表大会代表由海选产生
  severity: error
  source: cmmlu_chinese_history_153
- pattern: 城市化.*进程.*缓慢
  correct: 一五计划期间优先发展重工业，城市化进程并非主要目标，但工业化带动了城市发展
  description: 误以为住宅建设投资减少意味着城市化进程放缓
  severity: error
  source: cmmlu_chinese_history_154
- pattern: 国民经济结构.*平衡
  correct: 一五计划优先发展重工业，国民经济结构偏向工业而非平衡
  description: 误以为抑制非生产性建设投资是为了平衡国民经济结构
  severity: error
  source: cmmlu_chinese_history_154
- pattern: 压缩基本建设投资规模
  correct: 一五计划期间基本建设投资规模并未压缩，而是调整了投资方向，优先保证工业建设
  description: 误以为住宅建设投资减少意味着整体基本建设投资规模被压缩
  severity: error
  source: cmmlu_chinese_history_154
- pattern: 土地制度的调整
  correct: 明中后期棉花产区形成的主要因素是地区经济差异，而非土地制度调整
  description: 误以为土地制度调整是棉花产区形成的主要原因
  severity: error
  source: cmmlu_chinese_history_155
- pattern: 交通方式的变革
  correct: 大运河在明中后期已存在，并非新变革，棉花运输依赖已有运河，主要因素是地区经济差异
  description: 误以为交通方式变革是棉花产区形成的主要原因
  severity: error
  source: cmmlu_chinese_history_155
- pattern: 货币制度的改变
  correct: 明中后期棉花贸易的主要驱动力是地区经济差异，而非货币制度改变
  description: 误以为货币制度改变是棉花产区形成的主要原因
  severity: error
  source: cmmlu_chinese_history_155
- pattern: 科举制根深蒂固.*无法破除
  correct: 科举制在洋务运动期间仍受重视，但并非无法破除，其废除是清末新政的结果
  description: 误以为科举制在洋务运动期间完全无法动摇
  severity: error
  source: cmmlu_chinese_history_156
- pattern: 北洋水师急需科举人才
  correct: 北洋水师需要的是近代化军事和技术人才，而非科举出身者
  description: 误以为北洋水师急需科举人才
  severity: error
  source: cmmlu_chinese_history_156
- pattern: 维新派存在软弱性和妥协性
  correct: 严复参加科举是洋务运动时期的社会现象，与维新派的软弱性和妥协性无直接关联
  description: 误将严复参加科举归因于维新派的软弱性和妥协性
  severity: error
  source: cmmlu_chinese_history_156
- pattern: 兼收并蓄的文化政策
  correct: 西汉初期学术思想的融合主要是出于现实统治需要，而非单纯的文化政策
  description: 误以为学术思想的融合是由文化政策直接推动的
  severity: error
  source: cmmlu_chinese_history_157
- pattern: 百家争鸣局面的延续
  correct: 西汉初期学术思想的融合并非百家争鸣的延续，而是适应现实统治需要的结果
  description: 误以为西汉初期学术融合是战国百家争鸣的延续
  severity: error
  source: cmmlu_chinese_history_157
- pattern: 王国势力强大
  correct: 王国势力强大并非导致学术思想融合的主要因素，现实统治需要才是关键
  description: 误以为王国势力强大促进了学术思想的融合
  severity: error
  source: cmmlu_chinese_history_157
- pattern: 中国.*科技.*领先
  correct: 中国当时在科技上整体落后于西方，仅个别技术应用接近同步
  description: 误以为中国在科技上处于领先地位
  severity: error
  source: cmmlu_chinese_history_158
- pattern: 中国.*学习器物
  correct: 19世纪末中国已进入制度学习阶段，而非仅学习器物
  description: 误以为19世纪末中国仍停留在学习器物阶段
  severity: error
  source: cmmlu_chinese_history_158
- pattern: 御史制度.*促进.*行政
  correct: 御史制度主要负责监察，而非直接促进行政运行
  description: 误以为御史制度的主要作用是促进行政运行，实际上其核心职能是监察百官
  severity: error
  source: cmmlu_chinese_history_159
- pattern: 郡县制度.*推动.*中央集权
  correct: 郡县制度是地方行政制度，材料描述的是中央中枢行政系统
  description: 误将郡县制度与中央中枢行政系统混淆，材料讨论的是中央政府机构
  severity: error
  source: cmmlu_chinese_history_159
- pattern: 皇帝制度.*保证.*行政
  correct: 皇帝制度是最高权力制度，材料强调的是三公九卿的分工运作
  description: 误以为皇帝制度直接保证行政运作，材料核心是中枢行政系统的分工设计
  severity: error
  source: cmmlu_chinese_history_159
- pattern: 各地军阀对三民主义理解存在差异
  correct: 材料反映的是军阀利用主义进行政治标榜，而非对三民主义理解存在差异
  description: 误以为材料主旨是军阀对三民主义理解不同，实际是军阀借主义名义争夺政治资本
  severity: error
  source: cmmlu_chinese_history_160
- pattern: 标榜主义成为军阀自保的主要手段
  correct: 材料说明军阀标榜主义是为了争夺政治资本和舆论支持，而非主要为了自保
  description: 误以为军阀标榜主义主要是为了自保，实际是为了争夺政治话语权
  severity: error
  source: cmmlu_chinese_history_160
- pattern: 政治宣传促使各界思想趋同
  correct: 材料反映的是军阀利用主义进行政治标榜，而非各界思想趋同
  description: 误以为政治宣传导致思想趋同，实际是军阀各自标榜不同主义以争夺影响力
  severity: error
  source: cmmlu_chinese_history_160
- pattern: 《天津条约》.*台湾
  correct: 《马关条约》割让台湾给日本，《天津条约》不涉及台湾割让
  description: 误以为《天津条约》涉及台湾割让
  severity: error
  source: cmmlu_chinese_history_161
- pattern: 《南京条约》.*台湾
  correct: 《马关条约》割让台湾给日本，《南京条约》割让香港岛
  description: 误以为《南京条约》涉及台湾割让
  severity: error
  source: cmmlu_chinese_history_161
- pattern: 《北京条约》.*台湾
  correct: 《马关条约》割让台湾给日本，《北京条约》割让九龙半岛南部
  description: 误以为《北京条约》涉及台湾割让
  severity: error
  source: cmmlu_chinese_history_161
- pattern: 国内无报刊供其选稿
  correct: 当时国内已有其他报刊，但《国闻报》选择百余种外国报刊作为稿件来源
  description: 误以为当时中国没有报刊可供选稿
  severity: error
  source: cmmlu_chinese_history_162
- pattern: 维新思想的传播仅限于北方各省
  correct: 《国闻报》国内外均有采访，维新思想传播不限于北方各省
  description: 误以为维新思想只在北方各省传播
  severity: error
  source: cmmlu_chinese_history_162
- pattern: 清政府允许自由办报
  correct: 清末清政府并未允许自由办报，办报受到限制
  description: 误以为清末清政府允许自由办报
  severity: error
  source: cmmlu_chinese_history_162
- pattern: 加强对地方的控制
  correct: 刘邦推行分封制的主要目的是确保刘氏皇族的统治和皇位传承稳固，而非单纯加强对地方的控制
  description: 误以为分封制的主要目的是加强中央对地方的控制
  severity: error
  source: cmmlu_chinese_history_163
- pattern: 继承西周的政治体制
  correct: 刘邦的分封制是西汉初年特定政治条件下的权宜之计，并非完全继承西周的分封体制
  description: 误以为西汉分封制是直接继承西周的政治体制
  severity: error
  source: cmmlu_chinese_history_163
- pattern: 否定秦朝的政治体制
  correct: 刘邦推行分封制并非完全否定秦朝体制，而是吸取秦亡教训并兼顾现实需要
  description: 误以为分封制是对秦朝政治体制的彻底否定
  severity: error
  source: cmmlu_chinese_history_163
- pattern: 贵族世袭
  correct: 长兄如父、小儿不及长孙体现的是宗法观念，而非贵族世袭
  description: 误将宗法观念等同于贵族世袭制度
  severity: error
  source: cmmlu_chinese_history_164
- pattern: 等级秩序
  correct: 长兄如父、小儿不及长孙体现的是宗法观念，而非一般性的等级秩序
  description: 误将宗法观念泛化为等级秩序
  severity: warning
  source: cmmlu_chinese_history_164
- pattern: 家族和睦
  correct: 长兄如父、小儿不及长孙体现的是宗法观念，而非家族和睦
  description: 误将宗法观念理解为家族和睦
  severity: error
  source: cmmlu_chinese_history_164
- pattern: 发起新文化运动
  correct: 新文化运动是1915年由陈独秀等人发起的思想解放运动，与袁世凯当选临时大总统后的政治举措无关
  description: 误以为新文化运动是革命派为约束袁世凯而发起的政治行动
  severity: error
  source: cmmlu_chinese_history_165
- pattern: 成立同盟会
  correct: 同盟会成立于1905年，早于袁世凯当选临时大总统（1912年），并非为此而成立
  description: 混淆了同盟会成立时间与袁世凯当选后的政治应对
  severity: error
  source: cmmlu_chinese_history_165
- pattern: 发动护法运动
  correct: 护法运动是1917年孙中山为维护《临时约法》而发起的，并非袁世凯当选后立即采取的措施
  description: 误以为护法运动是袁世凯当选后革命派立即采取的行动
  severity: error
  source: cmmlu_chinese_history_165
- pattern: 和平与发展成为时代主题.*天时
  correct: 和平与发展成为时代主题是国际环境因素，属于'天时'的一部分
  description: 误以为和平与发展成为时代主题不属于'天时'
