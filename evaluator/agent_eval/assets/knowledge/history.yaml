- pattern: 雅言.*山东
  correct: 周代的雅言起源于陕西，因为周朝发源于陕西地区
  description: 误以为雅言起源于山东
  severity: error
  source: cmmlu_chinese_history_309
- pattern: 雅言.*河北
  correct: 周代的雅言起源于陕西，因为周朝发源于陕西地区
