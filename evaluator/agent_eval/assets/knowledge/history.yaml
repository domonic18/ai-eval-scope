  source: cmmlu_chinese_history_265
- pattern: 方田均税法.*科举新法
  correct: 方田均税法和科举新法分别针对土地税收和选官制度，不是直接增加生产、解决积贫积弱的根本措施
  description: 误以为方田均税法和科举新法是王安石针对生产少问题的根本改革
