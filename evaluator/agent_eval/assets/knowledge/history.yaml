- pattern: 19世纪现实主义画家
  correct: 文艺复兴时期画家是欧洲最早摆脱教会垄断艺术资助、转向世俗肖像画的群体
  description: 误以为19世纪现实主义画家是文艺复兴时期艺术资助转型的代表
  severity: error
  source: cmmlu_world_history_155
- pattern: 20世纪现代主义画家
  correct: 文艺复兴时期画家是欧洲最早摆脱教会垄断艺术资助、转向世俗肖像画的群体
  description: 误以为20世纪现代主义画家是文艺复兴时期艺术资助转型的代表
  severity: error
  source: cmmlu_world_history_155
- pattern: 冷战.*秩序.*建立
  correct: 冷战秩序是政治军事对峙格局，与国际贸易体系不同
  description: 误将冷战秩序视为美国战后推动的国际贸易体系
  severity: error
  source: cmmlu_world_history_156
- pattern: 北美自由贸易区.*建立
  correct: 北美自由贸易区成立于1994年，是区域贸易协定，非战后全球体系
  description: 误将北美自由贸易区当作战后美国主导的全球贸易体系
  severity: error
  source: cmmlu_world_history_156
- pattern: 世界贸易组织.*建立
  correct: 世界贸易组织成立于1995年，晚于关贸总协定，后者是1947年签署的临时协定
  description: 误将世界贸易组织当作战后立即建立的体系，实际是关贸总协定
  severity: error
  source: cmmlu_world_history_156
- pattern: 获得了安理会常任理事国席位
  correct: 日本至今未获得安理会常任理事国席位
  description: 误以为日本已获得安理会常任理事国席位
  severity: error
  source: cmmlu_world_history_157
- pattern: 实现了经济的持续增长
  correct: 1990年代日本经济陷入长期停滞，并未持续增长
  description: 误以为1990年代日本经济持续增长
  severity: error
  source: cmmlu_world_history_157
- pattern: 成为当时世界上最大的债权国
  correct: 日本在1980年代曾是最大债权国，但材料未体现且与题意无关
  description: 误以为材料中捐款行为直接表明日本是最大债权国
  severity: warning
  source: cmmlu_world_history_157
- pattern: 法兰克王国.*控制.*商路
  correct: 法兰克王国存在于中世纪早期，并未控制亚欧商路
  description: 误以为法兰克王国是中世纪后期控制亚欧商路的军事强国
  severity: error
  source: cmmlu_world_history_158
- pattern: 拜占庭帝国.*控制.*商路
  correct: 拜占庭帝国在中世纪后期已衰落，并未控制亚欧商路
  description: 误以为拜占庭帝国是中世纪后期控制亚欧商路的军事强国
  severity: error
  source: cmmlu_world_history_158
- pattern: 西罗马帝国.*控制.*商路
  correct: 西罗马帝国于5世纪灭亡，并非中世纪后期的国家
  description: 误以为西罗马帝国存在于中世纪后期并控制亚欧商路
  severity: error
  source: cmmlu_world_history_158
- pattern: 罗马法学体系.*完善.*成熟
  correct: 《十二铜表法》是罗马成文法的开端，但罗马法学体系的完善和成熟是在帝国时期
  description: 误以为《十二铜表法》标志着罗马法学体系的完善和成熟
  severity: error
  source: cmmlu_world_history_159
- pattern: 平民.*取得.*罗马法.*制定权
  correct: 平民通过斗争推动了成文法公布，但并未取得罗马法的制定权，制定权仍由贵族掌握
  description: 误以为平民取得了罗马法的制定权
  severity: error
  source: cmmlu_world_history_159
- pattern: 贵族.*利益.*不再受法律保护
  correct: 《十二铜表法》限制了贵族随意解释法律的特权，但贵族的利益仍受法律保护
  description: 误以为《十二铜表法》后贵族的利益不再受法律保护
  severity: error
  source: cmmlu_world_history_159
- pattern: 未给殖民地造成任何的打击和破坏
  correct: 新航路开辟给殖民地带来了掠夺、奴役和破坏
  description: 误以为新航路开辟对殖民地没有负面影响
  severity: error
  source: cmmlu_world_history_160
- pattern: 带来的物种交流助推新旧大陆发展
  correct: 物种交流主要推动了欧洲的发展，对殖民地的影响复杂，包括破坏和剥削
  description: 误以为物种交流平等地助推了新旧大陆的发展
  severity: warning
  source: cmmlu_world_history_160
- pattern: 促进新旧大陆经济互补而共同发展
  correct: 新航路开辟后，欧洲主导了经济互补，殖民地经济被扭曲并遭受剥削
  description: 误以为新旧大陆在经济互补中实现了平等共同发展
  severity: warning
  source: cmmlu_world_history_160
domain_facts:
  dynasty_timeline:
