  source: cmmlu_chinese_history_274
- pattern: 市.*突破空间限制
  correct: 唐代‘市’突破空间限制是商品经济发展的表现，与均田制破坏无关
  description: 误将‘市’突破空间限制与均田制破坏混淆
  severity: error
  source: cmmlu_chinese_history_275
- pattern: 井田制瓦解
  correct: 井田制在春秋战国时期已瓦解，唐代不存在井田制
  description: 误以为唐代仍存在井田制
  severity: error
  source: cmmlu_chinese_history_275
- pattern: 分封制恢复
  correct: 唐代未恢复分封制，分封制在秦朝已废除
  description: 误以为唐代恢复了分封制
  severity: error
  source: cmmlu_chinese_history_275
- pattern: 广大民众.*决定国家政策
  correct: 当时民众尚未拥有决定国家政策的权力，仍处于被启蒙阶段
  description: 误以为1919年民众已拥有决定国家政策的权力
  severity: error
  source: cmmlu_chinese_history_276
- pattern: 知识阶层.*参与政府管理
  correct: 当时知识阶层主要追求社会变革和民主，而非直接参与政府管理
  description: 误以为知识阶层已有参与政府管理的意识
  severity: error
  source: cmmlu_chinese_history_276
- pattern: 马克思主义.*广泛深入传播
  correct: 1919年马克思主义在中国开始传播，但尚未广泛深入
  description: 误以为1919年马克思主义已在中国广泛深入传播
  severity: error
  source: cmmlu_chinese_history_276
- pattern: 小农经济.*瓦解
  correct: 19世纪末20世纪初中国小农经济尚未瓦解，丝茶出口下降主要因国际竞争力减弱
  description: 误以为小农经济瓦解是丝茶出口下降的主因
  severity: error
  source: cmmlu_chinese_history_277
- pattern: 重农抑商政策
  correct: 清政府此时已放宽抑商政策，丝茶出口下降并非因重农抑商
  description: 误以为清政府重农抑商政策导致丝茶出口地位下降
  severity: error
  source: cmmlu_chinese_history_277
- pattern: 产业结构.*变化
  correct: 中国产业结构变化是丝茶出口下降的结果而非原因，主因是国际竞争力减弱
  description: 误将产业结构变化当作丝茶出口下降的原因
  severity: error
  source: cmmlu_chinese_history_277
- pattern: 科学.*改变.*宗教信仰
  correct: 科学影响了人类的思想观念，但不一定直接改变宗教信仰
  description: 误以为科学必然改变宗教信仰
  severity: warning
  source: cmmlu_chinese_history_278
- pattern: 科学.*提升.*物质生活
  correct: 科学影响了人类的思想观念，而非直接提升物质生活
  description: 误以为科学主要提升物质生活，而非影响思想观念
  severity: error
  source: cmmlu_chinese_history_278
- pattern: 科学.*摆脱.*宗教神学
  correct: 科学影响了人类的思想观念，但不一定完全摆脱宗教神学束缚
  description: 误以为科学必然导致摆脱宗教神学束缚
  severity: warning
  source: cmmlu_chinese_history_278
- pattern: 皇帝好恶决定社会对艺术的评判
  correct: 皇帝的好恶会影响艺术评判，但并非决定性因素，艺术地位的确立是艺术水平与时代选择共同作用的结果
  description: 误以为皇帝的个人喜好完全决定了社会对艺术的评判
  severity: error
  source: cmmlu_chinese_history_279
- pattern: 王羲之的艺术成就不可超越
  correct: 王羲之的艺术成就很高，但并非不可超越，其地位是历史与时代选择的结果
  description: 误以为王羲之的艺术成就是绝对不可超越的
  severity: error
  source: cmmlu_chinese_history_279
- pattern: 秦汉时期.*思想市场
  correct: 秦汉时期实行思想控制（如焚书坑儒、独尊儒术），没有思想自由表达的环境
  description: 误以为秦汉时期存在思想自由市场
  severity: error
  source: cmmlu_chinese_history_280
- pattern: 明清时期.*思想市场
  correct: 明清时期实行文字狱等思想控制，没有思想自由表达的环境
  description: 误以为明清时期存在思想自由市场
  severity: error
  source: cmmlu_chinese_history_280
- pattern: 立法的目的一致
  correct: 《秦律》与古罗马《民法大全》的立法目的不同，前者旨在维护专制统治，后者强调法律公正与个人权利
  description: 误以为不同法律体系的立法目的相同
  severity: error
  source: cmmlu_chinese_history_281
- pattern: 都是维护封建王朝的工具
  correct: 古罗马《民法大全》并非维护封建王朝，而是罗马帝国时期的法典，与秦律的封建王朝性质不同
  description: 误将古罗马法律体系归类为封建王朝工具
  severity: error
  source: cmmlu_chinese_history_281
- pattern: 都违背了公平公开公正的原则
  correct: 古罗马《民法大全》强调不得基于怀疑惩罚，体现了公平公正原则，而秦律的轻罪重罚则违背此原则
  description: 误以为两者都违背公平公正原则
  severity: error
  source: cmmlu_chinese_history_281
- pattern: 另起炉灶
  correct: “另起炉灶”是新中国初期针对旧中国外交关系提出的方针，与二战后非殖民化浪潮无关
  description: 误以为“另起炉灶”是针对亚非拉民族国家兴起的外交政策
  severity: error
  source: cmmlu_chinese_history_282
- pattern: 打扫干净屋子再请客
  correct: “打扫干净屋子再请客”是清除帝国主义在华特权和势力的方针，不直接针对非殖民化浪潮
  description: 误以为“打扫干净屋子再请客”是应对亚非拉新兴国家的外交策略
  severity: error
  source: cmmlu_chinese_history_282
- pattern: 放弃.*一边倒
  correct: 新中国在二战后并未放弃“一边倒”政策，该政策持续到20世纪60年代中苏关系恶化
  description: 误以为新中国因非殖民化浪潮放弃了“一边倒”政策
  severity: error
  source: cmmlu_chinese_history_282
- pattern: 天下之治乱，不在一姓之兴亡，而在万民之忧乐
  correct: 《中华民国临时约法》强调主权在民，颠覆了君主主权观念，而此句虽关注万民，但仍未否定君主制
  description: 误以为关注民生的观念与主权在民相同，实际上未否定君主主权
  severity: error
  source: cmmlu_chinese_history_283
- pattern: 水能载舟，亦能覆舟
  correct: 此句强调君主应重视民力，但未改变君主主权本质，与主权在民不同
  description: 误以为民本思想等同于主权在民，实际上仍以君主为中心
  severity: error
  source: cmmlu_chinese_history_283
- pattern: 得民心者得天下，失民心者失天下
  correct: 此句强调君主得民心以维持统治，但主权仍属君主，与主权在民根本不同
  description: 误以为得民心即主权在民，实际上未否定君主主权
  severity: error
  source: cmmlu_chinese_history_283
- pattern: 五四运动时期.*苏联顾问
  correct: 苏联顾问来华主要发生在国民革命时期（1924-1927年），而非五四运动时期（1919年）
  description: 误以为五四运动时期已有苏联顾问在华活动
  severity: error
  source: cmmlu_chinese_history_284
- pattern: 辛亥革命时期.*苏联顾问
  correct: 苏联顾问来华是在1920年代国民革命时期，辛亥革命（1911年）时苏联尚未成立
  description: 误以为辛亥革命时期已有苏联顾问
  severity: error
  source: cmmlu_chinese_history_284
- pattern: 全面抗战时期.*广州聘请苏联顾问
  correct: 广州聘请苏联顾问发生在国民革命时期（1920年代），而非全面抗战时期（1937年后）
  description: 误以为全面抗战时期广州才聘请苏联顾问
  severity: error
  source: cmmlu_chinese_history_284
- pattern: 罗斯福新政.*《全国工业复兴法》.*《社会保险法》
  correct: 《全国工业复兴法》和《社会保险法》是罗斯福新政中并列的法律，不存在等级或层次关系
  description: 误以为《全国工业复兴法》和《社会保险法》是包含与被包含的等级关系
  severity: error
  source: cmmlu_chinese_history_285
- pattern: 科学社会主义诞生.*十月革命.*社会主义思潮
  correct: 科学社会主义诞生早于十月革命，且社会主义思潮是更广泛的概念，三者不是严格的等级或层次关系
  description: 误以为科学社会主义诞生、十月革命和社会主义思潮是依次包含的等级关系
  severity: error
  source: cmmlu_chinese_history_285
- pattern: 第二次世界大战.*德国突袭波兰.*德国投降
  correct: 德国突袭波兰是第二次世界大战的开端事件，德国投降是结束事件，二者是时间先后关系而非等级包含关系
  description: 误以为德国突袭波兰和德国投降是第二次世界大战的包含子事件，但它们是同一层次的事件
  severity: error
  source: cmmlu_chinese_history_285
- pattern: 元大都.*刺杀
  correct: 武元衡刺杀事件发生在唐朝长安，而非元朝大都
  description: 误以为武元衡刺杀事件发生在元朝大都
  severity: error
  source: cmmlu_chinese_history_286
- pattern: 宋汴梁.*刺杀
  correct: 武元衡刺杀事件发生在唐朝长安，而非宋朝汴梁
  description: 误以为武元衡刺杀事件发生在宋朝汴梁
  severity: error
  source: cmmlu_chinese_history_286
- pattern: 汉长安.*刺杀
  correct: 武元衡刺杀事件发生在唐朝长安，而非汉朝长安
  description: 误以为武元衡刺杀事件发生在汉朝长安
  severity: error
  source: cmmlu_chinese_history_286
- pattern: 察举制.*孝
  correct: 察举制是汉代选官制度，以孝廉等科目选拔人才，但题干思想出自《孝经》，其制度渊源是宗法制
  description: 误以为强调孝的思想一定源于察举制
  severity: error
  source: cmmlu_chinese_history_287
- pattern: 禅让制.*孝
  correct: 禅让制是原始社会末期首领更替制度，与题干中孝悌礼乐思想无关，其制度渊源是宗法制
  description: 误以为禅让制与孝悌思想有关
  severity: error
  source: cmmlu_chinese_history_287
- pattern: 重视维护外商利益
  correct: 清政府严格限制对外交往，并非重视维护外商利益
  description: 误以为清政府重视维护外商利益
  severity: error
  source: cmmlu_chinese_history_288
- pattern: 禁止外国商人来华
  correct: 清政府严格限制对外交往，但并非完全禁止外国商人来华
  description: 误以为清政府完全禁止外国商人来华
  severity: error
  source: cmmlu_chinese_history_288
- pattern: 反对向西方学习
  correct: 张之洞等主张‘中体西用’，并不反对向西方学习，而是反对可能动摇传统意识形态的新名词
  description: 误以为张之洞等完全反对向西方学习
  severity: error
  source: cmmlu_chinese_history_289
- pattern: 抵制维新思想的传播
  correct: 禁止新名称的根本目的是维护传统意识形态，而非专门抵制维新思想
  description: 误以为禁止新名称是为了抵制维新思想
  severity: error
  source: cmmlu_chinese_history_289
- pattern: 保证民族语言的纯洁性
  correct: 禁止新名称并非为了语言纯洁，而是担心新名词传播新观念冲击传统意识形态
  description: 误以为禁止新名称是为了保护语言纯洁
  severity: error
  source: cmmlu_chinese_history_289
- pattern: 承孟荀传统.*兼收并蓄.*西方
  correct: 中体西用强调以中国传统文化为根本，西方技术为辅助，而非平等兼收并蓄
  description: 误以为中体西用是平等融合中西学说
  severity: error
  source: cmmlu_chinese_history_290
- pattern: 新输入之欧化为是.*孔教为非
  correct: 中体西用主张维护孔教（中学）为体，并非以欧化否定孔教
  description: 误以为中体西用是全面否定中国传统文化
  severity: error
  source: cmmlu_chinese_history_290
- pattern: 融合东西两大文明
  correct: 中体西用并非追求平等融合，而是以中学为体、西学为用
  description: 误以为中体西用是东西文明平等融合
  severity: error
  source: cmmlu_chinese_history_290
- pattern: 小农经济非常脆弱
  correct: 小农经济具有顽强的生命力，能够通过简单工具和劳力实现再生产
  description: 误以为小农经济脆弱，实际上其简单再生产模式使其具有顽强生命力
  severity: error
  source: cmmlu_chinese_history_291
- pattern: 小农经济只需要一些简单的劳动工具
  correct: 小农经济不仅需要简单工具，还需要主要劳力与辅助劳力结合土地才能组织再生产
  description: 片面强调工具而忽略劳力与土地的结合
  severity: warning
  source: cmmlu_chinese_history_291
- pattern: 小农经济具有稳定性
  correct: 小农经济具有顽强的生命力，而非稳定性，稳定性可能被误解为停滞不变
  description: 将生命力误等同于稳定性，忽略了其简单再生产中的脆弱与韧性并存
  severity: warning
  source: cmmlu_chinese_history_291
- pattern: 书院.*宗旨.*对抗朝廷
  correct: 岳麓书院反对科举利禄之学，但并非与朝廷对抗，而是主张培养传道济民的人才
  description: 误以为反对科举利禄之学就是与朝廷对抗
  severity: error
  source: cmmlu_chinese_history_292
- pattern: 书院.*教学方法.*完全独创
  correct: 岳麓书院的教学方法如循序渐进、学思并进等，是继承和发展了前人的教育思想，并非完全独创
  description: 误以为书院的教学方法是完全独创的
  severity: error
  source: cmmlu_chinese_history_292
- pattern: 书院.*受陆九渊.*影响最大
  correct: 岳麓书院的指导思想与朱熹的理学倾向一致，而非受陆九渊心学影响最大
  description: 误以为岳麓书院受陆九渊心学影响最大
  severity: error
  source: cmmlu_chinese_history_292
- pattern: 儒佛融合
  correct: 李贽的着装和言行体现的是对封建礼教的批判，而非致力于儒佛融合
  description: 误以为李贽的怪异装扮和收女弟子行为是为了融合儒佛
  severity: error
  source: cmmlu_chinese_history_293
- pattern: 超然物外.*自由
  correct: 李贽的行为是积极入世地批判封建传统，而非追求超然物外的自由
  description: 误以为李贽的狂狷行为是为了追求超脱世俗的自由
  severity: error
  source: cmmlu_chinese_history_293
- pattern: 妇女地位.*变化
  correct: 李贽收女弟子体现其反传统思想，但明代妇女地位并未普遍提高
  description: 误以为李贽收女弟子反映了当时妇女地位的实际变化
  severity: error
  source: cmmlu_chinese_history_293
- pattern: 俸禄制度.*选拔人才
  correct: 俸禄制度取代食邑制度，削弱了贵族世袭特权，促进了分封制的瓦解，而非直接有利于选拔人才
  description: 误以为俸禄制度的主要作用是选拔人才，实际上其核心是瓦解分封制
  severity: error
  source: cmmlu_chinese_history_294
- pattern: 俸禄制度.*商品经济
  correct: 俸禄制度是官吏俸禄支付方式的变化，与商品经济发展无直接主要关联
  description: 误以为俸禄制度推动了商品经济发展，实际其作用在于政治制度变革
  severity: error
  source: cmmlu_chinese_history_294
- pattern: 俸禄制度.*郡县制进步性
  correct: 俸禄制度主要促进分封制瓦解，而非直接肯定郡县制的进步性
  description: 误以为俸禄制度肯定了郡县制的进步性，实际其作用在于瓦解分封制
  severity: error
  source: cmmlu_chinese_history_294
- pattern: 和平统一.*口号.*提出
  correct: 1987年返乡运动促成了两岸隔绝状态的打破，而非‘和平统一’口号的提出
  description: 误以为返乡运动直接导致了‘和平统一’口号的提出
  severity: error
  source: cmmlu_chinese_history_295
- pattern: 海峡两岸.*三通.*开展
  correct: 1987年返乡运动促成了两岸隔绝状态的打破，而非海峡两岸‘三通’的开展
  description: 误以为返乡运动直接导致了海峡两岸‘三通’的开展
  severity: error
  source: cmmlu_chinese_history_295
- pattern: 九二共识.*达成
  correct: 1987年返乡运动促成了两岸隔绝状态的打破，而非‘九二共识’的达成
  description: 误以为返乡运动直接导致了‘九二共识’的达成
  severity: error
  source: cmmlu_chinese_history_295
- pattern: 各解放区连成一片.*全国解放
  correct: 该描述反映的是抗日战争时期全民族团结抗战的景象，而非解放战争时期
  description: 误将抗日战争时期的全民族抗战描述为解放战争时期的全国解放
  severity: error
  source: cmmlu_chinese_history_296
- pattern: 工农兵联合.*打倒列强除军阀
  correct: 该描述反映的是抗日战争时期全民族团结抗战，而非国民革命时期的北伐战争
  description: 误将抗日战争时期的全民族抗战描述为国民革命时期的工农兵联合反帝反军阀
  severity: error
  source: cmmlu_chinese_history_296
- pattern: 打土豪分田地.*井冈星火
  correct: 该描述反映的是抗日战争时期全民族团结抗战，而非土地革命时期的井冈山斗争
  description: 误将抗日战争时期的全民族抗战描述为土地革命时期的打土豪分田地
  severity: error
  source: cmmlu_chinese_history_296
- pattern: 专管军务
  correct: 军机处参与政务，并非专管军务
  description: 误以为军机处只负责军事事务
  severity: error
  source: cmmlu_chinese_history_297
- pattern: 专理刑狱
  correct: 军机处参与政务和审理大案，但并非专理刑狱
  description: 误以为军机处职能仅限于司法审判
  severity: error
  source: cmmlu_chinese_history_297
- pattern: 削弱国民党.*敌后
