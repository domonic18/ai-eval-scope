  severity: error
  source: cmmlu_chinese_history_300
- pattern: 从旧民主主义社会到新民主主义社会
  correct: 礼治社会向法治社会的转变，而非社会形态的民主主义阶段更替
  description: 误将礼治到法治的社会性质改变理解为民主主义社会阶段的转变
