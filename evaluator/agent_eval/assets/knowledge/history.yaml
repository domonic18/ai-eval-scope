  severity: error
  source: cmmlu_chinese_history_231
- pattern: 建立金砖国家领导人会晤机制
  correct: 金砖机制是新兴市场国家合作平台，并非全球层面的倡议
  description: 误将新兴市场国家合作平台等同于全球层面的倡议
  severity: error
  source: cmmlu_chinese_history_231
- pattern: 国家至上
  correct: 陈独秀强调个人人格与权利对国家的重要性，并非主张国家至上
  description: 误以为陈独秀主张国家至上，实际他批判封建伦理，强调个人价值
  severity: error
  source: cmmlu_chinese_history_232
- pattern: 反对西方民主
  correct: 陈独秀提倡个人权利，这与西方民主理念一致，并非反对西方民主
  description: 误以为陈独秀反对西方民主，实际他倡导个人自由和权利
  severity: error
  source: cmmlu_chinese_history_232
- pattern: 传播马克思主义
  correct: 1916年陈独秀尚未系统传播马克思主义，其意在批判封建伦理
  description: 误以为陈独秀在1916年传播马克思主义，实际当时他主要批判封建伦理
  severity: error
  source: cmmlu_chinese_history_232
- pattern: 充分发挥文书功能
  correct: 西汉实现对全国的统治，主要是因为继承了秦朝的基本制度，而非单纯依靠文书功能
  description: 误以为文书功能是西汉统治全国的主要原因，忽略了制度继承的重要性
  severity: error
  source: cmmlu_chinese_history_233
- pattern: 崇尚儒家的政策
  correct: 汉初实行黄老之术，崇尚儒家政策是汉武帝时期的事，并非汉初统治全国的原因
  description: 误以为汉初就崇尚儒家政策，混淆了汉初与汉武帝时期的治国思想
  severity: error
  source: cmmlu_chinese_history_233
- pattern: 背离.*仁爱思想
  correct: 董仲舒并未背离原始儒学的仁爱思想，而是通过‘天人感应’等理论发展了仁爱思想
  description: 误以为董仲舒背离了原始儒学的仁爱思想
  severity: error
  source: cmmlu_chinese_history_234
- pattern: 摒弃.*德治主张
  correct: 董仲舒并未摒弃原始儒学的德治主张，而是将其与阴阳五行学说结合，强调以德治国
  description: 误以为董仲舒摒弃了原始儒学的德治主张
  severity: error
  source: cmmlu_chinese_history_234
- pattern: 继承.*全部宗旨
  correct: 董仲舒对原始儒学进行了改造，并非继承其全部宗旨
  description: 误以为董仲舒继承了原始儒学的全部宗旨
  severity: error
  source: cmmlu_chinese_history_234
- pattern: 历史不会重演.*不能以史为鉴
  correct: 历史虽不会完全重演，但可以借鉴经验教训，并非完全不能以史为鉴
  description: 误以为历史不会重演就意味着完全不能从历史中学习
  severity: error
  source: cmmlu_chinese_history_235
- pattern: 历史可以重演.*应当以史为鉴
  correct: 历史事实情同而势异，不能照搬历史经验，而非简单认为历史可以重演
  description: 误以为历史可以完全重演，从而可以直接照搬历史经验
  severity: error
  source: cmmlu_chinese_history_235
- pattern: 一切历史都是当代史.*无须学习古人
  correct: 历史虽与当代有关联，但仍需学习古人经验，不能完全否定学习古人的必要性
  description: 误以为一切历史都是当代史，因此无需学习古人
  severity: error
  source: cmmlu_chinese_history_235
- pattern: 肯定心学.*修身养性
  correct: 顾炎武批判心学，认为心学非孔孟正统
  description: 误以为顾炎武肯定心学的修身养性功能
  severity: error
  source: cmmlu_chinese_history_236
- pattern: 历史记载必须经过考古发现证实
  correct: 历史记载可以通过多种方式验证，考古发现是重要手段之一，但并非所有历史记载都必须经过考古发现证实
  description: 误以为所有历史记载都必须依赖考古发现才能被证实
  severity: error
  source: cmmlu_chinese_history_237
- pattern: 考古资料比文献材料更真实
  correct: 考古资料和文献材料各有价值，不能简单认为考古资料绝对更真实，两者需要相互印证
  description: 误以为考古资料在真实性上绝对优于文献材料
  severity: error
  source: cmmlu_chinese_history_237
- pattern: 历史记载不存在纯粹客观性
  correct: 历史记载可能带有主观性，但并非完全不存在客观性，许多记载基于事实
  description: 误以为历史记载完全没有客观性
  severity: error
  source: cmmlu_chinese_history_237
- pattern: 颁布推恩令
  correct: 推恩令是汉武帝时期颁布的，并非西汉初年
  description: 误以为推恩令是西汉初年的政策
  severity: error
  source: cmmlu_chinese_history_238
- pattern: 尊崇儒术
  correct: 尊崇儒术是汉武帝时期董仲舒提出的文化改革，并非西汉初年
  description: 误以为尊崇儒术是西汉初年的施政方针
  severity: error
  source: cmmlu_chinese_history_238
- pattern: 设立.*中朝
  correct: 设立中朝是汉武帝时期为削弱相权而采取的措施，并非西汉初年
  description: 误以为设立中朝是西汉初年的制度
  severity: error
  source: cmmlu_chinese_history_238
- pattern: 设枢密院
  correct: 宋初设枢密院掌管军政，但扭转中央集权削弱的主要措施是文官任知州
  description: 误以为设枢密院是宋初扭转中央集权削弱的关键措施
  severity: error
  source: cmmlu_chinese_history_239
- pattern: 设三司使
  correct: 宋初设三司使掌管财政，但扭转中央集权削弱的主要措施是文官任知州
  description: 误以为设三司使是宋初扭转中央集权削弱的关键措施
  severity: error
  source: cmmlu_chinese_history_239
- pattern: 施行将兵法
  correct: 将兵法是王安石变法内容，非宋初措施；宋初扭转中央集权削弱的主要措施是文官任知州
  description: 误以为将兵法是宋初措施，混淆了时间顺序
  severity: error
  source: cmmlu_chinese_history_239
- pattern: 失去分号.*力量削弱
  correct: 企业失去分号后，销售职能被剥离，但生产仍可维持，并非力量削弱导致茫然
  description: 误以为分号脱钩直接削弱了企业整体实力
  severity: error
  source: cmmlu_chinese_history_240
- pattern: 产品质量下滑
  correct: 达仁堂作为百年老字号，产品质量并未下滑，而是因未适应市场经济体制而茫然
  description: 误以为企业困境源于产品质量问题
  severity: error
  source: cmmlu_chinese_history_240
- pattern: 集中统一管理.*失去活力
  correct: 20世纪50年代纳入集中统一管理后，企业只管生产不管销售，但90年代困境主因是未适应市场经济，而非集中管理本身
  description: 误以为集中统一管理直接导致企业失去活力
  severity: error
  source: cmmlu_chinese_history_240
- pattern: 农村经济体制改革完成
  correct: 1980年农村经济体制改革尚在推进中，并未完成
  description: 误以为1980年农村经济体制改革已经完成
  severity: error
  source: cmmlu_chinese_history_241
- pattern: 国家取消对农副产品的统销政策
  correct: 1980年国家尚未取消对农副产品的统销政策
  description: 误以为1980年已取消统销政策
  severity: error
  source: cmmlu_chinese_history_241
- pattern: 农业生产技术.*革命性改变
  correct: 1980年农业生产技术并未发生革命性改变，主要变化是政策调整
  description: 误以为1980年农业生产技术有革命性突破
  severity: error
  source: cmmlu_chinese_history_241
- pattern: 推动实业救国
  correct: 近代中国社会新陈代谢的核心动力是挽救民族危亡，实业救国只是具体手段之一
  description: 误以为实业救国是推动近代中国社会变革的核心动力
  severity: error
  source: cmmlu_chinese_history_242
- pattern: 提倡民主科学
  correct: 民主科学是新文化运动的口号，并非贯穿近代中国社会新陈代谢的核心动力
  description: 误以为提倡民主科学是推动近代中国社会变革的核心动力
  severity: error
  source: cmmlu_chinese_history_242
- pattern: 发展资本主义
  correct: 发展资本主义是近代中国部分变革的目标，但核心动力是挽救民族危亡
  description: 误以为发展资本主义是推动近代中国社会新陈代谢的核心动力
  severity: error
  source: cmmlu_chinese_history_242
- pattern: 维护清朝统治
  correct: 王夫之、黄宗羲、顾炎武是明末清初思想家，其主张并非维护清朝统治，而是反思明朝灭亡、关注民生
  description: 误以为明末清初思想家主张的目的是维护清朝统治
  severity: error
  source: cmmlu_chinese_history_243
- pattern: 重农抑商
  correct: 这些主张关注土地分配和个体小农，但不等同于传统的重农抑商思想
  description: 误将土地均分主张等同于重农抑商思想
  severity: warning
  source: cmmlu_chinese_history_243
- pattern: 复古色彩
  correct: 王夫之、黄宗羲、顾炎武的主张具有现实批判性，并非单纯复古
  description: 误以为这些主张具有浓厚的复古色彩
  severity: warning
  source: cmmlu_chinese_history_243
- pattern: 政府管理失控
  correct: 宋代土地政策调整（如不抑兼并）导致土地集中，而非政府管理失控
  description: 误以为宋代土地集中是政府管理失控所致，实际是政策主动调整的结果
  severity: error
  source: cmmlu_chinese_history_244
- pattern: 坊市制度崩溃
  correct: 坊市制度崩溃是宋代商业发展的表现，与土地集中、主客户分化无直接因果关系
  description: 混淆了坊市制度崩溃（商业现象）与土地政策调整（农业土地分配）的关系
  severity: error
  source: cmmlu_chinese_history_244
- pattern: 经济严重衰退
  correct: 宋代经济并未严重衰退，反而繁荣，主客户分化源于土地政策而非经济衰退
  description: 误以为主客户分化是经济衰退的结果，实际宋代经济持续发展
  severity: error
  source: cmmlu_chinese_history_244
- pattern: 土地所有权与经营权没有分离
  correct: 明朝租佃制下，土地所有权与经营权已经分离，地主拥有所有权，佃农拥有经营权
  description: 误以为明朝租佃制下土地所有权和经营权未分离
  severity: error
  source: cmmlu_chinese_history_245
- pattern: 租佃制抑制了佃农的生产积极性
  correct: 租佃制下佃农有较大的生产自主权，反而可能提高生产积极性
  description: 误以为租佃制抑制了佃农的生产积极性
  severity: error
  source: cmmlu_chinese_history_245
- pattern: 地主与佃农间存在雇佣关系
  correct: 地主与佃农之间是租佃关系，而非雇佣关系
  description: 误以为地主与佃农是雇佣关系
  severity: error
  source: cmmlu_chinese_history_245
- pattern: 小农经济.*不利于.*中央集权
  correct: 小农经济是古代中央集权制度的经济基础，有利于中央集权
  description: 误以为小农经济不利于中央集权
  severity: error
  source: cmmlu_chinese_history_246
- pattern: 唐代开始.*个体小农经济
  correct: 个体小农经济在春秋战国时期就已出现，并非始于唐代
  description: 误以为个体小农经济始于唐代
  severity: error
  source: cmmlu_chinese_history_246
- pattern: 中国人民解放军.*朝鲜
  correct: 入朝参战的是中国人民志愿军，而非中国人民解放军
  description: 误以为中国人民解放军直接参与了朝鲜战争
  severity: error
  source: cmmlu_chinese_history_247
- pattern: 国民革命军第八路军.*朝鲜
  correct: 国民革命军第八路军是抗日战争时期的部队，未参与朝鲜战争
  description: 误以为八路军参与了朝鲜战争
  severity: error
  source: cmmlu_chinese_history_247
- pattern: 东北野战军.*朝鲜
  correct: 东北野战军是解放战争时期的部队，未以该名义入朝参战
  description: 误以为东北野战军参与了朝鲜战争
  severity: error
  source: cmmlu_chinese_history_247
- pattern: 卜辞.*生产力低下
  correct: 卜辞反映了商代已有较成熟的占卜文化和文字系统，不能直接推断生产力低下
  description: 误以为卜辞内容直接证明古代生产力低下
  severity: error
  source: cmmlu_chinese_history_248
- pattern: 古代.*依赖自然
  correct: 卜辞中求雨反映了商代农业对自然条件的依赖，但并非所有卜辞都体现依赖性强
  description: 误以为卜辞内容必然说明古代人们对自然依赖性强
  severity: warning
  source: cmmlu_chinese_history_248
- pattern: 卜辞.*农事诗
  correct: 卜辞是占卜记录，虽涉及农事，但并非诗歌形式，不能视为农事诗
  description: 误以为卜辞可被归类为原始形态的农事诗
  severity: error
  source: cmmlu_chinese_history_248
- pattern: 封建经济的衰退
  correct: 唐宋时期封建经济持续发展，并非衰退
  description: 误以为唐宋服饰变化是由于经济衰退
  severity: error
  source: cmmlu_chinese_history_249
- pattern: 审美意识的觉醒
  correct: 审美意识一直存在，服饰变化主要受思想文化影响
  description: 误以为服饰变化源于审美意识突然觉醒
  severity: error
  source: cmmlu_chinese_history_249
- pattern: 专制集权的巩固
  correct: 专制集权并非唐宋服饰风格转变的直接原因
  description: 误以为服饰变化是由于专制集权加强
  severity: error
  source: cmmlu_chinese_history_249
- pattern: 精耕细作.*遏止.*大土地所有制
  correct: 精耕细作农业并不直接遏止大土地所有制的发展，二者可以并存
  description: 误以为精耕细作农业会阻止大土地所有制的发展
  severity: error
  source: cmmlu_chinese_history_250
- pattern: 人口.*土地.*矛盾.*耕作模式.*转变
  correct: 材料中并未提及人口与土地的矛盾导致耕作模式转变，而是强调精耕细作以提高收益
  description: 误以为人口与土地矛盾是耕作模式转变的原因
  severity: error
  source: cmmlu_chinese_history_250
- pattern: 个体农户.*耕作模式.*抑制.*农业进步
  correct: 个体农户的精耕细作模式在当时促进了农业进步，而非抑制
  description: 误以为个体农户为主的耕作模式会抑制农业进步
  severity: error
  source: cmmlu_chinese_history_250
- pattern: 长期共存.*互相监督
  correct: 长期共存、互相监督方针是1956年提出的，与1949年政协会议无关
  description: 误以为长期共存、互相监督方针在1949年政协会议前就已提出
  severity: error
  source: cmmlu_chinese_history_251
- pattern: 第一个五年计划
  correct: 第一个五年计划是1953年开始实施的，与1949年政协会议无关
  description: 误以为第一个五年计划在1949年政协会议期间就已制定
  severity: error
  source: cmmlu_chinese_history_251
- pattern: 恢复民主党派的各级组织
  correct: 当时民主党派组织已存在，中共的主要目的是团结民主人士共同筹建新中国，而非恢复其组织
  description: 误以为中共接运民主人士是为了恢复民主党派的组织
  severity: warning
  source: cmmlu_chinese_history_251
- pattern: 商业活动突破时空限制
  correct: 宋代商业革命已突破时空限制，明清商业革命更突出的是南方工商业市镇的兴盛
  description: 误以为商业活动突破时空限制是明清商业革命的新特征，实际上宋代已实现
  severity: error
  source: cmmlu_chinese_history_252
- pattern: 出现了世界最早的纸币
  correct: 世界最早的纸币交子出现在宋代，不是明清商业革命的特征
  description: 误以为世界最早的纸币出现在明清时期，实际出现在宋代
  severity: error
  source: cmmlu_chinese_history_252
- pattern: 民间对外贸易空前活跃
  correct: 明清时期实行海禁政策，民间对外贸易受到限制，并非空前活跃
  description: 误以为明清时期民间对外贸易空前活跃，实际受海禁政策影响
  severity: error
  source: cmmlu_chinese_history_252
- pattern: 《老子》.*神游天地.*上下求索
  correct: 《老子》是道家哲学著作，并非以神游天地、上下求索的幻想境界表达理想追求
  description: 误以为《老子》具有浪漫主义幻想色彩和求索精神
  severity: error
  source: cmmlu_chinese_history_253
- pattern: 《诗经》.*美人芳草.*比兴
  correct: 《诗经》以现实主义手法为主，虽用比兴但非'美人芳草'的典型楚辞比兴手法
  description: 混淆《诗经》与《离骚》的比兴手法特点
  severity: error
  source: cmmlu_chinese_history_253
- pattern: 《庄子》.*神游天地.*上下求索
  correct: 《庄子》虽富有想象和逍遥游思想，但并非以'上下求索'表达对理想的执着追求
  description: 误以为《庄子》具有屈原式的求索精神和政治理想表达
  severity: error
  source: cmmlu_chinese_history_253
- pattern: 不承认国民政府.*旧外交
  correct: ‘打扫干净屋子再请客’强调的是清除帝国主义在华特权和势力，而非不承认旧外交关系
  description: 误将‘打扫干净屋子再请客’等同于‘另起炉灶’（不承认旧外交）
  severity: error
  source: cmmlu_chinese_history_254
- pattern: 坚定地站在社会主义阵营一边
  correct: ‘打扫干净屋子再请客’侧重清除帝国主义特权，而非明确选择阵营
  description: 误将‘打扫干净屋子再请客’与‘一边倒’（站在社会主义阵营）混淆
  severity: error
  source: cmmlu_chinese_history_254
- pattern: 保障社会主义革命.*胜利成果
  correct: ‘打扫干净屋子再请客’针对的是帝国主义在华特权，而非社会主义革命成果
  description: 误将外交政策与国内革命成果保障混为一谈
  severity: error
  source: cmmlu_chinese_history_254
- pattern: 土地改革.*共产主义
  correct: 土地改革发生在1950-1952年，主要废除封建土地制度，并非向共产主义过渡的形式
  description: 误以为土地改革是加速社会主义建设、向共产主义过渡的形式
  severity: error
  source: cmmlu_chinese_history_255
- pattern: 一五计划.*共产主义
  correct: 一五计划（1953-1957年）是工业化建设计划，并非直接向共产主义过渡的形式
  description: 误以为一五计划是向共产主义过渡的最好形式
  severity: error
  source: cmmlu_chinese_history_255
- pattern: 社会主义三大改造.*共产主义
  correct: 三大改造（1953-1956年）是生产资料私有制向社会主义公有制的转变，但人民公社才是被当时视为向共产主义过渡的形式
  description: 误以为社会主义三大改造是向共产主义过渡的最好形式
  severity: error
  source: cmmlu_chinese_history_255
- pattern: 交子.*商业纠纷
  correct: 交子产生于民间商业需要，而非商业纠纷
  description: 误以为交子产生的原因是商业纠纷
  severity: error
  source: cmmlu_chinese_history_256
- pattern: 交子.*经济重心.*南移
  correct: 交子是北宋四川地区的货币创新，与经济重心南移无直接因果关系
  description: 误以为交子促进了经济重心南移
  severity: error
  source: cmmlu_chinese_history_256
- pattern: 交子.*富商.*社会地位
  correct: 交子由富民主持发行，但并未因此提高富商的社会地位
  description: 误以为交子的发行提高了富商的社会地位
  severity: error
  source: cmmlu_chinese_history_256
- pattern: 资本输出.*主要手段
  correct: 19世纪60年代列强侵华的主要手段是商品输出，资本输出是19世纪末甲午战争后的主要特征
  description: 误以为19世纪60年代列强侵华以资本输出为主
  severity: error
  source: cmmlu_chinese_history_257
- pattern: 开埠通商.*民族工业
  correct: 开埠通商主要刺激了自然经济解体与丝织业等传统手工业发展，而非民族工业（近代机器工业）
  description: 混淆了传统手工业发展与民族工业（近代机器工业）的发展
  severity: error
  source: cmmlu_chinese_history_257
- pattern: 入超.*出超
  correct: 19世纪60年代中国对外贸易仍处于入超（逆差）状态，并未变为出超
  description: 误以为19世纪60年代中国对外贸易由入超变为出超
  severity: error
  source: cmmlu_chinese_history_257
- pattern: 宪法原则.*建立
  correct: 中国计划经济体制是在工业化建设过程中逐步建立起来的，并非依据宪法原则建立
  description: 误以为计划经济体制是在宪法原则指导下建立的
  severity: error
  source: cmmlu_chinese_history_258
- pattern: 新生国家政权的基础
  correct: 计划经济体制是工业化建设的产物，而非新生国家政权的基础
  description: 误以为计划经济体制是新生国家政权的基础
  severity: error
  source: cmmlu_chinese_history_258
- pattern: 行政区域的扩大.*建立
  correct: 计划经济体制是随着工业化建设的进行而建立，并非随着行政区域的扩大而建立
  description: 误以为计划经济体制是随着行政区域扩大逐步建立的
  severity: error
  source: cmmlu_chinese_history_258
- pattern: 国民革命运动.*普遍拥护
  correct: 1919-1922年国民革命运动尚未全面展开，民众普遍拥护的说法与史实不符
  description: 误以为1919-1922年间国民革命运动已获得民众普遍拥护
  severity: error
  source: cmmlu_chinese_history_259
- pattern: 资本主义政体模式.*知识界否定
  correct: 新文化运动后期主流转向马克思主义，但并非所有知识界人士都否定了资本主义政体模式
  description: 误以为知识界整体否定了资本主义政体模式
  severity: error
  source: cmmlu_chinese_history_259
- pattern: 中国社会主要矛盾.*改变
  correct: 1919-1922年间中国社会主要矛盾仍是帝国主义与中华民族、封建主义与人民大众的矛盾，并未发生根本改变
  description: 误以为1919-1922年间中国社会主要矛盾已发生改变
  severity: error
  source: cmmlu_chinese_history_259
- pattern: 东汉初年.*资本主义萌芽
  correct: 资本主义萌芽出现在明清时期，东汉初年不可能出现资本主义萌芽
  description: 误以为东汉初年已经出现资本主义萌芽
  severity: error
  source: cmmlu_chinese_history_260
- pattern: 东汉初年.*商人与封君勾结.*中央集权削弱
  correct: 材料仅体现商人经济实力强，未体现商人与封君勾结导致中央集权削弱
  description: 误将商人经济实力强解读为商人与封君勾结削弱中央集权
  severity: error
  source: cmmlu_chinese_history_260
- pattern: 重农抑商.*现象不存在
  correct: 重农抑商是古代基本政策，但材料中桓谭描述的现象是存在的
  description: 误以为重农抑商政策下商人经济实力强的现象不可能存在
  severity: error
  source: cmmlu_chinese_history_260
- pattern: 《政府论》.*自由发展
  correct: 该句出自《共产党宣言》，是马克思和恩格斯关于共产主义社会的经典论述
  description: 误将《共产党宣言》中的经典语句归因于洛克的《政府论》
  severity: error
  source: cmmlu_chinese_history_261
- pattern: 《乌托邦》.*自由发展
  correct: 该句出自《共产党宣言》，是马克思和恩格斯关于共产主义社会的经典论述
  description: 误将《共产党宣言》中的经典语句归因于莫尔的《乌托邦》
  severity: error
  source: cmmlu_chinese_history_261
- pattern: 《共同纲领》.*自由发展
  correct: 该句出自《共产党宣言》，是马克思和恩格斯关于共产主义社会的经典论述
  description: 误将《共产党宣言》中的经典语句归因于《共同纲领》
  severity: error
  source: cmmlu_chinese_history_261
- pattern: 国民革命
  correct: 五四运动后中国革命的新方向是无产阶级革命，而非国民革命
  description: 误以为五四运动后中国革命的新方向是国民革命
  severity: error
  source: cmmlu_chinese_history_262
- pattern: 民族革命
  correct: 五四运动后中国革命的新方向是无产阶级革命，而非民族革命
  description: 误以为五四运动后中国革命的新方向是民族革命
  severity: error
  source: cmmlu_chinese_history_262
- pattern: 武装革命
  correct: 五四运动后中国革命的新方向是无产阶级革命，而非武装革命
  description: 误以为五四运动后中国革命的新方向是武装革命
  severity: error
  source: cmmlu_chinese_history_262
- pattern: 取士科目有所减少
  correct: 宋代科举科目并未减少，反而有所增加或调整
  description: 误以为宋代科举科目比唐代减少
  severity: error
  source: cmmlu_chinese_history_263
- pattern: 进士及第尤为尊贵
  correct: 宋代进士科虽尊贵，但唐代进士科已尤为尊贵，并非宋代特有变化
  description: 误以为进士及第的尊贵是宋代相比唐代的显著变化
  severity: error
  source: cmmlu_chinese_history_263
- pattern: 录取人数大大增加
  correct: 宋代科举录取人数并未显著增加，材料未体现此信息
  description: 误以为宋代科举录取人数比唐代大大增加
  severity: error
  source: cmmlu_chinese_history_263
- pattern: 外争国权，内除国贼
  correct: 洋务派创办军事工业的初衷是镇压内部反抗和抵御外侮，而非反帝反封建
  description: 误将五四运动口号当作洋务派军事工业的初衷
  severity: error
  source: cmmlu_chinese_history_264
- pattern: 师夷之长技以制夷
  correct: 洋务派创办军事工业的初衷是‘剿发逆’和‘勤远略’，而非单纯学习西方技术以制敌
