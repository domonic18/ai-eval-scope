  source: cmmlu_chinese_history_267
- pattern: 人民.*未.*理解.*民主
  correct: 陈独秀认为复辟帝制的原因是守旧武人和学者的阻力，而非广大人民群众不理解民主制
  description: 误以为陈独秀将复辟归因于人民不理解民主制
  severity: error
  source: cmmlu_chinese_history_267
- pattern: 中原经济区.*优势地位不复存在
  correct: 中原经济区优势地位减弱，但并未完全消失
  description: 误以为中原经济区完全失去优势地位
  severity: error
  source: cmmlu_chinese_history_268
- pattern: 江南经济发展水平.*迅速超过北
  correct: 江南经济获得显著发展，但尚未超过北方
  description: 误以为江南经济水平迅速超过北方
  severity: error
  source: cmmlu_chinese_history_268
- pattern: 经济重心.*已经转移到南方
  correct: 经济重心南移是一个长期过程，魏晋南北朝时期只是初步开发
  description: 误以为魏晋南北朝时期经济重心已完全南移
  severity: error
  source: cmmlu_chinese_history_268
- pattern: 耕战结合
  correct: 拔河活动体现的是对阳刚与力量的推崇，而非耕战结合观念
  description: 误以为拔河活动反映了耕战结合的政策观念
  severity: error
  source: cmmlu_chinese_history_269
- pattern: 江南文化.*主流
  correct: 拔河在唐代广为流传，不能说明江南文化成为主流
  description: 误以为拔河流行代表江南文化成为主流
  severity: error
  source: cmmlu_chinese_history_269
- pattern: 诗歌.*描写宫廷生活
  correct: 唐玄宗此诗描写的是民间拔河活动，并非宫廷生活
  description: 误以为唐代诗歌以描写宫廷生活为主
  severity: error
  source: cmmlu_chinese_history_269
- pattern: 独立的管理体制
  correct: 经济特区实行特殊经济管理体制，但并非独立的管理体制，仍受国家统一领导
  description: 误以为经济特区有独立的管理体制，脱离国家统一管理
  severity: error
  source: cmmlu_chinese_history_270
- pattern: 社会主义经济领导下的多种经济成分并存.*不包括
  correct: 经济特区允许社会主义经济领导下的多种经济成分并存，这是其特殊经济政策之一
  description: 误以为经济特区不允许多种经济成分并存
  severity: error
  source: cmmlu_chinese_history_270
- pattern: 市场调节为主.*不包括
  correct: 经济特区实行以市场调节为主的经济体制，这是其特殊经济政策之一
  description: 误以为经济特区不以市场调节为主
  severity: error
  source: cmmlu_chinese_history_270
- pattern: 儒家思想.*推动.*西方政治革命
  correct: 儒家思想在西方主要引起文化关注，并未直接推动政治革命
  description: 误以为儒家思想对西方政治革命产生了推动作用
  severity: error
  source: cmmlu_chinese_history_271
- pattern: 儒家思想.*被西方学者普遍接受
  correct: 儒家思想在西方引起关注，但并未被西方学者普遍接受
  description: 误以为儒家思想被西方学者普遍接受
  severity: error
  source: cmmlu_chinese_history_271
- pattern: 中西文化交流限于传教士之间
  correct: 中西文化交流不仅限于传教士，还涉及学术、文化等多领域
  description: 误以为中西文化交流只发生在传教士之间
  severity: error
  source: cmmlu_chinese_history_271
- pattern: 市场经济体系形成
  correct: 1984-1985年合资企业出现时，中国仍处于计划经济向市场经济过渡的初期，市场经济体系尚未形成
  description: 误以为1980年代中期中国已形成市场经济体系
  severity: error
  source: cmmlu_chinese_history_272
- pattern: 独立工业体系形成
  correct: 合资企业的出现恰恰说明中国工业体系开始融入全球分工，而非形成独立封闭的工业体系
  description: 误以为合资企业出现意味着独立工业体系形成
  severity: error
  source: cmmlu_chinese_history_272
- pattern: 改革开放拉开了序幕
  correct: 改革开放始于1978年十一届三中全会，1984-1985年的合资企业是改革开放深化的表现，而非序幕
  description: 误以为1984-1985年的合资企业出现是改革开放的开始
  severity: error
  source: cmmlu_chinese_history_272
- pattern: 健全了市场经济体制
  correct: 1979-1981年中国尚未建立市场经济体制，这些政策主要推动农村经济结构调整
