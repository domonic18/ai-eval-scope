subject: biology
description: 生物知识库：常见动物分类误区、人体基本事实、细胞生物学、光合作用
version: '1.0'
constants: []
misconceptions:
- pattern: 鲸鱼(?:是|属于)鱼
  correct: 鲸鱼是哺乳动物（用肺呼吸、胎生、哺乳）
  description: 鲸鱼虽然生活在水中，但属于哺乳动物
  severity: error
- pattern: 蝙蝠(?:是|属于)鸟
  correct: 蝙蝠是哺乳动物（胎生、哺乳、体表被毛）
  description: 蝙蝠会飞但不是鸟类，是哺乳动物
  severity: error
- pattern: 蘑菇(?:是|属于)植物
  correct: 蘑菇是真菌（无叶绿体，不能进行光合作用，靠分解有机物获取营养）
  description: 蘑菇属于真菌界，不是植物
  severity: error
- pattern: 企鹅(?:是|属于)哺乳动物
  correct: 企鹅是鸟类（卵生、有羽毛、前肢特化为鳍）
  description: 企鹅不会飞但属于鸟类
  severity: error
- pattern: 鸭嘴兽不是哺乳动物
  correct: 鸭嘴兽是哺乳动物（单孔目，卵生但哺乳）
  description: 鸭嘴兽是最原始的哺乳动物之一，虽卵生但仍属哺乳动物
  severity: error
- pattern: 细菌都是有害的
  correct: 多数细菌是有益的，只有少数细菌能使人生病（如大肠杆菌、乳酸菌等是有益菌）
  description: 绝大多数细菌对人类有益或无害
  severity: error
- pattern: 病毒(?:是|属于|有)细胞
  correct: 病毒没有细胞结构，由蛋白质外壳和内部遗传物质组成
  description: 病毒是非细胞生物，不能独立生存
  severity: error
- pattern: 植物只能进行光合作用
  correct: 植物既进行光合作用（合成有机物），也进行呼吸作用（分解有机物释放能量）
  description: 植物同时进行光合作用和呼吸作用
  severity: error
- pattern: 光合作用只在白天进行
  correct: 只要有光（包括人造光源），光合作用就可以进行，与白天黑夜无关
  description: 光合作用的关键条件是光，不是白天
  severity: warning
- pattern: 植物白天(?:进行|只进行)光合作用.*晚上(?:进行|只进行)呼吸作用
  correct: 植物的呼吸作用全天进行；光合作用在有光条件下进行。白天光合作用强度大于呼吸作用
  description: 呼吸作用24小时不间断，光合作用需要光
  severity: error
- pattern: 蚯蚓(?:是|属于)昆虫
  correct: 蚯蚓是环节动物（身体分节，无外骨骼）
  description: 蚯蚓属于环节动物门，不是昆虫
  severity: error
- pattern: 蜘蛛(?:是|属于)昆虫
  correct: 蜘蛛是节肢动物但不是昆虫（8条腿，身体分头胸部和腹部两部分）
  description: 昆虫有6条腿3节身体，蜘蛛有8条腿2节身体
  severity: error
- pattern: BAX.*原癌基因
  correct: BAX是促凋亡基因，属于抑癌基因，不属于原癌基因
  description: 误以为BAX等凋亡相关基因属于原癌基因
  severity: error
  source: cmmlu_high_school_biology_0
- pattern: 生物进化.*产生新的物种
  correct: 生物进化的实质是种群基因频率的改变，但生物进化不一定产生新物种
  description: 误以为生物进化必然导致新物种形成
  severity: error
  source: cmmlu_high_school_biology_1
- pattern: 只有生殖隔离.*阻止.*基因交流
  correct: 地理隔离也能阻止种群间的基因交流
  description: 误以为只有生殖隔离能阻止基因交流
  severity: error
  source: cmmlu_high_school_biology_1
- pattern: 自然选择.*导致突变产生
  correct: 自然选择不能导致突变产生，突变是随机发生的
  description: 误以为自然选择能诱导或导致突变产生
  severity: error
  source: cmmlu_high_school_biology_1
- pattern: As.*富集.*细胞膜.*结构特点
  correct: As在水稻细胞内富集主要由细胞膜的功能特点（选择透过性）决定，而非结构特点
  description: 误将细胞膜的结构特点（流动性）与功能特点（选择透过性）混淆，认为富集由结构特点决定
  severity: error
  source: cmmlu_high_school_biology_2
- pattern: 有丝分裂中期.*联会.*同源染色体.*赤道板
  correct: 联会发生在减数第一次分裂前期，有丝分裂中期没有联会现象
  description: 误以为有丝分裂中期会发生同源染色体联会
  severity: error
  source: cmmlu_high_school_biology_3
- pattern: 分裂间期.*持续时间.*比.*分裂期.*短
  correct: 在细胞周期中，分裂间期的持续时间通常比分裂期长
  description: 误以为分裂间期比分裂期短
  severity: error
  source: cmmlu_high_school_biology_3
- pattern: 赤道板.*细胞有丝分裂.*结构
  correct: 赤道板是一个虚拟的平面，不是细胞中实际存在的结构
  description: 误以为赤道板是细胞有丝分裂中出现的实际结构
  severity: error
  source: cmmlu_high_school_biology_3
- pattern: 卡诺氏液.*蒸馏水冲洗
  correct: 低温诱导植物细胞染色体数目变异实验中，卡诺氏液处理根尖后，需要用体积分数为95%的酒精冲洗
  description: 误以为卡诺氏液处理后用蒸馏水冲洗
  severity: error
  source: cmmlu_high_school_biology_4
- pattern: 生物武器.*干扰素
  correct: 生物武器是用微生物、毒素及重组致病菌等来形成杀伤力，干扰素不属于生物武器
  description: 误以为干扰素是生物武器的组成部分
  severity: error
  source: cmmlu_high_school_biology_5
- pattern: 群落演替.*地衣.*消失
  correct: 群落演替过程中，地衣等先锋物种会被其他物种取代，但并非完全消失，可能仍存在于局部环境中
  description: 误以为群落演替中早期物种会完全灭绝
  severity: error
  source: cmmlu_high_school_biology_6
- pattern: 预测.*种群数量.*性别比例
  correct: 预测黑线姬鼠种群数量变化趋势的主要依据是年龄组成，而非性别比例
  description: 误将性别比例作为预测种群数量变化的主要依据
  severity: error
  source: cmmlu_high_school_biology_6
- pattern: 草原.*只存在水平结构.*不存在垂直结构
  correct: 草原群落既有水平结构也有垂直结构，只是垂直结构不如森林明显
  description: 误以为草原群落没有垂直结构
  severity: error
  source: cmmlu_high_school_biology_6
- pattern: 能量.*流动.*双向
  correct: 能量在生态系统中单向流动，不能双向进行
  description: 误以为能量在生态系统中可以双向流动
  severity: error
  source: cmmlu_high_school_biology_7
- pattern: 生长素.*极性运输.*双向
  correct: 植物生长素的极性运输是单向的，从形态学上端到形态学下端
  description: 误以为植物生长素的极性运输可以双向进行
  severity: error
  source: cmmlu_high_school_biology_7
- pattern: 反射.*兴奋.*神经纤维.*双向
  correct: 反射活动中，兴奋在神经纤维上的传导是单向的，从感受器到效应器
  description: 误以为反射活动中兴奋在神经纤维上可以双向传导
  severity: error
  source: cmmlu_high_school_biology_7
- pattern: F2双显性性状中能稳定遗传的个体占1/16
  correct: 基因型为AAbb和aaBB的个体杂交，F2双显性性状中能稳定遗传的个体占1/9
  description: 误以为F2双显性性状中能稳定遗传的个体比例为1/16，实际应为1/9
  severity: error
  source: cmmlu_high_school_biology_8
- pattern: 花药离体培养.*基因重组
  correct: 花药离体培养过程中，基因重组不会发生，因为该过程不涉及减数分裂中的同源染色体交换或自由组合
  description: 误以为花药离体培养过程中可能发生基因重组，实际上该过程主要涉及基因突变和染色体变异
  severity: error
  source: cmmlu_high_school_biology_8
- pattern: 基因重组.*不能改变基因频率
  correct: 基因重组可以改变基因频率，因为它通过产生新的基因组合影响后代基因型分布
  description: 误以为基因重组不能改变基因频率，实际上基因重组通过产生新组合可影响基因频率
  severity: error
  source: cmmlu_high_school_biology_8
- pattern: X染色体.*g基因纯合.*致死
  correct: 这对等位基因位于X染色体上，G基因纯合时致死
  description: 误以为致死基因是g纯合，实际是G纯合致死
  severity: error
  source: cmmlu_high_school_biology_9
- pattern: 常染色体.*G基因纯合.*致死
  correct: 这对等位基因位于X染色体上，G基因纯合时致死
  description: 误以为基因位于常染色体且G纯合致死，实际位于X染色体
  severity: error
  source: cmmlu_high_school_biology_9
- pattern: 常染色体.*g基因纯合.*致死
  correct: 这对等位基因位于X染色体上，G基因纯合时致死
  description: 误以为基因位于常染色体且g纯合致死，实际位于X染色体且G纯合致死
  severity: error
  source: cmmlu_high_school_biology_9
- pattern: 有丝分裂.*核膜消失
  correct: 有丝分裂前期核膜消失，末期重新形成
  description: 误以为有丝分裂过程中核膜不会消失和重新形成
  severity: error
  source: cmmlu_high_school_biology_10
- pattern: 蛋白质.*染色质
  correct: 染色质由DNA和蛋白质组成，蛋白质是染色质的组成成分
  description: 误以为蛋白质不是染色质的组成成分
  severity: error
  source: cmmlu_high_school_biology_10
- pattern: 细胞核.*遗传物质.*复制
  correct: 细胞核是遗传物质复制和转录的主要场所
  description: 误以为细胞核中不能进行遗传物质的复制和转录
  severity: error
  source: cmmlu_high_school_biology_10
- pattern: 双缩脲试剂.*脂肪
  correct: 检测脂肪应使用苏丹Ⅲ或苏丹Ⅳ染液，双缩脲试剂用于检测蛋白质
  description: 误以为双缩脲试剂可用于检测脂肪
  severity: error
  source: cmmlu_high_school_biology_11
- pattern: 斐林试剂.*DNA
  correct: 斐林试剂用于检测还原糖，观察DNA和RNA应使用甲基绿和吡罗红
  description: 误以为斐林试剂可用于染色DNA
  severity: error
  source: cmmlu_high_school_biology_11
- pattern: 甲基绿.*葡萄糖
  correct: 甲基绿用于染色DNA，检测葡萄糖应使用斐林试剂
  description: 误以为甲基绿可用于检测葡萄糖
  severity: error
  source: cmmlu_high_school_biology_11
- pattern: 低温诱导.*联会
  correct: 联会现象发生在减数分裂过程中，低温诱导洋葱根尖细胞进行有丝分裂，不会出现联会
  description: 误以为低温诱导能引发联会现象
  severity: error
  source: cmmlu_high_school_biology_12
- pattern: 转基因.*强制.*标识
  correct: 我国已经对转基因食品和转基因农产品强制实施了产品标识制度
  description: 误以为我国没有强制标识制度
  severity: error
  source: cmmlu_high_school_biology_13
- pattern: 转基因.*安全性.*争论.*食用.*环境
  correct: 目前对转基因生物安全性的争论主要集中在食用安全性和环境安全性上
  description: 误以为转基因安全性争论不涉及食用或环境安全
  severity: error
  source: cmmlu_high_school_biology_13
- pattern: 转基因.*风险评估.*预警.*保障
  correct: 开展风险评估、预警跟踪和风险管理是保障转基因生物安全的前提
  description: 误以为风险评估等措施不是保障转基因生物安全的前提
  severity: error
  source: cmmlu_high_school_biology_13
- pattern: 内质网.*合成.*DNA
  correct: 内质网是脂质合成的场所，不合成DNA
  description: 误以为内质网能合成DNA
  severity: error
  source: cmmlu_high_school_biology_14
- pattern: 内质网.*合成.*蛋白质
  correct: 内质网主要合成脂质，蛋白质合成在核糖体
  description: 误以为内质网能合成蛋白质
  severity: error
  source: cmmlu_high_school_biology_14
- pattern: 细胞核.*合成.*RNA
  correct: 细胞核是DNA复制和转录的场所，RNA在细胞核中合成
  description: 误以为细胞核不能合成RNA
  severity: error
  source: cmmlu_high_school_biology_14
- pattern: 细胞核.*合成.*DNA
  correct: 细胞核是DNA复制的主要场所，但DNA合成发生在细胞核中
  description: 误以为细胞核不能合成DNA
  severity: error
  source: cmmlu_high_school_biology_14
- pattern: 内质网.*合成.*氨基酸
  correct: 内质网不合成氨基酸，氨基酸合成在细胞质中
  description: 误以为内质网能合成氨基酸
  severity: error
  source: cmmlu_high_school_biology_14
- pattern: 都能识别信息分子
  correct: B细胞能识别抗原信息分子，但胰岛B细胞主要识别血糖浓度变化等信号，两者都能识别信息分子
  description: 误以为只有B细胞能识别信息分子，而胰岛B细胞不能
  severity: error
  source: cmmlu_high_school_biology_15
- pattern: 都能转录出指导ATP酶合成的mRNA
  correct: 所有活细胞都需要ATP，因此都能转录出指导ATP酶合成的mRNA
  description: 误以为只有某些细胞能转录ATP酶相关mRNA
  severity: error
  source: cmmlu_high_school_biology_15
- pattern: 都含有控制胰岛素合成的基因
  correct: 所有体细胞都含有全套基因，包括控制胰岛素合成的基因，但只在胰岛B细胞中表达
  description: 误以为只有胰岛B细胞含有胰岛素基因
  severity: error
  source: cmmlu_high_school_biology_15
- pattern: 逆浓度梯度.*不需要消耗能量
  correct: 大多数离子在逆浓度梯度下进入细胞内需要消耗能量（主动运输）
  description: 误以为逆浓度梯度的离子运输不需要能量
  severity: error
  source: cmmlu_high_school_biology_16
- pattern: 大分子有机物.*载体蛋白
  correct: 大分子有机物通过胞吞作用进入细胞，不需要载体蛋白
  description: 误以为大分子有机物通过载体蛋白转运进入细胞
  severity: error
  source: cmmlu_high_school_biology_16
- pattern: 水分子.*跨膜运输.*与.*浓度差.*无关
  correct: 水分子的跨膜运输速率与细胞内外溶液浓度的差值有关，浓度差越大，渗透速率越快
  description: 误以为水分子跨膜运输速率与浓度差无关
  severity: error
  source: cmmlu_high_school_biology_16
- pattern: T细胞释放的淋巴因子.*不能.*B细胞增殖
  correct: T细胞释放的淋巴因子能促进受到抗原刺激的B细胞增殖
  description: 误以为T细胞释放的淋巴因子不能使B细胞增殖
  severity: error
  source: cmmlu_high_school_biology_17
- pattern: 加入酶.*加入底物.*加入缓冲液
  correct: 缓冲液应先于底物和酶加入，以维持反应体系的pH稳定
  description: 误以为酶和底物可以先混合再加入缓冲液，忽略了缓冲液对反应环境的关键作用
  severity: error
  source: cmmlu_high_school_biology_18
- pattern: 加入底物.*计时.*加入酶.*加入缓冲液
  correct: 应先加入缓冲液，再加入底物，然后加入酶，最后开始计时保温
  description: 误以为可以先加底物并计时，再加入酶和缓冲液，导致反应起始时间不准确
  severity: error
  source: cmmlu_high_school_biology_18
- pattern: 加入底物.*加入酶.*计时.*加入缓冲液
  correct: 缓冲液应在加入底物和酶之前加入，以提供稳定的反应条件
  description: 误以为可以在加入底物和酶之后再加入缓冲液，忽略了缓冲液对反应起始条件的调控
  severity: error
  source: cmmlu_high_school_biology_18
- pattern: 白花植株.*纯合子
  correct: F2中白花植株既有纯合子也有杂合子
  description: 误以为所有白花植株都是纯合子
  severity: error
  source: cmmlu_high_school_biology_19
- pattern: 控制红花与白花的基因在一对同源染色体上
  correct: 控制红花与白花的基因位于两对同源染色体上，遵循自由组合定律
  description: 误以为性状由一对等位基因控制，实际由两对基因控制
  severity: error
  source: cmmlu_high_school_biology_19
- pattern: 红花植株.*基因型.*2种
  correct: F2中红花植株的基因型有4种
  description: 误以为红花植株只有2种基因型，实际有4种
  severity: error
  source: cmmlu_high_school_biology_19
- pattern: 呼气.*主要散热途径
  correct: 皮肤排汗和辐射、传导、对流是人体主要的散热途径，呼气散热只占一小部分
  description: 误以为呼气是人体散热的主要方式
  severity: error
  source: cmmlu_high_school_biology_20
- pattern: 常染色体显性遗传病.*女性.*发病率.*基因频率
  correct: 常染色体显性遗传病在女性中的发病率等于该病致病基因的基因频率的平方（纯合子）加上2倍基因频率乘以非致病基因频率（杂合子），不等于基因频率
  description: 误以为常染色体显性遗传病在女性中的发病率直接等于致病基因的基因频率
  severity: error
  source: cmmlu_high_school_biology_21
- pattern: X染色体显性遗传病.*女性.*发病率.*基因频率
  correct: X染色体显性遗传病在女性中的发病率等于该病致病基因的基因频率的平方（纯合子）加上2倍基因频率乘以非致病基因频率（杂合子），不等于基因频率
  description: 误以为X染色体显性遗传病在女性中的发病率直接等于致病基因的基因频率
  severity: error
  source: cmmlu_high_school_biology_21
- pattern: 常染色体隐性遗传病.*男性.*发病率.*基因频率
  correct: 常染色体隐性遗传病在男性中的发病率等于该病致病基因的基因频率的平方，不等于基因频率
  description: 误以为常染色体隐性遗传病在男性中的发病率直接等于致病基因的基因频率
  severity: error
  source: cmmlu_high_school_biology_21
- pattern: 光合色素.*叶绿体内膜
  correct: 光合色素分布于叶绿体的类囊体薄膜上，能吸收光能
  description: 误以为光合色素分布在叶绿体内膜上
  severity: error
  source: cmmlu_high_school_biology_22
- pattern: ATP合成酶.*核孔.*进入细胞核
  correct: ATP合成酶主要在线粒体和叶绿体中合成ATP，不通过核孔进入细胞核
  description: 误以为ATP合成酶能通过核孔进入细胞核
  severity: error
  source: cmmlu_high_school_biology_22
- pattern: 线粒体基质.*葡萄糖分解酶
  correct: 葡萄糖分解酶存在于细胞质基质中，线粒体基质中进行的是丙酮酸的分解
  description: 误以为线粒体基质中含有分解葡萄糖的酶
  severity: error
  source: cmmlu_high_school_biology_22
- pattern: 宽叶雌株.*窄叶雄株.*子代.*雌株.*雄株
  correct: 含有基因b的花粉不育，窄叶雄株（XbY）只能产生Y型可育花粉，与宽叶雌株（XBXB或XBXb）杂交，子代雌株均从父本获得X染色体，但父本Xb不育，故子代雌株只能从母本获得X染色体，实际子代雌株基因型为XBX-，雄株为XBY或XbY，但窄叶雄株XbY的Xb来自母本，因此子代中既有雌株又有雄株
  description: 误以为宽叶雌株与窄叶雄株杂交子代只有雄株或只有雌株
  severity: error
  source: cmmlu_high_school_biology_23
- pattern: 若亲本杂交后子代雄株均为宽叶.*则亲本雌株是纯合子
  correct: 子代雄株均为宽叶，说明雄株均从母本获得XB，但母本可能是纯合子（XBXB）或杂合子（XBXb），若母本为杂合子，子代雄株也可能全为宽叶（因为Xb花粉不育，母本只能产生XB卵细胞）
  description: 误以为子代雄株全宽叶时母本必为纯合子
  severity: error
  source: cmmlu_high_school_biology_23
- pattern: 窄叶性状只能出现在雄株中.*不可能出现在雌株中
  correct: 窄叶性状可出现在雌株中，例如母本为XBXb，父本为XbY（但Xb花粉不育，实际父本只能提供Y，故雌株需从母本获得Xb，但母本Xb卵细胞与父本Y结合得雄株，雌株需从父本获得X染色体，但父本Xb不育，因此雌株无法获得Xb，故窄叶雌株不可能出现
  description: 误以为窄叶雌株可能通过某种杂交出现
  severity: error
  source: cmmlu_high_school_biology_23
- pattern: 胚芽鞘会弯向光源生长
  correct: 该实验证明的是琼脂块中的化学物质导致弯曲，而非向光性
  description: 误以为该实验证明了向光性，实际上实验未涉及光源
  severity: error
  source: cmmlu_high_school_biology_24
- pattern: 生长素只能从形态学上端运输到形态学下端
  correct: 该实验证明的是尖端产生化学物质引起弯曲，未涉及极性运输
  description: 误以为该实验证明了生长素的极性运输
  severity: error
  source: cmmlu_high_school_biology_24
- pattern: 生长素的化学本质是吲哚乙酸
  correct: 该实验仅证明有化学物质引起弯曲，未鉴定其化学本质
  description: 误以为该实验证明了生长素的化学本质
  severity: error
  source: cmmlu_high_school_biology_24
- pattern: 艾弗里.*DNA.*蛋白质.*分开
  correct: 艾弗里通过体外转化实验证明DNA是遗传物质，但并未将DNA和蛋白质完全分开单独观察
  description: 误以为艾弗里将DNA和蛋白质完全分开并单独观察其作用
  severity: error
  source: cmmlu_high_school_biology_25
- pattern: 格里菲思实验.*证明.*DNA.*遗传物质
  correct: 格里菲思实验只证明了存在转化因子，并未证明DNA是遗传物质
  description: 误以为格里菲思实验证明了DNA是遗传物质
  severity: error
  source: cmmlu_high_school_biology_26
- pattern: 赫尔希和蔡斯.*DNA.*直接标记
  correct: 赫尔希和蔡斯实验中T2噬菌体的DNA是通过标记宿主细菌（大肠杆菌）间接标记的
  description: 误以为赫尔希和蔡斯实验直接用放射性同位素标记噬菌体DNA
  severity: error
  source: cmmlu_high_school_biology_26
- pattern: 格里菲思.*R型.*S型.*基因突变
  correct: 格里菲思实验中肺炎双球菌R型转化为S型是基因重组（转化）的结果，不是基因突变
  description: 误以为细菌转化是基因突变所致
  severity: error
  source: cmmlu_high_school_biology_26
- pattern: 水稻.*病毒.*互利共生
  correct: 病毒V寄生在水稻上，对水稻有害，不是互利共生
  description: 误以为植物病毒与宿主是互利共生关系
  severity: error
  source: cmmlu_high_school_biology_27
- pattern: 病毒.*青蛙.*寄生
  correct: 病毒V只感染水稻，不感染青蛙，不是寄生关系
  description: 误以为病毒可以寄生在青蛙体内
  severity: error
  source: cmmlu_high_school_biology_27
- pattern: 水稻.*青蛙.*竞争
  correct: 水稻和青蛙之间不存在竞争关系，青蛙以稻飞虱为食
  description: 误以为水稻和青蛙会竞争资源
  severity: error
  source: cmmlu_high_school_biology_27
- pattern: 造血干细胞.*未经分化
  correct: 哺乳动物的造血干细胞是已经分化的细胞，但具有多向分化潜能
  description: 误以为造血干细胞是未分化的细胞
  severity: error
  source: cmmlu_high_school_biology_28
- pattern: PFOS.*物理因素
  correct: PFOS诱导基因突变的因素属于化学因素，而非物理因素
  description: 误将化学诱变剂PFOS归类为物理诱变因素
  severity: error
  source: cmmlu_high_school_biology_29
- pattern: PFOS.*定向诱导.*突变
  correct: PFOS诱导基因突变是随机的，不具有定向性
  description: 误以为化学诱变剂能定向诱导基因突变
  severity: error
  source: cmmlu_high_school_biology_29
- pattern: DNA双链断裂.*一定.*基因结构破坏
  correct: DNA双链断裂不一定导致基因结构破坏，断裂可能发生在非基因区域
  description: 误以为所有DNA双链断裂都会破坏基因结构
  severity: error
  source: cmmlu_high_school_biology_29
- pattern: 鉴定还原糖.*水浴加热
  correct: 鉴定还原糖需要水浴加热，但鉴定蛋白质和DNA不需要水浴加热
  description: 误以为鉴定蛋白质和DNA也需要水浴加热
  severity: error
  source: cmmlu_high_school_biology_30
- pattern: 还原糖.*双缩脲试剂
  correct: 还原糖的鉴定使用斐林试剂，双缩脲试剂用于鉴定蛋白质
  description: 混淆了斐林试剂和双缩脲试剂的用途
  severity: error
  source: cmmlu_high_school_biology_30
- pattern: 蛋白质.*砖红色沉淀
  correct: 蛋白质鉴定使用双缩脲试剂，产生紫色反应，砖红色沉淀是还原糖与斐林试剂反应的结果
  description: 误以为蛋白质鉴定产生砖红色沉淀
  severity: error
  source: cmmlu_high_school_biology_30
- pattern: 生长素.*促进生根
  correct: 适宜浓度的生长素类似物处理插条可促进其生根，这是正确的应用
  description: 误以为生长素类似物不能促进生根
  severity: warning
  source: cmmlu_high_school_biology_31
- pattern: 生长素类似物.*无子果实
  correct: 适宜浓度的生长素类似物可促进无子果实的发育，这是正确的应用
  description: 误以为生长素类似物不能促进无子果实发育
  severity: warning
  source: cmmlu_high_school_biology_31
- pattern: 单侧光.*生长素分布
  correct: 单侧光照射燕麦胚芽鞘可使其生长素分布发生变化，这是正确的现象
  description: 误以为单侧光不影响生长素分布
  severity: warning
  source: cmmlu_high_school_biology_31
- pattern: 停止使用杀虫剂.*抗药基因频率.*下降.*进化
  correct: 停止使用杀虫剂后，抗药基因频率下降是种群基因库的变化，但进化是基因频率的定向改变，下降本身不一定代表进化方向
  description: 误以为抗药基因频率下降就是种群在进化，忽略了进化需要基因频率的定向改变
  severity: error
  source: cmmlu_high_school_biology_32
- pattern: 杀虫剂.*严寒.*定向改变.*进化方向
  correct: 自然选择（如杀虫剂和严寒）通过定向改变种群基因频率决定进化方向，但该表述本身正确，不是错误选项
  description: 该干扰项表述正确，不应作为错误选项
  severity: warning
  source: cmmlu_high_school_biology_32
- pattern: 变异.*不定向.*自然选择.*原材料
  correct: 变异是不定向的，为自然选择提供原材料，该表述正确
  description: 该干扰项表述正确，不应作为错误选项
  severity: warning
  source: cmmlu_high_school_biology_32
- pattern: 负反馈调节.*有利于.*稳定
  correct: 负反馈调节是生态系统保持相对稳定的重要机制，但并非唯一因素
  description: 误以为负反馈调节是生态系统保持稳定的唯一或绝对有利因素
  severity: warning
  source: cmmlu_high_school_biology_33
- pattern: 生态系统.*稳定.*离不开信息传递
  correct: 信息传递是生态系统维持相对稳定的重要因素之一，但并非绝对必要条件
  description: 误以为信息传递是生态系统维持稳定的绝对必要条件
  severity: warning
  source: cmmlu_high_school_biology_33
- pattern: 生态系统.*组成成分.*非生物成分
  correct: 生态系统的组成成分包括非生物成分（如阳光、水、空气等）
  description: 误以为生态系统组成成分中不包含非生物成分
  severity: error
  source: cmmlu_high_school_biology_33
- pattern: 减数第一次分裂后期.*DNA数目.*有丝分裂后期
  correct: 减数第一次分裂后期细胞核内DNA数目与有丝分裂后期细胞核内DNA数目之比为1:1
  description: 误以为减数第一次分裂后期与有丝分裂后期的核内DNA数目不同
  severity: error
  source: cmmlu_high_school_biology_34
- pattern: 减数第一次分裂后期.*X染色体数目.*有丝分裂后期
  correct: 减数第一次分裂后期X染色体数目与有丝分裂后期X染色体数目之比为1:2
  description: 误以为减数第一次分裂后期与有丝分裂后期的X染色体数目比例不是1:2
  severity: error
  source: cmmlu_high_school_biology_34
- pattern: 减数第一次分裂后期.*染色单体数目.*有丝分裂后期
  correct: 减数第一次分裂后期染色单体数目与有丝分裂后期染色单体数目之比为2:1
  description: 误以为减数第一次分裂后期与有丝分裂后期的染色单体数目比例不是2:1
  severity: error
  source: cmmlu_high_school_biology_34
- pattern: 静息状态.*没有离子进出
  correct: 静息状态时神经元细胞膜上有离子进出，主要是钾离子外流，维持静息电位
  description: 误以为静息状态时神经元细胞膜内外没有离子流动
  severity: error
  source: cmmlu_high_school_biology_35
- pattern: 溴麝香草酚蓝水溶液.*酸性.*酒精.*灰绿色
  correct: 溴麝香草酚蓝水溶液在酸性条件下与二氧化碳反应呈黄色，与酒精反应呈灰绿色需在酸性条件下使用重铬酸钾
  description: 误以为溴麝香草酚蓝水溶液用于检测酒精
  severity: error
  source: cmmlu_high_school_biology_36
- pattern: 秋水仙素.*解离.*95%酒精.*漂洗
  correct: 秋水仙素诱导染色体数目加倍的实验中，解离后应用清水漂洗，而非95%酒精
  description: 误以为解离后需用酒精漂洗
  severity: error
  source: cmmlu_high_school_biology_36
- pattern: 新鲜黑藻叶片.*不可以.*质壁分离
  correct: 新鲜的黑藻叶片含有叶绿体，可作为观察质壁分离与复原的实验材料
  description: 误以为新鲜黑藻叶片不能用于观察质壁分离与复原
  severity: error
  source: cmmlu_high_school_biology_36
- pattern: 激素.*分泌量.*不变
  correct: 激素的分泌量会随机体生理状态和反馈调节而变化
  description: 误以为激素分泌量恒定不变
  severity: error
  source: cmmlu_high_school_biology_37
- pattern: 促甲状腺激素.*受体.*各种细胞
  correct: 促甲状腺激素的受体只分布在甲状腺细胞上
  description: 误以为促甲状腺激素的受体广泛分布于各种细胞
  severity: error
  source: cmmlu_high_school_biology_37
- pattern: 性激素.*氨基酸.*蛋白质
  correct: 性激素的化学本质是脂质（类固醇），不是蛋白质
  description: 误以为性激素是蛋白质类物质
  severity: error
  source: cmmlu_high_school_biology_37
- pattern: 成熟茎韧皮部.*生长素.*非极性运输
  correct: 生长素在成熟茎韧皮部中通过韧皮部进行非极性运输，但该说法本身正确，不是错误选项
  description: 误以为成熟茎韧皮部中的生长素不能进行非极性运输
  severity: error
  source: cmmlu_high_school_biology_38
- pattern: 豌豆幼苗.*乙烯.*生长素浓度
  correct: 豌豆幼苗切段中乙烯的合成受生长素浓度的影响，该说法正确
  description: 误以为乙烯合成不受生长素浓度影响
  severity: error
  source: cmmlu_high_school_biology_38
- pattern: 幼嫩叶片.*色氨酸.*生长素
  correct: 植物幼嫩叶片中的色氨酸可转变为生长素，该说法正确
  description: 误以为色氨酸不能转变为生长素
  severity: error
  source: cmmlu_high_school_biology_38
- pattern: tRNA种类不同
  correct: 同一物种不同细胞中tRNA种类相同，蛋白质氨基酸排列顺序不同是由mRNA碱基序列不同决定的
  description: 误以为tRNA种类差异导致蛋白质氨基酸排列顺序不同
  severity: error
  source: cmmlu_high_school_biology_39
- pattern: 同一密码子所决定的氨基酸不同
  correct: 同一密码子在不同细胞中决定相同的氨基酸，这是遗传密码的通用性
  description: 误以为同一密码子可决定不同氨基酸
  severity: error
  source: cmmlu_high_school_biology_39
- pattern: 核糖体成分不同
  correct: 同一物种不同细胞中核糖体成分相同，蛋白质氨基酸排列顺序不同是由mRNA碱基序列不同决定的
  description: 误以为核糖体成分差异导致蛋白质氨基酸排列顺序不同
  severity: error
  source: cmmlu_high_school_biology_39
- pattern: 细胞生长.*物质运输.*效率.*增强
  correct: 细胞生长时体积增大，相对表面积减小，物质运输效率降低
  description: 误以为细胞生长会增强物质运输效率
  severity: error
  source: cmmlu_high_school_biology_40
- pattern: 卡诺氏液.*清水冲洗
  correct: 卡诺氏液固定细胞形态后需用体积分数为95%的酒精冲洗
  description: 误以为卡诺氏液固定后需用清水冲洗
  severity: error
  source: cmmlu_high_school_biology_41
- pattern: 生长素.*双缩脲试剂.*紫色
  correct: 植物的生长素是吲哚乙酸，不是蛋白质，不能与双缩脲试剂发生紫色反应
  description: 误以为所有激素都能与双缩脲试剂发生紫色反应
  severity: error
  source: cmmlu_high_school_biology_41
- pattern: 土壤小动物.*标志重捕法
  correct: 研究土壤中小动物类群的丰富度时，采用取样器取样法
  description: 误以为土壤小动物丰富度调查可用标志重捕法
  severity: error
  source: cmmlu_high_school_biology_41
- pattern: 过氧化氢酶.*温度.*酶活性
  correct: 过氧化氢在高温下会自行分解，干扰实验结果，因此过氧化氢酶不适用于探究温度对酶活性的影响
  description: 误以为过氧化氢酶是探究温度对酶活性影响的理想材料，忽略了过氧化氢自身受温度影响分解的问题
  severity: error
  source: cmmlu_high_school_biology_42
- pattern: 健那绿.*小麦叶片.*线粒体
  correct: 健那绿是活体染色剂，但小麦叶片细胞含有叶绿体，会干扰线粒体的观察，且叶片细胞不易长期存活
  description: 误以为健那绿染色后可在高倍显微镜下长期观察小麦叶片细胞的线粒体，忽略了叶绿体干扰和细胞存活问题
  severity: error
  source: cmmlu_high_school_biology_42
- pattern: 探究pH.*自变量.*酶的种类
  correct: 探究pH对酶活性的影响时，自变量是pH，而不是酶的种类
  description: 误以为探究pH对酶活性的影响时自变量是酶的种类
  severity: error
  source: cmmlu_high_school_biology_42
- pattern: 胞间连丝.*传递信息
  correct: 胞间连丝是植物细胞间物质运输和信息交流的通道，属于细胞间信息传递方式
  description: 误以为高等植物细胞之间不能通过胞间连丝传递信息
  severity: error
  source: cmmlu_high_school_biology_43
- pattern: 垂体.*甲状腺.*激素.*传递
  correct: 垂体分泌促甲状腺激素作用于甲状腺，甲状腺分泌甲状腺激素反馈调节垂体，属于激素调节的信息传递
  description: 误以为垂体与甲状腺之间不能通过激素分子传递调节信息
  severity: error
  source: cmmlu_high_school_biology_43
- pattern: DNA.*RNA.*蛋白质
  correct: 遗传信息可通过转录从DNA流向RNA，再通过翻译从RNA流向蛋白质，这是中心法则的核心内容
  description: 误以为遗传信息不能从DNA流向RNA再流向蛋白质
  severity: error
  source: cmmlu_high_school_biology_43
- pattern: 研究土壤中小动物类群丰富度时用标志重捕法
  correct: 研究土壤中小动物类群丰富度常用取样器取样法，标志重捕法适用于活动能力强、活动范围大的动物
  description: 误以为土壤小动物丰富度调查使用标志重捕法
  severity: error
  source: cmmlu_high_school_biology_44
- pattern: 电子显微镜下拍摄到的叶绿体的结构照片属于概念模型
  correct: 电子显微镜照片属于实物图像或物理模型，不属于概念模型
  description: 混淆了实物图像与概念模型
  severity: error
  source: cmmlu_high_school_biology_44
- pattern: 调查人群中某遗传病发病率时，最好要选取群体中发病率较高的多基因遗传病
  correct: 调查遗传病发病率应选择群体中发病率较高的单基因遗传病
  description: 误以为调查发病率应选多基因遗传病
  severity: error
  source: cmmlu_high_school_biology_44
- pattern: 内环境.*丙酮酸氧化分解
  correct: 丙酮酸氧化分解发生在线粒体基质中，属于细胞内液，不属于内环境
  description: 误以为丙酮酸氧化分解发生在内环境中
  severity: error
  source: cmmlu_high_school_biology_45
- pattern: 验证光合作用需要光照.*叶片.*黑纸包住
  correct: 将叶片一半用黑纸包住是控制自变量（光照）的操作，不是控制无关变量
  description: 误以为将叶片一半用黑纸包住是控制无关变量的操作，实际上这是控制自变量的操作
  severity: error
  source: cmmlu_high_school_biology_46
- pattern: Na.*从红细胞外运入红细胞内.*被动运输
  correct: Na+从红细胞外运入红细胞内通常需要钠钾泵主动运输，属于主动运输
  description: 误以为Na+进入红细胞是被动运输，实际上Na+进入细胞通常是逆浓度梯度的主动运输
  severity: error
  source: cmmlu_high_school_biology_47
- pattern: 生长素.*调控.*降解细胞壁.*酶合成基因.*表达
  correct: 生长素通过促进H+分泌到细胞壁中使其酸化，激活现有降解细胞壁的酶（如β半乳糖苷酶）的活性，而非调控酶合成基因的表达
  description: 误以为生长素通过调控基因表达来影响酶合成，而实际机制是激活现有酶的活性
  severity: error
  source: cmmlu_high_school_biology_48
- pattern: 根尖细胞.*叶肉细胞.*生长素受体.*数量相等
  correct: 不同组织细胞中生长素受体数量不同，根尖细胞和叶肉细胞对生长素的敏感性不同
  description: 误以为不同部位细胞中生长素受体数量相同
  severity: error
  source: cmmlu_high_school_biology_48
- pattern: 生长素浓度越高.*细胞伸长.*作用越大
  correct: 生长素对细胞伸长的作用具有两重性，低浓度促进、高浓度抑制，并非浓度越高作用越大
  description: 误以为生长素浓度与促进细胞伸长作用呈正比
  severity: error
  source: cmmlu_high_school_biology_48
- pattern: 细胞凋亡.*基因活动加强.*有利于个体发育
  correct: 细胞凋亡是基因控制的程序性死亡，有利于个体发育，但相关基因活动加强是凋亡过程的表现，而非原因
  description: 误以为细胞凋亡时基因活动加强是直接有利于个体发育的原因
  severity: error
  source: cmmlu_high_school_biology_49
- pattern: 细胞癌变.*膜蛋白改变.*易于扩散转移
  correct: 细胞癌变后膜蛋白（如糖蛋白）减少，导致黏着性降低，易于扩散转移
  description: 误以为细胞癌变后膜蛋白改变是导致易于扩散转移的直接原因，但未明确是减少
  severity: warning
  source: cmmlu_high_school_biology_49
- pattern: 细胞分裂.*线粒体.*分配随机
  correct: 细胞分裂时线粒体等细胞器的分配是随机的，但通常能保证子细胞获得足够的功能
  description: 误以为线粒体分配随机是错误的，实际上随机分配是正常现象
  severity: error
  source: cmmlu_high_school_biology_49
- pattern: 乔木层的疏密程度不会影响草本层的水平结构
  correct: 乔木层的疏密程度会影响草本层的水平结构，因为光照、水分等环境因子会随之改变
  description: 误以为乔木层对草本层水平结构无影响
  severity: error
  source: cmmlu_high_school_biology_50
- pattern: 染色体解螺旋.*DNA.*双链.*解旋
  correct: 染色体解螺旋形成染色质时，DNA双链并不解旋，解旋发生在DNA复制或转录时
  description: 误以为染色体解螺旋与DNA双链解旋是同一过程
  severity: error
  source: cmmlu_high_school_biology_51
- pattern: 一种tRNA可以携带多种氨基酸
  correct: 一种tRNA只能携带一种特定的氨基酸
  description: 误以为一种tRNA能携带多种氨基酸
  severity: error
  source: cmmlu_high_school_biology_52
- pattern: 反密码子是位于mRNA上相邻的三个碱基
  correct: 反密码子是位于tRNA上相邻的三个碱基，与mRNA上的密码子互补配对
  description: 误以为反密码子位于mRNA上
  severity: error
  source: cmmlu_high_school_biology_52
- pattern: DNA聚合酶是在细胞核内合成的
  correct: DNA聚合酶是在细胞质中的核糖体上合成的
  description: 误以为DNA聚合酶在细胞核内合成，实际上蛋白质合成发生在细胞质
  severity: error
  source: cmmlu_high_school_biology_52
- pattern: 蓝光直接提供.*能量
  correct: 蓝光激活H+-ATPase，但转运能量来自ATP水解，而非蓝光直接提供
  description: 误以为蓝光直接为H+跨膜转运提供能量
  severity: error
  source: cmmlu_high_school_biology_53
- pattern: 放养鱼.*提高.*恢复力稳定性
  correct: 放养鱼增加了营养结构的复杂性，提高了生态系统的抵抗力稳定性，而非恢复力稳定性
  description: 误以为增加营养结构复杂性会提高恢复力稳定性，实际上提高的是抵抗力稳定性
  severity: error
  source: cmmlu_high_school_biology_54
- pattern: 不同植物的插条.*对照
  correct: 在探索生长素类似物促进插条生根的最适浓度的实验中，应使用同种植物的插条作对照，以控制无关变量
  description: 误以为用不同植物的插条可以作对照，实际上不同植物对生长素的敏感性不同，会引入额外变量
  severity: error
  source: cmmlu_high_school_biology_55
- pattern: 等量的淀粉糊
  correct: 在探究土壤微生物对淀粉的分解作用的实验中，控制自变量是土壤微生物的有无，而不是淀粉糊的量
  description: 误以为放入等量淀粉糊是控制自变量，实际上这是控制无关变量
  severity: error
  source: cmmlu_high_school_biology_55
- pattern: 同一温度下进行
  correct: 在探究过氧化氢酶最适pH的实验中，控制自变量是pH，温度是无关变量，需要保持相同，但这不是控制自变量
  description: 误以为控制温度是控制自变量，实际上温度是无关变量，控制自变量是pH
  severity: error
  source: cmmlu_high_school_biology_55
- pattern: 洋葱鳞片叶.*DNA.*RNA
  correct: 洋葱鳞片叶细胞含有DNA和RNA，可用于观察分布
  description: 误以为洋葱鳞片叶细胞不含DNA或RNA
  severity: error
  source: cmmlu_high_school_biology_56
- pattern: 洋葱鳞片叶.*线粒体
  correct: 洋葱鳞片叶细胞含有线粒体，可用于观察
  description: 误以为洋葱鳞片叶细胞无线粒体
  severity: error
  source: cmmlu_high_school_biology_56
- pattern: 洋葱鳞片叶.*质壁分离
  correct: 洋葱鳞片叶细胞有大液泡，可用于观察质壁分离及复原
  description: 误以为洋葱鳞片叶细胞不能发生质壁分离
  severity: error
  source: cmmlu_high_school_biology_56
- pattern: 血糖.*氧化分解.*心跳加速
  correct: 血糖浓度偏低时，细胞供能不足，但心跳加速不是直接由血糖氧化分解减少引起的，而是代偿反应
  description: 误以为血糖氧化分解减少直接导致心跳加速
  severity: error
  source: cmmlu_high_school_biology_57
- pattern: 胰岛素分泌增加.*肝糖原分解
  correct: 血糖偏低时，胰岛素分泌减少，胰高血糖素分泌增加，促进肝糖原分解
  description: 误以为低血糖时胰岛素分泌增加
  severity: error
  source: cmmlu_high_school_biology_57
- pattern: 细胞外液渗透压升高.*抗利尿激素分泌增多
  correct: 只喝水未吃早餐，细胞外液渗透压不会显著升高，抗利尿激素分泌不会增多
  description: 误以为只喝水会导致渗透压升高
  severity: error
  source: cmmlu_high_school_biology_57
- pattern: 细胞膜.*细胞质基质.*转运氨基酸.*载体.*蛋白质
  correct: 细胞膜上转运氨基酸的载体是蛋白质，但细胞质基质中转运氨基酸的是tRNA，不是蛋白质
  description: 误以为细胞质基质中转运氨基酸的载体也是蛋白质
  severity: error
  source: cmmlu_high_school_biology_58
- pattern: 原癌基因.*阻止细胞.*异常增殖
  correct: 原癌基因的主要功能是调节细胞周期，控制细胞生长和分裂，而抑癌基因的主要功能是阻止细胞发生异常增殖
  description: 误以为原癌基因的功能是阻止异常增殖，实际上这是抑癌基因的功能
  severity: error
  source: cmmlu_high_school_biology_59
- pattern: 血浆渗透压升高
  correct: 人体失水过多时，血浆渗透压会升高
  description: 误以为失水过多时血浆渗透压不会升高
  severity: error
  source: cmmlu_high_school_biology_60
- pattern: 抗利尿激素含量升高
  correct: 人体失水过多时，抗利尿激素分泌增加，含量升高
  description: 误以为失水过多时抗利尿激素含量不会升高
  severity: error
  source: cmmlu_high_school_biology_60
- pattern: 大量出汗.*失水.*促进抗利尿激素
  correct: 大量出汗导致失水过多，会促进抗利尿激素分泌
  description: 误以为失水过多会抑制抗利尿激素分泌，实际上失水会促进其分泌以减少尿量
  severity: error
  source: cmmlu_high_school_biology_61
- pattern: 计数甲地内蒲公英的总数，再除以甲地面积
  correct: 样方法通过抽样统计估算种群密度，而非直接计数整个区域的个体总数
  description: 误以为样方法需要直接计数整个调查区域的所有个体
  severity: error
  source: cmmlu_high_school_biology_62
- pattern: 计数所有样方内蒲公英总数，除以甲地面积
  correct: 样方法应计算所有样方内蒲公英总数除以所有样方面积之和，得到平均密度，而非除以甲地总面积
  description: 误将样方内个体总数除以整个调查区域面积，忽略了样方总面积与调查区域面积的区别
  severity: error
  source: cmmlu_high_school_biology_62
- pattern: 除以所有样方的面积之和，再乘以甲地面积
  correct: 样方法直接计算所有样方内个体总数除以所有样方面积之和，得到平均密度，无需再乘以甲地面积
  description: 误以为需要将样方密度乘以调查区域面积来得到种群密度，混淆了密度与总数的计算
  severity: error
  source: cmmlu_high_school_biology_62
- pattern: 光学显微镜.*观察.*暗—亮—暗
  correct: 细胞膜的暗—亮—暗三层结构需用电子显微镜才能观察到
  description: 误以为普通光学显微镜能观察到细胞膜的亚显微结构
  severity: error
  source: cmmlu_high_school_biology_63
- pattern: F1雌果蝇共有两种表现型.*致死基因是n
  correct: 若F1雌果蝇共有两种表现型，则致死基因是N
  description: 误以为雌果蝇有两种表现型时致死基因为n，实际应为N
  severity: error
  source: cmmlu_high_school_biology_64
- pattern: 浆细胞.*胞吐.*分泌抗体
  correct: 浆细胞通过胞吐作用分泌抗体是正确的，不是错误
  description: 误以为浆细胞分泌抗体的方式不是胞吐作用
  severity: error
  source: cmmlu_high_school_biology_65
- pattern: 超氧化物歧化酶.*自由扩散
  correct: 超氧化物歧化酶是大分子蛋白质，不能通过自由扩散进入细胞，需通过胞吞等方式
  description: 误以为大分子蛋白质可以通过自由扩散跨膜运输
  severity: error
  source: cmmlu_high_school_biology_66
- pattern: 分泌蛋白.*自由透过.*高尔基体
  correct: 分泌蛋白通过囊泡运输而非自由透过高尔基体膜
  description: 误以为分泌蛋白能直接自由透过高尔基体膜
  severity: error
  source: cmmlu_high_school_biology_66
- pattern: 光合作用相关蛋白.*内质网.*叶绿体
  correct: 叶绿体是半自主细胞器，其蛋白部分由自身基因编码，部分由核基因编码并通过叶绿体膜上的转运系统输入，不经过内质网
  description: 误以为所有细胞质合成的蛋白都需经内质网加工并运输至叶绿体
  severity: error
  source: cmmlu_high_school_biology_66
- pattern: 胰岛素.*促进.*胰高血糖素
  correct: 胰岛素抑制胰高血糖素分泌，胰高血糖素促进胰岛素分泌
  description: 误以为胰岛素促进胰高血糖素分泌
  severity: error
  source: cmmlu_high_school_biology_67
- pattern: 基因频率.*只与环境选择有关
  correct: 基因频率的变化受突变、迁移、遗传漂变、自然选择等多种因素影响
  description: 误以为基因频率变化仅由环境选择决定
  severity: error
  source: cmmlu_high_school_biology_68
- pattern: 催化ATP合成的酶.*管家基因
  correct: 催化ATP合成的酶是细胞基本代谢所需，由管家基因指导合成
  description: 误以为催化ATP合成的酶不是由管家基因指导合成
  severity: error
  source: cmmlu_high_school_biology_69
- pattern: 组成管家基因和奢侈基因的脱氧核苷酸种类
  correct: 所有基因的脱氧核苷酸种类相同，均为A、T、C、G四种
  description: 误以为管家基因和奢侈基因的脱氧核苷酸种类不同
  severity: error
  source: cmmlu_high_school_biology_69
- pattern: 保留一定数量的杂草.*恢复力稳定性
  correct: 保留一定数量的杂草能提高生态系统的抵抗力稳定性，而非恢复力稳定性
  description: 误以为保留杂草能提高恢复力稳定性，实际上杂草增加物种多样性，增强抵抗力稳定性
  severity: error
  source: cmmlu_high_school_biology_70
- pattern: 分离酶.*中期.*转录
  correct: 分离酶是蛋白质，其基因在间期转录，中期染色体已高度凝集，不再进行转录
  description: 误以为分离酶基因在中期才开始转录和翻译
  severity: error
  source: cmmlu_high_school_biology_71
- pattern: 所有纺锤丝.*着丝点
  correct: 动物细胞中并非所有纺锤丝都与着丝点连接，还有星射线等
  description: 误以为动物细胞中所有纺锤丝都连接着丝点
  severity: error
  source: cmmlu_high_school_biology_71
- pattern: RNA.*相邻核糖核苷酸.*氢键
  correct: 构成RNA的两个相邻核糖核苷酸之间通过磷酸二酯键相连
  description: 误以为RNA链中相邻核苷酸之间通过氢键连接，实际是磷酸二酯键
  severity: error
  source: cmmlu_high_school_biology_72
- pattern: ATP.*腺苷.*磷酸基团.*高能磷酸键
  correct: ATP中腺苷与磷酸基团之间通过普通磷酸键（而非高能磷酸键）相连，高能磷酸键存在于磷酸基团之间
  description: 误以为ATP中腺苷与磷酸基团之间是高能磷酸键，实际是普通磷酸键
  severity: error
  source: cmmlu_high_school_biology_72
- pattern: DNA.*两条脱氧核苷酸链.*磷酸二酯键
  correct: 构成DNA的两条脱氧核苷酸链之间通过氢键相连
  description: 误以为DNA两条链之间通过磷酸二酯键连接，实际是氢键
  severity: error
  source: cmmlu_high_school_biology_72
- pattern: 线粒体.*[H]与O2结合
  correct: 大脑发出信号所需的能量主要通过线粒体中有氧呼吸第三阶段（[H]与O2结合）释放，但该过程释放的能量部分用于合成ATP，直接供能的是ATP
  description: 误以为[H]与O2结合释放的能量直接用于大脑发出信号，而忽略了能量需先转化为ATP
  severity: error
  source: cmmlu_high_school_biology_73
- pattern: 蓝藻.*核糖体
  correct: 蓝藻无细胞核，但有核糖体
  description: 误以为蓝藻没有核糖体
  severity: error
  source: cmmlu_high_school_biology_74
- pattern: 标志重捕法.*标志物脱落
  correct: 标志重捕法中标志物脱落会导致重捕时带标志个体比例偏低，计算所得种群密度偏大
  description: 误以为标志物脱落会使计算数值偏小，实际会使计算值偏大
  severity: error
  source: cmmlu_high_school_biology_75
- pattern: 样方法.*分布较密地区取样
  correct: 样方法调查蒲公英种群密度时在分布较密地区取样会使计算数值偏大
  description: 误以为在分布较密地区取样会使数值偏小，实际会使数值偏大
  severity: error
  source: cmmlu_high_school_biology_75
- pattern: 调查遗传病发病率.*患者家系
  correct: 调查某遗传病的发病率应在人群中随机抽样调查，以患者家系为调查对象会使发病率偏大
  description: 误以为以患者家系为调查对象会使计算数值偏小，实际会使发病率偏大
  severity: error
  source: cmmlu_high_school_biology_75
- pattern: 紫外线.*选育.*青霉素
  correct: 紫外线诱变育种与同位素标记法核心技术不同
  description: 误以为紫外线诱变育种与同位素标记法属于相同核心技术
  severity: error
  source: cmmlu_high_school_biology_76
- pattern: 甲基绿.*吡罗红.*观察核酸
  correct: 甲基绿-吡罗红染色与同位素标记法核心技术不同
  description: 误以为染色观察法与同位素标记法属于相同核心技术
  severity: error
  source: cmmlu_high_school_biology_76
- pattern: 细胞膜.*线粒体膜.*核膜.*蛋白质.*功能相同
  correct: 不同生物膜所含蛋白质种类和功能不同
  description: 误以为所有生物膜中的蛋白质功能相同
  severity: error
  source: cmmlu_high_school_biology_77
- pattern: 离子浓度差.*自由扩散
  correct: 细胞膜两侧的离子浓度差主要通过主动运输和协助扩散实现
  description: 误以为离子跨膜运输是通过自由扩散实现
  severity: error
  source: cmmlu_high_school_biology_77
- pattern: 磷脂分子.*胆固醇.*脂肪酸.*磷酸组成
  correct: 磷脂分子由甘油、脂肪酸和磷酸组成，胆固醇是固醇类物质
  description: 误以为胆固醇是磷脂分子的组成成分
  severity: error
  source: cmmlu_high_school_biology_77
- pattern: 增加.*KCl浓度.*静息电位绝对值增大
  correct: 增加细胞外K+浓度会使静息电位绝对值减小
  description: 误以为增加细胞外K+浓度会使静息电位绝对值增大
  severity: error
  source: cmmlu_high_school_biology_78
- pattern: 局部炎症.*肿胀.*Na.*浓度增加
  correct: 局部炎症反应时的肿胀是由于组织液增多，而非组织中的Na+浓度增加所致
  description: 误以为炎症肿胀是由Na+浓度增加直接引起
  severity: error
  source: cmmlu_high_school_biology_78
- pattern: 摄入过多过咸食物.*细胞内液.*增加
  correct: 摄入过多过咸食物会使细胞外液渗透压升高，导致细胞内液水分外流，细胞内液量减少
  description: 误以为摄入过咸食物会导致细胞内液量增加
  severity: error
  source: cmmlu_high_school_biology_78
- pattern: 突触后膜.*受体蛋白.*合成.*消耗ATP
  correct: 突触后膜上受体蛋白的合成需要消耗ATP，这是正确的
  description: 误以为突触后膜上受体蛋白的合成不需要消耗ATP
  severity: error
  source: cmmlu_high_school_biology_79
- pattern: 神经细胞兴奋后恢复.*静息状态.*消耗ATP
  correct: 神经细胞兴奋后恢复为静息状态需要消耗ATP，这是正确的
  description: 误以为神经细胞兴奋后恢复为静息状态不消耗ATP
  severity: error
  source: cmmlu_high_school_biology_79
- pattern: ATP.*神经元线粒体.*内膜.*产生
  correct: ATP能在神经元线粒体的内膜上产生，这是正确的
  description: 误以为ATP不能在神经元线粒体的内膜上产生
  severity: error
  source: cmmlu_high_school_biology_79
- pattern: 叶绿体.*干扰.*观察
  correct: 叶肉细胞中的叶绿体有颜色，但不会干扰植物细胞吸水和失水的观察，因为实验主要观察原生质层与细胞壁的分离与复原
  description: 误以为叶绿体颜色会干扰质壁分离实验的观察
  severity: error
  source: cmmlu_high_school_biology_80
- pattern: 对照组.*土壤.*灭菌
  correct: 探究落叶分解的实验中，对照组土壤应保持自然状态（不灭菌），实验组土壤灭菌以排除微生物作用
  description: 误以为对照组需要对土壤灭菌处理
  severity: error
  source: cmmlu_high_school_biology_80
- pattern: 血友病.*随机取样
  correct: 调查遗传病的遗传方式应在患者家系中进行调查，而不是随机取样
  description: 误以为调查遗传方式可采用随机取样调查
  severity: error
  source: cmmlu_high_school_biology_80
- pattern: 捕食者数量增长.*被捕食者数量减少
  correct: 捕食者数量增长导致被捕食者数量减少是负反馈调节，而非正反馈
  description: 误以为捕食者与被捕食者数量变化关系是正反馈
  severity: error
  source: cmmlu_high_school_biology_81
- pattern: 寒冷.*甲状腺激素.*抑制促甲状腺激素
  correct: 寒冷时甲状腺激素浓度升高通过负反馈抑制促甲状腺激素分泌，而非正反馈
  description: 误以为甲状腺激素对促甲状腺激素的抑制是正反馈
  severity: error
  source: cmmlu_high_school_biology_81
- pattern: 进餐后.*胰岛素.*使血糖浓度下降
  correct: 进餐后胰岛素分泌增多使血糖浓度下降是负反馈调节，而非正反馈
  description: 误以为胰岛素降低血糖的过程是正反馈
  severity: error
  source: cmmlu_high_school_biology_81
- pattern: 肾小管.*主动运输.*水
  correct: 肾小管对水的重吸收是被动运输（水通道蛋白协助扩散），受抗利尿激素调节
  description: 误以为肾小管通过主动运输吸收水
  severity: error
  source: cmmlu_high_school_biology_82
- pattern: 苏丹Ⅲ.*脂肪.*染色
  correct: 苏丹Ⅲ染液可将脂肪染成橘黄色，花生子叶中脂肪颗粒可被染色并在显微镜下观察到
  description: 误以为苏丹Ⅲ染液不能使脂肪产生特定颜色
  severity: error
  source: cmmlu_high_school_biology_83
- pattern: 斐林试剂.*还原糖.*颜色
  correct: 斐林试剂与还原糖在加热条件下反应生成砖红色沉淀，成熟香蕉富含还原糖
  description: 误以为斐林试剂不能检测还原糖产生特定颜色
  severity: error
  source: cmmlu_high_school_biology_83
- pattern: 甲基绿.*细胞核.*染色
  correct: 甲基绿可将DNA染成绿色，细胞核中含有DNA，因此可被染色并在显微镜下观察到
  description: 误以为甲基绿不能使细胞核产生特定颜色
  severity: error
  source: cmmlu_high_school_biology_83
- pattern: 重铬酸钾.*检测.*CO2
  correct: 重铬酸钾用于检测酒精（乙醇），检测CO2常用澄清石灰水或溴麝香草酚蓝水溶液
  description: 误以为重铬酸钾可以检测二氧化碳
  severity: error
  source: cmmlu_high_school_biology_84
- pattern: 洋葱根尖伸长区.*有丝分裂
  correct: 观察植物细胞有丝分裂应选择根尖分生区细胞，伸长区细胞已分化，分裂能力弱
  description: 误以为根尖伸长区细胞适合观察有丝分裂
  severity: error
  source: cmmlu_high_school_biology_84
- pattern: 多基因遗传病.*调查遗传方式
  correct: 多基因遗传病易受环境影响，调查遗传方式应选择单基因遗传病
  description: 误以为多基因遗传病适合调查遗传方式
  severity: error
  source: cmmlu_high_school_biology_84
- pattern: X染色体.*显性.*Q.*0.*P.*1
  correct: 若突变基因位于X染色体上且为显性，则Q和P值分别为1、0
  description: 误以为X染色体显性突变时，子代雄株全部表现突变性状，雌株全部表现野生性状
  severity: error
  source: cmmlu_high_school_biology_85
- pattern: Y染色体.*Q.*1.*P.*0
  correct: 若突变基因位于Y染色体上，则Q和P值分别为1、0
  description: 误以为Y染色体突变时，子代雄株全部表现突变性状，雌株全部表现野生性状
  severity: error
  source: cmmlu_high_school_biology_85
- pattern: 常染色体.*显性.*Q.*1/2.*P.*1/2
  correct: 若突变基因位于常染色体上且为显性，则Q和P值分别为1/2、1/2
  description: 误以为常染色体显性突变时，子代雄株和雌株中突变性状比例均为1/2
  severity: error
  source: cmmlu_high_school_biology_85
- pattern: 碱性条件.*重铬酸钾.*酒精
  correct: 重铬酸钾鉴定酒精应在酸性条件下进行，溶液颜色由橙色变为灰绿色
  description: 误以为重铬酸钾鉴定酒精需要在碱性条件下进行
  severity: error
  source: cmmlu_high_school_biology_86
- pattern: 局部电流的方向与兴奋传导的方向相反
  correct: 在神经纤维膜外，局部电流的方向与兴奋传导的方向相同
  description: 误以为神经纤维膜外局部电流方向与兴奋传导方向相反
  severity: error
  source: cmmlu_high_school_biology_87
- pattern: 刺激神经纤维中部.*向两侧传导
  correct: 刺激神经纤维中部，产生的兴奋沿神经纤维向两侧传导是正确的，但该选项不是错误叙述
