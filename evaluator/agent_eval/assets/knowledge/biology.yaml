    correct_class: 真菌
    key_traits:
    - 无叶绿体
    - 分解有机物
    - 有细胞核
  human_body:
  - fact: 人体骨骼数量
    value: 206
    unit: 块
  - fact: 人体肌肉数量
    value: 600
    unit: 块以上
  - fact: 人体五大主要脏器
    value: 心、肝、脾、肺、肾
    unit: null
  - fact: 人体最大器官
    value: 皮肤
    unit: null
  - fact: 人体最坚硬的组织
    value: 牙釉质
    unit: null
  cell_facts:
  - fact: 细胞基本结构
    description: 细胞膜、细胞质、细胞核（植物细胞还有细胞壁、叶绿体、液泡）
  - fact: 细胞是生物体结构和功能的基本单位
    description: 除病毒外，所有生物都由细胞构成
  - fact: 动物细胞与植物细胞的区别
    description: 植物细胞有细胞壁、叶绿体、液泡，动物细胞没有
  - fact: DNA主要存在于细胞核中
    description: 细胞核中含有遗传物质DNA
  photosynthesis:
    equation: 6CO2 + 6H2O → C6H12O6 + 6O2（光照/叶绿体）
    conditions:
    - 光（不止白天，有光源即可）
    - 叶绿体（含叶绿素）
    raw_materials:
    - 二氧化碳
    - 水
    products:
    - 有机物（葡萄糖）
    - 氧气
    key_facts:
    - 光合作用在叶绿体中进行
    - 光合作用将光能转化为化学能储存在有机物中
    - 光合作用吸收CO2释放O2
    - 光合作用和呼吸作用同时进行，白天光合作用强度大于呼吸作用
  genetics:
  - fact: 基因
    description: 控制生物性状的 DNA 片段，是有遗传效应的片段
  - fact: DNA（脱氧核糖核酸）
    description: 主要遗传物质，主要存在于细胞核中
  - fact: 染色体
    description: 由 DNA 和蛋白质组成；人正常体细胞 23 对（46 条），生殖细胞（精子/卵细胞）23 条
  - fact: 性状与相对性状
    description: 性状是生物体的形态/生理/行为特征；相对性状是同种生物同一性状的不同表现（如豌豆高茎与矮茎）
  - fact: 显性与隐性
    description: 显性基因用大写字母（如 A），隐性基因用小写（如 a）
  - fact: 基因型与表现型
    description: 基因型是基因组合（如 Aa），表现型是表现出的性状
  - fact: 人的性别决定
    description: 性染色体 XX 为女性、XY 为男性；生男生女取决于精子的性染色体类型
  - fact: 近亲结婚
    description: 近亲结婚使隐性遗传病发病率显著升高（如白化病、红绿色盲）
  - fact: 变异的普遍性
    description: 变异普遍存在（基因突变/基因重组/染色体变异），为生物进化提供原材料
  ecology:
  - fact: 生态系统组成
    description: 生物部分（植物-生产者/动物-消费者/细菌真菌-分解者）+ 非生物部分（阳光/空气/水/温度）
  - fact: 食物链
    description: 生产者→消费者，不含分解者和非生物部分（如 草→兔→鹰）
  - fact: 食物网
    description: 一个生态系统中多条食物链相互交错形成
  - fact: 生产者
    description: 绿色植物，通过光合作用制造有机物，为其他生物提供物质和能量
  - fact: 消费者
    description: 动物，直接或间接以植物为食
  - fact: 分解者
    description: 细菌和真菌，分解动植物遗体，参与物质循环
  - fact: 能量流动
    description: 沿食物链单向流动、逐级递减（传递效率约 10%-20%）
  - fact: 生物富集
    description: 有害物质（重金属、农药）沿食物链逐级积累，营养级越高浓度越大
  - fact: 生物圈
    description: 地球上最大的生态系统，包括大气圈底部、水圈大部、岩石圈上部
  evolution:
  - fact: 自然选择学说（达尔文）
    description: 过度繁殖→生存斗争→遗传变异→适者生存；环境对变异定向选择
  - fact: 化石
    description: 研究生物进化最直接、最有力的证据（地层越古老，化石越简单低等）
  - fact: 生存斗争
    description: 生物个体间以及生物与环境之间的斗争
  - fact: 适者生存
    description: 具有有利变异的个体在生存斗争中获胜并繁衍，不利变异个体被淘汰
  - fact: 变异与遗传
    description: 变异为进化提供原材料；遗传使有利变异积累；变异不定向，自然选择定向
  - fact: 生物进化趋势
    description: 由简单到复杂、由低等到高等、由水生到陆生
  - fact: 人类起源
    description: 森林古猿→南方古猿→能人→直立人→智人→现代人
