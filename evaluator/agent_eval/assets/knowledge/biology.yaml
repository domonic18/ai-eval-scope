- pattern: 补充.*R型细菌.*营养物质
  correct: DNA酶处理后的DNA已被降解，不能作为营养物质补充，该步骤的目的是对照而非补充营养
  description: 误以为DNA酶处理后的DNA能为R型细菌提供生长所需的营养物质
