  severity: warning
  source: cmmlu_high_school_biology_87
- pattern: 直接证明.*DNA不是.*促进.*转化
  correct: 该实验步骤的目的是与DNA转化实验形成对照，排除DNA酶处理后DNA失效的干扰，而非直接证明DNA不是转化因素
  description: 误以为用DNA酶处理后的实验能直接证明S型细菌的DNA不是转化因素，实际上这是对照实验
