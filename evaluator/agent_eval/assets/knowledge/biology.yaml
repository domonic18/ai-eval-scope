  severity: warning
  source: cmmlu_high_school_biology_87
- pattern: 兴奋.*传导方向.*兴奋部位至未兴奋部位
  correct: 兴奋在神经纤维上的传导方向是由兴奋部位至未兴奋部位是正确的，但该选项不是错误叙述
