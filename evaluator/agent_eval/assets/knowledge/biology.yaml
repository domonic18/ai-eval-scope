  source: cmmlu_high_school_biology_88
- pattern: 证明R型细菌生长不需要DNA
  correct: 该实验不能证明R型细菌生长是否需要DNA，而是通过对照排除DNA酶的影响
  description: 误以为该实验步骤能证明R型细菌生长不需要DNA
  severity: error
  source: cmmlu_high_school_biology_88
- pattern: 黄色老鼠.*杂合子.*黑色老鼠.*纯合子
  correct: 黄色基因纯合致死，所以黄色老鼠一定是杂合子；黑色基因A3为隐性，黑色老鼠一定是纯合子A3A3
  description: 误以为黄色老鼠可能是纯合子，或黑色老鼠可能是杂合子
  severity: error
  source: cmmlu_high_school_biology_89
- pattern: 多年前.*单一毛色.*只可能是白色或黑色
  correct: 多年前单一毛色可能是黄色、白色或黑色，取决于当时存在的基因型
  description: 误以为单一毛色只能是白色或黑色，忽略了黄色可能但未致死的情况
  severity: error
  source: cmmlu_high_school_biology_89
- pattern: 两只老鼠杂交.*子代有三种毛色
  correct: 两只老鼠杂交子代可能出现三种毛色，例如A1A2与A2A3杂交
  description: 误以为两只老鼠杂交不可能产生三种毛色
  severity: error
  source: cmmlu_high_school_biology_89
- pattern: 叶绿体.*不能合成ATP
  correct: 叶绿体在光合作用的光反应阶段可以合成ATP
  description: 误以为叶绿体只能进行暗反应（CO2固定）而不能合成ATP
  severity: error
  source: cmmlu_high_school_biology_90
- pattern: 蓝藻.*线粒体
  correct: 蓝藻是原核生物，没有线粒体，其能量来源于细胞质中的有氧呼吸
  description: 误以为蓝藻（原核生物）具有线粒体
  severity: error
  source: cmmlu_high_school_biology_90
- pattern: 核糖体.*膜结构
  correct: 核糖体是无膜结构的细胞器，由RNA和蛋白质组成
  description: 误以为核糖体具有膜结构
  severity: error
  source: cmmlu_high_school_biology_90
- pattern: 质壁分离.*第二次观察.*第三次观察.*间隔时间.*没有影响
  correct: 质壁分离与复原实验中，第二次与第三次观察间隔时间过长可能导致细胞失水过多死亡或复原过度，影响实验结果
  description: 误以为质壁分离与复原实验中观察间隔时间不影响结果
  severity: error
  source: cmmlu_high_school_biology_91
- pattern: 证明绿叶.*光照.*制造淀粉.*实验时间越长.*淀粉越多.*现象越明显
  correct: 光合作用实验时间过长，淀粉可能被转运或消耗，且叶片可能因光照过久受损，现象不一定更明显
  description: 误以为光合作用实验中光照时间越长淀粉积累越多，现象越明显
  severity: error
  source: cmmlu_high_school_biology_91
- pattern: 检测生物组织.*脂肪.*临时装片.*放置时间.*没有影响
  correct: 脂肪检测的临时装片放置时间过长，脂肪可能氧化或染色剂褪色，影响观察结果
  description: 误以为脂肪检测中临时装片放置时间不影响观察
  severity: error
  source: cmmlu_high_school_biology_91
- pattern: 麦芽糖.*水解.*果糖
  correct: 麦芽糖经水解可产生两分子葡萄糖，而非果糖
  description: 误以为麦芽糖水解产物包含果糖
  severity: error
  source: cmmlu_high_school_biology_92
- pattern: toll样受体.*合成的场所是细胞核
  correct: toll样受体（TLR）是蛋白质，其合成场所是核糖体
  description: 误以为蛋白质的合成场所是细胞核
  severity: error
  source: cmmlu_high_school_biology_93
- pattern: 树突细胞.*激发T细胞分化形成各种淋巴细胞
  correct: 树突细胞激发T细胞，但T细胞分化形成效应T细胞和记忆细胞，而非各种淋巴细胞
  description: 误以为树突细胞能激发T细胞分化形成所有类型的淋巴细胞
  severity: error
  source: cmmlu_high_school_biology_93
- pattern: toll样受体.*存在细胞内外两面
  correct: toll样受体（TLR）是跨膜蛋白，但并非同时存在于细胞内外两面，而是跨膜分布
  description: 误以为toll样受体同时存在于细胞内外两面
  severity: error
  source: cmmlu_high_school_biology_93
- pattern: 味觉受体分子位于反射弧的感受器部分
  correct: 味觉受体分子是感受器的一部分，但感受器是反射弧的组成部分，而非受体分子本身位于感受器部分
  description: 误以为味觉受体分子直接位于反射弧的感受器部分，混淆了受体分子与感受器的概念
  severity: error
  source: cmmlu_high_school_biology_94
- pattern: 味觉受体R1可能出现了感知甜味的结构变化
  correct: 味觉受体R1感知甜味是合理的，因为受体结构变化可改变其功能，但题目中该选项是合理的说法，并非错误
  description: 误以为味觉受体R1出现感知甜味的结构变化不合理，实际上这是可能的进化适应
  severity: warning
  source: cmmlu_high_school_biology_94
- pattern: 特殊味觉的形成是长期自然选择的结果
  correct: 特殊味觉的形成是长期自然选择的结果，这是正确的进化观点
  description: 误以为特殊味觉的形成不是自然选择的结果，实际上自然选择是适应性进化的主要机制
  severity: warning
  source: cmmlu_high_school_biology_94
- pattern: 信号分子.*完成.*信息传递.*数量.*性质.*改变
  correct: 信号分子在完成信息传递后通常会被降解或回收，但并非所有信号分子都会发生数量和性质的改变
  description: 误以为所有信号分子在信息传递后都会发生数量和性质的改变
  severity: error
  source: cmmlu_high_school_biology_95
- pattern: 信号分子.*自由扩散.*运出细胞
  correct: 只有部分信号分子（如气体或脂溶性小分子）可以通过自由扩散运出细胞，多数信号分子通过胞吐等方式释放
  description: 误以为所有信号分子都能通过自由扩散运出细胞
  severity: error
  source: cmmlu_high_school_biology_95
- pattern: 双缩脲试剂.*信号分子.*紫色
  correct: 双缩脲试剂检测蛋白质，只有含肽键的蛋白质或肽类信号分子才会显紫色，并非所有信号分子都是蛋白质
  description: 误以为所有信号分子都能与双缩脲试剂反应显紫色
  severity: error
  source: cmmlu_high_school_biology_95
- pattern: 组织液.*氧.*含量相等
  correct: 组织液生成时氧气含量高于回流时，因为组织细胞消耗氧气
  description: 误以为组织液生成与回流时氧气含量相同，忽略了组织细胞对氧气的消耗
  severity: error
  source: cmmlu_high_school_biology_96
- pattern: 分泌蛋白.*胞吐
  correct: 分泌蛋白从胰腺腺泡细胞到胞外属于胞吐作用
  description: 误以为分泌蛋白的释放不属于胞吐
  severity: error
  source: cmmlu_high_school_biology_97
- pattern: 浆细胞.*抗体.*胞外
  correct: 浆细胞分泌抗体到细胞外属于胞吐作用
  description: 误以为抗体分泌不属于胞吐
  severity: error
  source: cmmlu_high_school_biology_97
- pattern: 突触小泡.*神经递质.*释放
  correct: 突触小泡中的神经递质释放到突触间隙属于胞吐作用
  description: 误以为神经递质释放不属于胞吐
  severity: error
  source: cmmlu_high_school_biology_97
- pattern: 探究植物生长调节剂.*插条生根数.*无关变量
  correct: 插条生根数是因变量（观测指标），不是无关变量
  description: 误将实验的观测结果（生根数）当作无关变量
  severity: error
  source: cmmlu_high_school_biology_98
- pattern: 探究植物细胞的失水和吸水.*原生质层外侧溶液浓度.*无关变量
  correct: 原生质层外侧溶液的浓度是自变量（实验变量），不是无关变量
  description: 误将实验的自变量（溶液浓度）当作无关变量
  severity: error
  source: cmmlu_high_school_biology_98
- pattern: 探究酵母菌细胞呼吸方式.*培养液溶氧量.*无关变量
  correct: 培养液中的溶氧量是自变量（有氧/无氧条件），不是无关变量
  description: 误将实验的自变量（溶氧量）当作无关变量
  severity: error
  source: cmmlu_high_school_biology_98
- pattern: 促红细胞生成素.*靶细胞.*红细胞
  correct: 促红细胞生成素作用的靶细胞是骨髓造血干细胞，而非红细胞
  description: 误以为促红细胞生成素直接作用于红细胞
  severity: error
  source: cmmlu_high_school_biology_99
- pattern: 6＋XXY.*3个染色体组
  correct: 6+XXY的果蝇体细胞中染色体组成为2个常染色体组加2条X和1条Y，实际含有2个染色体组（二倍体）
  description: 误以为XXY个体含有3个染色体组，实际上XXY是二倍体，只是性染色体数目异常
  severity: error
  source: cmmlu_high_school_biology_100
- pattern: 母本.*减数第一次分裂出错.*极体.*A、A、aXb
  correct: 若母本减数第一次分裂出错，同源染色体未分离，则卵细胞为aXbXb，三个极体为A、A、a（不含Xb）
  description: 误以为减数第一次分裂出错时极体基因型包含aXb，实际此时Xb应随同源染色体进入卵细胞
  severity: error
  source: cmmlu_high_school_biology_100
- pattern: 父本.*减数第一次分裂出错.*XY.*异常精子.*正常卵细胞
  correct: 父本减数第一次分裂出错产生XY精子，与正常卵细胞（aXb）结合会得到AaXBXbY，表现为红眼，而非白眼
  description: 误以为父本XY精子与正常卵细胞结合可产生白眼雌蝇，实际该组合产生红眼个体
  severity: error
  source: cmmlu_high_school_biology_100
- pattern: 固定化酶.*溶解氧交换受阻
  correct: 溶解氧交换受阻是固定化细胞应用的重要限制因素，而非固定化酶
  description: 误以为溶解氧交换受阻是固定化酶的限制因素，实际上固定化酶不涉及细胞呼吸，无需考虑氧气供应
  severity: error
  source: cmmlu_high_school_biology_101
- pattern: 观察植物细胞有丝分裂.*染色.*漂洗
  correct: 观察植物细胞有丝分裂的正确操作步骤是：取材→解离→漂洗→染色→制片→观察
  description: 误以为有丝分裂制片时先染色后漂洗，实际应先漂洗再染色
  severity: error
  source: cmmlu_high_school_biology_102
- pattern: 烘干.*口腔上皮细胞.*健那绿
  correct: 观察线粒体应使用活的口腔上皮细胞，烘干处理会杀死细胞，健那绿染液只能染活细胞中的线粒体
  description: 误以为烘干后的细胞仍可用健那绿染色观察线粒体
  severity: error
  source: cmmlu_high_school_biology_102
- pattern: CO2.*重铬酸钾.*灰绿色
  correct: CO2可使溴麝香草酚蓝水溶液由蓝变绿再变黄，但使酸性重铬酸钾溶液变成灰绿色的是酒精，不是CO2
  description: 误以为CO2也能使重铬酸钾变色，实际是酒精的检测反应
  severity: error
  source: cmmlu_high_school_biology_102
- pattern: DNA.*ATP.*元素种类
  correct: DNA含有C、H、O、N、P，ATP含有C、H、O、N、P，两者元素种类相同
  description: 误以为DNA和ATP的元素种类不同
  severity: error
  source: cmmlu_high_school_biology_103
- pattern: T2噬菌体.*核酸.*核糖核苷酸
  correct: T2噬菌体的核酸是DNA，由脱氧核糖核苷酸组成
  description: 误以为T2噬菌体的核酸由核糖核苷酸组成
  severity: error
  source: cmmlu_high_school_biology_103
- pattern: tRNA.*多个反密码子
  correct: 一个tRNA分子中只有一个反密码子
  description: 误以为一个tRNA分子有多个反密码子
  severity: error
  source: cmmlu_high_school_biology_103
- pattern: （2）或（3）
  correct: 实验（2）子代全为全缘叶，无法判断植株甲是纯合子还是杂合子；实验（3）子代1:1，只能说明植株甲是杂合子，但需要结合其他实验才能判定
  description: 误以为实验（2）或（3）能单独判定植株甲为杂合子
  severity: error
  source: cmmlu_high_school_biology_104
- pattern: （3）或（4）
  correct: 实验（3）子代1:1只能说明植株甲是杂合子，但实验（4）子代3:1也能判定植株甲是杂合子，但（3）和（4）组合不是唯一能判定的
  description: 误以为实验（3）或（4）组合能判定植株甲为杂合子，但忽略了实验（1）也能判定
  severity: error
  source: cmmlu_high_school_biology_104
- pattern: （1）或（2）
  correct: 实验（1）子代出现性状分离能判定植株甲为杂合子，但实验（2）子代全为全缘叶无法判定
  description: 误以为实验（1）或（2）能判定植株甲为杂合子，实际上实验（2）不能
  severity: error
  source: cmmlu_high_school_biology_104
- pattern: 研磨.*洗涤剂.*溶解DNA
  correct: 研磨植物细胞时加入洗涤剂是为了破坏细胞膜，释放DNA
  description: 误以为洗涤剂的作用是溶解DNA，实际是破坏细胞膜
  severity: error
  source: cmmlu_high_school_biology_105
- pattern: 探究温度对酶活性的影响.*过氧化氢酶.*过氧化氢.*保温
  correct: 过氧化氢在高温下会自行分解，不宜用其作为底物探究温度对酶活性的影响
  description: 误以为过氧化氢酶和过氧化氢可以用于探究温度对酶活性的影响，忽略了过氧化氢自身受热分解的干扰
  severity: error
  source: cmmlu_high_school_biology_106
- pattern: 性状分离比的模拟实验.*两个盒子的彩球数量要求相同
  correct: 两个盒子分别代表雌雄生殖器官，彩球数量可以不同，但每个盒子内两种彩球数量需相等
  description: 误以为模拟实验中两个盒子的彩球总数必须相同
  severity: error
  source: cmmlu_high_school_biology_106
- pattern: 探究酵母菌细胞呼吸方式.*澄清石灰水是否变混浊.*判断
  correct: 酵母菌有氧和无氧呼吸都产生二氧化碳，仅凭澄清石灰水变混浊无法区分呼吸方式，需进一步比较混浊程度或使用其他检测方法
  description: 误以为通过澄清石灰水是否变混浊就能判断酵母菌的呼吸方式
  severity: error
  source: cmmlu_high_school_biology_106
- pattern: F1野生型个体都是纯合子
  correct: F1野生型个体可能为纯合子bb，也可能为杂合子Bb但未表现突变型（外显率75%导致部分Bb个体为野生型）
  description: 误以为野生型个体一定不携带显性基因B
  severity: error
  source: cmmlu_high_school_biology_107
- pattern: 亲本表现型为突变型
  correct: 亲本基因型为Bb，但外显率75%，其表现型可能为突变型或野生型，无法确定
  description: 误以为自交亲本一定表现突变型
  severity: error
  source: cmmlu_high_school_biology_107
- pattern: F1比例说明该性状的遗传遵循基因自由组合定律
  correct: F1比例5:3是由一对等位基因的不完全外显导致，不涉及基因自由组合定律
  description: 误将一对基因的不完全外显现象归因于两对基因的自由组合
  severity: error
  source: cmmlu_high_school_biology_107
- pattern: 低温诱导染色体加倍.*紫色洋葱鳞片叶.*外表皮
  correct: 低温诱导染色体加倍实验应选用洋葱根尖分生区细胞，因其分裂旺盛，易于观察染色体
  description: 误以为紫色洋葱鳞片叶外表皮可用于观察染色体加倍，实际外表皮细胞已高度分化，不分裂
  severity: error
  source: cmmlu_high_school_biology_108
- pattern: 观察DNA和RNA.*盐酸.*使细胞分散开
  correct: 盐酸在实验中的作用是改变细胞膜通透性，使染色质中DNA与蛋白质分离，便于染色
  description: 误以为盐酸的作用是使细胞分散开，实际盐酸用于水解和改变通透性
  severity: error
  source: cmmlu_high_school_biology_108
- pattern: 观察植物细胞有丝分裂.*解离.*染色.*漂洗.*制片
  correct: 正确操作顺序为：解离→漂洗→染色→制片→观察，漂洗应在染色之前以去除盐酸
  description: 误以为染色在漂洗之前，实际漂洗需先去除解离液，否则影响染色效果
  severity: error
  source: cmmlu_high_school_biology_108
- pattern: 加二苯胺试剂.*沸水浴加热
  correct: 二苯胺试剂需在沸水浴条件下与DNA反应，但操作中应先加入试剂再沸水浴加热
  description: 误以为加二苯胺试剂后不需要沸水浴加热或顺序错误
  severity: error
  source: cmmlu_high_school_biology_109
- pattern: 加入酒精.*玻璃棒.*搅拌
  correct: 加入冷酒精后应用玻璃棒轻缓搅拌以析出DNA，但搅拌过猛会破坏DNA结构
  description: 误以为加入酒精后不能搅拌或搅拌方式错误
  severity: warning
  source: cmmlu_high_school_biology_109
- pattern: 用蛋白酶.*纯化.*DNA
  correct: 蛋白酶可降解蛋白质杂质，用于纯化DNA，但需注意后续去除蛋白酶
  description: 误以为蛋白酶不能用于DNA纯化或会破坏DNA
  severity: error
  source: cmmlu_high_school_biology_109
- pattern: 前期.*染色体数目相同.*染色体行为.*DNA分子数目不同
  correct: 有丝分裂前期和减数第一次分裂前期染色体数目相同，染色体行为不同（减Ⅰ前期有联会、交叉互换），但DNA分子数目也相同
  description: 误以为减数第一次分裂前期DNA分子数目与有丝分裂前期不同
  severity: error
  source: cmmlu_high_school_biology_110
- pattern: 中期.*染色体数目不同.*染色体行为.*DNA分子数目相同
  correct: 有丝分裂中期和减数第一次分裂中期染色体数目相同，染色体行为不同（减Ⅰ中期同源染色体成对排列在赤道板），DNA分子数目也相同
  description: 误以为减数第一次分裂中期染色体数目与有丝分裂中期不同
  severity: error
  source: cmmlu_high_school_biology_110
- pattern: 末期.*染色体数目.*染色体行为相同.*DNA分子数目不同
  correct: 有丝分裂末期和减数第一次分裂末期染色体数目不同（减Ⅰ后同源染色体分离，末期染色体数目减半），染色体行为不同，DNA分子数目也不同
  description: 误以为有丝分裂末期和减数第一次分裂末期染色体数目和染色体行为相同
  severity: error
  source: cmmlu_high_school_biology_110
- pattern: 细菌.*能量.*流向生产者
  correct: 细菌作为分解者，其能量以热能形式散失，不能流向生产者
  description: 误以为分解者（细菌）的能量可以逆向流向生产者
  severity: error
  source: cmmlu_high_school_biology_111
- pattern: 鹰.*迁入.*改变.*能量流动方向
  correct: 能量流动方向由食物链决定，鹰的迁入不改变方向，只改变环节
  description: 误以为新物种迁入会改变生态系统能量流动的方向
  severity: error
  source: cmmlu_high_school_biology_111
- pattern: 没有核膜和染色体的细胞一定是原核细胞
  correct: 某些真核细胞（如哺乳动物成熟红细胞）也没有核膜和染色体，因此不能仅凭此判断为原核细胞
  description: 误以为所有没有核膜和染色体的细胞都是原核细胞，忽略了某些真核细胞在成熟过程中失去细胞核的情况
  severity: error
  source: cmmlu_high_school_biology_112
- pattern: 含有有氧呼吸酶的细胞不可能是原核细胞
  correct: 某些原核细胞（如好氧细菌）也含有有氧呼吸酶，能进行有氧呼吸
  description: 误以为只有真核细胞才含有有氧呼吸酶，忽略了原核细胞也能进行有氧呼吸
  severity: error
  source: cmmlu_high_school_biology_112
- pattern: 含有叶绿素的细胞一定是真核细胞
  correct: 某些原核细胞（如蓝藻）也含有叶绿素，能进行光合作用
  description: 误以为只有真核细胞才含有叶绿素，忽略了原核生物如蓝藻也含有叶绿素
  severity: error
  source: cmmlu_high_school_biology_112
- pattern: 基因表达.*稳态
  correct: 基因表达存在稳态，但器官、种群和生物圈也存在稳态现象
  description: 误以为基因表达、器官、种群和生物圈中只有部分存在稳态
  severity: error
  source: cmmlu_high_school_biology_113
- pattern: 内环境.*成分.*理化性质.*动态平衡
  correct: 内环境的每一种成分和理化性质都处于动态平衡中
  description: 误以为内环境的成分和理化性质不是都处于动态平衡
  severity: error
  source: cmmlu_high_school_biology_113
- pattern: 单细胞动物.*体液调节
  correct: 单细胞动物和一些多细胞低等动物只有体液调节，没有神经调节
  description: 误以为单细胞动物和多细胞低等动物有神经调节或其他调节方式
  severity: error
  source: cmmlu_high_school_biology_113
- pattern: 湖泊中所有的鱼类构成一个种群
  correct: 种群是指同一区域内同种生物的所有个体，湖泊中所有鱼类包含多个物种，不能构成一个种群
  description: 误以为所有鱼类属于同一个种群，忽略了种群定义中同种生物的要求
  severity: error
  source: cmmlu_high_school_biology_114
- pattern: 湖泊中的.*大鱼吃小鱼.*小鱼吃虾.*构成食物链
  correct: 食物链的起点是生产者，'大鱼吃小鱼、小鱼吃虾'缺少生产者，不能构成完整的食物链
  description: 误以为捕食关系即构成食物链，忽略了食物链必须从生产者开始
  severity: error
  source: cmmlu_high_school_biology_114
- pattern: 退耕还湖引发的群落演替属于初生演替
  correct: 退耕还湖是在原有土壤条件基本保留的地方进行的演替，属于次生演替
  description: 误以为退耕还湖是从无生命开始的初生演替，混淆了初生演替与次生演替的条件
  severity: error
  source: cmmlu_high_school_biology_114
- pattern: 胰岛素受体蛋白.*转运葡萄糖
  correct: 胰岛素受体蛋白是信号转导蛋白，识别并结合胰岛素，不直接转运葡萄糖
  description: 误以为胰岛素受体蛋白具有转运葡萄糖的功能
  severity: error
  source: cmmlu_high_school_biology_115
- pattern: 原核细胞.*没有膜蛋白
  correct: 原核细胞有细胞膜，膜上存在膜蛋白，如转运蛋白、酶等
  description: 误以为原核细胞没有膜蛋白
  severity: error
  source: cmmlu_high_school_biology_115
- pattern: 光合膜.*膜蛋白.*吸收.*转化光能
  correct: 光合膜上的色素（如叶绿素）吸收光能，膜蛋白参与光能转化（如电子传递），但吸收光能主要由色素完成
  description: 误以为膜蛋白直接吸收和转化光能，忽略了色素的作用
  severity: error
  source: cmmlu_high_school_biology_115
- pattern: 健那绿.*清水.*洗去浮色
  correct: 用健那绿染液染色后不需要用清水洗去浮色，直接观察即可
  description: 误以为健那绿染色后需要清水漂洗去除浮色
  severity: error
  source: cmmlu_high_school_biology_116
- pattern: Rloop.*嘌呤.*等于.*嘧啶
  correct: Rloop结构是RNA-DNA杂合链，其中RNA链和DNA链的碱基互补配对，但嘌呤和嘧啶总数不一定相等
  description: 误以为Rloop结构中嘌呤碱基总数一定等于嘧啶碱基总数
  severity: error
  source: cmmlu_high_school_biology_117
- pattern: Rloop.*碱基.*五碳糖.*磷酸二酯键
  correct: 碱基与五碳糖通过糖苷键连接，磷酸二酯键连接的是核苷酸之间的磷酸和五碳糖
  description: 混淆了碱基与五碳糖的连接方式与核苷酸之间的连接方式
  severity: error
  source: cmmlu_high_school_biology_117
- pattern: Rloop.*DNA单链.*转录.*mRNA
  correct: Rloop结构中的DNA单链是模板链的互补链，其序列与模板链互补，转录需要以模板链为模板，因此该单链转录出的RNA与正常mRNA序列不同
  description: 误以为Rloop结构中的DNA单链可以转录形成正常的mRNA
  severity: error
  source: cmmlu_high_school_biology_117
- pattern: 载体.*识别.*激素
  correct: 激素识别依赖细胞膜上的受体，而非载体；载体主要参与物质运输
  description: 误以为载体蛋白能识别激素并传递信息
  severity: error
  source: cmmlu_high_school_biology_118
- pattern: 兴奋.*传导.*不能体现.*选择透过性
  correct: 兴奋在神经纤维上的传导涉及离子通道的开闭和离子跨膜运输，体现了细胞膜的选择透过性
  description: 误以为兴奋传导与细胞膜选择透过性无关
  severity: error
  source: cmmlu_high_school_biology_118
- pattern: 细胞癌变.*糖蛋白增加
  correct: 细胞癌变后细胞膜上糖蛋白减少，导致癌细胞间黏着性降低
  description: 误以为癌变后糖蛋白增加
  severity: error
  source: cmmlu_high_school_biology_118
- pattern: OMP.*生物致癌因子
  correct: OMP过量添加可能增加患癌风险，但OMP本身是蛋白质，不属于生物致癌因子（如病毒、细菌等）
  description: 误将化学物质或蛋白质类致癌物归为生物致癌因子
  severity: error
  source: cmmlu_high_school_biology_119
- pattern: OMP.*所有体细胞.*核糖体.*合成
  correct: OMP（胰岛素样生长因子）是一种分泌蛋白，只在特定细胞（如肝脏等）的核糖体上合成，并非所有体细胞
  description: 误以为所有蛋白质都能在所有体细胞中合成，忽略了基因的选择性表达
  severity: error
  source: cmmlu_high_school_biology_119
- pattern: 氮.*主要存在于R基
  correct: 蛋白质中的氮主要存在于肽键（-CO-NH-）中，而非R基
  description: 误以为蛋白质中的氮主要存在于R基，实际上肽键是氮的主要存在部位
  severity: error
  source: cmmlu_high_school_biology_119
- pattern: 男性患者.*致病基因.*全来自于其母亲
  correct: 男性患者的致病基因可能全部来自母亲，也可能部分来自父亲
  description: 误以为男性患者的致病基因不可能全部来自母亲
  severity: error
  source: cmmlu_high_school_biology_120
- pattern: 蛋白质合成所需的酶
  correct: 体外合成多肽链需要核糖体、tRNA、氨基酸、mRNA和能量，但不需要额外添加酶，因为细胞裂解液已提供所需酶
  description: 误以为体外合成多肽链必须额外添加蛋白质合成所需的酶
  severity: error
  source: cmmlu_high_school_biology_121
- pattern: 同位素标记的tRNA
  correct: 同位素标记应标记在氨基酸上，而非tRNA，因为tRNA只起转运作用，标记tRNA无法使多肽链带上同位素
  description: 误以为标记tRNA可使多肽链带上同位素标记
  severity: error
  source: cmmlu_high_school_biology_121
- pattern: 转运20种氨基酸的tRNA总共有64种
  correct: tRNA种类通常多于20种但少于64种，每种氨基酸对应一种或多种tRNA，64种对应密码子数，但tRNA通过摇摆配对识别密码子，实际种类少于64种
  description: 误以为tRNA种类等于密码子数量（64种），实际上tRNA通过摇摆配对识别多个密码子，种类少于64种
  severity: error
  source: cmmlu_high_school_biology_122
- pattern: 线粒体.*叶绿体.*核糖体.*A—T.*U—A
  correct: 核糖体是RNA-蛋白质复合体，不含DNA，不存在A—T配对；线粒体和叶绿体中有DNA，存在A—T配对，但U—A配对仅出现在RNA中
  description: 误以为核糖体中也存在A—T和U—A配对，实际上核糖体不含DNA，只有RNA，仅存在U—A配对
  severity: error
  source: cmmlu_high_school_biology_122
- pattern: 基因的两条链.*分别作为模板.*转录
  correct: 转录时通常只以基因的一条链（模板链）为模板，另一条链（编码链）不转录
  description: 误以为基因的两条链都可以作为模板进行转录，实际上转录具有方向性，只以一条链为模板
  severity: error
  source: cmmlu_high_school_biology_122
- pattern: 都有9种基因型
  correct: 由于DD纯合致死，F1成熟植株有6种基因型，F2成熟植株有6种基因型
  description: 误以为两对基因独立遗传时，自交和随机交配后代成熟植株都有9种基因型，忽略了DD纯合致死的条件
  severity: error
  source: cmmlu_high_school_biology_123
- pattern: 有茸毛与无茸毛比分别为2∶1和2∶3
  correct: F1成熟植株中有茸毛与无茸毛比为2:1，F2成熟植株中有茸毛与无茸毛比为1:1
  description: 误以为F2成熟植株中有茸毛与无茸毛比为2:3，实际应为1:1
  severity: error
  source: cmmlu_high_school_biology_123
- pattern: 高产抗病类型分别占1/3和1/10
  correct: F1成熟植株中高产抗病类型占1/3，F2成熟植株中高产抗病类型占1/4
  description: 误以为F2成熟植株中高产抗病类型占1/10，实际应为1/4
  severity: error
  source: cmmlu_high_school_biology_123
- pattern: 维生素D.*不属于固醇
  correct: 维生素D和性激素都属于固醇类物质
  description: 误以为维生素D和性激素不属于固醇类
  severity: error
  source: cmmlu_high_school_biology_124
- pattern: 脂质.*核糖体.*合成
  correct: 脂质在内质网合成，核糖体是合成蛋白质的场所
  description: 误以为脂质在核糖体上合成
  severity: error
  source: cmmlu_high_school_biology_124
- pattern: 脂肪.*彻底氧化.*产能少
  correct: 脂肪比相同质量的多糖彻底氧化产能更多
  description: 误以为脂肪氧化产能少于多糖
  severity: error
  source: cmmlu_high_school_biology_124
- pattern: GC重复序列.*更稳定
  correct: GC重复序列过多会导致DNA与蛋白质结合异常，形成缢沟，使染色体结构不稳定
  description: 误以为GC重复序列增加DNA稳定性，实际上过量重复会导致结构异常
  severity: error
  source: cmmlu_high_school_biology_125
- pattern: 免疫系统.*不能清除.*异常细胞
  correct: 免疫系统能清除体内的异常细胞，如癌变细胞
  description: 误以为免疫系统只能消灭外来病原体，不能清除体内异常细胞
  severity: error
  source: cmmlu_high_school_biology_126
- pattern: 免疫系统.*不受神经调节.*不受体液调节
  correct: 免疫系统受神经调节和体液调节，三者共同维持内环境稳态
  description: 误以为免疫系统独立于神经调节和体液调节
  severity: error
  source: cmmlu_high_school_biology_126
- pattern: 类风湿性关节炎.*自身免疫病
  correct: 类风湿性关节炎是自身免疫病，但获得性免疫缺陷综合征（艾滋病）不是自身免疫病，而是免疫缺陷病
  description: 误以为获得性免疫缺陷综合征（艾滋病）属于自身免疫病
  severity: error
  source: cmmlu_high_school_biology_126
- pattern: 单侧光.*胚芽鞘.*向光弯曲.*去尖端.*不生长
  correct: 该实验证明胚芽鞘尖端是感光部位，但不能证明生长素具有极性运输的特点
  description: 误以为胚芽鞘向光弯曲实验能证明生长素的极性运输
  severity: error
  source: cmmlu_high_school_biology_127
- pattern: 天竺葵.*黑暗处理.*遮光.*曝光.*碘液.*蓝色
  correct: 该实验证明绿色植物光合作用需要光，并能产生淀粉，但不能直接证明场所是叶绿体
  description: 误以为天竺葵叶片遮光实验能证明光合作用的场所是叶绿体
  severity: error
  source: cmmlu_high_school_biology_127
- pattern: R型肺炎双球菌.*加热杀死.*S型.*混合.*小鼠死亡
  correct: 该实验证明加热杀死的S型细菌中含有转化因子，但不能直接证明DNA是遗传物质
  description: 误以为格里菲斯肺炎双球菌体内转化实验能证明DNA是遗传物质
  severity: error
  source: cmmlu_high_school_biology_127
- pattern: DNA的复制.*细胞器
  correct: DNA复制主要发生在细胞核（真核细胞）或拟核（原核细胞），线粒体和叶绿体中的DNA复制也在细胞器内发生
  description: 误以为DNA复制一定不在细胞器中发生，实际上线粒体和叶绿体等细胞器内也有DNA复制
  severity: error
  source: cmmlu_high_school_biology_128
- pattern: 衰老细胞器.*水解.*细胞器
  correct: 衰老细胞器的水解发生在溶酶体中，溶酶体是细胞器
  description: 误以为衰老细胞器的水解不在细胞器中发生，实际上溶酶体是负责水解的细胞器
  severity: error
  source: cmmlu_high_school_biology_128
- pattern: 肽键.*形成.*细胞器
  correct: 肽键的形成发生在核糖体上，核糖体是细胞器
  description: 误以为肽键形成不在细胞器中发生，实际上核糖体是合成肽键的细胞器
  severity: error
  source: cmmlu_high_school_biology_128
- pattern: 肾上腺素.*呼吸频率减慢
  correct: 肾上腺素分泌增加会使动物警觉性提高、呼吸频率加快、心率加快
  description: 误以为肾上腺素会减慢呼吸频率和心率
  severity: error
  source: cmmlu_high_school_biology_129
- pattern: 肾上腺素.*心率减慢
  correct: 肾上腺素分泌增加会使动物警觉性提高、呼吸频率加快、心率加快
  description: 误以为肾上腺素会减慢心率
  severity: error
  source: cmmlu_high_school_biology_129
- pattern: IGF1.*生物致癌因子
  correct: IGF1过量增加癌症风险属于化学致癌因子（化学物质），而非生物致癌因子（如病毒、细菌）
  description: 误将化学物质IGF1归类为生物致癌因子
  severity: error
  source: cmmlu_high_school_biology_130
- pattern: 细胞内液Na＋的增加远大于细胞外液Na＋的增加
  correct: 静脉滴注生理盐水后，Na+主要分布在细胞外液，细胞内液Na+增加很少
  description: 误以为静脉输入的Na+会大量进入细胞内液
  severity: error
  source: cmmlu_high_school_biology_131
- pattern: 输入的Na＋中50%进入细胞内液，50%分布在细胞外液
  correct: Na+主要分布在细胞外液，静脉输入的Na+不会等量进入细胞内液
  description: 误以为Na+在细胞内液和细胞外液均匀分布
  severity: error
  source: cmmlu_high_school_biology_131
- pattern: 细胞内液和细胞外液分别增加10 mL
  correct: 静脉滴注的生理盐水主要进入细胞外液，不会等量分布到细胞内液和细胞外液
  description: 误以为输入液体在细胞内液和细胞外液均匀分配
  severity: error
  source: cmmlu_high_school_biology_131
- pattern: 复制.*子代DNA.*两条单链.*只有一条.*和亲代.*完全相同
  correct: DNA半保留复制时，子代DNA分子的两条单链中，一条来自亲代，一条是新合成的，因此每条子代DNA都有一条链与亲代DNA完全相同
  description: 误以为DNA复制后只有一条子代链与亲代相同，实际上每条子代DNA都含有一条亲代链
  severity: error
  source: cmmlu_high_school_biology_132
- pattern: HIV.*高度变异性.*疫苗效果难以持久
  correct: HIV的高度变异性是疫苗研发困难的原因之一，但疫苗效果难以持久并非仅因高度变异性，还与病毒逃避免疫机制有关
  description: 误以为HIV高度变异性直接导致疫苗效果难以持久，忽略了其他免疫逃逸机制
  severity: warning
  source: cmmlu_high_school_biology_133
- pattern: HIV.*破坏免疫系统.*无体液免疫应答
  correct: HIV感染后机体仍存在体液免疫应答，可通过检测抗体来诊断HIV感染
  description: 误以为HIV破坏免疫系统后机体完全丧失体液免疫应答，无法通过抗体检测诊断
  severity: error
  source: cmmlu_high_school_biology_133
- pattern: 无氧呼吸.*丙酮酸.*不能生成ATP
  correct: 无氧呼吸第一阶段（葡萄糖分解为丙酮酸）能生成少量ATP
  description: 误以为无氧呼吸产生丙酮酸的过程不生成ATP
  severity: error
  source: cmmlu_high_school_biology_134
- pattern: 无氧呼吸.*产物.*乳酸.*葡萄
  correct: 马铃薯块茎无氧呼吸的产物是乳酸，不产生酒精和二氧化碳
  description: 误以为马铃薯块茎无氧呼吸产物包括酒精或葡萄糖
  severity: error
  source: cmmlu_high_school_biology_134
- pattern: 氧气浓度.*升高.*增加酸味
  correct: 氧气浓度升高会抑制无氧呼吸，减少乳酸产生，从而减轻酸味
  description: 误以为氧气浓度升高会促进无氧呼吸产生酸味
  severity: error
  source: cmmlu_high_school_biology_134
- pattern: 食物链.*能量.*流动
  correct: 在食物链和食物网中，能量流动是单向的，但物质流动是循环的
  description: 误以为物质在食物链中也是单向流动，实际上物质是循环利用的
  severity: error
  source: cmmlu_high_school_biology_135
- pattern: 神经元.*兴奋.*传递
  correct: 在两个神经元之间，兴奋通过突触单向传递
  description: 误以为兴奋在神经元之间可以双向传递
  severity: error
  source: cmmlu_high_school_biology_135
- pattern: 核糖体.*mRNA.*移动
  correct: 蛋白质合成过程中，核糖体在mRNA上沿5'→3'方向单向移动
  description: 误以为核糖体在mRNA上的移动是双向的
  severity: error
  source: cmmlu_high_school_biology_135
- pattern: 菌剂.*减少.*残留农药.*阻碍.*物质循环
  correct: 微生物分解农药属于物质循环的一部分，菌剂促进而非阻碍物质循环
  description: 误以为减少残留农药会阻碍物质循环，实际上微生物分解农药本身就是物质循环的过程
  severity: error
  source: cmmlu_high_school_biology_136
- pattern: 加料酒.*灭菌
  correct: 加料酒主要作用是调味和抑制微生物生长，而非灭菌
  description: 误以为料酒在腐乳制作中的主要作用是灭菌
  severity: error
  source: cmmlu_high_school_biology_137
- pattern: 发酵.*主要作用.*乳酸杆菌
  correct: 腐乳发酵过程中起主要作用的是毛霉等霉菌，而非乳酸杆菌
  description: 误以为腐乳发酵主要由乳酸杆菌完成
  severity: error
  source: cmmlu_high_school_biology_137
- pattern: 加盐.*调节水分.*毛霉生长
  correct: 加盐主要作用是抑制微生物生长、调味和析出水分，而非促进毛霉生长
  description: 误以为加盐是为了调节水分以利于毛霉生长
  severity: error
  source: cmmlu_high_school_biology_137
- pattern: 黄色血蚕的基因型有2种
  correct: 黄色血蚕的基因型有4种，即YYii、Yyii、YYIi、YyIi（其中Ii为杂合抑制基因时仍表现黄色）
  description: 误以为黄色血蚕只有两种基因型，忽略了抑制基因杂合时仍可表现黄色的情况
  severity: error
  source: cmmlu_high_school_biology_138
- pattern: 白色血蚕的基因型有7种
  correct: 白色血蚕的基因型有5种，包括yyii、yyIi、yyII、YyII、YYII
  description: 误以为白色血蚕有7种基因型，实际只有5种
  severity: error
  source: cmmlu_high_school_biology_138
- pattern: 凝胶色谱.*血红蛋白.*移动慢
  correct: 在凝胶色谱法中，分子量大的蛋白质移动快，先被洗脱出来
  description: 误以为分子量大的蛋白质在凝胶色谱中移动更慢
  severity: error
  source: cmmlu_high_school_biology_139
- pattern: 青蛙.*J型曲线增长
  correct: 自然条件下，青蛙种群增长通常呈S型曲线，受环境容纳量限制
  description: 误以为自然种群（如青蛙）在湿地公园中呈J型指数增长
  severity: error
  source: cmmlu_high_school_biology_140
- pattern: 观赏价值.*间接价值
  correct: 湿地公园的观赏价值体现了生物多样性的直接价值（如美学价值），而非间接价值
  description: 混淆了生物多样性的直接价值（观赏、药用等）与间接价值（生态功能）
  severity: error
  source: cmmlu_high_school_biology_140
- pattern: 清除其他树种.*抵抗力稳定性提高
  correct: 清除其他树种会降低物种多样性，从而降低生态系统的抵抗力稳定性
  description: 误以为人工清除其他树种、提高单一速生树数量能增强生态系统抵抗力稳定性
  severity: error
  source: cmmlu_high_school_biology_140
- pattern: 蛋白质变性剂.*提高.*离子泵
  correct: 蛋白质变性剂会使离子泵变性失活，降低其跨膜运输离子的速率
  description: 误以为蛋白质变性剂能提高离子泵活性
  severity: error
  source: cmmlu_high_school_biology_141
- pattern: 离子泵.*协助扩散
  correct: 离子泵利用ATP水解供能进行主动运输，不是协助扩散
  description: 误将离子泵的主动运输归为协助扩散
  severity: error
  source: cmmlu_high_school_biology_141
- pattern: 离子泵.*顺着浓度梯度
  correct: 离子泵跨膜运输离子是逆浓度梯度进行的主动运输
  description: 误以为离子泵运输是顺浓度梯度
  severity: error
  source: cmmlu_high_school_biology_141
- pattern: 盐酸.*DNA.*吡罗红
  correct: 盐酸处理染色质能促进DNA与甲基绿结合，而不是与吡罗红结合
  description: 误以为盐酸处理染色质能促进DNA与吡罗红结合
  severity: error
  source: cmmlu_high_school_biology_142
- pattern: 高温.*酶失活.*冷水.*去污.*比温水好
  correct: 酶在适宜温度下活性最高，温水通常比冷水去污效果更好
  description: 误以为酶在高温下失活后，冷水洗涤效果优于温水
  severity: error
  source: cmmlu_high_school_biology_143
- pattern: 洗衣粉中酶.*分解.*溶在水里.*污渍
  correct: 加酶洗衣粉中的酶主要分解衣物上的污渍，而非溶解在水中的污渍
  description: 误以为酶主要作用于已溶解在水中的污渍
  severity: error
  source: cmmlu_high_school_biology_143
- pattern: 叶绿体.*干扰.*质壁分离
  correct: 黑藻叶片中叶绿体可作为参照物，便于观察质壁分离现象
  description: 误以为叶绿体会干扰质壁分离实验的观察
  severity: error
  source: cmmlu_high_school_biology_144
- pattern: 抗利尿激素分泌减少
  correct: 静脉注射高渗葡萄糖导致血糖升高，肾小管中葡萄糖超过重吸收阈值，管腔液渗透压升高，阻碍水重吸收，而非抗利尿激素分泌减少
  description: 误以为高渗葡萄糖注射直接抑制抗利尿激素分泌导致多尿
  severity: error
  source: cmmlu_high_school_biology_145
- pattern: 肾小管对水的重吸收速率增加
  correct: 肾小管中高渗葡萄糖使管腔液渗透压升高，反而减少水的重吸收
  description: 误以为血糖升高会促进肾小管重吸收水
  severity: error
  source: cmmlu_high_school_biology_145
- pattern: 胰岛素分泌增加
  correct: 静脉注射高渗葡萄糖虽可刺激胰岛素分泌，但尿量增多主要原因是肾小管中葡萄糖超负荷导致渗透性利尿
  description: 误以为胰岛素分泌增加直接导致多尿
  severity: error
  source: cmmlu_high_school_biology_145
- pattern: K.*进出胃壁细胞.*跨膜运输方式相同
  correct: K+进入胃壁细胞是主动运输（通过质子泵），出胃壁细胞是协助扩散（通过通道蛋白），两种方式不同
  description: 误以为K+进出胃壁细胞的方式相同，忽略了质子泵驱动K+内流是主动运输，而K+外流是顺浓度梯度的协助扩散
  severity: error
  source: cmmlu_high_school_biology_146
- pattern: 磷酸和核糖.*氢键
  correct: 双链DNA分子中一条链上的磷酸和脱氧核糖是通过磷酸二酯键连接的
  description: 误以为DNA链内磷酸和核糖（应为脱氧核糖）之间通过氢键连接
  severity: error
  source: cmmlu_high_school_biology_147
- pattern: 向日葵.*花盘.*跟着太阳转.*生长素
  correct: 向日葵花盘向光转动主要是由生长素分布不均引起的向光性生长，但花盘转动还涉及其他因素如叶枕的膨压变化
  description: 误以为向日葵花盘跟着太阳转完全由生长素调节
  severity: warning
  source: cmmlu_high_school_biology_148
- pattern: 两对基因显性纯合致死
  correct: 该杂交结果中只有一对基因（眼型基因）存在显性纯合致死，另一对基因（翅型）无纯合致死
  description: 误以为两对基因都存在显性纯合致死，实际只有眼型基因显性纯合致死
  severity: error
  source: cmmlu_high_school_biology_149
- pattern: 决定眼型的基因位于常染色体
  correct: 决定眼型的基因位于X染色体上，因为子代雌雄眼型比例不同
  description: 误以为眼型基因在常染色体上，实际根据子代性别差异可判断为伴X遗传
  severity: error
  source: cmmlu_high_school_biology_149
- pattern: 固定化细胞.*催化.*各种反应底物
  correct: 固定化细胞通常只能催化特定底物的一系列反应，因为细胞内的酶系具有底物特异性
  description: 误以为固定化细胞可以催化任意反应底物的一系列反应
  severity: error
  source: cmmlu_high_school_biology_150
- pattern: 反应产物.*固定化酶.*没有影响
  correct: 反应产物可能对固定化酶的活性产生影响，例如产物抑制或改变反应条件
  description: 误以为反应产物不会影响固定化酶的活性
  severity: error
  source: cmmlu_high_school_biology_150
- pattern: 葡萄糖异构酶.*固定前后.*专一性不同
  correct: 葡萄糖异构酶固定前后专一性不变，固定化不改变酶的专一性
  description: 误以为固定化会改变酶的专一性
  severity: error
  source: cmmlu_high_school_biology_150
- pattern: 插入DNA.*碱基对.*使DNA双链不能解开
  correct: 该物质通过阻止DNA双链解开，抑制DNA复制和转录，从而将细胞周期阻断在DNA复制前的间期（G1/S期），而非分裂中期
  description: 误以为DNA双链不能解开会直接阻断分裂中期，实际上分裂中期需要的是染色体排列和纺锤体牵引，而非DNA解旋
  severity: error
  source: cmmlu_high_school_biology_151
- pattern: 该物质.*对癌细胞的增殖有抑制作用
  correct: 该物质通过抑制DNA复制和转录，确实能抑制包括癌细胞在内的所有增殖细胞的增殖
  description: 误以为该物质对癌细胞增殖无抑制作用，实际上任何阻断DNA复制的物质都会抑制细胞增殖
  severity: error
  source: cmmlu_high_school_biology_151
- pattern: 天竺葵叶.*质壁分离
  correct: 天竺葵叶细胞含有叶绿体，颜色干扰观察质壁分离，应选用紫色洋葱等有色素且无叶绿体的细胞
  description: 误以为天竺葵叶适合观察质壁分离，实际其叶绿体颜色会干扰观察
  severity: error
  source: cmmlu_high_school_biology_152
- pattern: 水稻胚乳.*脂肪
  correct: 水稻胚乳主要含淀粉，脂肪含量低，不适合观察脂肪；花生子叶富含脂肪
  description: 误以为水稻胚乳适合观察脂肪，实际其主要成分是淀粉
  severity: error
  source: cmmlu_high_school_biology_152
- pattern: 水稻胚乳.*RNA
  correct: 水稻胚乳细胞中RNA含量较低，且胚乳为储存组织，不适合观察RNA；应选用代谢旺盛的细胞
  description: 误以为水稻胚乳适合观察RNA，实际其RNA含量低
  severity: error
  source: cmmlu_high_school_biology_152
- pattern: 清除被病原体感染细胞.*不存在细胞凋亡
  correct: 清除被病原体感染的细胞过程中存在细胞凋亡现象
  description: 误以为清除被病原体感染的细胞不涉及细胞凋亡
  severity: error
  source: cmmlu_high_school_biology_153
- pattern: 胎儿手.*发育.*不会发生细胞凋亡
  correct: 胎儿手的发育过程中会发生细胞凋亡，例如手指分离
  description: 误以为胎儿手发育过程中没有细胞凋亡
  severity: error
  source: cmmlu_high_school_biology_153
- pattern: 细胞凋亡.*属于细胞坏死
  correct: 细胞凋亡是基因决定的程序性死亡，与细胞坏死不同
  description: 混淆细胞凋亡与细胞坏死，认为细胞凋亡属于坏死
  severity: error
  source: cmmlu_high_school_biology_153
- pattern: 放射性细胞数量.*逐代减少
  correct: 放射性DNA分子数与所有细胞总DNA分子数之比逐代减少，但放射性细胞数量不一定逐代减少
  description: 误以为放射性标记的细胞数量会逐代减少，实际上放射性DNA分子比例减少，但细胞可能仍含放射性DNA
  severity: error
  source: cmmlu_high_school_biology_154
- pattern: 非同源染色体自由组合.*放射性
  correct: 非同源染色体自由组合发生在减数分裂，而本题为有丝分裂，不涉及自由组合
  description: 误将有丝分裂中DNA标记的分配与减数分裂中的自由组合混淆
  severity: error
  source: cmmlu_high_school_biology_154
- pattern: 姐妹染色单体均分.*放射性
  correct: 姐妹染色单体均分到两极不能保证放射性DNA均匀分配，因为DNA半保留复制导致放射性链分布不均
  description: 误以为姐妹染色单体均分就能确定放射性细胞数，忽略了半保留复制的影响
  severity: error
  source: cmmlu_high_school_biology_154
- pattern: 一次性加入.*乙醇.*研磨
  correct: 研磨时应分次加入乙醇，以保证充分提取色素
  description: 误以为一次性加入全部溶剂研磨效果最好，实际分次加入更利于色素提取
  severity: error
  source: cmmlu_high_school_biology_155
- pattern: 研磨叶片后立即加入CaCO3
  correct: CaCO3应在研磨前与叶片一起加入，以中和细胞液中的酸，防止叶绿素被破坏
  description: 误以为CaCO3在研磨后加入仍有效，实际应在研磨前加入
  severity: error
  source: cmmlu_high_school_biology_155
- pattern: 叶绿素条带.*挥发消失
  correct: 层析后叶绿素条带不会挥发消失，但色素可能因光照或氧化而分解褪色
  description: 误以为叶绿素条带会随溶液挥发消失，实际色素不挥发，但可能分解
  severity: error
  source: cmmlu_high_school_biology_155
- pattern: 前者为倒金字塔形，后者为倒金字塔形
  correct: 夏季草原生态系统中牧草个体数远多于羊，呈金字塔形；森林生态系统中乔木个体数少于昆虫，呈倒金字塔形
  description: 误以为所有生态系统数量金字塔都是倒金字塔形
  severity: error
  source: cmmlu_high_school_biology_156
- pattern: 前者为倒金字港形，后者为金字塔形
  correct: 夏季草原生态系统中牧草个体数远多于羊，呈金字塔形；森林生态系统中乔木个体数少于昆虫，呈倒金字塔形
  description: 误以为草原生态系统数量金字塔是倒金字塔形，森林是金字塔形
  severity: error
  source: cmmlu_high_school_biology_156
- pattern: 前者为金字塔形，后者为金字塔形
  correct: 森林生态系统中乔木个体数少于昆虫，数量金字塔呈倒金字塔形
  description: 误以为所有生态系统数量金字塔都是金字塔形
  severity: error
  source: cmmlu_high_school_biology_156
- pattern: 摩尔根.*类比推理法
  correct: 摩尔根证明基因在染色体上采用的是假说—演绎法
  description: 误以为摩尔根证明基因在染色体上使用了类比推理法
  severity: error
  source: cmmlu_high_school_biology_157
- pattern: 研究细胞有丝分裂的周期.*假说—演绎法
  correct: 研究细胞有丝分裂的周期通常采用观察法或实验法，而非假说—演绎法
  description: 误以为研究细胞周期使用假说—演绎法
  severity: error
  source: cmmlu_high_school_biology_157
- pattern: 研究DNA分子双螺旋结构.*数学模型构建法
  correct: 研究DNA分子双螺旋结构主要采用物理模型构建法
  description: 误以为DNA双螺旋结构的研究使用了数学模型构建法
  severity: error
  source: cmmlu_high_school_biology_157
- pattern: 标志重捕法.*标志物脱落.*偏大
  correct: 标志重捕法调查种群密度时，部分标志物脱落会导致重捕个体中标志个体比例偏低，计算所得数值偏大
  description: 误以为标志物脱落会使种群密度估计值偏小
  severity: error
  source: cmmlu_high_school_biology_158
- pattern: 95%乙醇.*无水Na2CO3.*提高色素溶解度
  correct: 在95%乙醇中加入无水Na2CO3可吸收水分，提高乙醇纯度，但并不能直接提高色素的溶解度
  description: 误以为加入无水Na2CO3能提高色素在乙醇中的溶解度
  severity: error
  source: cmmlu_high_school_biology_158
- pattern: 光学显微镜.*观察.*质壁分离
  correct: 光学显微镜可用于观察植物细胞的质壁分离现象
  description: 误以为光学显微镜不能观察质壁分离
  severity: warning
  source: cmmlu_high_school_biology_158
- pattern: 绿叶中色素的提取.*酒精
  correct: 绿叶中色素的提取用无水乙醇溶解色素，检测生物组织中的脂肪用50%酒精洗去浮色，两者作用不同
  description: 误以为绿叶中色素提取和脂肪检测中酒精的作用相同
  severity: error
  source: cmmlu_high_school_biology_159
- pattern: 检测生物组织中的还原糖.*CuSO4
  correct: 检测还原糖用斐林试剂（CuSO4与NaOH混合后使用），检测蛋白质用双缩脲试剂（CuSO4在碱性条件下与肽键反应），两者CuSO4的作用不同
  description: 误以为还原糖和蛋白质检测中CuSO4的作用相同
  severity: error
  source: cmmlu_high_school_biology_159
- pattern: 体验制备细胞膜的方法.*蒸馏水
  correct: 体验制备细胞膜用蒸馏水使细胞吸水涨破，显微镜观察叶绿体用清水或生理盐水保持细胞活性，两者作用不同
  description: 误以为制备细胞膜和观察叶绿体中蒸馏水的作用相同
  severity: error
  source: cmmlu_high_school_biology_159
- pattern: 流经.*湖泊.*总能量.*生产者.*固定.*太阳能总量
  correct: 流经该湖泊的总能量包括生产者固定的太阳能和人工投饵中的化学能
  description: 误以为流经人工投饵湖泊的总能量只有生产者固定的太阳能，忽略了人工输入的能量
  severity: error
  source: cmmlu_high_school_biology_160
- pattern: 生物大分子.*载体蛋白.*转运.*消耗能量
  correct: 生物大分子如蛋白质、核酸等不能通过载体蛋白转运进入细胞，它们通过胞吞等方式进入
  description: 误以为所有生物大分子都通过载体蛋白主动运输进入细胞
  severity: error
  source: cmmlu_high_school_biology_161
- pattern: 生物大分子合成.*都需要模板
  correct: 并非所有生物大分子合成都需要模板，如糖原、淀粉的合成不需要模板
  description: 误以为所有生物大分子合成都需要模板
  severity: error
  source: cmmlu_high_school_biology_161
- pattern: 生物大分子.*都由单体组成.*元素.*C、H、O、N
  correct: 生物大分子不一定都由单体组成，且组成元素不一定都含N，如糖类只有C、H、O
  description: 误以为所有生物大分子都由单体组成且都含C、H、O、N
  severity: error
  source: cmmlu_high_school_biology_161
- pattern: 减数第二次分裂前期.*只有染色体
  correct: 减数第二次分裂前期也有纺锤体出现
  description: 误以为减数第二次分裂前期没有纺锤体
  severity: error
  source: cmmlu_high_school_biology_162
- pattern: 间期.*复制.*原料.*脱氧核苷酸.*氨基酸
  correct: 间期DNA复制原料为脱氧核苷酸，蛋白质合成原料为氨基酸，但两者间期相关复制的原料不同
  description: 误以为间期DNA复制和蛋白质合成原料相同
  severity: error
  source: cmmlu_high_school_biology_162
- pattern: 有丝分裂中期.*减数第二次分裂中期.*染色体行为不同
  correct: 有丝分裂中期和减数第二次分裂中期染色体行为相似，均排列在赤道板上
  description: 误以为有丝分裂中期和减数第二次分裂中期染色体行为不同
  severity: error
  source: cmmlu_high_school_biology_162
- pattern: 平堤行洪.*退田还湖.*移民建镇
  correct: 平堤行洪、退田还湖、移民建镇是湿地恢复工程的重要方针
  description: 误以为该方针不是湿地恢复工程的重要方针
  severity: error
  source: cmmlu_high_school_biology_163
- pattern: 朊粒.*增殖方式.*肺炎双球菌.*相同
  correct: 朊粒通过诱导蛋白质构象变化增殖，而肺炎双球菌通过二分裂增殖，两者方式不同
  description: 误以为朊粒的增殖方式与细菌的细胞分裂方式相同
  severity: error
  source: cmmlu_high_school_biology_164
- pattern: 朊粒.*整合.*基因组
  correct: 朊粒是蛋白质，不能整合到宿主基因组中，只有核酸才能整合
  description: 误以为朊粒作为蛋白质可以像病毒核酸一样整合到宿主基因组
  severity: error
  source: cmmlu_high_school_biology_164
- pattern: PrPc.*PrPsc.*翻译过程
  correct: PrPc转变为PrPsc是蛋白质空间结构改变，不属于遗传信息的翻译过程
  description: 误以为蛋白质构象变化属于翻译过程
  severity: error
  source: cmmlu_high_school_biology_164
- pattern: 调节性T细胞.*增加.*提高器官移植成功率
  correct: 调节性T细胞具有抑制免疫的功能，其数量增加会抑制免疫反应，有利于提高器官移植成功率
  description: 误以为调节性T细胞数量增加会降低器官移植成功率
  severity: error
  source: cmmlu_high_school_biology_165
- pattern: Mcl1蛋白活性过高.*恶性肿瘤
  correct: Mcl1蛋白使调节性T细胞数量增加，抑制免疫，可能降低对肿瘤细胞的免疫监视，但并非直接导致恶性肿瘤
  description: 误以为Mcl1蛋白活性过高直接导致恶性肿瘤
  severity: warning
  source: cmmlu_high_school_biology_165
- pattern: ATP和葡萄糖均能为.*直接提供能源
  correct: ATP是直接能源物质，葡萄糖不能直接为生命活动提供能源，需通过细胞呼吸分解产生ATP
  description: 误以为葡萄糖可以直接为生命活动提供能量
  severity: error
  source: cmmlu_high_school_biology_166
- pattern: 在无氧条件下.*大肠杆菌能生存.*酵母菌不能生存
  correct: 酵母菌在无氧条件下能进行无氧呼吸（发酵）生存，大肠杆菌也能在无氧条件下生存
  description: 误以为酵母菌不能在无氧条件下生存
  severity: error
  source: cmmlu_high_school_biology_166
- pattern: 酵母菌的遗传物质为DNA.*大肠杆菌的遗传物质为RNA
  correct: 酵母菌和大肠杆菌的遗传物质均为DNA
  description: 误以为大肠杆菌的遗传物质是RNA
  severity: error
  source: cmmlu_high_school_biology_166
- pattern: 藓类叶片.*生理盐水
  correct: 观察叶绿体时，藓类叶片应放入清水中以保持细胞活性
  description: 误以为观察叶绿体需要用生理盐水，实际上生理盐水会使藓类细胞失水
  severity: error
  source: cmmlu_high_school_biology_167
- pattern: 斐林试剂.*先加甲液.*混合.*再加乙液
  correct: 使用斐林试剂检测还原糖时，应将甲液和乙液等量混合后立即使用
  description: 误以为斐林试剂可以分步加入，实际需现配现用、混合后加入
  severity: error
  source: cmmlu_high_school_biology_167
- pattern: 提取绿叶色素.*加蒸馏水
  correct: 提取绿叶色素时，应使用无水乙醇或丙酮等有机溶剂，而非蒸馏水
  description: 误以为色素提取可用蒸馏水，实际色素不溶于水，需用有机溶剂
  severity: error
  source: cmmlu_high_school_biology_167
- pattern: 鲁宾和卡门.*同位素标记
  correct: 鲁宾和卡门用18O标记水，证明光合作用释放的氧来自水，使用了同位素标记法
  description: 误以为鲁宾和卡门的实验没有使用同位素标记法
  severity: error
  source: cmmlu_high_school_biology_168
- pattern: 研究豚鼠胰腺腺泡细胞分泌蛋白.*同位素标记
  correct: 该实验用3H标记亮氨酸，追踪分泌蛋白的合成和运输过程，使用了同位素标记法
  description: 误以为研究分泌蛋白合成运输的实验没有使用同位素标记法
  severity: error
  source: cmmlu_high_school_biology_168
- pattern: 大肠杆菌.*半保留复制.*同位素标记
  correct: 该实验用15N标记DNA，通过密度梯度离心证实半保留复制，使用了同位素标记法
  description: 误以为证实DNA半保留复制的实验没有使用同位素标记法
  severity: error
  source: cmmlu_high_school_biology_168
