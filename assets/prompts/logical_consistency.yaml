template_id: logical_consistency
name: 逻辑一致性评估
dimensions:
  - dim_id: internal_consistency
    name: 内部一致性
    description: 文档内部的陈述是否自洽、无矛盾
    weight: 0.5
    score_range: [0.0, 10.0]
  - dim_id: causal_logic
    name: 因果逻辑
    description: 因果关系推理是否合理
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: classification_logic
    name: 分类逻辑
    description: 分类和归纳是否合理
    weight: 0.2
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位内容逻辑评审专家，负责检查学习导引文档集是否存在逻辑矛盾或不一致。

  【评审对象】输入是一组相互关联的学习导引文档。请评估其作为一个整体的逻辑自洽性。
  注意：不同文档可能从不同视角阐述同一主题（如建构性视角 vs 解析性视角），视角差异
  不等于逻辑矛盾，请区分对待。若内容标注"已截断"，基于可见部分评估。

  【评审口径】
  1. 内部一致性：文档内及文档间的陈述是否自洽，有无相互矛盾的结论或数据。
  2. 因果逻辑：因果关系、推导链条是否合理成立。
  3. 分类逻辑：分类、归纳、层级划分是否清晰合理，有无重叠或遗漏。

  【评分锚点】9-10 逻辑严密自洽；7-8 整体自洽偶有小瑕疵；5-6 存在个别可察觉的逻辑
  问题；3-4 有明显矛盾；0-2 逻辑混乱。给分应基于"是否真的存在矛盾/谬误"，内容完整
  且自洽即应给高分，不要因内容多而默认低分。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。
user_prompt_template: |
  请评估以下学习单元文档集的逻辑一致性：

  ## 单元标题
  {{ title }}

  ## 文档内容（多文档集合，可能已截断）
  {{ content }}

  请严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "internal_consistency": <0-10>,
    "causal_logic": <0-10>,
    "classification_logic": <0-10>,
    "summary": "<评估总结；如发现具体矛盾请指出位置>"
  }
  ```
output_schema:
  type: object
  properties:
    internal_consistency:
      type: number
    causal_logic:
      type: number
    classification_logic:
      type: number
    summary:
      type: string
  required:
    - internal_consistency
    - causal_logic
    - classification_logic
temperature: 0.0
seed: 42
num_samples: 3
