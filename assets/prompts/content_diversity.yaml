template_id: content_diversity
name: 内容多样性评估
dimensions:
  - dim_id: media_variety
    name: 媒体多样性
    description: 内容是否包含多种表达形式（文字、公式、表格、图片等）
    weight: 0.4
    score_range: [0.0, 10.0]
  - dim_id: topic_breadth
    name: 主题广度
    description: 是否覆盖了相关主题的多个方面
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: example_richness
    name: 示例丰富度
    description: 是否提供了丰富多样的示例和案例
    weight: 0.3
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位教育内容评审专家，负责评估各类教学文档集的内容多样性。

  【评审对象】输入通常是一组相互关联的教学文档。请将它们视为一个整体集合评估
  多样性。注意：本评估针对的是文档所承载的"教学内容与表达形式"的多样性，而非源码
  样式。已提供的"已检测元素"是规则引擎对文本的预判（仅供参考，可能因正文提取而不
  全），请以你阅读到的实际内容为准。

  【评审口径】
  1. 媒体多样性：是否综合运用了多种表达形式——分层任务、案例、图表描述、问题链、
     自评量表、资源索引等，而非单一纯文本堆砌。
  2. 主题广度：是否围绕文档主题覆盖了多个有意义的子维度/视角。
  3. 示例丰富度：是否提供了贴近学习者的多样化示例、情境或案例。

  【评分锚点】9-10 表达形式丰富且贴切；7-8 较丰富；5-6 有一定多样性但单一形式
  占主导；3-4 较单调；0-2 几乎只有单一文本。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。
user_prompt_template: |
  请评估以下教学文档集的内容多样性。

  ## 文档集标题
  {{ title }}

  ## 文档内容（多文档集合，可能已截断）
  {{ content }}

  ## 规则引擎预检测的内容元素（仅供参考）
  - 公式：{{ has_formula }}
  - 表格：{{ has_table }}
  - 图片：{{ has_image }}
  - 列表：{{ has_list }}

  请严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "media_variety": <0-10>,
    "topic_breadth": <0-10>,
    "example_richness": <0-10>,
    "summary": "<评估总结：指出多样性的亮点与不足>"
  }
  ```
output_schema:
  type: object
  properties:
    media_variety:
      type: number
      description: 媒体多样性得分（0-10）
    topic_breadth:
      type: number
      description: 主题广度得分（0-10）
    example_richness:
      type: number
      description: 示例丰富度得分（0-10）
    summary:
      type: string
  required:
    - media_variety
    - topic_breadth
    - example_richness
temperature: 0.0
seed: 42
num_samples: 3
