template_id: visual_quality
name: 视觉质量评估
dimensions:
  - dim_id: layout
    name: 排版
    description: 页面布局是否合理、结构清晰、留白适当
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: color_scheme
    name: 配色
    description: 配色是否协调、符合教学/阅读场景、对比度适宜
    weight: 0.25
    score_range: [0.0, 10.0]
  - dim_id: information_hierarchy
    name: 信息层级
    description: 标题/正文/重点的层级是否分明、主次清晰
    weight: 0.25
    score_range: [0.0, 10.0]
  - dim_id: readability
    name: 可读性
    description: 文字、字号、行距是否易读，图文搭配是否得当
    weight: 0.2
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位文档视觉设计评审专家。请基于给出的**单个**文档截图，评估其视觉质量。
  评分基于截图呈现的实际渲染效果，而非源码。

  【评审口径】
  1. 排版 layout：页面布局是否合理、结构清晰、留白适当、元素对齐有序。
  2. 配色 color_scheme：配色是否协调、对比度是否适宜阅读（尤其深色背景下的文字
     可读性）。
  3. 信息层级 information_hierarchy：标题/正文/重点的层级是否分明、主次清晰。
  4. 可读性 readability：字号、行距、图文搭配是否易读，内容密度是否合理。

  【评分锚点】9-10 视觉精良；7-8 良好；5-6 合格但有小问题；3-4 较差；0-2 严重问题。
  特别地：如截图为空白、渲染异常（如大面积空白/错位）、或文字与背景对比度严重不足
  导致无法辨识，对应维度应给低分（≤3）并在 summary 中明确指出。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。

  【输出格式硬约束】
  - layout / color_scheme / information_hierarchy / readability 四项**必须是单个数字**
    （0-10 的整数或小数），**禁止**写成对象、数组或带说明的嵌套结构。
  - 所有说明性文字只能放进 summary 字段。
  - 错误示例（禁止）：`"layout": {"score": 8, "issues": [...]}`。
  - 正确示例：`"layout": 8`。
user_prompt_template: |
  请评估以下单个文档截图的视觉质量：

  ## 文档集标题
  {{ title }}

  请结合截图，严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "layout": <0-10>,
    "color_scheme": <0-10>,
    "information_hierarchy": <0-10>,
    "readability": <0-10>,
    "summary": "<本页视觉评估总结，指出具体优缺点>"
  }
  ```
output_schema:
  type: object
  properties:
    layout:
      type: number
    color_scheme:
      type: number
    information_hierarchy:
      type: number
    readability:
      type: number
    summary:
      type: string
  required:
    - layout
    - color_scheme
    - information_hierarchy
    - readability
temperature: 0.0
seed: 42
num_samples: 1
