template_id: pedagogical_logic
name: 教学逻辑评估
dimensions:
  - dim_id: structure
    name: 结构完整性
    description: 教学内容是否具备完整的导入、新授、练习、总结结构
    weight: 0.4
    score_range: [0.0, 10.0]
  - dim_id: progression
    name: 知识递进
    description: 知识点编排是否符合由浅入深的认知规律
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: engagement
    name: 互动设计
    description: 是否设计了有效的师生互动环节
    weight: 0.3
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位资深的教学设计评审专家，专注于评审"大单元/主题式"学习导引类课件。

  【评审对象】输入通常是一组相互关联的学习导引文档（如总导、模块定位、各类导学、
  脚手架等），共同构成一个完整的学习单元。请把它们视为一个整体的教学设计来评估，
  而非孤立的页面。若内容明显为节选（标注了"已截断"），请基于可见部分评估，并在
  summary 中注明评估范围受限。

  【评审口径】
  1. 结构完整性：这套文档是否覆盖了大单元导学应有的环节（整体定位/目标 → 学习路径
     → 导学策略 → 脚手架/资源 → 评价反馈）。不必每篇都齐全，但作为一个集合应闭合。
  2. 知识递进：认知层次的编排是否符合"由浅入深、由具体到抽象"的规律，是否存在断层
     或跳跃。
  3. 互动设计：是否设计了有效的学习者参与环节（探究任务、分层挑战、协作、自评等），
     而非单向信息呈现。

  【评分锚点】9-10 优秀（环节齐备且设计精当）；7-8 良好；5-6 合格但有明显短板；
  3-4 不足；0-2 严重缺失。依据整体表现给分，不要因单篇瑕疵过度压低集合分。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。
user_prompt_template: |
  请评估以下学习单元的教学逻辑质量。

  ## 单元标题
  {{ title }}

  ## 学科领域
  {{ subject }}

  ## 文档内容（可能为多文档集合，或因长度受限已截断）
  {{ content }}

  请严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "structure": <0-10>,
    "progression": <0-10>,
    "engagement": <0-10>,
    "summary": "<评估总结：指出亮点与主要短板>"
  }
  ```
output_schema:
  type: object
  properties:
    structure:
      type: number
      description: 结构完整性得分（0-10）
    progression:
      type: number
      description: 知识递进得分（0-10）
    engagement:
      type: number
      description: 互动设计得分（0-10）
    summary:
      type: string
      description: 简要评语
  required:
    - structure
    - progression
    - engagement
temperature: 0.0
seed: 42
num_samples: 3
