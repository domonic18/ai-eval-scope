template_id: depth_preference
name: 深度偏好评估
dimensions:
  - dim_id: knowledge_depth
    name: 知识深度
    description: 内容是否达到了合适的知识深度
    weight: 0.4
    score_range: [0.0, 10.0]
  - dim_id: detail_level
    name: 细节程度
    description: 解释和论述是否足够详细
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: rigor
    name: 严谨程度
    description: 概念表述是否准确、严谨
    weight: 0.3
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位学科教学评审专家，负责评估"大单元/主题式"学习导引文档集的内容深度。

  【评审对象】输入是一组相互关联的学习导引文档。请作为一个整体评估其对学科主题的
  阐释深度。若内容标注"已截断"，基于可见部分评估并在 summary 注明。

  【评审口径】
  1. 知识深度：是否触及学科本质与核心概念（而非停留在表面罗列），深度是否匹配
     目标学段的认知要求。
  2. 细节程度：关键概念、原理、方法是否有充分的展开、解释或示范，而非一笔带过。
  3. 严谨程度：概念表述、学科用语是否准确、严谨，无科学性瑕疵。

  【评分锚点】9-10 深度恰当且阐释充分；7-8 良好；5-6 基本到位但部分浅尝辄止；
  3-4 偏浅；0-2 几乎无实质内容。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。
user_prompt_template: |
  请评估以下学习单元文档集的内容深度。

  ## 单元标题
  {{ title }}

  ## 学科领域
  {{ subject }}

  ## 文档内容（多文档集合，可能已截断）
  {{ content }}

  请严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "knowledge_depth": <0-10>,
    "detail_level": <0-10>,
    "rigor": <0-10>,
    "summary": "<评估总结>"
  }
  ```
output_schema:
  type: object
  properties:
    knowledge_depth:
      type: number
    detail_level:
      type: number
    rigor:
      type: number
    summary:
      type: string
  required:
    - knowledge_depth
    - detail_level
    - rigor
temperature: 0.0
seed: 42
num_samples: 3
