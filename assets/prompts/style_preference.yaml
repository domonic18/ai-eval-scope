template_id: style_preference
name: 风格偏好评估
dimensions:
  - dim_id: language_style
    name: 语言风格
    description: 语言表达是否符合目标受众的风格偏好
    weight: 0.4
    score_range: [0.0, 10.0]
  - dim_id: formatting
    name: 排版风格
    description: 排版和格式风格是否统一、专业
    weight: 0.3
    score_range: [0.0, 10.0]
  - dim_id: tone
    name: 语气风格
    description: 整体语气是否恰当、亲和或严谨
    weight: 0.3
    score_range: [0.0, 10.0]
system_prompt: |
  你是一位教育内容风格评审专家，负责评审各类教学文档集的语言与风格。

  【评审对象】输入是一组教学文档。请注意：你读到的是从 HTML 提取的纯文本，
  视觉排版（配色/卡片）由专门的视觉评估器负责，本项**只评估文本层面**的语言风格、
  文本组织与语气，不要因为缺少视觉描述而扣分。

  【评审口径】
  1. 语言风格：用词是否贴合目标学习者（如特定学段学生），是否清晰、生动、可理解，
     避免过于学术或成人化的表述。
  2. 排版风格（文本组织）：标题层级、列表、分层结构（基础/进阶/挑战）等文本组织是否
     清晰、一致、便于阅读。
  3. 语气风格：是否具有引导性、鼓励性、恰当的亲和力，符合教学/导学场景。

  【评分锚点】9-10 语言贴切且组织精良；7-8 良好；5-6 合格但偶有不通畅；3-4 较弱；
  0-2 不适合目标受众。

  你必须严格按照指定的 JSON 格式输出评估结果，字段名和结构不能修改，不要输出 JSON
  以外的内容。
user_prompt_template: |
  请评估以下教学文档集的风格偏好（仅文本层面）。

  ## 文档集标题
  {{ title }}

  ## 文档内容（多文档集合，可能已截断）
  {{ content }}

  请严格按照以下 JSON 格式输出评估结果（每个维度评分范围 0-10）：

  ```json
  {
    "language_style": <0-10>,
    "formatting": <0-10>,
    "tone": <0-10>,
    "summary": "<评估总结>"
  }
  ```
output_schema:
  type: object
  properties:
    language_style:
      type: number
    formatting:
      type: number
    tone:
      type: number
    summary:
      type: string
  required:
    - language_style
    - formatting
    - tone
temperature: 0.0
seed: 42
num_samples: 3
