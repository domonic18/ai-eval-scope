      - event: "甲午中日战争"
        date: "1894-1895年"
        significance: "签订《马关条约》"

      - event: "戊戌变法"
        date: "1898年"
        significance: "百日维新"

      - event: "辛亥革命"
        date: "1911年"
        significance: "推翻清王朝、结束帝制"

      - event: "五四运动"
        date: "1919年5月4日"
        significance: "新民主主义革命开端"

      - event: "中国共产党成立"
        date: "1921年7月"
        significance: "开天辟地的大事变"

      - event: "南昌起义"
        date: "1927年8月1日"
        significance: "建军节的由来"

      - event: "九一八事变"
        date: "1931年9月18日"
        significance: "日本侵华开端"

      - event: "七七事变（卢沟桥事变）"
        date: "1937年7月7日"
