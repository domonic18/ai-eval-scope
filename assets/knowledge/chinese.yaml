subject: "chinese"
description: "语文知识库：古诗作者归属纠错、小学必背古诗、常见成语正确写法"
version: "1.0"

constants: []

misconceptions:
  # ---- 古诗作者归属（小学必背75首高频篇目） ----
  - pattern: "《静夜思》.*(?:杜甫|白居易|王维)"
    correct: "《静夜思》作者为李白（唐代）"
    description: "《静夜思》是李白的名篇，不是杜甫、白居易或王维的作品"
    severity: "error"

  - pattern: "《春晓》.*(?:李白|白居易)"
    correct: "《春晓》作者为孟浩然（唐代）"
    description: "《春晓》是孟浩然的名篇"
    severity: "error"

  - pattern: "《咏鹅》.*(?:李白|杜甫)"
    correct: "《咏鹅》作者为骆宾王（唐代）"
    description: "《咏鹅》是骆宾王七岁时的作品"
    severity: "error"

  - pattern: "《登鹳雀楼》.*(?:李白|杜甫)"
    correct: "《登鹳雀楼》作者为王之涣（唐代）"
    description: "《登鹳雀楼》是王之涣的名篇"
    severity: "error"

  - pattern: "《望庐山瀑布》.*杜甫"
    correct: "《望庐山瀑布》作者为李白（唐代）"
    description: "《望庐山瀑布》是李白的名篇"
    severity: "error"

  - pattern: "《悯农》.*(?:李白|杜甫)"
    correct: "《悯农》作者为李绅（唐代）"
    description: "《悯农》（锄禾日当午）是李绅的作品"
    severity: "error"

  - pattern: "《咏柳》.*(?:李白|杜甫)"
    correct: "《咏柳》作者为贺知章（唐代）"
    description: "《咏柳》是贺知章的名篇"
    severity: "error"

  - pattern: "《绝句》.*(?:两个黄鹂).*李白"
    correct: "《绝句》（两个黄鹂鸣翠柳）作者为杜甫（唐代）"
    description: "这首《绝句》是杜甫的作品"
    severity: "error"

  - pattern: "《江雪》.*(?:李白|杜甫)"
    correct: "《江雪》作者为柳宗元（唐代）"
    description: "《江雪》是柳宗元的名篇"
    severity: "error"

  - pattern: "《早发白帝城》.*杜甫"
    correct: "《早发白帝城》作者为李白（唐代）"
    description: "《早发白帝城》是李白的名篇"
    severity: "error"

