# 地理知识准确性规则
# 覆盖范围：K-12 中国地理与世界地理常识
# 被 InfoAccuracyEvaluator 加载用于事实校验

subject: "geography"
description: "地理知识准确性规则（K-12 教育）"
version: "1.0"

# ─── 地理常数（关键数值） ────────────────────────────────────
# extract_pattern: 从文档中提取数值的正则（需包含一个捕获组）
# value: 标准值
# tolerance: 允许偏差

constants:
  # ─── 中国地理关键数值 ───

  - name: "珠穆朗玛峰海拔"
    extract_pattern: "(?:珠穆朗玛峰|珠峰|珠穆朗玛).*?(?:海拔|高度|高).*(?:≈|＝|=|约为|约|为|是)\\s*(\\d+\\.?\\d*)\\s*(?:米|m)"
    value: 8848.86
    tolerance: 5
    description: "珠穆朗玛峰海拔 8848.86m（2020年中尼联合测量）"

  - name: "长江全长"
    extract_pattern: "(?:长江|长江干流).*?(?:全长|长度|约).*(?:≈|＝|=|约为|约|为|是)\\s*(\\d[\\d,]*(?:\\.\\d+)?)\\s*(?:公里|千米|km)"
    value: 6300
    tolerance: 50
    description: "长江全长约6300km"

  - name: "黄河全长"
    extract_pattern: "(?:黄河|黄河干流).*?(?:全长|长度|约).*(?:≈|＝|=|约为|约|为|是)\\s*(\\d[\\d,]*(?:\\.\\d+)?)\\s*(?:公里|千米|km)"
    value: 5464
    tolerance: 50
    description: "黄河全长约5464km"

  - name: "中国陆地面积"
    extract_pattern: "(?:中国|我国).*?(?:陆地面积|国土面积|领土面积|国土总面积).*(?:≈|＝|=|约为|约|为|是)\\s*(\\d[\\d,]*(?:\\.\\d+)?)\\s*(?:万?平方公里|万?km²)"
    value: 960
    tolerance: 10
    description: "中国陆地面积约960万平方公里"

  # ─── 世界地理关键数值 ───

  - name: "地球表面积"
    extract_pattern: "(?:地球表面积|地球表面总面积).*(?:≈|＝|=|约为|约|为|是)\\s*(\\d+\\.?\\d*)\\s*(?:亿平方公里|亿km²)"
    value: 5.1
    tolerance: 0.2
    description: "地球表面积约5.1亿平方公里"

  - name: "地球海洋面积占比"
    extract_pattern: "(?:地球|地表).*?(?:海洋|海洋面积).*?(?:占比|占|比例|约为|约|为|是)\\s*(\\d+\\.?\\d*)\\s*%?"
    value: 71
    tolerance: 2
    description: "地球表面约71%被海洋覆盖"

# ─── 常见地理错误模式 ─────────────────────────────────
# pattern: 匹配可能的错误表述
# correct: 正确信息
# severity: error（确信错误）或 warning（可能误报）

misconceptions:
  # ─── 河流长度错误 ───

  - pattern: "长江.*?(?:全长|长度|约).*(?:5000|七千|7000|八千|8000|五千)\\s*(?:公里|千米|km)"
    correct: "长江全长约6300km"
    description: "长江长度错误（正确值约6300km）"
    severity: "error"

  - pattern: "黄河.*?(?:全长|长度|约).*(?:3000|4000|6000|三千|四千|六千)\\s*(?:公里|千米|km)"
    correct: "黄河全长约5464km"
    description: "黄河长度错误（正确值约5464km）"
    severity: "error"

  # ─── 省会城市错误 ───

  - pattern: "(?:中国|我国).*?首都.*?(?:上海|南京|广州|深圳|重庆|成都|武汉|杭州)"
    correct: "中国首都是北京"
    description: "中国首都错误"
    severity: "error"

  - pattern: "四川.*?省会.*?重庆|重庆.*?四川.*?省会"
    correct: "四川省会是成都，重庆是直辖市（1997年从四川分离）"
    description: "四川省会错误（重庆是直辖市不是四川省会）"
    severity: "error"

  - pattern: "浙江.*?省会.*?南京|南京.*?浙江.*?省会"
    correct: "浙江省会是杭州（南京是江苏省会）"
    description: "浙江省会错误"
    severity: "error"

  - pattern: "江苏.*?省会.*?杭州|杭州.*?江苏.*?省会"
    correct: "江苏省会是南京（杭州是浙江省会）"
    description: "江苏省会错误"
    severity: "error"

  - pattern: "福建.*?省会.*?(?:厦门|泉州)"
    correct: "福建省会是福州（厦门是经济特区，不是省会）"
    description: "福建省会错误"
    severity: "warning"

  - pattern: "广东.*?省会.*?(?:深圳|东莞|佛山)"
    correct: "广东省会是广州（深圳是经济特区，不是省会）"
    description: "广东省会错误"
    severity: "warning"

  - pattern: "广西.*?省会"
    correct: "广西是自治区，首府为南宁（非省会）"
    description: "广西行政称谓不准确（应为首府）"
    severity: "warning"

  - pattern: "山东.*?省会.*?(?:青岛|烟台)"
    correct: "山东省会是济南（青岛是副省级城市，不是省会）"
    description: "山东省会错误"
    severity: "warning"

  - pattern: "辽宁.*?省会.*?(?:大连|鞍山)"
    correct: "辽宁省会是沈阳（大连是副省级城市，不是省会）"
    description: "辽宁省会错误"
    severity: "warning"

  - pattern: "河南.*?省会.*?(?:洛阳|开封)"
    correct: "河南省会是郑州（洛阳、开封是历史古都，非现任省会）"
    description: "河南省会错误"
    severity: "warning"

  # ─── 行政区划错误 ───

  - pattern: "新疆.*?不是.*?(?:最大的|面积最大)|最大的.*?省.*?不是.*?新疆"
    correct: "新疆是中国面积最大的省级行政区，面积约166万平方公里"
    description: "新疆面积事实错误"
    severity: "error"

  - pattern: "海南.*?不是.*?经济特区|经济特区.*?不.*?海南"
    correct: "海南是中国最大的经济特区（1988年设立）"
    description: "海南经济特区事实错误"
    severity: "error"

  - pattern: "台湾.*?不是.*?中国|台湾.*?独立"
    correct: "台湾是中国领土不可分割的一部分"
    description: "台湾归属事实错误"
    severity: "error"

  # ─── 地理常识错误 ───

  - pattern: "长江.*?注入.*?(?:黄海|南海|日本海|渤海)"
    correct: "长江注入东海"
    description: "长江入海口错误"
    severity: "error"

  - pattern: "黄河.*?注入.*?(?:东海|南海|日本海|渤海以外的海)"
    correct: "黄河注入渤海"
    description: "黄河入海口错误"
    severity: "error"

  - pattern: "(?:最高峰|世界最高峰).*?不是.*?珠穆朗玛|珠穆朗玛.*?不是.*?(?:最高峰|世界最高)"
    correct: "珠穆朗玛峰是世界最高峰，海拔8848.86m"
    description: "世界最高峰事实错误"
    severity: "error"

  - pattern: "中国.*?没有.*?(?:内陆国|邻国|接壤)|中国.*?不与.*?接壤"
    correct: "中国陆地边界线约2.2万千米，与14个国家接壤"
    description: "中国邻国事实错误"
    severity: "error"

  - pattern: "北京.*?不.*?靠海|北京.*?内陆|北京.*?没有.*?出海"
    correct: "北京距海约150km，虽不直接临海但距海较近，经天津可出海"
    description: "北京地理位置表述不严谨"
    severity: "warning"

