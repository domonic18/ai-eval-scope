name: CI (Web)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  pull_request:
    paths:
      - "web/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      # 后端测试为集成测试，需 postgres + 对象存储(minio) + 完整运行期 env
      # CI 暂只做静态检查；本地运行：make docker-up 启动全栈后 cd web/backend && npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run build
