name: CI (Python)

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "web/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "web/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evaluator
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check agent_eval tests

      - name: Ruff format check
        run: uv run ruff format --check agent_eval tests

      - name: Pytest
        run: uv run pytest tests/unit -q
