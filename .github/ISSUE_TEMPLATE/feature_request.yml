name: 🚀 功能建议
description: 提议一个新功能或改进
labels: [enhancement]
title: "[Feature] "
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么痛点？当前如何绕过？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么实现？可附使用示例。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案

  - type: checkboxes
    id: contribute
    attributes:
      label: 是否愿意贡献
      options:
        - label: 我愿意实现这个功能并提交 PR
